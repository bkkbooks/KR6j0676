body:
  text: 一名中印度那蘭陀大道場經於灌頂部錄出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集註明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閱鋟阿難世間一切所修心人不假禪那無有智慧但能執身不行婬欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵眾天資中云不假禪那無有智慧者統明修行皆假禪定後發智慧定慧均等方稱靜慮此釋禪那之總名也若行若坐想念不生者欲愛初盡淨相現前味此而生名為梵眾即凡夫所修六行伏惑之相也手鑑云六行事觀者謂是凡夫起世間道伏惑之行相也故俱舍論云世道緣何作何行相頌曰世無間解脫如次緣下上作粗苦障行及淨妙離三論曰世俗無間及解脫道如次能緣下地上地為粗苦障及淨妙離謂無間道緣自次下諸有漏法作粗苦障三行相中隨一行相若諸解脫道緣彼次上諸有漏法作淨妙離三行相中隨一行相非寂靜故粗非美妙故苦非出離故障淨妙離三翻此應知謂若精進作此六行斷結之道伏却下地煩惱命終即受上二界生又六行忻厭各三若所忻厭體則隨何地各各不同如欲惡不善為初禪所厭尋伺為二禪所厭乃至無所有寂然而住為有頂所厭如次欣上亦例可知又初禪為下未至地心所欣為淨妙離為他二禪近分地心所厭為粗苦障則欲界法唯是所厭非欣有頂地法唯是所欣非厭中間地法通可厭可欣携李云言不假者但約不修無漏定慧為言餘同六行補遺云執身戒也行坐無定念也欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天孤山云內定外戒倍勝於前故能行梵德為王輔弼也補遺云欲習既除名伏為除也離欲心現初禪發也以初禪九品故次第發也身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵眾為大梵王如是一類名大梵天手鑑云如佛地論云離欲寂靜故名為梵具云梵摩此云清潔寂靜謂創離欲染故名清潔得根本定名為寂靜貌如童子身白銀色衣黃金衣禪悅為食是娑婆世界主也孤山云以上之三天不顯言修禪唯言持戒者蓋此經扶律以勵未來故資中云俱舍論明大梵天威德光明獨一而住無尋唯伺定力所感下二天具有尋伺熏聞云論明三摩地有三種一有尋伺謂初禪及未至定也二無尋唯伺謂中間禪三無尋無伺謂二禪近分乃至非想等今大梵天即中間定力所感補遺云資中引俱舍言大梵天是無尋唯伺者當是初禪大梵進修中間言之耳若就初禪只是有尋有伺也又劫末後去劫成先來外道不測故執為常也熏聞云證真言劫初成時梵王先生猶住一劫未有梵侶後起念云願諸有情來生此處作是念已梵子即生外道不測便執梵王是常梵子無常手鑑云然一切外人所計不過二天一謂摩醯首羅二謂毗紐摩醯首羅此云大自在色界頂天三目八臂騎白牛執白拂有大威力能傾覆世界世皆尊之以為化本毗紐此翻徧勝亦云徧淨俱舍云是第三禪頂有云欲界之極大論云徧淨天者四臂捉貝持輪騎金翅鳥有大神力而多恚害時人畏威遂加尊敬劫初千頭少一二十四手化生水上臍中有千葉蓮華華中有光光如萬日俱照梵王因此下生念言何故空無眾生作是念時他方世界眾生應生此者有八天子忽然化生八天子是眾生之父母梵王是八天子之父母毗紐是梵王之父母此皆遠推根本也譬喻經云諸外人計梵王生四姓口生婆羅門臂生剎帝利脇生毗舍足生首陀中含長含亦更有說皆名同少異法華亦權指云梵王是一切眾生之父亦遠推本而言也荊公云梵此言淨然華嚴經有淨行品又有梵行品如天淨乃名為梵阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪資中云一切苦惱所不能逼離欲界八苦也孤山云禪有四類一有漏禪即今四禪二無漏禪謂九想八背等三亦有漏亦無漏禪謂六妙通明等四非有漏非無漏禪即此經首楞嚴王中道理定今云雖非正修真三摩地此以第一簡非第四清淨心中正指初禪也諸漏不動已伏欲惑也荊公云諸漏不動雖未能伏漏然能持使不動此天有覺觀支故苕溪云初禪修五法離五蓋成五支具有八觸十功德相熏聞云五法者欲念精進定慧一心也五蓋者貪欲嗔恚睡眠掉悔疑也五支者覺觀喜樂一心也八觸者動痒涼暖輕重澁滑復有八觸曰掉猗冷熱浮沈堅軟此八雖與前觸大同若細分別不無小異合而言之名十六觸十功德者一定二空三明淨四喜悅五樂六善心生七知見明了八無累解脫九境界現前十心調柔輭云云阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天其次下牒前大梵澄心下正明少光補遺云經次第牒前寄一人次第修習以示耳統攝梵人牒前也圓滿梵行起後也資中云二禪已上無有語言但以定心發光光有勝劣分其高下光光相然照耀無盡映十方界徧成琉璃如是一類名無量光天長水云從前少光更發多光光相轉增名光光相然真際云映十方界者約其定光隨所受用東西等言之非徧十方世界也吸持圓光成就教體發化清淨應用無盡如是一類名光音天孤山云舊解云擥慧光之應用為表詮之教體以代言詮故名光音發化清淨者十四變化心也智欲圓光也真際云教體即言詮也以光為音表了無盡故云發化清淨等長水云以二禪界地無有五識外乘及凡夫若在定時俱不能起前五了境但用光明以為表詮以光為音名光音天荊公云非特吸持圓光又能成就教體故名光音吸言不散持言不失此天有內淨支路阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中麤漏已伏名為二禪苕溪云地持論目第二禪為喜俱禪此定生時與喜俱發故今說云一切憂懸所不能逼問初禪五支已具於喜何以二禪方名喜俱答初禪有覺有觀猶帶憂懸今覺觀既盡故別受斯稱熏聞云此有四支謂內淨喜樂一心此禪發時如人從暗室中出見日月光明其心豁然明亮八觸十功德亦同初禪但從內淨俱發為異懸者繫也以離覺觀故無所繫著荊公云粗漏已伏者有內淨支故然尚有喜支但能以伏下地粗漏而已上地微細未能伏也阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天苕溪云圓光成音指前教體也披音露妙即發化清淨也補遺云如是二句牒前也披音露妙下正明三禪也披去光音之教跡露出此妙性之定也良以二禪有內喜之染此中去之所以名淨耳進修三禪故發成精行證得少淨故通寂滅樂發成精行者純修之定也通寂滅樂一心支也荊公云披音露妙者能披發音元知教之所由成能開現妙性見光之所從生此天有慧支故淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天苕溪云既得少淨空相現前復以定力引發少相令無邊際望上未徧望下則多故名無量世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名徧淨天上身心輕安且言其內今世界等者總攝於外勝定所託一切淨相既現於前還歸內心寂滅之樂荊公云發成精行通寂滅樂能通而已淨空現前引發無際身心輕安然後樂成勝託現前則有所託地故曰歸寂滅樂阿難此三勝流具大隨順身心安隱得無量樂雖非正修真三摩地安隱心中歡喜畢具名為三禪資中云具大隨順意地異熟樂隨順自在故熏聞云證真云異熟樂者徹於意地徧身適悅與五識相應不可分別也苕溪云地持論目第三禪為樂俱禪此有五支謂捨念慧樂一心此定功德與徧身樂俱發故前二禪雖有樂支為喜支所障今滅喜純樂故得其名而云歡喜畢具者名同體別不以文害意荊公云安隱心中歡喜畢具是為樂支非喜動也阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨麤重相滅淨福性生如是一類名福生天復次下結三禪之德樂非下顯三禪之過若樂下正示福生也三禪無下界苦因雖名為樂樂久必壞壞亦成苦今既捨樂苦則不生地持名此為捨俱禪其義同矣補遺云指前三禪離下界內喜之動故曰不逼身心樂非常住者樂壞苦生非所以為福也熏聞云淨福性生性謂體性亦約內說此禪與微妙捨受俱發故名捨俱禪具有四支一不苦不樂支二捨三清淨四一心支福生餘經或名無雲天第二福愛名福生天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天補遺云前福生天以捨樂為福今捨心轉勝愛樂此福故名福愛與前福生深淺之別矣下三句明因福愛故分二岐上二句以捨心轉勝正明福愛因此愛樂不止故生廣果無想也從廣果天出生五那含無漏之業窮未來際挹其源蓋出此福愛樂悅之心所以於此言之者明福愛之功耳苕溪云得妙隨順即隨順下文二岐路也由此淨福體性無遮愛樂修習勝妙之法是則福資二路非止當天故云窮未來際長水云於福愛中分二所向一直往道即至廣果二迃僻道即至無想補遺云然則所以此中方分二路者良由捨心勝妙若福德純厚堪為出世之基加四無量心則生廣果若資捨心灰斷僻見故生無想良由空法誤人多矣例如通教三人證空二乘取證菩薩於空自能化物也阿難從是天中有二岐路若於先心無量淨光福德圓明修證而住如是一類名廣果天資中云於福愛中分出二天一廣果二無想此廣果天以四無量心熏禪福德離下地染廣福所感名廣果天熏聞云即廣果之因修證而住且約不生無想言之若厭色窮空亦復無住若於先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天資中云此計無想為涅槃以捨心為方便初捨粗心入於微心復從微心入微微心從微微心便即灰凝常修不息命終生此五百大劫後還退墮是人不了妄性體空乃執生滅以為勞慮厭此生滅求不生滅非真不生也但見第六識不行如氷夾魚不知微細生滅妄謂涅槃故於受生半劫有生半劫方滅准俱舍論引婆沙釋彼生死位中初生彼天經半劫始入無想異熟欲無常時從異熟出經半劫有心後方始死補遺云應知無想壽五百大劫但初生至彼先經半劫猶覺有心方入無想故曰初半劫滅壽五百劫已當報盡時又經半劫覺有心想方始無常故曰後半劫生再生心想故曰生也熏聞云百法論名為無想報屬不相應行彼疏云由欲界修感彼天果名無想報亦云無想異熟此有三義一變異而熟要因成熟方能招果二異時而熟過去造因今現得果三異類而熟由善惡因感無記果證真云然此四禪總報別業但有三品感下三天其無想天秪是廣果天中別報凡夫境界上極於此後五不還亦是聖人雜修靜慮資廣果天業令五品殊勝生彼受樂與凡夫不同阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪資中云俱舍云第四禪離八災患所謂尋伺苦樂憂喜出息入息亦不為水火風三災所動名不動地阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙亡下無卜居故於捨心眾同分中安立居處五不還者第三果人已斷欲界九品修惑種現俱盡更不還求下界受生名為不還苦樂雙亡者又能進斷第三禪染已離下地未超色界故於此中安立居處俱舍云雜修靜慮有五品不同故生五淨居雜修者以有漏無漏間雜而修之也梵語阿那含此云不還亦名不來俱舍論色界有五種那含頌曰此中生有行無行般涅槃上流若雜修能至色究竟言五種者一中般謂往色界住中有位便般涅槃二生般謂生色界已不久便般涅槃三有行般謂生色界已長時加行不息由多功用方般涅槃四無行般謂生色界已經久加行懈怠不多功用而般涅槃此有二種由因與果異故因異者有雜修無雜修也果異者至色究竟及有頂也前是觀行後是止行樂慧樂定不同故今五不還天即樂慧者所生也初二三禪皆有九品修惑俱名為染頌曰由雜修五品生有五淨居論曰由雜熏修第四靜慮有五品故淨居唯五如是五品雜修靜慮如其次第感五淨居有餘師言由信等五次第增上感五淨居云云手鑑云五淨居者正理論云離欲諸聖以聖道水濯煩惱垢故名為淨淨身所止故名淨居或住於此窮生死邊如還債盡故名為淨淨者所住故名淨居或此無異生雜純聖所止故名淨居五品者謂以有漏無漏雜資廣果故業令其殊勝轉生五淨居天故有五品然何故須雜耶謂五淨居無別引業一切有情法爾第四禪中秪有三品總報引業生彼三天聖人既無煩惱故須雜修下三天故業生五天也然所資故業是一由能資因行相有五故感五天五品者謂下中上上勝上極也手鑑云此五皆有加行根本且初下品先起多念無漏又起多念有漏後又起多念無漏如是漸滅至二念時名加行次起一念無漏有漏無漏名為根本謂前後是無漏中間是有漏間雜修故名為雜修由此資於故業從廣果沒便生無煩次中品有六心用前下品三心為加行更引生三心一念無漏有漏無漏為根本資其故業從廣果沒能超無煩生於無熱三上品有九心用前六心為加行更引三心以為圓滿資於故業超於一二而生第三四上勝品有十二心用前九心為加行更引三心為根本資於故業超三生四五上極品有十五心用前十二心為加行更引三心為根本資於故業能超四天生色究竟阿難苦樂兩滅鬪心不交如是一類名無煩天機括獨行研交無地如是一類名無熱天十方世界妙見圓澄更無塵象一切沈垢如是一類名善見天精見現前陶鑄無礙如是一類名善現天究竟羣幾窮色性性入無邊際如是一類名色究竟天苕溪云若有苦樂勢必相傾是猶鬪戰交於內心也又心受苦境則與苦苦交鬪心受樂境則與壞苦交鬪今既兩滅故名無煩長水云苦樂心滅敵對則亡形待既無故云不交不交則無煩也初滅苦樂二形待心雜修初品釋要云即下品心資也謂行人先入四禪定已於此定中先起多念無漏心相續現前次起多念有漏心相續現前又起多念無漏心相續現前如是漸漸減至二念無漏二念有漏二念無漏時名雜修加行成滿次起一念無漏一念有漏一念無漏至此名為根本成滿由此有漏無漏間雜修故名為雜修亦名夾熏禪以用無漏夾熏有漏色定轉明果報轉勝由此資故業故從廣果沒便生無煩天也稍離定障名為無煩煩即障也補遺云若在三禪而下苦樂交戰於胷中孤山云機弩牙也栝箭括也凡箭弩之發必欲中的有研交之地今捨心獨行無苦無為違順之境譬箭發而交也既無違順故無熱中之患無煩言其絕外境無熱言其絕內心長水云雜修上品此品有九心用前六心為加行更起三心為根本資故業故從廣果沒生善見天無漏功著定慧障亡故能妙見圓澄十方世界名善見天塵象沈垢即定慧之障也孤山云如陶師之為器爐治之鑄像言其作用自在也補遺云精見指前善見陶鑄方指今文善見言體善現言用陶鑄猶言出生也能起十四變化自在故也苕溪云究竟研窮之義也幾者動之微也研窮多念至於一念故曰究竟群幾以雜修五品初用多念無漏熏多念有漏乃至最後用一念無漏熏一念有漏名上極品故俱舍云成由一念雜是也窮色性性者窮亦究竟變其文耳心既熏多至少色亦窮粗至微粗細不同故曰性性入無邊際即色界與無色界二邊之交際也俱舍云從此向上無復所居此處最高名色究竟熏聞云此略示初後二品雜修之相如第四禪先修得已更以多念無漏相續而起從此引生多念有漏然後復起多念無漏即初品三心也如是後漸漸減少乃至二念名加行成唯有一念名根本成阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間麤人所不能見阿難是十八天獨行無交未盡形累自此已還名為色界孤山云獨行無交俱無情欲故未盡形累尚有色質故復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為迴心大阿羅漢苕溪云色究竟天第三果人根有利鈍故分二路其利根者發無漏智斷盡修惑即出三界其鈍根者復由定心欣上厭下生無色界應知慧光圓通且約盡無生智圓滿而言謂見苦已斷乃至道已修名盡智不復更斷乃至不復更修名無生智入菩薩乘正約出三界後勝進而說斯亦今經破定性之明文也若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處諸礙既銷無礙無滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處長水云捨心有二一者若於有頂用無漏道斷惑入空即樂定那含也二者若於廣果用有漏道伏惑入空即凡夫外道也無漏道謂八聖種觀有漏道即六行觀八聖種觀者觀五陰如病如癰如瘡如刺無常苦空無我云云以此二天俱在捨心共一地故真際云諸礙既銷厭色歸空也無礙無滅厭空欣識無礙之無亦復滅也孤山云空處亡色識處亡空今識處亦滅故無所有苕溪云前無所有處雖云滅識而體性不動但滅微細窮研之分耳今於無盡性中發宣盡性即是從盡復立無盡故天台禪門出古師解云此定中不見一切相貌故言非想若一向無想如木石無異云何能知無想故言非非想如存不存即非想也若盡非盡即非非想也熏聞云前觀識處是有想無所有處是非想今雙遣之又凡夫外道得此定謂證涅槃斷一切想故言非想佛弟子如實知有細想依四陰而住故云非非想此約得失合而名之此等窮空不盡空理從不還天聖道窮者如是一類名不迴心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉苕溪云此等窮空通指凡聖欣厭未盡故言不盡空理縱是聖人修八聖種觀亦有四陰細惑未亡以未得滅受想定故欣厭未盡者欣即窮空之心厭是捨苦之行此四空處生滅猶在真空不明故云未盡也縱是聖人等者謂五不還人修八聖種觀雖有頂亦不免生滅四陰細惑者具有十種心心數法謂受想行觸思欲解念定慧云云從不還天下明聖人有生此處者是鈍根那含耳言羅漢者約後為名也若從無想下明外道有不生此處者謂窮空不歸也補遺云此等指前四空也窮空該於二類即不還無想自從不還下釋出二類窮空不歸者謂外道徒能窮空不反照性不歸真理也則顯不還能窮空歸真者矣但諸師泥於經論便謂無想不能復至四禪空或指廣果同名無想或以不歸強作不來唯孤山云然人根不一諸教偏說一分耳況今明云從無想諸外道天來豈可違經蓋由無想天者外道所居多分壽盡便應墮落又是斥邪政自不能不爾豈可無有報盡復至四空者乎問無想壽五百劫一向灰凝何處可云復窮空也今斟酌其義恐取初生半劫想未滅時因又窮空迴生四空又五百劫後仍經半劫有想復生既未墮落有利根者又復窮空乃生上天也阿難是諸天上各各天人則是凡夫業果酬答答盡入輪彼之天王即是菩薩遊三摩提漸次增進迴向聖倫所修行路資中云准華嚴經皆是登地菩薩亦為天王然則別圓二教法身大士方能為也孤山云遊三摩提者以菩薩善入出住百千三昧故住此定而為天主善入出者九次第定善入師子奮迅善出超越三昧善住孤山云若達禪實相即號楞嚴阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界無業果色者顯有定果色也定果色出百法輪若顯揚論名定自在所生色謂勝定力故於一切色皆得自在即以定變起五塵之境也補遺云有質礙義定法持心使不散亂似有質礙亦假色也若顯揚聖教論定自在所生色乃定之用非定果之比此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沈溺補特伽羅各從其類孤山云補特伽羅此云數取趣即有情隨諸趣受生也謂數數取諸趣故復次阿難是三界中復有四種阿修羅類若於鬼道以護法力成通入空此阿修羅從卵而生鬼趣所攝若於天中降德貶墜其所卜居鄰於日月此阿修羅從胎而出人趣所攝有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝阿難別有一分下劣修羅生大海心沈水穴口旦遊虗空暮歸水宿此阿修羅因濕氣有畜生趣攝苕溪云俱舍四生頌但云鬼通胎化二今卵生修羅鬼趣所攝則世親之言似未詳矣問法華所列四種修羅與今四種為同為異答彼四秪可攝在此四之中不可次第分屬其類荊溪云法華四種皆與帝釋𩰖戰一往觀之但同今經第三類耳問此四修羅既為四趣所攝應無別報同分之處耳答雖屬四趣非無別報今云卜居鄰於日月等即同分之處也又長阿含云南州有金剛山中有修羅宮所治六千由旬欄楯行樹等然一日一夜三時受苦苦具自來入其宮中是知此趣且取一分善報謂之人天若論受苦實在人趣之下故正法念經唯以鬼畜二種收之良由於此孤山云若依七趣優劣則修羅在人趣之下今為攝屬不定故在其後熏聞云能與梵王等爭權此鬪戰修羅廣如正法念經所說彼云若閻浮提人順法修行孝事父母供養沙門及婆羅門恭敬耆舊大眾則勝若諸世人不順法教修羅則勝起世經云修羅所居宮殿城郭器用降地居天一等亦有婚姻男女法式略如人間別報補遺云生大海心總舉其處也沈水別目也在大海心或在水底故曰沈水或在洩水之穴故曰穴口如莊子曰尾閭洩之注云尾閭東海川名疏云尾閭洩海水之所也在碧海之東其處有石濶四萬里百川之下尾而為閭族故曰尾閭今言穴口似尾閭洩水之所阿難如是地獄餓鬼畜生人及神仙天洎修羅精研七趣皆是昏沈諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒阿難此等眾生不識本心受此輪迴經無量劫不得真淨皆由隨順殺盜婬故反此三種又則出生無殺盜婬有名鬼倫無名天趣有無相傾起輪迴性長水云鬼倫天趣略舉四惡三善之二也荊公云有對則有待有執則有釋執有以為樂則與苦對其釋也苦代之故人樂終於壞執無以為淨則與染對其釋也染代之故天淨終於墮墮則所無更有壞則所有更無若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不婬云何更墮殺盜婬事孤山云有無二無無生死之俗也無二亦滅滅涅槃之真也尚無於善況隨於惡亦應云尚無無二云何隨二中道無著其旨惟明阿難不斷三業各各有私因各各私眾私同分非無定處自妄發生生妄無因無可尋究此亦結酬阿難前問長水云殺盜婬三隨人別造名各各私所造攸同故云同分言因各各私者若作因果之因指造業私因也若作因由之因因此私業聚其眾私則有同分之處也同分猶言同類也荊公云與物有合故婬業不斷與物有分故殺偷不斷有分有合以取我故既取我矣各各有私矣同分妄業非無定處若了唯心即無此取著汝勗脩行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道雖欲除妄倍加虗偽如來說為可哀憐者汝妄自造非菩提咎前言婬落魔道今言不盡三惑落於魔道鬼神精靈好魅邪人皆魔所攝作是說者名為正說若他說者即魔王說即時如來將罷法座於師子牀攬七寶几迴紫金山再來凭倚普告大眾及阿難言長水云此經家敘佛答阿難七趣已竟慶喜既默眾又無辭故云將罷法座然禪發境界非一切智孰能知之若不與說末代脩行遇此難敵故再凭几顯悲深也汝等有學緣覺聲聞今日迴心趣大菩提無上妙覺吾今已說真脩行法汝猶未識脩奢摩他毗婆舍那微細魔事魔境現前汝不能識洗心非正落於邪見孤山云奢摩他止也毗婆舍那觀也依常住真心脩圓融止觀則多動魔事即是天台所說因觀五陰而發九境也故下五十重悉依陰發而其相狀不出煩境熏聞云止觀中凡列十境一陰入二九惱三病患四業相五魔事六禪定七諸見八上慢九二乘十菩薩初境現觀餘九待發補遺云止觀云陰入二境常自現前若發不發恒得為觀餘九境發可為觀不發何所觀疑者云所觀何故不立佛境今謂若云佛境已屬能過非所發也止觀記云縱有佛境亦名為雜此正為揀所脩圓頓能過佛境兼名利心無非雜毒故也熏聞云不出九境者且約大槩言之若病患及菩薩境其相則隱苕溪云今經五陰之下佛皆結云眾生頑迷不自忖量謂言登聖大妄語成墮無間獄約位論之此等魔事並是觀行位中所發之相從相似位破見惑後必無大妄墮獄之理若十信中縱有魔事觀力易防非此經所說之意也故下文云識陰若盡則汝現前諸根互用豈非相似已出魔境耶問若言此等魔事並是觀行所發之境秪如上文所告有學二乘及迴心者豈可盡是外凡之人乎答此有二意一告當機已破惑者令其流通二告結緣未破惑者令其保護然結緣則少當機則多至下付囑自見其意補遺云既云有學二乘今日迴心趣大乘者非下位人矣而云未識魔事者豈非寄聖規凡成流通事耶如法華中勗誡妙音以規所將熏聞云魔事者梵語魔羅此翻殺者能殺人法身慧命故亦名奪者能奪人善法故補行云天魔正以順生死貪五欲退菩提嫉眷屬為事行者宿行魔業今違宿因宿事來遮故曰魔事魔境現前者魔有四種謂五陰天子煩惱死也今所現者皆是於五陰中為天子煩惱之所惑亂唯受陰中云心不欲活有同死魔亦天魔使然耳或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄長水云陰魔等者常說四魔謂煩惱魔生死因陰魔死魔生死果天魔生死緣也今云鬼神等即天魔屬若涅槃云皆是先世犯初重禁乃至餘篇而現者此則業因種子被激而生是故行人先須明擇苕溪云智論云有一比丘脩得四禪生增上慢謂得四道恃此而止不復進求命欲盡時見四禪中陰相便生邪見謂無涅槃佛為欺我惡邪生故失四禪中陰見阿鼻中陰相於是命終生泥犂中補遺云經中自約生四禪者認為涅槃天報將盡衰相現前知非真滅因此生謗不可用大論修四禪人方入中陰便生邪見為同類也今經所指別是一緣但未見其文或梵文未到耳謗阿羅漢身遭後有即謂無涅槃復生三相也汝應諦聽吾今為汝子細分別阿難起立并其會中同有學者歡喜頂禮伏聽慈誨佛告阿難及諸大眾汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發徧迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶長水云無明妄想迷真常理遂成四惑略舉其二故云癡愛發生若具對者先由不如實知真如法一即我癡次於迷處見有所相即我見所相既現執而不捨即我愛恃此為體轉增麤顯即我慢楞伽云七識生滅如來藏不生不滅此二和合成阿犂耶此即內識成也故云徧迷故有下外器具也則此下重指非無漏者反顯諸佛淨土即是鏡智所現唯識云大圓鏡智能現能生身土智影今此有漏皆妄安立苕溪云非無漏者謂微塵國土悉是有情有漏之所變造亦可此句別指眾生正報兼于上文復具虗空之同世界之異非無漏者即有為法無同無異也當知下略舉世界總攝情器補遺云癡愛等者此取在迷一念未與諸使合時多為癡愛此迷初動與真性似同尚徧一切未局其體故有空性汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂苕溪云前微塵國土且約同居而說究論歸元振裂之義須通三土若發偏真歸小涅槃之元則同居振裂若發圓真歸大涅槃之元則方便實報振裂今已開小顯大則真元之理無非寂光但有相似分極之異耳熏聞云若以寂光對破三土從界外次第而說則相似銷同居分證殞方便極果裂實報汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通㳷當處湛然飾猶莊嚴也謂修禪定功德莊嚴本有真三摩地以修飾故菩薩羅漢所證心性與我所觀心性通同㳷合此即動魔之由㳷與泯同由唐太宗諱民故此易之一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚慴由三摩地將出其境故魔等宮殿自然崩裂斯亦歸元之前相也近指欲界遠指非想補遺云上云一人發真十方銷殞此約自行一人所見今云魔外同能見不與上文意同今明動魔蓋是三昧欲成驗其已證特以威神振裂宮殿激怒其意使之來惱耳凡夫昏暗不覺遷訛苕溪云此釋伏疑也恐疑者曰魔及諸天既見其相凡夫何事都不覺知故此釋云彼等咸得五種神通唯除漏盡戀此塵勞如何令汝摧裂其處是故神鬼及諸天魔魍魎妖精於三昧時僉來惱汝熏聞云止觀云一切鬼神屬六天管當界防戍故來相惱僉者皆也然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅氷暖氣漸隣不日銷殞徒恃神力但為其客成就破亂由汝心中五陰主人主人若迷客得其便補遺云觀力既勝彼魔將破故如其客所以經中一句即云成就破亂是也如下又曰則彼群邪咸受幽氣者以敗者屬幽陰故也五陰主人者觀五陰得其真性方曰主人經中既通舉五陰則如達色無色即色陰主人苕溪云觀行位中人法二執伏而未斷若起我見主人則迷魔乘見入客則得便當處禪那覺悟無惑則彼魔事無奈汝何陰銷入明則彼群邪咸受幽氣明能破暗近自銷殞如何敢留擾亂禪定咸受幽氣者魔以幽暗惑人人既不惑反受其氣若不明悟被陰所迷則汝阿難必為魔子成就魔人長水云殷勤啟悟令識魔惑五陰所惑魔得其便故正理論云五蘊者積聚藏隱諸不善因譬如群賊藏隱山中時出人間劫奪財物故知五陰魔所依處若能觀破魔自銷歇苕溪云此寄阿難用警凡眾如摩登伽殊為眇劣彼唯呪汝破佛律儀八萬行中秪毀一戒心清淨故尚未淪溺孤山云以婬女比天魔人眇劣也以一戒比全身事眇劣也舉劣況勝勗彼深防初果道共戒力自然無犯故云心清淨等此乃墮汝寶覺全身如宰臣家忽逢藉沒宛轉零落無可哀救漢書云除其屬籍是也應邵曰籍者為二尺竹牒記其年紀名字物色阿難當知汝坐道場銷落諸念其念若盡則諸離念一切精明動靜不移憶忘如一資中云攀緣妄想總名諸念心若澄靜麤念不起是為銷落此欲界麤定暫得相應耳苕溪云離念者如天台止觀止脩前方便訶欲離蓋等是也所離雖近能離則深非欲界麤定補遺云觀力漸成不為動散所改故曰不移出定為動入定為靜心記為憶不記為忘起信云止一切境界相今經云消落諸念能所二緣經論互舉依此離念深入正定自然憶忘如一也當住此處入三摩提如明目人處大幽暗精性妙淨心未發光此則名為色陰區宇長水云心入正定如明目人未破色陰如大幽暗區宇寰區也如王所統有諸國土故云區皆一天所覆曰宇若目明朗十方洞開無復幽暗名色陰盡是人則能超越劫濁真際云空為色本依空立界依界立時故色陰盡則超劫濁也長水云問色陰麤顯觀中先破劫濁最細何得却超答以起時無前後故破時兼麤細文不累書故見生起有次第耳又色陰現相是本識今色陰破即現相破現相破即動本識本識豈非劫濁故得超也補遺云應知劫者時分也據俱舍自減劫至二萬歲時方名劫濁今楞嚴所明迷真為空依空立界皆時分之義但迷真為空劫猶未濁迷空立界依正之色乃劫濁之時故今破色陰乃超劫濁矣觀其所由堅因妄想以為其本堅固妄想者覺明堅執質礙成色之體故云堅固阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流溢前境斯但功用暫得如是非為聖證熏聞云四大不織者因畢竟空亡堅固執故見四大無交織之相補遺云四大不織即止觀中通修通發陰解虗融故得四大無交織相身能出礙等者由研妙性內明外虗故得依報不礙下文流溢形體乃是正報虗融谷響云流溢前境即墻壁外色無礙下文流溢形體即色身內色無礙不作聖心名善境界若作聖解即受群邪孤山云凡諸境發雖是善相取著成邪任是惡相若不取著邪亦成正以境隨心轉故阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受群邪又以此心內外精研其時魂魄意志精神除執受身餘皆涉入若為賓主忽於空中聞說法聲或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證補遺云指前外境內身虗融今雙研之故曰內外精研魂魄等六皆第六識意志言其體也精神言其氣也魂魄言其用也左傳曰人始化曰魄既生魄陽曰魂谷響云白虎通云魂猶沄沄也行不休於外而主于情也魄孝迫然著人主於性也魂者芸也情以除穢魄者白也性以治內精者靜也太陽施化之氣也象火之任生也神者恍惚太陰之氣也今謂意即心王志即心所如云在心為志各言爾志皆所志不同正屬于想也孤山云除執受身餘皆涉入謂除其色身而內魂魄等六互相涉入也苦為賓主者若如也餘五入魂則魂如主五如賓乃至入神則神如主餘如賓遞相離合者即精離本位而合於魂或魂離本位而合於精也不作聖心名善境界若作聖解即受群邪又以此心澄露皎徹內光發明十方徧作閻浮檀色一切種類化為如來於時忽見毗盧遮那踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證熏聞云毗盧遮那此翻徧一切處斯是法身若現踞天光臺合是盧舍那報身之相以唐時譯經法報不分故也補遺云文句記云近代翻譯法報不分二三莫辨自古經論許有三身若言毗盧與舍那不別則法身即是報身此斥法報名相不揀他宗乃謂毗盧舍那異名一體左右之稱不作聖心名善境界若作聖解即受群邪又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時徧滿不相留得青黃赤白各各純現此名抑按功力逾分暫得如是非為聖證苕溪云抑按降伏制止超越應對四分煩惱或如下文排四大性此名等從略而結也不作聖心名善境界若作聖解即受群邪又以此心研究澄徹精光不亂忽於夜合在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證補遺云暗中見物乃行者觀力見如白晝彼暗中物自受暗蔽不能滅其暗相耳假如兩人居在暗中一人觀力見如白晝彼無觀力豈亦爾耶不作聖心名善境界若作聖解即受群邪又以此心圓入虗融四體忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證資中云心融思寂執受不行四大五塵忽然排併既無能執割截如空念想一純暫得如是不作聖心名善境界若作聖解即受群邪又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明徧滿又見恒沙諸佛如來徧滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證熏聞云欣厭當約淨穢凡聖二義分之不作聖心名善境界若作聖解即受群邪又以此心研究深遠忽於中夜遙見遠方市井街卷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證谷響云管子曰處商必就市井尹知章注云立市必四方若造井之制故曰市井補遺云此名迫心等者觀解之心推窮迫逐於色陰故色既虗融不能為障是故飛出能隔見矣不作聖心名善境界若作聖解即受群邪又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端說法通遠妙義非為聖證資中云此人曾有邪心種子合外魔境相因而來此則非善境界純是魔嬈不同前九皆稱善境起心作證方乃成魔補遺云善知識是行者依歸今見變改欲壞行人之心謂彼不足為師故也此第十人皆魔所為至能無端說法等乃是行人因魔入心故能如是所以興福云天魔借辯是也熏聞云無端說法此是行人自能說或聞前知識說法而令其行人通達妙義應以藏通別教所詮之義稱之為妙荊溪云前教中權魔亦能說不作聖心魔事銷歇若作聖解即受群邪阿難如是十種禪那現境皆是色陰用心交互故現斯事眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道苕溪云用心交互者用禪那心與色陰堅固妄想交互故現斯事乃至識陰例此明之何則以五妄想各於本陰區宇之中為禪所觀將破未破如燈欲滅其光復熾乃與定力交戰其功故成之敗之則魔佛之道於是乎辨長水云問此不作五陰次第觀門何得陰次第盡明其境耶答觀雖總相五陰同觀陰有麤細麤者先盡譬如浣衣麤垢先去此陰既積妄所成妄盡自然陰滅從麤至細理必然也阿難彼善男子修三摩提奢摩他中色陰盡者見諸佛心如明鏡中顯現其像苕溪云色陰盡者約已斷說見諸佛心即相似證如前文云若目明朗十方洞開無復幽暗若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇補遺云文有二段初法次喻初謂行者進觀受心似若了然不取前境有明白之相未能破除受陰故曰若有所得而未能用也下文心離於身返觀其面去住自在方能有用受陰盡相也今雖明白未脫受陰乃區宇也次舉喻觸客邪者心有厭合如觸客邪喻今受陰明白尚為受陰所籠熏聞云魘本厭後人加鬼伏合人心曰厭苕溪云問何故色陰前斷後伏邪答斷從懸示伏就次論若不明斷無以知離過顯德之相若不明伏無以知依陰發魔之由下三陰文初皆有此義若魘咎歇其心離身反觀其面去住自由無復留礙名受陰盡是人則能超越見濁真際云見以推求執取為義由領前境取著隨生故心離其形則超見濁也補遺云若脫陰籠如魘歇去其心離身者凡夫心必隨根受領前境今不隨於眼等受境乃是其心離身矣非但不隨眼等受境又能返觀能見等根故曰返觀其面依根曰住離根曰去去住在我故曰自由受以領納分別前境為義今不領受分別亦止故超見濁也觀其所由虗明妄想以為其本真際云虗妄照了故曰虗明阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊蝱猶如赤子心生憐愍不覺流淚此名功用抑摧過越谷響云赤子言其新生未有眉髮其色赤也悟則無咎非為聖證覺了不迷久自銷歇若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜苕溪云其心發明即下文見色陰鎖受陰明白也阿難又彼定中諸善男子見色陰銷受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越此名功用陵率過越補遺云感激謂用受陰明白似蒙聖力故生感激之心苕溪云陵率謂勇心高率也悟則無咎非為聖證覺了不迷久自銷歇若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白前無新證歸失故居智力衰微入中隳地逈無所見心中忽然生大枯渴於一切時沈憶不散將此以為勤精進相此名修心無慧自失補遺云行者已得受陰明白欲棄此取彼相似之法前相新證未發而受陰明白又失良以智力衰微故爾以今受陰得而復失名中隳地望前相似後有色陰虗融故曰中也沈憶不散者憶前故居後陰明白又下云旦夕撮心懸在一處亦言心懸所失耳悟則無咎非為聖證若作聖解則有憶魔入其心腑旦夕撮心懸在一處失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白慧力過定失於猛利以諸勝性懷於心中自心已疑是盧舍那得少為足此名用心亡失恒審溺於知見舍那是報智因慧力偏勝之故也長水云定力微故亡失恒審慧力過故溺於知見熏聞云亡失恒審謂失於平常審諦之心也悟則無咎非為聖證若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜以由定力微慧力過勝解忽生引起見取種子執劣為勝故此現也又彼定中諸善男子見色陰銷受陰明白新證未獲故心已亡歷覽二際自生艱險於心忽然生無盡憂如坐鐵牀如飲毒藥心不欲活常求於人令害其命早取解脫此名修行失於方便補遺云此與前文歸失故居其義大同然則受陰明白之相或有或亡者何須知受陰明白但是初得未是觀成受陰盡故將使欲進前證此法即失矣如吳興前文云以五妄想各於本陰區宇之中為禪所觀將破未破如燈欲滅其光復熾乃與定力交戰其功是也今初得於受陰明白未至堅純便希新證安得不失初得淺法乎悟則無咎非為聖證若作聖解則有一分常憂愁魔入其心腑手執刀劒自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜悔惱種子被激而生修無方便故引魔鬼如四分律婆求河邊諸比丘等修不淨觀厭淨過分求刀自割魔使之然悟則無咎又彼定中諸善男子見色陰銷受陰明白處清淨中心安隱後忽然自有無限喜生心中懽悅不能自止此名輕安無慧自禁苕溪云輕安七覺支中其體屬定熏聞云七覺支謂念擇進喜輕安定捨初通定慧次三屬慧後三屬定定若兼慧正道可通今所發者既無慧自持則定翻成散魔得其便喜樂入焉悟則無咎非為聖證若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路傍自歌自舞自謂已得無礙解脫失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救資中云此有七慢恃我陵他名我慢稱量自他比較同德但名為慢於他等謂己勝名過慢於他勝為己勝名慢過慢未得謂得名增上慢雖知下劣返顧自矜名卑劣慢下毀經像即是邪慢補遺云涅槃瑜伽七慢並同此經成論有大慢為八慢顯揚論第一云慢者謂以他方己計我為勝我等我劣令心恃舉為體或是俱生或分別起能障無慢為業如經說三種慢類我勝慢類我等慢類我劣慢類或疑云經中七慢自足何故又云乃至須知據佛意說眾生慢相不止此七故有斯語是則今列七慢亦是略舉慢過慢者慢中之慢也於前過慢又加一倍故悟則無咎非為聖證若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是疊華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄土中疑誤眾生入無間獄失於正受當從淪墜孤山云夫假像知真因言體道於是嚴其像以生其敬寫其言以悟其心住持三寶理在於茲也苟生邪見豈達中庸唯自敬身輕毀經像邪風一扇愚者悅隨昔衛元嵩諫周武帝不造曲見伽藍以四海為延平大寺和夫妻為聖眾即皇帝是如來樹令德為綱維尊耆年為上座而周武惑其言遂滅佛法凡此說者將非天魔外道入佛法中肆其姦謀傾毀我教耶長水云愚者修禪皆墮此見並是魔種不識如來像教之意且末世住持依因像教出家學道藉此而修魔壞信因令毀經像故楞伽云佛若不說教則壞滅教若壞滅誰有修行及得道者愚者不見此文一向謗佛無說故知若不說法十二部經於茲滅矣須知毀經像者魔鬼入心是大邪見當須善識勿同此謗又彼定中諸善男子見色陰銷受陰明白於精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清苕溪云輕安者名雖同前其義則異以云因慧獲諸輕清故此中受陰於諸塵境無重濁之惑便言成聖得大自在也悟則無咎非為聖證若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤眾生墮阿鼻獄失於正受當從淪墜又彼定中諸善男子見色陰銷受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解熏聞云密嚴經云寧起有見如須彌不起空見如芥子悟則無咎非為聖證若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒啖肉廣行婬穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿興酒肉等一種俱空破佛律儀誤人入罪失於正受當從淪墜資中云此從邪見種生引此空魔入其心腑大般若云魔能入一切眾生心令歸依魔黨如膠如漆斷手截臂不以為難孤山云嗟乎叔世尊合雜為大道排持操為小乘戒律軌儀棄為他物畫魑魅以為巧扇無撿以為風及夫陰陽拘忌流俗妄說一皆信受畏若嚴刑未審戒律之教與陰陽之書孰愈流俗之說與如來之談孰優背正向邪顛亂之甚懷道大士一為思之或為宗師願以訓眾斯乃震法雷於迷蟄耀慧燈於永夜夫如是則涅槃之囑斯經之誡得其人而其道舉矣又何待於四依出世乎國策云畫鬼神易為巧圖狗馬難為工今以排去律檢妄談無礙如畫鬼神耳太史公曰甞觀陰陽之術太詳而使人忌諱拘而多畏流俗妄說者此又陰陽家之訛者也又彼定中諸善男子見色陰銷受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲味其虗明者愛著禪中色陰淨處以為勝境由此起愛無慧覺察引其貪欲種子而發遂成狂欲也悟則無咎非為聖證若作聖解則有欲魔入其心腑一向說欲為菩提道化諸白衣平等行欲其行婬者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德既無陷於王難疑誤眾生入無間獄失於正受當從淪墜苕溪云此如天台止觀煩惱境欲發之相智者云生來欲色抑制可停今所發者其惑熾盛若見外境心狂眼暗如睡獅子觸之哮吼若不識者則能牽人作大重罪今文既云魔入其心則是煩惱興魔二境俱發阿難如是十種禪那現前皆是受陰用心交互故現斯事眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語於我滅後傳示末法徧令眾生開悟斯義無令天魔得其方便保持覆護成無上道阿難彼善男子修三摩提受陰盡者雖未漏盡心離其形如鳥出籠已能成就雖未漏盡謂界外無明漏也從是凡身上歷菩薩六十聖位得意生身隨往無礙譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇六十聖位通塗舉之別在意生身耳孤山云始三漸次終乎妙覺其間有賢有聖皆是三世諸佛所歷之位故通稱聖位問五十五位真菩提路既不取三漸次義今六十聖位何故取之答前據別論今從通說通中義含外凡相似分真之位若別論中從乾慧去方是正明地位之相補遺云十信十住十行十向十地前乾慧與前漸次即為六十得意生身者即入相似聖位中也楞伽經大慧菩薩問佛何名意生佛言譬如意去速疾無礙此則從喻得名彼經又有兩義重釋初云如十萬由旬外憶先所見念念相續疾至於彼次云如幻三昧力憶本願故生經中二義並約意憶故生也熏聞云此與玄義釋意不同玄義從因楞伽約果謂捨分段生變易時速疾無礙若爾智者違經文耶答不違蓋取三昧樂意等謂之作意是則經存兩義前後互出耶楞伽第四明三種意生身一入三昧樂意生身二覺法自性意生身三種類俱生無作意生身法華玄義以第一擬二乘入空第二擬通教出假第三擬別教修中通名意者初作空意二作假意後作中意又云別圓似解猶未發真皆名作意當知今經意生即第三種類也補遺云天台一家諸文明意生身義通四教三乘未斷無明凡有九人修觀作意義通故往生方便義通故法華玄文擬前三教不云圓似攝入其中者止觀記云以觀勝故意生之名宜在教道也若維摩疏對後三教皆云恐者不敢定判也法華玄文安樂作空意云擬二乘止觀記云以攝通別維摩疏以空對通例攝藏別入空之人秪為義通所以諸文隨諸教義從容進退擬人對教自在說之楞伽文局別接通者止觀記云並云地故此准楞伽若按華嚴隨意生身其義稍通又須知五陰文初結示陰盡則入觀行相似此約初根互入者說謂若於色陰悟入非但能盡色陰餘之四陰亦空則破惑入理故曰見諸佛心如明鏡中顯現其像若鈍根人但能見于色陰銷融未有所悟故進觀受陰今約鈍者次第歷於五陰修觀不可指修受陰觀人已於色陰曾悟入也今五陰中修禪那人並在觀行期入相似所言上歷聖位文寄此中義均上下如於一一陰中悟入並能上歷聖位故也不然則豈有得意生身菩薩為魔所入耶長水云譬如下未破想陰故如孰寐䆿言也有成聖位分故如音韻倫次也令不寐者咸悟其語如證聖人則知彼有聖位之分故般若云如來悉知悉見是人則能成就阿耨菩提補遺云想心所籠如在睡夢觀解明白如言倫次睡人心在無記曰無別所知喻未有相似之證也若動念盡浮想銷除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁孤山云覺明如鏡浮想似塵想盡心明猶居相似有尾猶云始終也若悟真常無始終生死之異故云圓照補遺云倫理也能以生死為一理故故曰一倫首尾即生死之終始覆釋上句耳人以生為始以死為終今一體圓照窮生之始究死之終不出一理故曰圓照資中云一切煩惱皆從想生故想陰除則超此濁觀其所由融通妄想以為其本想能融變通於質礙如心想酢梅口中流水等阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明銳其精思貪求善巧爾時天魔候得其便飛精附人口說經法其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座說法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或𥨊暗室身有光明是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲口中好言灾祥變異或言如來某處出世或言劫火或說刀兵怨怖於人令其家資無故耗散此名怪鬼年老成魔苕溪云飛精附人斯必附其可附之人亦修定習慧者耳補遺云想中十魔並從附口說法以明之者蓋想心迅利即覺觀之尤者無禪定力必須說而吐之故也以能說所聽皆心想之咎所致魔鬼耳熏聞云前云天魔候得其便今云怪鬼者前舉其主今言其黨又前是通名此是別目惱亂是人厭足心生去彼人體弟子與師俱陷王難苕溪云弟子與師即求巧之子說法之師下皆例此補遺云說法必須善巧謂能演一為百千等汝當先覺不入輪迴迷惑不知墮無間獄阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛游蕩飛其精思貪求經歷補遺云內因想心所動故外好游歷因以說法化人為事或經歷以求師爾時天魔候得其便飛精附人口說經法其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座說法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一眾聽人各各如是得未曾有是人愚迷惑為菩薩婬逸其心破佛律儀潛行貪欲口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智銷滅此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿㳷澄其精思貪求契合資中云夫亡機寂照理自玄會若希求㳷合擬心即差於是天魔得其便也谷響云綿㳷者綿微㳷合也補遺云言契合者求與我說符合此必想中自生見解不按經論故也如言佛有大小真假等豈非邪解乎爾時天魔候得其便飛精附人口說經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座說法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口說偈或自誦經各各歎娛得未曾有是人愚迷惑為菩薩綿愛其心破佛律儀潛行貪欲口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟此名魅鬼年老成魔長水云男女佛者貴引行人行貪欲事無妨成佛約教固有偏圓之佛而本同末異豈有大小乎邪人灼然謂之大小如來本迹豈易知之邪人輙判某在先成某在後證非唯判於先後而已亦乃恣其不遜云有真偽之佛洗滌本心者返以邪見除去正見似其洗滌淨盡矣惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本窮覽物化性之終始精爽其心貪求辨析苕溪云夫性海圓澄森羅自現苟偏求俗理則翻益漏心違本禪那邪鬼斯入爾時天魔候得其便飛精附人口說經法其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座說法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絕都指現在即為佛國無別淨居及金色相其人信受亡失先心身命歸依得未曾有是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言此名蠱毒魘勝惡鬼年老成魔補遺云即是法身者涅槃云吾今此身即是法身理無所存徧在於事事即理故法身在茲邪人妄合此意僻為俗事不達喻性竟成魔邪惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感苕溪云懸應在聖冥感厲己於未證理前求其休騐也爾時天魔候得其便飛精附人口說經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座說法能令聽眾暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛黏如膠漆得未曾有是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心此名癘鬼年老成魔補遺云知是先師者令聽者謬憶此人是我先世之師以傾其意也惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入剋己辛勤樂處陰寂貪求靜謐孤山云夫忘懷去來者市朝亦江湖睠情生死者山林猶桎梏既於靜取著故魔得其便長水云夫心亡則境寂豈間塵喧念動則緣繁任居谷隱夫靜謐者乃禪那之所宣作意貪求魔得其便爾時天魔候得其便飛精附人口說經法其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座說法令其聽人各知本業或於其處語一人言汝今未死已作畜生敕使一人於後蹋尾頓令其人起不能得於是一眾傾心欽伏有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒眾訐露人事不避譏嫌口中好言未然福及至其時毫髮無失此大力鬼年老成魔補遺云訐露謂攻人之陰私也有人起心已知其肇他心通也能知其人未死之前已是畜生見其後報蹋其尾者天眼通也以天眼能見因果細色故良以魔人亦得五通亦恐妄作非實有也惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命苕溪云宿命六通之一也小乘修成大乘發得今進不待發退不從修作念求之故招魔事爾時天魔候得其便飛精附人口說經法其人殊不覺知魔著亦言自得無上涅槃來彼求知善男子處敷座說法是人無端於說法處得大寶珠其魔或時化為畜生口銜其珠及雜珍寶簡䇿符牘諸奇異物先授彼人後著其體或誘聽人藏於地下有明月珠照曜其處是諸聽者得未曾有多食藥草不餐嘉饌或時日餐一麻一麥其形肥充魔力持故誹謗比丘罵詈徒眾不避譏嫌口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人此名山林土地城隍川嶽鬼神年老成魔或有宣婬破佛戒律與承事者潛行五欲或有精進純食草木無定行事補遺云先授彼人後著其體者謂以奇異之物先授之使其見然後藏著身體之內誘其貪婪故也或誘聽人藏於地下者欲誑言其有伏藏也宣婬者左氏傳陳靈公與孔寧父通於夏姬皆表袖衷袒服以戲于朝洩冶諫曰公卿宣婬民無効焉宣示也惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪迴迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力爾時天魔候得其便飛精附人口說經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座說法是人或復手執火光手撮其光分於所聽四眾頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或於空中定坐不動或入缾內或處囊中越牖透垣曾無障礙唯於刀兵不得自在自言是佛身著白衣受比丘禮誹謗禪律罵詈徒眾訐露人事不避譏嫌口中常說神通自在或復令人傍見佛土鬼力惑人非有真實讚歎行婬不毀麤行將諸猥媟以為傳法此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔孤山云猥鄙也方言媟狎也郭璞云相親狎也惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪迴迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空大論云諸佛說空法本為破于有若有著空者諸佛所不化若了真俗不二三諦互融有空空有曾無取著雖邪魔森列其如予何爾時天魔候得其便飛精附人口說經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座說法於大眾內其形忽空眾無所見還從虗空突然而出存沒自在或現其身洞如琉璃或垂手足作旃檀氣或大小便如厚石蜜誹毀戒律輕賤出家口中常說無因無果一死永滅無復後身及諸凡聖雖得空寂潛行貪欲受其欲者亦得空心撥無因果此名日月薄蝕精氣金玉芝草麟鳳龜鸖經千萬年不死為靈出生國土年老成魔薄蝕經史皆作食說文作蝕京房易傳云日月赤黃為薄或曰不交而食曰薄韋昭云氣往迫之為薄虧毀曰食惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪迴迷惑不知墮無間獄又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細相常住變易者斷見思盡生法性土故受變易今頓欲變麤身為細質易短壽為長齡從此分段延入彼土也補遺云變易土中微細生滅緣壞生相若望分段亦名常住法性身耳爾時天魔候得其便飛精附人口說經法其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座說法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或於一處在一宅中數步之間令其從東詣至西壁是人急行累年不到因此心信疑佛現前口中常說十方眾生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得此名住世自在天魔使其眷屬如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣或不因師其修行人親自觀見稱執金剛與汝長命現美女身盛行貪欲永逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死孤山云自在天即欲界第六天上別有魔王居處亦他化自在天攝長水云毗舍童子即毗舍遮鬼此云食精氣補遺云上文以遮文茶是自在天之屬今言毗舍是舉四王屬言未發心者若已發心自護佛法也口兼獨言聽其妖魅者謂化為美女非唯美色有時口中兼獨自言無問自說也聽者惑其妖態惱亂彼人以至殂殞汝當先覺不入輪迴迷惑不知墮無間獄補遺云變麤身為細質易短壽為長齡者法華文句記第八云大論正文羅漢須捨分段方入變易記第一云若羅漢皆以邊際定力持此身入變易者佛身何故入涅槃耶若言佛身權示何又云權示耶一切羅漢若至法華無不回心何故除四大羅漢十六羅漢餘皆入滅肉身菩薩得無生者應皆不滅此不許變麤身為細質易短壽為長齡也又記第七云羅漢發心後令分段身延至變易不復改報成無上果者此多屬通義以通菩薩過二乘地或潤生身或不經生而成正覺諸論皆云捨分段身而入變易天親論主意未必然但恐論釋義不正耳慈恩問聲聞無學永盡後有云何與記當得菩提答顯揚論說依變化身非業果形成唯識說即是變易生死入邊際定資昔所作感今身業令其長時與果不絕此所資業展轉微妙猶如變化由此變易異於舊時是故名為變易生死荊溪云通義有教無人慈恩變易名同事異然則三乘須捨分段小乘發智論以第四禪為邊際定毗奈耶雜事以初禪至非非想滅受想定寂然不動為邊際定婆沙問何謂邊際答邊者表義際者極義故名邊際阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正徧知覺讚歎婬欲破佛律儀先惡魔師與魔弟子婬婬相傳如是邪精魅其心腑近則九生多踰百世令真修行總為魔眷命終之後必為魔民失正徧知墮無間獄汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信眾生令不著魔得正知見我今度汝已出生死汝遵佛語名報佛恩孤山云此囑阿難未須取滅而付法藏傳云入風奮迅三昧四派其身入滅度者得非感見不同乎阿難如是十種禪那現境皆是想陰用心交互故現斯事眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法徧令眾生開悟斯義無令天魔得其方便保持覆護成無上道據弘此經合魔宮震動凡夫不覺故也如說四安樂行正同此意故文殊問云於後惡世云何能持此經佛令住四安樂行廣說離譏毀等緣豈非同此耶
