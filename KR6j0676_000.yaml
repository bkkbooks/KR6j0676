  text: 楞嚴集注序皇慶壬子歲與高昌沙門般若室利同坐夏天竺靈石山中每對讀譯天台止觀次天目中峯本公斷崖義公時來過從話間多敘及曾受楞嚴經旨於關西講主聞公亦且為畏吾方音字書翻之矣時都講學公有藏桐洲楞嚴集注因室利被召趨朝願必聞上板印流通遂挾之北歸已而竟與願違逮今茲景良居士欲刊施是經也初未定何者為善本本無頗追憶靈石山中學公授經室利時事特投書訪求於白蓮華院和上玉岡師師為躬往嘉禾烏鎮密印寺詢得故比丘圓具常執侍於鼎山舉師稟學於自聞熏師蓋業教有源委者遺下手寫所科注之經即與室利挾以北歸之本同專遞東來用以依據乃再條治微加刪定遂為成書是知經誥行世亦若有關乎運數者然桐洲師去今踰百二十載其書存於三吳流於宸京卒莫鋟梓乃今始克板行於四明王公居士之家得盛播於海內夫豈偶然也哉謹識其所自俾攬者信時緣之有在也三年丁丑日南至我菴本無修治畢敬題楞嚴集注後敘恭欽調御世尊性覺妙明本覺明妙不可思議原斛飯王佛成道夜得子因名慶喜梵曰阿難應生眷屬鈞佛天倫為最少弟隨佛出家恃慈愛憍憐多聞為尚怠修無漏才入初果以大乘配望是修假擇滅值波斯匿王父諱廣營珍味齊迎世尊兼延清衆阿難以赴別檀獨行乞食經幻術家摩登伽女用金頭黃髮之黨先梵天呪攝入室席初梵天先說外道所行娑毗迦羅與談冥諦投灰妄計及摩登伽世事邪師習為幻術將毀阿難白四非色非心持肥犯羸之戒體即八萬行中之一戒經謂阿難心清淨故而未淪溺故佛頂放光化身宣說佛頂光聚悉怛多般怛囉祕密伽陀微妙呪心是一切呪中之總要佛敕文殊將呪往護消滅彼惡提獎阿難及摩登伽來歸佛所而此呪心超出萬種莊嚴之域之上名首楞嚴王因修果證大定威德摧碾一切惑業亦名金剛王三昧法體周遍曠無畔際亦名大方廣雜絶染污亦名蓮華王出生善法亦名佛母陀羅尼性本明之七處陰界入即是本覺菩薩涅槃元清淨體衆生迷失常住之理相續生死輪環無已故經曰不知生滅去來本如來藏常住妙門不動周圓妙真如性又曰五陰本如來藏禪那行者當務宗明此經性本覺體豈特周圓有情而已至於山河大地剎土虗空一礫一塵無不具足何者蓋是諸佛歷劫精嚴萬行果滿微妙寂淨妙奢摩他覺體全體起用化無量身應微塵國轉大法輪降制魔外無不順伏其修證大乘因果不持是三摩提能坐道場成妙正覺無有是處不能稱是經呪性體而說法者波旬之說也不然則魔精附人口說經法譬劫蒸沙石為飯終不可得況持諸呪皆正修之助此經呪心常精持者圓觀行中正助兼進真如性界無佛無生起修行門有戒有定依教列位俾其聞見思齊免生上慢退屈位次周足莫過瓔珞猶是別權圓位整備無出此經初乾慧至回向開四善根十住陳列灌頂喻輪王取四海水灌太子頂表受王職今於分真以佛智水灌菩薩頂表受法王位華嚴初住便成正覺十地始明受職諸文雖各有謂理歸一揆此經列位五十有七或乾慧地而疑大品四善根而疑俱舍必了賢聖伏斷真似借名等義如大經修八正而見佛性荊溪戒曰不識名體同異學釋教之大患仁王十善長別三界苦輪即與此經三變流疊一十百千六根盈縮功德為齊復須會論法華法師功德六根清淨宗圓者非深探經教豈易言哉頻數徵心辨見之義聞鼓撞鐘綰疊華巾之文斯皆語雖次第一於顯明極性圓理暨佛問諸大弟子悟十八界入三摩地各言其得佛加妙德揀顯大勢至以往二十四士皆為所揀惟觀世音菩薩恆沙劫前獲見觀世音佛從聞思修入三摩地獨顯圓通當解憍陳那初聞佛音悟達觀世音亦初從聞而入匪以藏圓兩途剖釋曷明深義勿謂二十四士各舉往因受揀以同華嚴行布權門蓋今妙德承佛威光對諸大士一一各示圓理又若經謂五陰本如來藏而為正因二十四士聞揀即解是圓宗了因次於三千威儀八萬微細靡間斯道已至建立壇所隨喜彈指散華皆緣因種也其長水所注世推善本乃判此經正屬終教兼明頓圓蓋自語相違也或問此經於五時四教攝屬決當謹對的屬圓教部屬方等其有慶喜性比丘尼等機於此經前後獲大小益不同終以圓無生理為正結益後之微塵剎劫弘通此經自有衛獲是法八萬四千那由他恆河沙俱胝金剛藏王菩薩眷屬晝夜隨侍若魔來侵入三摩提善人者當以寶杵殞碎其首猶如微塵解釋此經疏記者衆四明南湖我菴無法師聚諸家注校之取桐洲集解之本為贍實私加治略并序太原信檀王氏元明居士啓誠敬施淨賄鋟梓用廣流通經中且言樺皮紙素書寫置之一身一家尚獲甚深善益比今注刊二志殊難同語茲濫隨後敘述所謂飛塵乎嶽挾涓於海者也至元丙子秋寶雲比丘子文焚香拜書楞嚴集注敘黃面老子云若有一人發真歸源十方虗空悉皆消殞五祖演和上云若有一人發真歸源十方虗空築著磕著是皆慈悲之故落草之談四明景良居士王元明因閲楞嚴自謂於徵心辨見處知心無徵了見非辨重刊茲板流布是經雖則錦上添華亦是眼中著屑千岩更說箇什麼經有經師論有論師爭怪得老僧伏龍山元長敬題楞嚴集注序真玉無瑕非假礱礪之勤不能顯其美良金無礦非假爐錘之勞不能彰其精至教無文非假注釋之廣不能臻其奧一心無相非假研究之深不能極其妙既得寶玉兼金之精美必遂致貴然後濟貧乏而無竭乃為全德也既得教旨契心之奧妙必即致聖然後開利凡蒙而無餘乃為全道也今焉四明王公元明居士內明一心外嚴衆行樂得楞嚴真教之集傳遂捐己資鏤梓以壽後世務俾攬者惑易辨而求易獲庶幾同圓種智其願乃已嗚呼釋尊與阿難徵辨開士二十五之述圓通勝會儼然曾何有今昔之少間耶宜加信無怠焉至元三年歲次丁丑九月九日鎮江路金山禪寺住持沙門釋契了拜首書大佛頂首楞嚴經釋題宋北峰沙門宗印述北峰四世孫本無略録天台智者國師凡釋諸經首題須約五重玄義此楞嚴經以人法為名常住真心為體圓通妙定為宗反妄歸真為用上妙醍醐為教相初釋名者題云大佛頂如來密因修證了義諸菩薩萬行首楞嚴經二十字吳興說題云初十九字是別名二經字是通名初釋別名又二初大佛頂三字是祕呪名二如來等十六字是顯了名初大佛頂祕呪名有二釋一約應化所說釋以經云佛頂光明摩訶悉怛多般怛囉無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所說心呪以此驗知大佛頂正目祕呪既云如來無見頂相無為心佛從頂發輝故知佛字指釋迦應身頂字含釋迦化身即能說之人以應化即法故云無為心佛具足須云悉怛多等首題從略耳二約諸佛尊戴釋准佛頂陀羅尼經云有陀羅尼名如來頂彼呪且非頂上佛說從果人所敬為名況今纍言佛頂神呪又云亦說此呪名如來頂若然者頂取尊戴之義不取無見之相詳考一釋文義俱當說題前云非喻是法亦屬於人以尊戴為頂則是於法以化佛為頂則是於人法界菴主補注云經文不云猶如佛頂雲間補遺云經文不曾用佛頂為喻吳興人法立題義誠有準二如來等顯了名此亦二釋一約果人修證顯所契之法如來即是果人密因即三德祕藏妙行也不異萬行首楞嚴定此定如來已證是則密因修證四字上三字屬因證字屬果而此因果皆是能契之法唯有了義正當所契之法二約因人萬行示能契之法諸菩薩即十方現在未來修學人也萬行者所具之定也體是中道攝法無遺故經云有三摩提名大佛頂首楞嚴王具足萬行云云涅槃云首楞者一切事竟嚴名堅固一切畢竟而得堅固名首楞嚴又大論云首楞嚴者秦言健相分別知諸三昧行相多少深淺譬如大將知諸兵力多少菩薩得是三昧諸煩惱等不能破壞如轉輪王主兵將寶所至之處無敢壞者故亦翻為事究竟也二釋通名即經字也別名異諸部通名同衆經梵語修多羅此翻為契經經者訓法訓常依此言說詮顯性相令物生解故稱為法一切諸佛皆同此說故稱為常已上釋名全取吳興玄義不用孤山具三為名之說備如說題釋名竟第二辨體者正依孤山以常住真心為體此經正宗之首佛告阿難云當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉經文顯云常住真心性淨明體安得不以此為經體耶應知此經大旨託阿難緣正為衆生顯示因地常住真心性淨明體文義昭然故可信受況常住真心既常且真顯是性體也若吳興別以空如來藏為體謂經之盛談者補注曰當知經文稱之以藏欲推因地覺心故也此經大旨正顯因地常住真心性淨明體全為菩薩諸佛所證此乃如來特立心體為經正體也辨體竟第三明宗者孤山疏云此經以圓通妙定為宗宗者要也雖真心本寂而迷者不覺故須修如幻三摩提達諸法之元寂經初阿難請云恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便故下如來番番開示令了真心本然諸法如幻雖異名別說只是廣演楞嚴妙定止諸妄想此乃達諸法寂然唯觀心性名為妙定故以圓通妙定為宗文詳夫圓通妙定蓋的取觀音耳根圓通通收一經所明定行其義甚正補遺亦曰楞嚴妙定為宗阿難乃以三止為請經之初後非談空假即說中道此為宗要法界庵主亦所承用取孤山之長也明宗竟第四論用者孤山疏以反妄歸真為用經云一人發真歸源十方虗空悉皆銷殞研考經文並是返妄歸真之義妄即人法二執也真即二空之理也語簡理備矣論用竟第五判教相者分四初正說孤山疏云以上妙醍醐為教相唯被圓機開權顯實與法華無殊扶律談常與涅槃不異又云如來三十成道八十示滅凡五十年說法於十二年中說阿含八年說方等二十二年說般若八年說法華最初華嚴與鹿苑同時此經最後垂範涅槃臨終乃說俱在八年之內即是第四十九年說此經第五十年說涅槃也吳興云今經所談唯一圓教以明如來藏故非前藏通中間永無諸委曲相故非別教也長水疏云諸乘之中一乘所攝若於五教此經分齊正唯終教兼於頓圓真際云會漸歸頓即法華後入滅未期乃涅槃前今詳諸說雖文義少殊而判教大途並是法華之後涅槃之前一乘圓頓無異論也俱為正說二義證長水疏云佛說此經非謂一時頓說說必前後集者約類總為一部若以文義往定即法華後涅槃前也經文明指耶輸受記持地證經以義往推序嘆聲聞非約小行應身無量度脫衆生法華已前無此顯露聲聞入實今經有故為說圓通諸小乘者皆敘本時或述今遇盡證圓妙法華前無應知在後又不唱入滅之期定涅槃前二經同部此經居中俱醍醐味無所疑矣文此謂楞嚴經第四明指羅睺羅母耶輸陀羅於法華授記第五持地菩薩明敘指於法華聞諸如來宣妙蓮華佛知見地豈非法華後耶又不唱入滅豈非在涅槃前以義往推應身無量聲聞入實以證入實以證圓通皆非法華前方等般若小乘之事驗是法華後醍醐法味也孤山吳興引證俱同更不再出三釋疑問按因果經說佛與波斯匿王同日而生今經第二卷說匿王年六十二則佛壽亦然據說法時合是般若何云法華涅槃答當取長水謂此經非一時頓說蓋結集者約類總為一部結前歸後也如經阿難疑問七趣中舉琉璃王誅釋種姓琉璃乃匿王之子王崩嗣位方誅瞿曇豈有事之未形而預致斯問耶復次經初別序唯在匿王請齊一事文備述之以為此經別序緣由據匿王當方等般若時已死禪位與子琉璃況寶積經又說琉璃王誅釋種生陷地獄則子亦已死豈可父到法華請齊耶是知請齊事在方等般若如何不許昔人判楞嚴為二酥耶此義孤山淨覺長水諸師並未說及今通其義為三初請齊在昔二請法在今三鈍雜自分且請齊在昔者如匿王沒琉璃王嗣位誅滅釋種生陷地獄事定在昔決無匿王到法華後今文匿王請如來齊阿難受別請無齊乞食被摩登伽女所攝事必在昔如谷響熏聞二記所引事緣在方等無疑矣言請法在今者阿難大權作楞嚴經發起於法華後見楞嚴機興追敘昔事我無始來一向多聞未全道力被摩登伽女所攝殷勤啓請十方如來妙奢摩他三摩禪那最初方便如來為說常住真心性淨明體悟入圓常一經文義無非圓頓此則追敘昔事發起楞嚴定在法華後涅槃前也若爾何故楞嚴經文連貫生起都無間雜不見為追敘昔事乃成一席之說與摩登伽女經所敘無別答此乃經家要戍部類庠序次第生起有由參入昔事結集在此考文尋義不同昔經但知若說匿王事及阿難被女所攝事便是法華前事若說請大悟大反指法華便是在法華後也故知長水云說必前後約類結集總成一部義實如是直是排之連貫作一時而會也言純雜自分者方等中摩登伽女經既說生滅法自屬三藏教今於法華後述昔發起入圓頓經同法華部自屬醍醐不可一混以純與雜各有部類故也問若今楞嚴同法華者且釋籤云首楞嚴名本在別圓通於通教豈是法華獨圓之義耶答吳興說題云記主自說法華已前楞嚴名義今經開顯安得類同問法華正開顯經嘆聲聞德只云無復煩惱逮得己利今文何故乃嘆應身無量度脫衆生却成超勝法華耶答法華會初列聽經衆未聞正說開顯還同昔日聲聞故從昔嘆之此經列衆已經法華開顯故嘆應身度生等也四異見又二初判歸方等神智補注三十一云如方等陀羅尼經次第在法華前而經中云先於靈山已為聲聞授記豈非方等至於涅槃以此推之言次第者是前分也互相指者是後分也結集者以後分明義氣類若同向前集之金光明經是方等後分故指般若為已廣說空無妨也若其然者大佛頂首楞嚴經云波斯匿王年六十二又云是名妙蓮華定性聲聞及諸一切皆獲一乘寂滅場地豈非亦是方等後分經耶文今謂神智此判有言無旨既云氣類若同向前集之且楞嚴小乘作佛闡提有性豈與方等焦穀敗種氣類同耶應身無量銷顛倒想豈與方等見不思議自鄙無分三生六十劫氣類同耶二判歸般若溫陵戒環禪師解云楞嚴即般若法中實大乘終極之教故如來密因菩薩萬行所修證法一切畢竟自此已往無復進修直造一乘圓妙之道故法華會上更無地位之說純談妙法隨根印可授記作佛而已蓋出與大事法華至矣盡矣法華之後便說涅槃扶律談常而終焉良以般若慧學方盛定力未全溺於多聞失於正受於是示楞嚴大定資般若深慧既定慧均學解行兩全而究竟於一乘之道盡於是已此楞嚴之所以作也究夫三經大旨無非大事因緣而必獲般若發明次由楞嚴修證終至法華印可然後盡諸能事文今謂此說不暇研究若果般若但慧次立楞嚴修定至於法華印可則佛說五時尚少一時祖師不談亦成疏漏以楞嚴小乘皆已證悟法華動執生疑因開佛知見亦成重煩何不自難且聲聞自行未正開顯成佛便能應身度生終無是理也如是則判在法華已前誠不可矣私議曰佛法不思議唯教相難解詳此楞嚴一經說時非一故致古今判教諸說各異若準天台一家判攝之式凡為通別五時別則顯其說法次第通則彰其教法融通勿以凡情局見應知並是如來赴機之相而於通中有乎文通義通如後分華嚴及方等陀羅尼經之流乃結集經家收通歸別皆文通也若義通者如般若明華嚴海空與夫蓮華藏海通至涅槃之後此於他部明華嚴義不必結歸本部也今楞嚴經前文有次後分不次收歸方等似合其宜如先達所謂一代教中除華嚴般若法華涅槃部別帙外凡所說小乘皆收歸鹿苑凡所說大乘皆收歸方等柏庭玄覽云但非四時所攝悉得以方等通收之此經既不專餘四時部類謂屬方等則無餘論也雖經有定性聲聞皆獲一乘寂滅場地之言但曰令汝會中而已固不與法華授記同日而語政使出於方等不妨以彈斥意密示與進況時在其後說亦無違文此則經之前分正屬方等是故云爾若經有耶輸授記持地證經等文應是後分經乃結集家收通歸別結歸前分此正通五時中文通之類也金光明玄記云以凡判教有前後分前分有次後分不定後雖不定須攝歸前文此為誠證非餘可擬因併録存以俟夫公於取舍者考焉首楞嚴經釋題北峰印法師引用文目孤山法師諱智圓經疏谷響鈔吳興法師諱仁嶽說題集解熏聞記法界菴主法師諱可觀補注雲間補遺長水法師諱子璿義疏柏庭法師諱善月玄覽私議所引用正經集注桐洲坦法師引用文目興福法師諱惟慤玄贊資中法師諱弘沇經疏擕李法師諱洪敏證真鈔真際法師諱崇節刪補疏孤山谷響苕溪即吳興熏聞長水手鑑法師諱道歡稟長水璿公之學而著是書荊公王丞相諱安石經解補遺纂注釋要首楞嚴經指文科節大分為三初序分二起第一卷初如是我聞止本卷歸來佛所初通序經前六事二別序二初發起遠由二初夏終演法二王臣營齊二發起近由四初獨還無供二乞食遭攝三如來慈救四護歸佛所二正宗分三流通分二正宗分六起一卷一六紙阿難見佛止十卷二七二紙不戀三界初依常住真心以開圓解二起阿難見佛止四卷一九紙尚留觀聽初對慶喜明破妄顯真以聞圓解三初阿難悔請即請人三止之最初方便二大衆願聞三如來演說二初酬請開示二初別破心見二初推妄所在七即七處徵心初在