body:
  text: 一名中印度那蘭陀大道場經於灌頂部録出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集注明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閲鋟爾時阿難及諸大衆聞佛示誨身心泰然念無始來失却本心妄認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性孤山云經家敘請意者我以身境為動見性寂然謂契真源猶蒙斥失願聞開示顯出二途阿難但合掌禮佛而默有斯意故至結集得備敘之所以不發言者以屢叩佛慈丞承指誨內慚暗短未識大方欲更興言未得機便以師嚴道尊理非容易者也後因匿王疑斷滅致問如來以不滅為答遂承佛語方得陳辭美哉聖人示斯令範資中云由前佛言云何汝今以動為身念念生滅遺失真性顛倒行事故有斯請也時波斯匿王起立白佛我昔未承諸佛誨敕見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大衆諸有漏者咸皆願聞孤山云迦旃延具云迦羅鳩陀迦旃延上是名下是姓說於諸法亦有亦無毗羅胝子具云刪闍夜毗羅胝子上是名毗羅胝是母說於衆生在運時熟得道又言八萬劫滿自然得道此外道六師中二人也準今經所說則有三人皆斷滅見故匿王引旃延毗羅而問後如來舉末伽而斥也狐疑者顏師古注漢書曰狐之為獸其性多疑每渡河氷且聽且渡故言疑者而稱狐疑熏聞云述征記曰北風徑河氷合要須狐行云此物善聽氷下無聲然後過河也發者越也揮者散也託彼邪疑以咨極理熏聞云前言此身今云此心者外道謂身死斷滅蓋由心滅匿王既聞佛斥生滅遺失真性是知若得真性則無生滅故此問心即是問身下文信知身後捨生趣生必亦信知心無斷滅斯亦善權助發機教耳長水云匿王深體阿難所懷知於生滅之外求不生滅心雖密請口不形言故引外宗冀佛開示近破外道斷見令知死後續生深引阿難悟真不離生滅妄識故云證知此心不生滅地補遺云前聞見性不動稍近真明故身心泰然本心即是見性分別影事即指前來窮逐之心準此文意阿難大衆已認見性本真不同前來見境者矣以由默請之後只聞陳如客塵之義并如來現相並是審定前之見性別未聞法要故知前默請之時已認見性非分別影事矣此中默請具有二問一問身心真妄二問生滅不生滅理前文佛敕大衆以動為身今疑其真妄虗實也前阿難答佛頭自搖動佛印許云如是則見性是真身動為妄矣何故斥云如何以動為身以動為境遺失真性據此斥詞身當屬真不當搖動耶此則身之真妄未決也心之真妄未決者向既印許見性不動我已為真又蒙斥奪遺失真性顛倒行事則向之見性總斥為非畢竟此心又成妄矣故於此中默請所疑身心真妄虗實未決也由是言之此因如來斥詞方疑向之見性真妄未判二問生滅不生滅理前斥大衆云從始洎終念念生滅即指現前日用生滅之事故今疑云現前固為生滅不知不生滅理的在何許下文答中先引匿王明不生滅理只在生滅中答其次問從阿難即從座起下答身心顛倒不顛倒義即判真妄所在答其初問今更言其大節經從佛舉光明拳下明破妄見顯真見總為二節初明見精二顯真見以真見難示且以見精漸明之以由見性猶託緣塵以研體性故也既已曉其見性自疑未為至當故有身心真妄虗實之請所以方明真見也初明見精中分三初正明次陳那下審定三云何下總斥於顯真見中二初默請即二問也次申明中二初答現前生滅不生滅次從阿難下答身心顛倒不顛倒又二初阿難據迹疑問要其後命次即時下如來敷陳法喻釋其餘疑為三初正明二初引喻即以手無正倒喻不倒一倍瞻視喻顛倒次從則知下顯法又三初示顛倒次佛與下示不顛倒三云何下斥迷次示相二初法二初示顛倒相次不知下示不顛倒次喻喻中亦顛倒不顛倒義三結斥在文此且示其大略子科細目當可意會佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅苕溪云前示阿難見無搖動後示匿王性無生滅一往似同義須甄別何則阿難以身境為動此相猶粗謂見性不動且據現前對揚而說今佛問匿王肉身變壞乃至答云剎那剎那不得停住其相甚微洎談見性自童至耄不遷不變由是而知所破生滅則粗細有殊所顯見性則即離成異聖人引物入如來藏其致漸深讀者詳此佛言大王汝未曾滅云何知滅世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸消殞殞亡不息決知此身當從滅盡資中云前念滅後念生剎那變異如火燒薪必歸灰滅俱舍云諸有為法剎那盡故佛言如是大王汝今生齡已從衰老顏貌何如童子之時世尊我昔孩孺膚腠潤澤年至長成血氣充滿而今頺齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時孤山云佛問兩時答出三時謂孩孺長成衰耄也釋名云兒年十五曰童膚腠猶云皮肉也膚謂皮膚腠謂腠理古者謂年齡齒亦齡也年天氣也齒人壽之數耄惛忘也此依禮記注又釋名曰耄頭髮耄耄然也然八十曰耄時匿王方六十二蓋通言惛忘耳佛言大王汝之形容應不頓朽王言世尊變化密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十於今六十又過於二觀五十時宛然強壯世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧唯一紀二紀實為年變豈唯年變亦兼月化何直月化兼又日遷沈思諦觀剎那剎那念念之間不得停住故知我身終從變滅答有二相一約粗相順觀則以十年為限始從十歲增至六十又過於二猶云六十有二也殂落猶云遷謝也二約細相逆觀則始從一紀減至一年年減為月月減為日以至剎那也十二年曰紀前粗相十年而增此細相一紀而減者由向自云六十又過於二觀五十時宛然強壯則是以今六十有二反觀五十是為一紀故約紀而減資中云俱舍云時之極小名剎那熏聞云仁王云一念中有九十剎那一剎那經九百生滅時之極長名之為劫熏聞云荊溪云邊高中下邊下中高皆名為宛顯了可見故也佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知王示不知意欲如來為凡開演佛言我今示汝不生滅性大王汝年幾時見恆河水王言我生三歲慈母擕我謁耆婆天經過此流爾時即知是恆河水佛言大王如汝所說二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至於今年六十二亦無有異佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恆河與昔童時觀河之見有童耄不王言不也世尊熏聞云恆河或言恆伽或言殑伽舊譯為天堂來見從高處來故此河從雪山頂無熱惱池東面象口而出流入東海長水云耆婆此云命西國風俗皆事長命天神子生三歲即謁彼廟孤山云既知見境不易可喻真性無遷則動樹訓風舉扇類月故令先識見無童耄然後直示性無生滅荊公云童而瞭老而眊者相見也所觀無改者性見也相者瞭眊之變故知隨塵變滅性則所觀無改故知常住不壞補遺云匿王觀河之見似同阿難意則別也今如來於生滅中示無生滅理即變論不變豈與見無搖動身自搖動為同年耶良以此中既顯真見無緣更將變者為外物與不變者為二體也又復應知此中觀河之見正欲顯生滅中有不生滅理阿難見無搖動只為顯見精耳佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅云何於中受汝生死孤山云見精即見性也皺者為變則顯生死無常不皺非變則顯涅槃常住生死涅槃雖分二派克論體性豈有兩殊言偏意圓變即非變若然者豈但破匿王引外之見抑亦酬阿難二發之請也補遺云經中云變者受滅彼不變者元無生滅此文似是生滅與不生滅乃有兩體以意求之實不相離如前文云亦於滅時汝知身中有不滅耶豈非滅即非滅只由匿王先陳生滅如來就彼生滅示不生滅其言似偏意則實顯生滅即不生滅也阿難灼然以身為動則是遺失真性而猶引彼末伽梨等都言此身死後全滅具云末伽梨拘賒梨子上是名拘賒梨是母此說衆生雖有苦樂無有因緣自然而然也等者等取旃延胝子二人准此文意則六師中三執斷明矣彼之三者必也執常乎王聞是言信知身後捨生趣生與諸大衆踊躍歡喜得未曾有長水云敘其淺悟但云捨生趣生詳彼深意必知滅元不滅隨宜領解主伴同置未即顯言也熏聞云此且約佛與王俱未顯談生滅即不生滅故猶同置應知王若顯談則無由發起阿難後問秪由王解身有生滅性無生滅與阿難云我頭自動見性不動其理似同是故下文對前為問補遺云結益之文經存兩意一破邪二悟理良由王信邪師死後斷滅今聞至教先破邪心即知身後捨生趣生除斷滅見也悟理者即歡喜踊躍得未曾有即又悟不生滅理也孤山亦云王聞下領悟文前既乃執斷滅以為疑故今且敘信趣生而結益既云得未曾有則是了達不生不滅之圓理也又復應知前阿難初知見性不動尚云心未開悟今匿王聞生滅即不生滅故結益云得未曾有則驗前後見性雲泥分矣阿難即從座起禮佛合掌長跪白佛言世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢資中云阿難承前起問據王見聞與我何異而我即名遺失真性於王即說元無生滅良由不達對機之意故此疑也長水云據此觀河之見與我見聞無殊於王即云不生不滅於我即云遺失真性然此問意由來久矣始因手自開合見無開合頭自搖動見無搖動一一佛印皆言如是此則如來令於妄見即辨真見無離生滅有不生滅阿難罔知佛旨猶謂生滅與不生滅別遂合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性匿王知其懷抱又不發問伸誠於是引外六師執身死後斷滅所冀佛親開示即妄見真貴引阿難無執二別補遺云如來已答現前生滅不生滅理而未蒙開示身心真妄之問阿難欲要其後命據迹陳疑也蓋由經中自見無童耄已前其見精之義與阿難不殊自如來談皺者為變去明生滅即不生滅其言雖偏其意已圓乃至領悟得未曾有則顯性之義乃至真明非見精矣今阿難但據匿王先陳之迹以為問詞不知如來演說之後明理性義已有別途也又亦可阿難但據言偏以為問辭不曉意圓真明妙心非己所及故孤山曰今聞王答見無童耄何殊我解見無動搖王不遭訶而我見斥良由慶喜不領皺變即不皺變全境是心尚執二途故有斯問然經中又據遺失真性顛倒行事為問者上文用此斥身心故今舉此二句即是重問身心真妄再請答前初問也即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世間衆生以此為倒而我不知誰正誰倒擕李云母陀羅結印手也佛告阿難若世間人以此為倒即世間人將何為正阿難言如來豎臂兜羅綿手上指於空則名為正佛即豎臂熏聞云阿難雖指世人其實己見亦爾告阿難言若此顛倒首尾相換諸世間人一倍瞻視孤山云若此顛倒謂垂手豎手也垂則以手為尾豎則以手為首故云相換首尾相翻名為一倍手實無殊既瞻垂為尾視豎為首非一倍如何補遺云經意以手無倒正喻非迷非悟乃悟中了了也若以竪喻諸佛之悟垂喻衆生之迷此乃情想分別於一手中作兩樣觀如上文以身境為動皆為顛倒並就衆生情想分別言之耳是一倍瞻視皆顛倒也以喻意秪將豎手喻悟若一倍者乃是於一手作豎垂正倒之觀方名一倍以喻迷情經中顯云諸世間人一倍瞻視又曰迷中倍人則知悟中無倍明矣則知汝身與諸如來清淨法身比類發明如來之身名正遍知汝等之身號性顛倒孤山云汝身迷理比垂手也如來悟理類豎手也垂豎自異手實無殊迷悟不同理常平等補遺云真如之性本無迷悟今汝執情強分迷悟乃於無分別性中而起顛倒故曰號性顛倒即與下文認悟中迷意同又如來之身名正遍知合上豎手以由名者實之賓所謂正遍知亦安有知以迷望悟如一倍瞻視耳隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒孤山云令審自身望佛正知汝稱顛倒過由何處得顛倒名補遺云經中汝身佛身亦應云汝心佛心但是文略故下具云不知身心顛倒所在于時阿難與諸大衆瞪矒瞻佛目精不瞬不知身心顛倒所在熏聞云瞪直正反定目直視也矒莫亘反目不明也舜亦作眴目動也苕溪云夫妙明真心本無倒正但由諸佛悟之假名為正衆生迷之暫說為倒苟了迷非迷達悟無悟真心尚泯復何倒正於其間哉阿難既以匿王見精不滅疑乎自身遺失真性故佛方便以倒正示之向問顛倒名字意斥阿難認悟中迷為自身心即是顛倒所在時衆未曉於是矒然熏聞云認悟中迷為身為心者以經云不知身心顛倒所在故斯蓋阿難雖知見性不動然猶未絶能見之情故今因佛問身心顛倒乃與大衆俱昧兩端由是下文皆約身心廣辨真妄補遺云今詳經意顛倒所在良由不曉諸法唯心此者終不以身境在外自為若知諸法唯心汝身汝心皆是妙明心中之物向斥遺失真性良在茲焉佛興慈悲哀慜阿難及諸大衆發海潮音遍告同會孤山云機熟即說感應無差喻以海潮來不過限補遺云涅槃三十六云大海有八不思議一漸漸轉深二深難得底三同一醎味四潮不過限五有種種寶藏六大身衆生在中居住七不宿死尸八一切萬流大雨投之不增不減諸善男子我常說言色心諸緣及心所使諸所緣法唯心所現資中云色心諸緣等總有五法一色法二心法三心所有法四不相應行法五無為法此五皆依真心所現如鏡中像真際云八識心王識自相故五十一心所識相應故十一種色識所變故二十四不相應識分位故六無為識自性故攝所歸能攝相歸性故言唯心所現熏聞云此依法相宗釋也若山家諦境明之所現之法不出十界百如三千世間俗諦之境也能現之心即三千真中之理也汝身汝心皆是妙明真精妙心中所現物妙明性覺也真精性識也合此覺識以為妙心所謂妙明真心者即此心也云何汝等遺失本妙圓妙明心寶明妙性認悟中迷孤山云汝等遺失責九界迷妄本妙即中諦圓妙明心即真諦寶明妙性即俗諦性具諸法如如意珠具足衆寶也三諦互融故皆稱妙認悟中迷者諸佛成道空界依正無非佛之真心佛心既然汝心亦爾今既不達名悟中迷熏聞云衆生不達真心是在諸佛悟中而迷荊公云本妙即本覺明妙也圓妙明心寶明妙性皆承此本妙妙明心即性覺妙明所現之心明妙性即本覺明妙所現之性於心言圓則知性之為方於性言寶則知心之為器性心非有方圓實相但以不住名圓不動名方耳晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內孤山云迷性明故而成無明故云晦昧由此無明變起頑空故曰為空又空謂所變頑空晦昧即能變無明二法和合變起四大依報外色故曰結暗為色以四大色雜妄想心變起衆生正報內色故曰想相為身想謂妄心相謂妄色色心和合五陰備矣以妄想四心聚四大內色而外緣六境心不暫停故曰聚緣內搖趣外奔逸也昏擾擾相即內搖外逸無明顛倒也既失本妙故用此相以為心性謂四趣以黑惡為性人天以白業為性二乘以非白非黑為性菩薩以慈悲喜捨為性又執此心在色身內無情有情莫能融一是知順九界妄心者豈信草木有佛性乎不知色身外洎山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤孤山云百千大海喻真心非遍而遍一浮漚體喻妄心非局而局背真趣妄如棄海認漚執妄為真如認漚為海全潮則遍海而湧故云窮盡瀛渤汝等即是迷中倍人如我垂手等無差別如來說為可憐愍者迷悟相翻各名一倍全迷為悟是一倍於迷全悟成迷是一倍於悟手之垂豎相倍易明今既斥迷故言垂手熏聞云當知須將垂手為倒以況於迷真際云迷中更迷故為倍也遺失明心早是迷矣復執前塵以為自性又一迷故荊公云於虗妄中重執迷妄是為迷中倍人然此但如垂手若能背迷合覺即舉手上指阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地補遺云深誨指上真明之見悟妙明心等指上所得見精而我悟佛現說法音現以緣心允所瞻仰徒獲此心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道阿難雖聞如來開示真見猶自未悟所以陳緣心分別也真明未顯所得見精未脫塵根所以猶以分別緣於聲相也准下文意言緣心者以妄想心為能緣聲為所緣既存緣相則所聞聲教未即所詮亦存能詮之相也徒獲此心謂見精也未敢認為本元心地者猶帶分別非得真見所以爾者阿難無明未破真見未顯彼同體分別猶存現聽但不同前來認分別為自心耳故此下歷於緣塵簡顯真見也苕溪云前破妄心已責因聲分別之性今阿難重以緣心而為問者欲顯真性無能所之相也既於緣心已離粗執是故但言未敢認為本元心地豈同前云若此發明不是心者我乃無心同諸土木耶所以下文略簡所緣之法能緣之心真體可見矣手鑑云圓音一演異類等解一音及圓音者有二一如來說一切法無不顯了故名圓音云如來於一語言中演出無邊契經海二如來同一切音故云圓音云一切衆生語言法一言演說盡無餘以一切音即一音故云一音一音即一切音故云圓音常不雜亂若音不遍則是音非圓若音等遍失其韻曲則是圓非音今不壞曲而等遍不動遍而差韻此是如來圓音非是識心思量境界耳荊公云本元心地者從本起元從元起心佛告阿難汝等尚以緣心聽法此法亦緣非得法性真際云以能緣心緣佛法音認為自性非自性也以此法音但是所緣聲教故補遺云此存兩重能所之相緣心聽法心為能緣法為所緣也此法亦緣只成能詮之緣也非得法性未能即性也下文先破聲教能所若得所詮之理能詮自泯矣經從若以分別去次破緣心能所若破分別能緣則所緣聲塵無非心性矣如人以手指月示人彼人因指當應看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈唯亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故孤山云人喻如來手指喻教月喻真理示人喻化衆生也教詮真理理是衆生之心聞教自合觀心離指方能識月教是聲塵故如暗理是真心故如明若依常途解能所義能猶此也所猶彼也應以指為能標月為所標今言所標即能標耳所生父母義不可以常義例之圓覺意也汝亦如是若以分別我說法音為汝心者此心自應離分別音有分別性如前文云若離前塵有分別性即真汝心既離塵無性自知是妄也苕溪云上指月喻雖遣所標之指正簡能緣之心以阿難云現以緣心𠃔所瞻仰故由是今文唯破分別之性者良有以也補遺云吳興意明此中緣心有二向若緣聲塵能聞之性此是真性同前見精此則已在上文遣所標之指遣能詮之教中破之所緣之法能緣之心真體若緣塵分別之性則屬妄念為所破也方在今文破之今詳經意阿難自陳現以緣心者只指分別過不在聞性今但破分別聞性自顯所以經中亦不言及聞性但云分別耳然阿難到此自知分別非是我心但未能破此分別耳經一往泛破故云為汝心者下文云若我心性各有所還者亦指分別影事是我心中分別之性故云若我心性非認為真性也譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主資中云以客喻妄以主喻真此亦如是若真汝心則無所去云何離聲無分別性斯則豈唯聲分別心分別我容離諸色相無分別性以聲例色相從而說非但聲分別心離聲無體色分引心離色相外亦無其性如是乃至分別都無非色非空拘舍離等昧為冥諦苕溪云二十五諦除冥諦外不出心色空也今分別都無心也即覺諦及我心等非色即五塵五大等非空即五大中空大也既非此等正同外道所見冥諦谷響云外道迦毗羅此云黃頭頭如金色故說經有十萬偈名僧佉論此云數術用二十五諦明因中有果計一為宗言二十五者一從冥初生覺過八萬劫前冥然不知但見最初中陰初起以宿命力恆憶想之名為冥諦亦云世性謂世間衆生由冥初而有即世間本性也亦曰自然無所從故從此生覺亦名為大即中陰識也次從覺生我心此是我慢之我非神我之我即第三諦也從我心生色聲香味觸從五塵生五大謂四大及空塵細大粗合塵成大故云從塵生大然此生生多少不同從聲生空大從聲觸生風大從色聲觸生火大從色聲觸味生水大五塵生地大地大藉塵多故其力最薄乃至空大藉塵少故其力最強故四輪成世界空輪最下次風次火次水次地從五大生十一根謂眼等根能覺知故名五知根手足口大小遺根能有用故名五業根心能遍緣名平等根若五知根各用一大謂火大成眼根眼根還見色空塵成耳根耳根還聞聲地成鼻水成舌風成身亦如是此二十四諦即是我所皆依神我名為主諦能所合論即二十五也長水云梵語僧伽奢薩怛羅此云數論拘舍離是彼類耳離諸法緣無分別性則汝心性各有所還云何為主阿難言若我心性各有所還則如來說妙明元心云何無還唯垂哀愍為我宣說孤山云由慶喜未了妙心無還於是如來以見性類通俾其一根反妄六趣歸真也谷響云妙心乃真見性猶妄見性尚爾豈況妙心苕溪云此問心性云何無還向下別指見精為不還者蓋前文已說如是見性是心非眼故然其見精真妄猶雜所以廣約緣塵簡出真性披沙若盡金體自純熏聞云阿難下廣簡緣塵之見二初又二一相待簡二絶待簡初又四一明還不還二明物非物三明遍不遍四明是非是佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影汝應諦聽今當示汝無所還地長水云且者權宜之辭權指阿難能見之心為明元也孤山云真月喻真心第二月喻見精水中影喻緣塵分別第二月由揑目而成見精由迷真而起既分能所豈達一如不揑目則真月宛然亡能所則真心可了故匿王因解見無童耄而達真無生滅也豈比夫分別緣塵俯觀水影之疏遠哉雖萬法一如而復真之路蓋有適莫是故二月月影取喻有殊谷響云認緣塵為自心認水影為真月豈不疏遠耶則知第二月望真月則名親近以仰觀天上俱無異故但不揑目二月自無以喻見性近乎真心其在此矣苕溪云阿難所問妙明元心云何無還而佛以見精為答者以真心無朕發悟良難故託見精方便開示此雖屬妄切近於真如第二月取譬非遠應知此見亦是前來緣塵之見但緣塵分別之性則破云有還緣塵能見之性則示云無還若不爾者何故佛言且汝見我見精明元耶荊公云所謂見精明元者見受識精又受覺明以有見根根首為元也既為見元不可互用即非妙精明心故如第二月所謂一月真者本覺所現妙精明心也所謂月影者相見無性見聞覺知也若無真月則無第二月亦無月影第二月依真月旁出故如見元月影離月別現故如相見相見待緣如影待水與俱生滅見元雖妄不待外緣但無見勞則滅此妄見精明元如第二月尚不可還則妙精明心如一月真其不可還明矣見精明元即是見性性見覺明妙德瑩然而以見元譬第二月者若背本起見即揑所成月若了見唯心不背本明即所謂彼見真精性非眚者阿難此大講堂洞開東方日輪升天則有明曜中夜黑月雲霧晦瞑則復昏暗戶牖之隙則復見通牆宇之間則復觀壅分別之處則復見緣頑虗之中遍是空性𡋯之象則紆昏塵澄霽斂氛又觀清淨真際云欲示無還之性先指可還之相釋要云西國堂舍皆面東阿難汝咸看此諸變化相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牖壅還牆宇緣還分別頑虗還空鬱𡋯還塵清明還霽長水云經列八種塵相今以八字收束謂明暗通塞空有染淨還猶滅也補遺云分別之處則復見緣蓋謂除却餘六物境之外凡有境之處則分別心緣攬而知若無境相處則是空體乃空有一雙此之緣攬因分別生故曰緣還分別也空無虗通似有體用之義因空之體乃有虗通之用往來不礙乃虗通也八義說還取歸復之義長水作滅義消之如日有明日去明滅是明復歸於日矣分別之處能生緣攪分別心亡緣攬隨滅乃至空有虗通之用如一室之空盡實以物則空亡而虗通之用亦滅是虗還空矣則諸世間一切所有不出斯類汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別諸可還者自然非汝不汝還者非汝而誰孤山云不汝還者猶云汝不還也唯有見精汝既不還自然屬汝的非他物故曰非汝而誰然則如是解者則見與境殊尚為物轉未能轉物名第二月若了八境如幻皆是妙明真心中物漚滅空本無況復諸三有者則真月圓明於斯見矣苕溪云見則見性不還猶喻二月此月屬妄將亦須還唯有真月所喻真性誠不還耳下文云但有一月真中間自無是月非月又云見見之時見非是見豈非此見亦可還乎問此還何所答還無明也由無明故而有能見無明若破此見即還起信論云若離業識則無見相厥旨顯然矣因無明故而有業識由業識故乃有轉識轉識即能見相也是知無明若破業轉俱亡則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍熏聞云上不汝還者非汝而誰正示見精明元則知汝心本妙明淨例顯妙精明心也孤山云若了見性無還則識真心常住何者以了境唯心現能所兩亡即是真心如不揑目即是真月且第二月亦在太虗仰觀無異但不揑目即是真矣不同月影俯觀水底塗漢相遼故因了見無還則知真心常住如來顯示其意在茲阿難既免臨池已能仰漢過由揑目未識桂輪谷響云不以緣塵為心是免認池月既識能見之性漸見於真猶如仰觀天漢若不揑目則真月現前能所苟忘則真心顯發阿難言我雖識此見性無還云何得知是我真性長水云阿難問意前對八境權指妄見有無還義因是得識本真元性不生不滅為復只此表如性常為更有義別得真妄故云云何得知等苕溪云如云雖識二月何謂真月佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律見閻浮提如觀掌中菴摩羅果諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚衆生洞視不過分寸熏聞云無漏清淨者近謂四果遠謂圓真據理而言唯圓無漏得真天眼孤山云准淨名經那律答嚴淨梵王云吾見三千大千世界如觀掌果此云見閻浮者且從近示閻浮提者洲有此樹從樹得名無故不翻也苕溪云菴摩羅舊翻難分別其果似桃非桃似奈非奈故熏聞云此依淨名疏釋見淺深隨證諸菩薩等等取緣覺智論明支佛天眼亦見百千世界補遺云准諸文小羅漢見小千今阿難見初禪乃小千之分齊初果而能見者佛之力也若只單見一初禪自力可辦也那律見大千而云閻浮以大千中皆有閻浮舉別攝總耳下文阿難只觀四天王一天而云遍娑婆國舉其通名非指大千阿難且吾與汝觀四天王所住宮殿中間遍覽水陸空行雖有昏明種種形像無非前塵分別留礙汝應於此分別自他今吾將汝擇於見中誰是我體誰為物象長水云將猶請也佛請阿難於所見中詳而擇之阿難極汝見源從日月宮是物非汝至七金山周遍諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝熏聞云方言云蘇芥草也阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性資中云物類雖殊見性常一不隨物異即是汝真孤山云能見常一所見自殊而此見性猶屬二月苕溪云阿難所疑我雖識此見性無還云何得知是我真性如來所答豈不顯真但由見性似在於內真性必周於外性實非內以前來所說皆附能見之性而示故云似內佛欲示之故指一切物象皆是見精所矚矚既斯遍性何攸局此寄見性之遍以顯真性之遍夫何二說各從一義乎然則肉眼所見物象森羅佛眼所觀真空冥寂猶恐阿難認此見性既周外物仍謂外物同我能見是故下文推而破之如華嚴云法性遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可得補遺云應知此中歷緣簡見有四段文初還不還顯見性常住次物非物顯見性周遍三遍非遍顯見性攝法四是非是顯見性融妙如不即不離乃體法融妙故大衆茫然失其所守也然則見性不還故常常然後體遍遍然後攝法攝法乃至於融妙妙則理極不可有加矣繼之絶待而已荊公云言衆生以至菩薩如來則明見有差別而見性無殊言日月宮以至草芥人畜則明物有差別而見性無殊若見是物則汝亦可見吾之見真際云若汝認見為物吾見亦同是物汝應可見若同見者名為見吾孤山云縱汝救云我與世尊同將心眼緣見之時即是見佛之見吾不見時何不見吾不見之處孤山云吾不緣境之時此不見處汝何不見耶補遺云我不緣境時汝合自見吾見汝既以見是物雖不緣境理合見之也今不見者知非物矣若見不見自然非彼不見之相孤山云若有處可見即是物象秪可名見不見補遺云若許見我不見我不緣境見無朕迹何緣見之若云見者則我不緣境無朕迹義自不成矣故云自然非彼不見之相若不見吾不見之地自然非物云何非汝長水云此之文意展轉結歸應有五重經文存三而隱二意若具論者合云若不見吾不見之處亦不見吾見處既不見吾見處吾見自然非物吾見若非是物汝見亦非是物汝見既非是物云何非汝真見熏聞云自然非物者此且一向作真見離物示之至下明是非是中方顯見物非即非離又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立真際云見若為物許汝見者汝見亦須為他所見是則體性雜亂自他不分情與無情不成安立阿難若汝見時是汝非我見性周遍非汝而誰云何自疑汝之真性性汝不真取我求實見性雖同各自受用一室千燈光豈有別彼此自照不相雜矣孤山云由真理本遍故從真所起見聞覺知六根之性一一皆遍今佛對機且論見性遍耳既了妄遍自知真遍以妄全真故蓋謂真性在汝而自不知其真翻取我言以求其實熏聞云若汝見時是汝非我指見精也見性周遍非汝而誰示真性也前私謂云此寄見性之遍以顯真性之遍豈不然乎阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓遍娑婆國退歸精舍秪見伽藍清心戶堂但瞻簷廡世尊此見如是其體本來周遍一界今在室中唯滿一室為復此見縮大為小為當墻宇夾令斷絶我今不知斯義所在願垂弘慈為我敷演孤山云娑婆亦言索訶此翻堪忍悲華云是諸衆生忍受三毒及諸煩惱故名娑婆今舉其通名耳長水云一界初天也一室講堂也借力見寬自力見狹補遺云前明見境廣狹中阿難以加被見初禪乃小千之分齊今指四天王天為初則非借力佛告阿難一切世間大小內外諸所事業各屬前塵不應說言見有舒縮孤山云大如一界小如一室內外如墻宇夾斷譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不安者在方器中應無方空汝言不知斯義所在義性如是云何為在阿難若復欲令入無方圓但除器方空體無方不應說言更除虗空方相所在方圓因器不在虗空大小由塵何關見性是故責言云何為在空性無動寧有出入因器去留強云出入故云若復欲令入無方圓等空體無方喻見性無二也以虗空無方圓可除況見性無大小可還唯言方者義攝於圓若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築墻宇能夾見斷穿為小竇寧無續迹是義不然一切衆生從無始來迷己為物失於本心為物所轉故於是中觀大觀小長水云迷真性之己成色心之物色心既成真性則隱故云失於本心如前文云能生諸緣緣所遺者境從心變心逐境遷故見內外之殊大小之異也若能轉物則同如來身心圓明不動道場於一毛端遍能含受十方國土孤山云若能轉物者即是以圓融智覺了本心不見前塵唯一自性然依解理名字轉物觀察無間觀行轉物粗垢先去相似轉物入聖流水分真轉物妙覺所證究竟轉物雖始終俱是而凡聖無濫六而復即斯之謂歟苕溪云楞伽云未達境唯心起種種分別達境唯心已分別即不生上二句為物所轉也下二句若能轉物也則同如來者肇師云會萬物以成己者其唯聖人乎今文正明無量為一蓋攝事成理補遺云若為物所轉則不同如來何故一切衆生皆證圓覺此如荊溪所謂一者示迷元從性變二者示性令其改迷故也南禪師有頌云若能轉物即如來春暖山華處處開自有一雙無事手不曾容易舞三臺此老不唯能盡經意抑又妙得理體真際云既滅前塵形量不立一切即一性乃圓成大品云一切法趣一法斯之謂矣下文理事雙顯體用具陳故有一為無量之言塵中轉法之義阿難白佛言世尊若此見精必我妙性今此妙性現在我前見必我真我今身心復是何物而今身心分別有實彼見無別分辨我身若實我心令我今見見性實我而身非我何殊如來先所難言物能見我唯垂大慈開發未悟孤山云向云迷己為物失於本心故為物轉若能轉物則同如來是則所見山河皆我妙性故云今此妙性現在我前此領旨也見必我真等者此由阿難尚存能所所見既是真性能見復是何物若謂身無見性而今分別非虗若言現前是見彼之外物別無心智反辨我身若彼外物實是我心現今能見則成外物是我內身非我何殊如來先所難言者前難既破今何復用補遺云此疑請中大有二意一疑能所二疑內外由前攝法則物境皆我真性是所見為真能見身心未即真性故曰我今身心復是何物身心既能分別真性在於物境有實彼所見物境之真何不能返分辨我身亦為真邪故曰而今身心等又若物境之真實我心性是彼為我實而內身成非耶良由泥於物境即真於是下文即離推破佛告阿難今汝所言見在汝前是義非實若實汝前汝實見者則此見精既有方所非無指示且今與汝坐祇陀林遍觀林渠及與殿堂上至日月前對恆河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著若必其見現在汝前汝應以手確實指陳何者是見阿難當知若空是見既已成見何者是空若物是見既已是見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑荊公云精淨性識明妙性覺合二不離是謂精明淨妙見元阿難言我今於此重閣講堂遠洎恆河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所說況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性相見為粗性見為精相見無性故此心滅時即同龜毛兔角性見無相故明暗通塞可還見不可還不可還者以無相故無相非物亦不離物故不能於萬物象前剖出精見佛言如是如是佛復告阿難如汝所言無有精見離一切物別有自性則汝所指是物之中無是見者今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見阿難言我實遍見此祇陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者佛言如是如是孤山云即離二答佛皆印成者以由見性非即非離即離求之定不可得則此見性宛然空華熏聞云一約離義簡物是見二約即義簡物非見於是大衆非無學者聞佛此言茫然不知是義終始一時惶悚失其所守真際云向執心境各別相見歷然今蒙一異推之是非不決心無所措於是茫然苕溪云大衆始聞見性非物佛印云如是終聞見性是物佛又印云如是故茫然不知終始二義何所歸耶故下文殊再敘其事云若是見者應有所指若非見者應無所矚而今不知是義所歸則知終始指此二義是見義既失非見理復乖終始難明守歸何所如來知其魂慮變懾心生憐愍安慰阿難及諸大衆諸善男子無上法王是真實語如所如說不狂不妄非末伽梨四種不死矯亂論義汝諦思惟無忝哀慕資中云世間王者尚無二語何況法王親證所說豈虗也哉如來有五語真語實語如語不誑語不異語無僞曰真稱理曰實不變曰如心境相應曰不誑懸見未然曰不異熏聞云引金剛般若釋之彼無不妄此無不異若會通者由不妄故所以不異荊公云佛真語與二乘共者也實語與菩薩共者也如語不共無實無虗無虗故不誑無實故不異今言不妄者妄以對真得名所謂真直一如而已則雖實亦妄故如所如說乃名不妄如所如者所謂如如四種矯亂下文備矣哀慕猶見憐弟子所以仰慕本師者以聞道也今不能思惟恐辱其所以見憐之意耳是時文殊師利法王子愍諸四衆在大衆中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大衆不悟如來發明二種精見色空是非是義二種真際謂精見色空孤山謂是非是義由前阿難析精見於萬象即象非見離見無象即離難定所以茫然不知終始故文殊述諸大衆不悟如來發明二種精見色空是非是義而為啓請二種即前精見之於色空為即為離是非是義之二種也世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕鮮惟願如來大慈發明此諸物象與此見精元是何物於其中間無是非是佛告文殊及諸大衆十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是熏聞云十方如來此約果人所證以示衆生所迷迷證雖殊見性是一及大菩薩即圓住已上也長水云自住首楞嚴三昧手鑑云凡諸三昧皆有三相謂入住出五識對境意從門出遠境護根意識却入此通權小今唯一心以明三相謂即照之寂名入即寂之照名出入已未起名住非權小所得故復云自又此妙定融一切法皆唯自己三昧故云見與見緣等見即是根見緣即境所想相即識也此根境識即十八界攝一切盡妄心所有真體元無如空中華翳目故見一切諸法不覺故有不覺即覺元是菩提補遺云此文只是泯事歸理二諦法相以由上明見性與境即離之義泯事歸理則無可推安有是非之相但前明泯俗即真故如空華次明泯真即俗故云元是文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊此有相待絶待二意相待則分真妄是非之異絶待則無真妄是非之別佛只問真文殊外為有為無有則便有是非真妄之異相待也無則唯一文殊是非從何而生絶待也如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相我真文殊無是文殊答絶待意也何以故若有是者則二文殊相待意也然我今日去重示絶待意欲於前絶待中示其無是非之相故覆疏之也今日非無文殊即上云我真文殊但一文殊在於今日何常有是非之相耶絶待則合上元是菩提妙淨明體相待則合是見性非見性之二途也節公疏云若立二身即有是非之相既唯一體終無待對之名此喻真本無妄也佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見本是妙明等合上真文殊妄為色空等合上更有文殊也色空既立對待潛生從真有妄也若知本是空華絶待於茲顯現如第二月誰為是月又誰非月文殊但一月真中間自無是月非月經只舉第二月已影帶真月為第一矣二月既立便有真妄之別誰為是月真月也又誰非月第二月也第二月揑目所見者此相待義合上二文殊也但一月真中間自無是月非月此絶待義合上只一文殊今日非無者也真月云誰第二可帶第一是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是精真妙覺明性故能令汝出指非指苕溪云物為所指見非可指真性俱離故云出焉荊公云不能出是非是者見二法故令汝出指非指者知一性故阿難白佛言世尊誠如法王所說覺緣遍十方界湛然常住性非生滅與先梵志娑毗迦羅所談冥諦及投灰等諸外道種說有真我遍滿十方有何差別苕溪云覺謂菩提緣即色空聞見等前文云此見及緣元是菩提妙淨明體真際云冥諦者數論二十五諦中第一諦也投灰等即苦行外道阿難疑云彼計冥諦及以真我亦遍十方與此覺性有何差別世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常說自然我說因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然楞伽山名此云不可往唯得通者能到彼經第二大慧舉佛昔說如來藏性與外道計我何別佛述真我為斷愚夫畏無我句故說如來藏性不同外道之我又為破外道自然說有因緣依世間相分別緣起今引次義為難熏聞云畏無我句者外道所計不出四句謂有無雙亦雙非此屬無句也補遺云外道計有神我畏佛說無我句故世尊有時亦說真我故曰不全說無我外道所計四句正是有句畏說無我而記主謂外道四句此屬無句何也豈不以佛說無我屬外計之無句乎就佛教四門空門無我亦是無句故云畏無我句似非因緣恐不是因緣也與彼自然即合彼自然也孤山云與者類也云何開示不入群邪獲真實心妙覺明性苕溪云蓋言今之覺性自然似非昔之因緣則與外道自然如何分別耶佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然阿難若必自然自須甄明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明興福云慶喜所疑唯約真體如來何故約相而破然一體凝然理無能所既興能計必有所緣緣則約相方生離相必無緣理是以假緣推自自且不成相息心亡永袪邪計熏聞問前疑覺緣濫於冥諦及以真我如來何故但破自然答阿難云我今觀此覺性自然即是觀前覺緣之性所言遍者亦自然遍也前文云覺緣遍十方界湛然常住等故知對他相濫雖有三名自己所疑秪自然耳自然若破冥諦真我復何濫歟荊公云凡言自者非無所從生又必有他為對但一性耳即非自然阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性孤山云始疑妙性同外自然既聞逐破則謂如佛昔說正因緣義但未知妙性云何符合耳佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞因略空塞緣略明暗佛言之巧相例可知真際云因親緣疏故分二門熏聞云如因明有見則境親而根疏若緣空有見則根親而境疏因緣皆對境破不對根破者以境有明暗空塞推撿為易根無此相故不論之又則阿難見性未脫前塵由於前塵而生轉計如上文云汝今因見見性現前等是故所破並從境說當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法苕溪云非正因緣非外自然非不自然者不無也謂非無覺性之自然如下文云無生滅名為自然不言非不因緣者以此中正破因緣生義故且置之無非下此顯覺性本無非與不非亦無是與非是上句謂因緣下句謂自然離則顯真非俗即乃觸境唯心亡然存然不可得而名焉補遺云阿難疑請之時通問自然因緣二義佛先別答二義從當知下總答二義此總中先破性執從無非不非下破相執非因緣破因緣性計也亦非自然性計也非不自然乃覺性之自然也以由上文將覺性自然與破外計自然相類今分別之破彼立此也據理合有非不因緣一句以破邪因緣立正因緣如上阿難所引楞伽佛說正因緣是也今謂此句合有經家略之欲生起下文阿難之問下文問云必妙覺性非因非緣世尊何故又說見性具四種緣此中若立因緣何以生起此問無非不非句破自然之相執無是非是句破因緣之相執上文破性非其自然今破能非故曰無非上立覺性自然云非不自然今亦破之故曰不非也不非與非不語倒意同也無是者合有非不因緣句是正因緣恐執是為病今亦非之非是者即是破性中非因非緣以邪因緣不是正因緣今破能不故曰無非是也下句總結云離一切相即相執亡也汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮摩虗空秪益自勞虗空云何隨汝執捉孤山云手掌喻妄情撮摩喻推度虗空喻真心秪益自勞喻生滅輪轉阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼是義云何唯識明九緣今經及涅槃但明四種廣略之異耳谷響云唯識九緣一空二根三明四境五作意六種子七分別八染淨九根本若加等無間緣則成十也今經云因心即分別緣因眼即根緣也佛言阿難我說世間諸因緣相非第一義因緣假名世諦則有第一義諦則無阿難吾復問汝諸世間人說我能見云何名見云何不見阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見若復二相自相凌奪非汝見性於中暫無如是則知二俱名見云何不見苕溪云此與初卷中盲人覩暗見性是同所破有異前顯見性是心且破眼根能見今顯見性非明廣破因緣能見破緣既廣顯性實深由是下文談見見非見是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞四義成就孤山云以明暗空塞四義推之成就見性離塵而有也四義成就是結上之辭汝復應知見見之時見非是見見猶離見見不能及云何復說因緣自然及和合相前非所見故離四塵今非能見故離見性上文云見精明元此見雖非妙精明心如第二月非是月影今云見非是見上見即如精明心如明月也下所非者即見精明元如第二月也熏聞云原夫佛意既破四緣俱非見性欲顯真性亦非能見故先牒能見以離四緣即見明之時見非是明等後約真性以離能見即見見之時見非是見見不能及釋成上句意云何故見猶離見良由見精屬妄不能及於真理故也又解准前文云見明之時見非是明等皆以能見見於所見能非是所也例今見見之時義亦如是即以前之能見復為今之所見蓋言真見見於見精之時真既無妄故曰見非是見也問見精屬妄何以真復見於妄乎答夫見精者映色之性也如空中華本無所有真見者了因佛性本覺之智也真見一顯見與見緣如空中華本無所有謂真見見妄見耳豈與見精緣色猶存能所同日而語哉何則以於妙覺明心一念不覺遂境智俄分非二成二即見與見緣也如無明破盡真見顯了此見及緣元是菩提妙淨明體但易其名本無二體是謂之見見非更有如第二月之精見為真見所見也熏聞云第四卷云由明暗等二種相形於妙圓中黏湛發見見精映色結色成根今言性者即眼根中能見見性也補遺云此謂初迷真性映於境界取於分別之時未與諸使合其體未全屬妄故下經云於妙圓中黏湛發見起信云不覺而起能見疏云今熏淨心成黎耶即依迷起似筆削云依迷起似者即依根本不覺起妄心也此言似者即以創迷真性成此妄念微細流注似其不動似無差別故似一似常楞嚴呼為妄覺影明斯之謂也見雖屬妄其性元真當知見見之時無別所見秪是見於見中之性耳然則若未見性性在見中同名見精若能見性性脫於見方名見見故下文云覺非眚中此實見見此中見見等又只緣阿難未脫見緣所以先明見性離緣次明真見離見此經旨也見雖屬妄性元是真阿難若發圓住分脫此見分顯元真若至果地乃究竟離全體顯也熏聞云問見見之時為屬何位答𭰈疏謂前離緣塵是相似位即別教三賢圓教十信也引唯識頌云現前立少物謂是唯識性以有所得故非實住唯識今離能見是見道位即別圓地住已上也引頌云若時於所緣智都無所得離二取相故真實住唯識今謂亦應約圓教六即明之從名字即以解為見乃至究竟即以證為見荊公云見見然後為見則見非是見也故知見無見斯則涅槃真淨無漏見見之見離於相見則非相見所能及也夫相見者見相而已不能見性汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開而今更聞見見非見重增迷悶伏願弘慈施大慧目開示我等覺心明淨作是語已悲淚頂禮承受聖旨長水云宣說因緣及與自然指前已聞也諸和合下述未悟也補遺云此文請指前已聞述後未悟也蓋下經文佛自指之云阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合是也但此中遠請和合不和合相近請見見非見所以下先答見見次答和合等又復須知和合即因緣之相不和合即自然之相我雖聞因緣而未曉和合雖聞自然未知不和合相所以上文云云何復說因緣自然及和合相且阿難初即問因緣自然不曾問及和合此文訶誡之者以和合即因緣相故至下破和合中兼言因緣亦此意也訶誡中不言和合者文略也爾時世尊憐愍阿難及諸大衆將欲敷演大陀羅尼諸三摩提妙修行路告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果孤山云陀羅尼此云總持即慧性也三摩提此云正受即定性也定慧均平故名妙修行是趣果之要故喻以道路奢摩他三止也微密觀照三觀也前經家敘則先慧而後定次佛正告則先定而後慧用顯圓頓止觀體無二也苕溪云阿難所迷心境轉細如來所示觀照愈深故曰微密阿難一切衆生輪回世間由二顛倒分別見妄當處發生當業輪轉云何二見一者衆生別業妄見二者衆生同分妄見迷己為物是名顛倒知見立知是名分別而此分別離塵無性故曰見妄妄即無明發生即見見即成業業即有苦所以輪轉為顯妄業苦三更非異時故曰當處發生當業輪轉手鑑云處即真也謂全真成妄故曰發生由因感果故曰當業輪轉一念迷真三道具足俱時而有如惡叉聚長水云衆生妄識緣境有異故名別業無見即真有見皆妄故云妄見此之妄見約衆生界彼彼皆然故曰同分當知妄見是一約人名異補遺云科次別釋又二初引喻二初燈光圓影喻云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊孤山云世間人喻九界衆生目喻本具真智燈喻本具真理赤眚喻妄心圓影喻妄境境謂五陰故云五色重疊苕溪云此別業中雖通指世人意且趣舉一人為喻至同分中方語多人耳於意云何此夜燈明所現圓光為是燈色為當見色阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等孤山云非眚人喻佛界也復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影是故當知色實在燈見病為影影見俱眚見眚非病終不應言是燈是見於是中有非燈非見色實在燈理體本真也見病為影妄心成境也影見俱眚心境皆妄也有智眚人知因目眚終不執言圓影實有故雖有眚不為見病也譬圓初心無明雖在而達無明本自不有則無妄境可得故大經云知涅槃者雖有煩惱如無煩惱苕溪云應知如來舉此推破性執者正欲引例阿難目觀山河等皆是妄見耳長水云色燈光也燈實有光不曾有影補遺云見乃解了之名如第二月非體非影何以故第二之觀揑所成故諸有智者不應說言此揑根元是形非形離見非見揑音涅㮈也長水云但是㮈目根識參差故見二相此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見苕溪云是燈是見謂圓影由燈見而有即因緣義也非燈非見謂圓影離燈見而有即自然義也前文已破此重責之長水云非形見也非見形也智人不言此月生處是形是見離形離見譯人變文耳次依報業感喻云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中其間或有三兩百國或一或二至於三十四十五十阿難若復此中有一小洲秪有兩國唯一國人同感惡緣則彼小洲當土衆生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹霓種種惡相但此國見彼國衆生本所不見亦復不聞孤山云暈適者皆日旁氣也適日將食先有黑氣之變也如浮日暈讀作運適如字珮應作背其形如背字玦其形如玉玦彗所以除舊布新孛氣似彗釋名云言其氣孛孛然似掃彗也彗即掃帚夭星之狀似之飛流謂飛星流星飛絶跡而去也流光跡相連也耳宜作珥珠在耳曰珥其狀似之通占曰負氣戰氣圓氣眚赤如半暈著暈上為圓日上為負負倚也五行志作抱珥孟康曰抱氣向日也珥形點黑也以其黑點似珠在耳也補遺云如淳曰凡氣在日上為冠為對在旁直對為珥在旁如半環向日為抱向外為背有氣刺日為鐍鐍決傷也荊公云暈暈氣也適所謂適見於日月之灾珮玦氣狀如此彗所謂掃星偏指曰彗芒氣四出曰孛飛星自下而升者流星自上而降者負氣背日如負者耳氣旁日如耳者長水云珮玦玉器也妖氣近日月如珮玦之形熏聞云玦如環而有缺也孤山云虹霓者雄者為虹雌者為霓多在日旁雙出鮮盛為虹暗者為霓通占曰陰陽之氣和則為和怒則為風雷妖氣擊作散為虹霓補遺云爾雅曰螮練謂之虹次合法又二初總標上引喻開說似是大異今欲合明言其同也阿難吾今為汝以此二事進退合明真際云今將同例別以別例同故曰進退由別業先明同分後說故得進退之名二別釋二先合法又二初合別業又二初正合又二初牒前喻阿難如彼衆生別業妄見矚燈光中所現圓影雖似前境終彼見者目眚所成眚即見勞非色所造荊公云以動為動故曰見勞然見眚者終無見咎補遺云上見乃解了之名下見乃妄見之見下經云皆即見眚非見眚者例可以曉次正合法又二初合目眚例汝今日以目觀見山河國土及諸衆生皆是無始見病所成苕溪云阿難目觀如別業妄見也山河國土等如燈光圓影也見病如目眚也以法言之即阿梨耶識能見相分以惑言之正屬無明次合非眚上喻有見則非眚人今以圓人達根境為覺明無眚病矣見與見緣似現前境元我覺明上云雖似前境終彼見者目眚所成喻無明成事也今云似現前境元我覺明示真如不變也纂注云此三句總標次酬請上文阿難猶迷見見非見之義如來陳顛倒妄見之後更委明見見以酬其請見所緣眚覺見即眚本覺明心覺緣非眚覺所覺眚覺非眚中此實見見云何復名覺聞知見謂見興所緣已俱是眚若起覺智覺此二空此能覺智亦是眚也圓覺云依幻說覺亦名為幻此二句釋上見與下二句苕溪云次二句釋成何故覺即見眚以本覺性中覺之與緣融融一體非如眚人見有能所此二句釋上元我下一句長水云次二句雙結真妄若起能覺覺於所覺俱是眚病真覺之體非能所中故非眚中上一句結見所下二句下一句結本覺下一句此實見見等者此無能所本覺明心名為見見以寂而常照照而常寂故於此豈名見聞覺知等苕溪云覺非眚中等者指上覺見即眚若離於眚此覺方是真實見見前文云見見之時見非是見言猶總略故委論之云何下顯其離妄也亦責其未悟也然佛所說二種顛倒分別見妄者由前阿難云世尊為我宣說因緣及與自然等心猶未開是故廣示別業同分所見之相皆是虗妄此即重破因緣自然二種之執也又阿難云而今又聞見見非見重增迷悶故今再離覺非眚中此實見見也熏聞云此實見見者應有二義一約真見簡非妄見此則通取解證俱名見見二別約真證而見簡非似解而見補遺云見所緣眚者見是根所緣是塵乃眚病也覺見即眚者即能覺能見前根塵乃所覺所見若存能所之相非但見緣是眚覺見亦即是眚此即阿難所得見精未脫於見者也本覺明心覺緣非眚者此二句釋出上意意云何故能所俱是眚病只緣本覺明心中覺與緣一體無能所相方是非眚也覺字指上能緣覺見即眚句緣字指上所緣見所緣眚句也已上四句明見精釋出上文見猶離見即所離之見也覺所覺眚下三句方明真見釋出上文見見之時也覺所覺眚者此一句且一往分境分觀以妄見為所覺之眚覺為能覺似天台初以陰境為所觀十乘為能觀也覺非眚中此實見見者體前眚病皆妙淨明體本非有眚則能所一體乃實見見也此似天台不思議境無能所異體也荊公云所謂見精明元者是元非本是我非物是見非心即所謂見精明元也所謂本覺明心者是本非元是心非見非有我非無我何則衆生認物為己則謂之無我計我迷己為物則謂之我計無我然則無我者物也有我者己也性見覺明是我非物所謂性也若本覺明心則是從本所現一心心一而已誰與為敵云何有我性一切物未嘗滅云何無我故維摩經曰我無我不二是無我義以心如此故我不足以言之見所緣眚覺見即眚者覺明起見而見所緣眚彼所覺見即是眚也本覺明心覺緣非眚者此本覺明心覺彼見覺能緣所緣而此本覺明心非是眚也覺所覺眚覺非眚中者覺明起見覺有所是名所覺此本覺明心覺彼所覺即眚而此本覺明心非眚中也覺非眚中即是見見也次合同分二初合一國人同見見眚者即覩不祥灾異誠眚病而見耳是故汝今見我及汝并諸世間十類衆生皆即見眚非見眚者苕溪云此斥阿難不是見眚非病之人次合彼國不見圓人地住已去者也彼見真精性非眚者故不名見若彼見性無眚之人故不見有世間之相所謂彼見真精性非眚者即真月也以非眚故次進退合明又二初總標阿難如彼衆生同分妄見例彼妄見別業一人一病目人同彼一國上文云吾今為汝以此二事進退合明義見於此如彼衆生等進同例別也一病目人等退別例同也由別業中引目眚為喻顯妄則易以因眚見影人皆知虗故同分中引瘴惡為喻顯妄則難以因瘴覩相事皆如實故佛意欲彰同分之妄悉如別業之妄故有進退合明之說次別釋又二初退同例別經云彼見圓影眚妄所生即牒前別業以為所例也此衆同分下正以同分例彼別業也即將同分中所見之妄退與前別業一人妄見俱是無始無明也彼見圓影眚妄所生此衆同分所現不祥同見業中瘴惡所起俱是無始見妄所生孤山云病目瘴惡雖是引喻而實能喻即是見妄以一切世間虗實分別無非妄故如此解者豈於能喻事外別求所喻法耶苕溪云雖能喻皆妄然所喻之法要顯阿難一人及閻浮提乃至十方衆生妄見咸爾又同業中瘴惡之妄猶易可知諸有漏國及諸衆生虗妄病緣其實難信是故經文從狹至廣以易例難次第發明展轉相濟也如此熏聞云無始者即指現前見妄無其始因也次進別例同即將一人妄見進與後文同分所見灾祥之妄俱是迷無漏妙心有於見聞覺知也既云閻浮提必有所例經文影取之耳況上文具云一病目人同彼一國此中可以影略也例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸衆生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死苕溪云真妄和合故有生死偏言妄者真如在迷也補遺云原夫立此同分別業二種妄見進退合明一切衆生皆因無始妄見故境界現前如目赤眚而見圓影若無妄見境亦隨滅如無眚人是也此一人別業如此一人既爾一切衆生皆然欲顯一切衆生皆有此妄燈有圓影之喻只可喻於一人不可施於衆人故又引見灾祥之喻欲顯妄見一切衆生皆有矣同分所見瘴惡雖同而妄義不顯故退與燈喻虗妄義齊並從無始而有則皆虗妄也蓋因瘴惡而有灾變之見何異因眚妄而見圓影乎又一人眚妄見燈圓影若進與衆同豈亦不見外之灾祥變乎良由同迷覺明無漏妙心所有見聞覺知無不同也故進退明之使二業齊等皆歸一妄見也問此二妄見為是見思為是無明今作二意明之一者此同分中所見不祥乃是引喻經中牒喻喻法乃是無始無明亦可現見惡瘴並從無始無明所起今欲引彼惡瘴例人所見並從無明流出耳若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住荊公云和合衆生法也不和合二乘法也阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合長水云前阿難敘云諸和合相及不和合心猶未開故今牒之補遺云和合即因緣相不和合即自然相但計因緣則粗計和合為細計自然為粗計不和合為細所以上文聞因緣自然而猶未悟和合與不和合也又上文據楞伽請問因緣自然至下文忽疑不曉和合及不和合者良由和合即因緣不和合即自然故也又破和合中經云汝今猶以一切世間妄想和合諸因緣性而自疑惑據此顯以因緣即和合也問曰粗細之義何以言之須知因之與緣計之與破各有四句若和合者和之與合自有八句則當計因與前塵和合則因有八句緣亦如之若非和非合共有八句推相自然豈非計相破法有粗細之別乎荊公云本覺所起妙明性非因緣性也則非和合可知非自然性也則非不和合可知而阿難未明故佛為詳說阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者苕溪云菩提心者即覺性也上文云而猶未明如是覺元非和合生等則汝今者妙淨見精為與明和為與暗和為與通和為與塞和若明和者且汝觀明當明現前何處雜見見相可辨雜何形像資中云明屬前相見屬內心齊何處所而論其雜見之與相目擊可分明見相雜作何形像若非見者云何見明若即見者云何見見孤山云若言明非是見故不可說其相雜形像者故破曰云何見明若言明即是見名相雜者故破曰云何見見必見圓滿何處和明若明圓滿不合見和圓滿猶云周遍也若見自周遍則無明可雜若明自周遍則無見可雜見必異明雜則失彼性明名字雜失明性和明非義性謂見性見被明雜豈得名見明被見雜豈得名明和雜既失明性兩名則知謂見和明不成義理故云和明非義彼暗與通及諸群塞亦復如是復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合資中云上明和義如水和土今明合義如蓋合函若明合者至於暗時明相已滅此見即不與諸暗合云何見暗長水云見與明合暗相現時明相必滅既與明合應隨明滅云何見暗若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗彼若救云我此見性不與暗合而不妨見暗斯有何失隨即破云與明合者應非見明等彼暗與通及諸群塞亦復如是阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶真際云若和合不成即非和合形對必然故也此計真妄二法了不相觸名非和合苕溪云中論破計不出四性謂自他共無因也初破自然即無因也次破因緣即自他共也如以明暗空塞推於因緣正約他性又阿難所執空明心眼四種因緣空明即他心眼即自又佛說同別二種見境見亦自也境亦他也既有自他必合其性但由共性難破是故更作和合而說然則非和合義亦從自他開出為防末習委曲搜揚耳問此與前七處推心四性何別答七處四性都未涉真但破第六識心分別校計今自然等皆依覺性破妄顯真微密觀照於此見矣佛言汝今又言覺非和合吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔熏聞云畔田界也阿難若明際中必無見者則不相及自不知其明相所在畔云何成彼暗與通及諸群塞亦復如是又妙見精非和合者為非明合為非暗合為非通合為非塞合非和約體不相入故以際畔推之非合約性自差別故以乖角破之是則和親而合疏若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理孤山云乖角者角謂隅也物在隅則不相對性既乖角何殊以彼耳根對此明境故云如耳與明等彼暗與通及諸群塞亦復如是已上約心見破妄顯真孤山云大章第二總破諸法前別破心見者誠由慶喜目觀如來勝相心生喜樂於是發心願捨生死而於佛法常好多開由茲三病不臻一理是故前文展轉破執不出心見及以聲塵雖涉餘法非是正意至今方歷三科七大巡歷檢破使無遺滯總別推尋無法可得常住真心於茲顯矣妙奢摩他於茲辨矣所以不歷僧祇修證而獲常住法身者其在茲焉文分為二一破四法二破七大於三科中更加六入故成四法問何故別科七大答前四從少至多謂五六十二十八也七大乖前次第故須別科又四法現前別示七大因疑總明故也阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體前已廣破心見而猶未歷三科故云汝猶未明一切浮塵諸幻化相浮虗無體塵翳真性故曰浮塵諸法不實如幻如化故曰諸幻化相處謂真體幻生幻滅不離於真波起波息不離於水故曰當處出生隨處滅盡去來妄見生滅故曰幻妄稱相幻是妄故故名幻妄其性等者波為水相水即波性波水一如性相名失為開示故云相云性而此相性即非相性三諦一諦一諦三諦思之可了熏聞云諸幻化相智論云譬如幻化象馬及種種諸物雖知無實然可聞見如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得孤山云諸經皆列三科謂陰處界以對愚根樂各有三故谷響云俱舍云聚生門種族是蘊處界義愚根樂有三故說蘊處界且愚三者一愚心為說五陰則開心為四合色為一二愚色為說十二處則開色為十處半謂五根五塵及法塵少分合心為一處半謂意根及法塵少分三愚心及色為說十八界則更開心為七界半謂六識意根法塵少分皆言愚言迷也根三謂上中下樂三謂略中廣皆如次配三科而今有四更加六入秪是破十二處中內六處耳隨機增減何必定三此並色心開合之殊廣上浮塵諸幻化相也因緣下廣上當處出生等也殊不能下廣上其性真為妙覺明體也初明九界即是佛界迷故不知一一界中咸具陰等而此妄想即是真理故無生滅去來等相如來果稱果有三身而因理含攝名之為藏非去來今故名常住即寂而照故曰妙明即照而寂故曰不動三一互攝故曰周圓體非妄僞故曰真如隨緣而不變名之為性又如來藏總含三諦次文別顯三諦常住妙明即真也不動周圓即俗也妙真如性即中也至第四卷世尊顯以三諦釋如來藏義與此冥合性真常中下明佛界圓理無二邊相一往而論則去來等三雙悉二邊也若深究其致則即真而俗故非去即俗而真故非來即邊而中故非迷即中而邊故非悟即斷而智故非死即智而斷故非生非此六相故云了無所得又是非前三方便權教故云了無所得何者藏通析體所說凡夫則去涅槃來生死聖人則去生死來涅槃別教次第所談九界則去中道來二邊佛界則去二邊來中道故三教有去來相也藏通捨六界迷成二乘悟別教捨八界迷成菩薩悟故知三教有迷悟相也藏通出分段生死而有變易生死別教出二生死期入中道非二生死故知三教有生死相也就彼教門當分所說亦非去來等以圓望之未逃六相豈稱本性乎今圓融稱性之說非生死去來亦非迷悟故云了無所得如是了者乃名圓悟長水云此諸幻相本無所依但是迷真忽然而起故云當處出生生即無生本自寂滅故云隨處滅盡楞伽經云一切法不生我說剎那義初生即有滅不為愚者說中論云諸法不自生亦不從他生不共不無因是故知無生彼之無生即此滅盡也以妄見取似有浮相畢竟無體猶如幻事故云幻妄稱相無體之處元是菩提妙覺明性故云其性真為妙覺明體問幻相不實畢竟無體何得復云其性真為妙覺明體答曰譬如空華由依翳病觀空故真離空無別華相空華雖無自性然以虗空為所依體若翳病差華相雖滅空性不滅諸法性相亦復如是幻相雖滅真性不動問若如是者斯則真如即萬法萬法即真如何得一體立真立妄答亦如空華翳者妄見若無翳目唯見晴空而無華故知萬法雖真唯證乃知非是識心之所能見以凡夫人心識粗動唯見世間粗動之相執此粗相為相所礙不見真性故前文云迷己為物故於是中觀大觀小故今廣破執喪空明因茲悟入佛之知見故華嚴云一切法無生一切法無滅若能如是解諸佛常現前前文亦云若能轉物即同如來皆斯義也補遺云經文到此唱如來藏名為其前文示常住真心體遍諸法將欲廣約諸法顯常住真心無所不含無所不攝無非理性三諦故也通唱一名義兼空與不空何以故理性具三諦故諸法自即離故以如來藏推廣真心故也若下經文空如來藏名目指屬果位此中正明因心不可直引同也阿難云何五陰本如本來藏妙真如性長水云梵語塞健陀此云蘊古翻為陰蘊謂積聚陰謂蓋覆積聚有為蓋覆真性也此陰有五攝有為盡何所不該手鑑云積聚等者雜集論說藏果重擔義藏因即蘊義重擔即陰義攝有為盡者然色等蘊通於無漏出世之義謂諸佛五蘊因滅無常色獲常色等兼通無為今但取有漏有為蘊不攝無為義不相應故然知五蘊乃有三義一知其相謂色以變閡為義受以領納為義想者取像行謂遷流識者了別二知其生滅謂生無從滅無至三知其不生不滅謂法本不生今則無滅故經云分別此諸蘊其性本空寂空故不可滅此是無生義然若能了知則轉五蘊成五分法身轉色蘊而成於戒身表無作戒皆色蘊故轉於受蘊而成定身定名正受轉想成慧凡所有相皆是虗妄見相非相成法身故轉行為解脫無貪等行名心解脫永斷無明名慧解脫轉識成解脫知見既與正受智慧相應即是現量如實知故仁王云觀色受想行識得戒忍知見忍定忍慧忍解脫忍即斯義也又此五蘊即是三德對之可見釋要云何所不該者以五陰攝於百法但除六無為餘皆攝盡故頌云色攝十一全受想各當一八王識蘊收七十三行攝無為非積聚不在蘊門攝故云五蘊攝有為盡谷響云然此五中一色四心三數一王同起異起各隨部執于今非要不暇具論若欲略知王數異起相狀者即是心王了其總相心所了其別相以識創起但緣青等總相次取境像即是想心次領納前境即是受心次起貪等煩惱造作即是行心凡夫妄想計為實有今經顯破五陰元空也阿難譬如有人以清淨目觀睛明空唯一晴虗逈無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是孤山云淨目況本具真智睛空況本具真理唯一晴虗即理智一如也逈無所有絶九界妄色也其人喻衆生也背真合妄故曰無故不動目睛妄心取著也瞪以發勞埤蒼云瞪直視也妄惑潤業也於妙性中現九界色故曰於空見狂華等長水云目喻智空喻理以果海無別色聲唯如如理及如如智猶存其人無故下不由別事只因自不動目直視於空目睛勞倦遂見華相或見毛輪第二月等故云色陰亦爾以不如實知真如法故不覺動念現六塵境即色陰起也熏聞云此須兼帶上下文相顯之方見其義上文既以狂華喻於色陰下文云是諸狂華非從空來等正喻色陰不從因緣等生也以能喻之文既悉故所喻之法甚略說在中間真語巧妙也後四陰例此可知矣荊公云以空頑故非有現有而為色空阿難是諸狂華非從空來非從目出熏聞云非從空來破他性非從目出破自性約法言之應以心境而分自他餘四陰中皆有自他二義蓋四性中存略而破也唯行陰中有離自他義似破無因性問經破人法二執何故須破四性於四性中多破自他二性耶答荊溪云四性為諸見本自他復為共無本所以然也故龍樹尊者為被末代人根轉鈍廣作觀法造於中論實以推檢四性為本正順今經最後垂範如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅如阿難體不容阿難若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時目應無翳云何晴空號清明眼長水云空元無華妄見生起說誰出來真元無色妄分質礙復從何所破空出也見華既從空出不見應從空入空無內外何出入之有設有出入即是實色不合名空既非虗空云何華出見實物時無華出故故阿難體是其實色見汝體時豈更容有阿難出耶若目出下破目出如人從屋出必有入目既有見能出於華華應有見從目出去能華於空自空歸目合見於眼若此華性雖從目出而無有見斯但為翳既從目出去翳虗空歸目之時應合翳眼若汝執言實不成翳無妨見華既無翳目而能見華見晴明空應是翳眼云何見空號清明眼華無所出色陰不生本妙真常何曾起滅而有說為因緣自然者是真虗妄釋要云從目出故當合有見者母有故子亦有也云何晴空號清明眼者合云云何見晴明空號清淨明眼意云若見華是好眼應見晴空却眼又何以世人觀晴空時號清淨明眼孤山云如阿難下譬空有實體則不容空華即此華性下謂眼既有見華亦應見又見華時下重約華從眼出破也若以無翳見有空華則見無空華復是何眼也是故當知色陰虗妄本非因緣非自然性資中云若知華相即空則顯色陰本如來藏釋要云本非因緣等即是四性觀推檢令見無生因即自性計緣即他性計因緣合即共性計自然即無因性計今推一切法若自性生苟無其緣何能生法如水無風豈自成浪若云他緣生者他又焉能自生法耶如風無水焉能起波若云共生未合各無共時安有又共涉二邊體屬誰邪共生尚非無因豈有此四既空名字亦絶性相執除三空自顯也阿難譬如有人手足宴安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是熏聞云證真云忘生猶云忘形也謂百骸調適不與苦樂憂喜諸受相應恬然靜住似無形命資中云性無違順喻真性寂然妄本無因故云無故真妄和合如二手相摩領納違順如妄生澀滑荊公云以覺迷故無所生所而為受陰阿難是諸幻觸不從空來不從掌出如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸若從掌出應非待合又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時蹤迹必有覺心知出知入自有一物身中往來何待合知要名為觸是故當知受陰虗妄本非因緣非自然性阿難譬如有人談說酢梅口中水出思踏懸崖足心酸澀想陰當知亦復如是資中云想以取像為義想像不實從虗生故以說酢思崖為喻荊公云談說酢梅但有名言思踏懸崖初無實事而能令心真受酸澀此足知為妙真如性熏聞云談說酢梅口中水出者世說云魏武帝行失道三軍皆渴令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆水出阿難如是酢說不從梅生非從口入如是阿難若梅生者梅合自談何待人說若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出想踏懸崖與說相類真際云應云如是思踏非懸崖來非足心入若從崖來崖合自想何待人思若從足入足自合思何待心想若獨心思何故足心覺有酸澀是故當知想陰虗妄本非因緣非自然性阿難譬如瀑流波浪相續前際後際不相踰越行陰當知亦復如是孤山云行以遷流為義故喻瀑流前念滅後念生後不至前故云不相踰越釋要云前波才滅後波續生次第相續無有過喻越次也阿難如是流性不因空生不因水有亦非水性非離空水如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此瀑流性應非水有所有相今應現在若即水性則澄清時應非水體若離空水空非有外水外無流資中云若因其水別有流性因果性別則瀑流性不應是水能有是水所有是流二相若殊俱應現在長水云流從水生水與瀑流而體應異水為能生流為所生如樹生果果不是樹二俱現在今且不然流相漂動水相澄清若此漂動便是水相者至澄清時應非是水瀑流漂動已是水故荊公云識精水也其性為空行如水流依此空水若無空水則流無所生若無識性即行無所起是故當知行陰虗妄本非因緣非自然性阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是擕李云頻伽好聲鳥也瓶形像之真際云塞其兩孔喻六七二識我法二執塞二空理苕溪云法句經云精神居形內猶藏瓶中瓶破則飛去矣今以人喻業以瓶喻身以空喻識補遺云法句在小故以喻識心此經欲顯真心故以空譬也空不可擎知識心體遍矣人擎瓶空而行猶業持身識而去熏聞云中陰生陰皆有色心並由業力之所任持也他國者六道依報也長水云識陰無形在有情身如瓶盛空釋要云或可以瓶喻業業能繫識受身似瓶能含空以將瓶人喻貪愛煩惱潤業受生也遠餉他國者阿賴耶識為業所使隨處受生此陰若滅彼陰續生如人擎空餉遠千里谷響云大經二十七云譬如蠟印印泥印與泥合印滅文成以喻凡夫現在陰滅中有陰生成論明極善極惡不歷中陰即受生陰如䂎矛離手即到地矣荊公云真覺性空空遍法界所妄既立明理不逾則此識生如瓶盛空與外空有間然實無間妄分別耳熏聞云五陰初並云譬如等者應知此中雖帶事說意在比況耳至六入去雖有譬字正約事相而破也阿難如是虗空非彼方來非此方入孤山云非從彼方來入此方補遺云彼方謂執瓶來之方也非此方入謂非將彼空來入此方也如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空若此方入開孔倒瓶應見空出若瓶盛空從彼入此何故彼方不見空少此方不見空出若從彼來彼應減少其空矣若從此入必見其出瓶之相是故當知識陰虗妄本非因緣非自然性孤山云問向解五陰悉約九界且三乘聖人亦名陰耶答准章安涅槃疏明十界俱論五陰六道陰者是蓋覆義蓋人天善及無漏善蓋人天善則沉沒三塗蓋無漏善則輪回諸有二乘陰者蓋等德蓋四等則不能度衆生蓋四德則不能至寶所菩薩陰則蓋覆生死涅槃蓋生死則大悲拔苦蓋涅槃則大慈與樂佛陰則蓋覆法界事理蓋事則應身遍應一切機根蓋理則以法界身遍一切處然下三段經文語似相濫而意有傍正初破六根雖以塵識對辨核其正意唯在內入次十二處雖根塵互破而正在於塵以前段中已破根故次十八界雖根境識三相對推破然論正意唯在六識以根境二前已破故
