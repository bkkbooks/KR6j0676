body:
  text: 一名中印度那蘭陀大道場經於灌頂部録出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集注明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閲鋟阿難如是衆生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想汝今修證佛三摩提於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露長水云初辨漸次修行者由前無明動彼靜心從細至粗遂成三相及二顛倒又由世界和合相涉根塵相對成業性故十二區分類生差別流浪苦海如汲井輪其猶空華於湛精明亂生亂滅此皆塵勞煩惱污染真性不得清淨今欲轉染歸淨返流復源故立漸次修行以為對治故喻云如淨器中除去毒蜜乃至後貯甘露由此漸次以立地位補遺云此中指前十二類生一一類中各具十二取無明種子正從思議一心流出說雖云各具乃具足之具耳次文真淨明心具足等者方是不思議具按止觀記事理二造今此亦各各具十二類者事造也于事造中衆生實造三世業果也三世業果不出十界于十界中十二類生別在欲界人道及以異趣各具者各造也所謂變造猶如揑目亂華發生正顯變造之相貌也然此事造並由理具故云真淨明心具足如斯虗妄亂想淨覺云淨器喻伏惑行人以上文令其立三漸次除滅亂想是則身器清淨也除去毒蜜喻除其助因及刳其正性也湯水如正行灰香如助行甘露譬所證之理補遺云欲境可愛似蜜令人墮獄如毒正同四十二章刀蜜之喻云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業孤山云言漸次者事漸理圓不同偏教之漸也謂斷辛持戒從粗至細破惑入位自淺由深事雖有漸而皆以菩提之心即理而修無非圓行也問此三漸次于天台六即中屬何位耶答名字中修能成觀行及發真似也長水云前問至何漸次得修行目今此第二正明修行故云真修以持聲聞菩薩戒律是無漏之學不同斷辛但除葷食故標真修簡前修習長水云五種辛菜名為助因以能資助煩惱業故淫盜殺妄名為正性以是生死根本解脫冤故根塵隅對流逸奔趣正是無明現行業用是故除而去之刳而空之違而背之苟三行漸著功用漸成六用不行返流全一妙圓平等身心快然是人即獲無生法忍熏聞云除其助因除即斷也五辛是淫恚助發之因故先斷之刳其正性刳猶去也淫殺等心是衆生正業之性故當去之云胎卵濕化皆因淫欲而正性命此義同焉正助之正性分之性衆生以淫殺是正業之性彼五辛酒乃助業之性違其現業者由前漸次助修正行能破六根現前惑業應知第三更無他法是故於此別名增進云何助因阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛說一切衆生皆依食住擕李云四食皆所資益為義段謂形段以香味觸三塵為體入腹變壞資益諸根古翻經律多云摶食其義則局如漿飲等不可摶故觸謂觸對取六識中相應觸對前境時生喜樂故思謂意思取第六識相應思於可意境生希望故相應觸及相應思皆心所遍行中法思想飲食令人不死亦名思食冷暖等觸亦名觸食此乃分通非正食義識即第八執持之相由前三食勢分所資今此識增勝能執持諸根大種故若約三界辨之段食唯在欲界以色無色界無香味二塵餘之三食遍通三界谷響云入腹變壞資益諸根乃名為食若聲塵望于耳根是離中知不能親資益故不為體色塵但為三塵所依無資益義亦不為體故但三塵長水云皆依食住者食以資益諸根大種心心所法能生喜樂相續執持故有四種段謂分段以欲界香味觸三正消變時有資益故乃名為食觸謂根境識三和合能引意識相應觸起觸對前境能生喜樂資益諸根及心心所故思謂意識相應思與欲俱轉於可意境希望偏勝有資益義故識謂八識由前三食緣助勢力令此第八體有增勝故能執持諸根大種能與諸法為長養因有攝益義故名為食補遺云成唯識論一者段食變壞為相二者觸食觸境為相三者思食希望為相四者識食執持為相段食香味觸三於變壞時能為食事以變壞時色無用故觸食謂有漏觸裁取境時能為食事思食謂有漏思希可愛境能為食事識食謂有漏識由段觸思勢力增長能為食事增一佛告阿那律一切諸法由食而住眼以眠為食乃至意以法為食涅槃以無放逸為食皆所資養以為食義真際云佛初出家於外道邊六年苦行日食麻麥知其非道遂即捨之於牧牛女邊受乳糜食外道聞之生謗佛成道後為除自餓外道苦行乃說一切衆生皆依食住正覺正說餘不能知外道嗤曰愚者亦知何言正覺正知佛返問之食有幾種外道不能答因說四食云云阿難一切衆生食甘故生食毒故死苕溪云此舉段食之損益欲除五辛之助因以五辛能發淫恚猶毒死之食焉有資益義皆名為甘不正消變能壞身心皆名為毒也是諸衆生求三摩提當斷世間五種辛菜是五種辛熟食發淫生噉增恚孤山云五辛者楞伽經云葱蒜韭薤興渠也興渠正云興宜慈憫三藏云根如蘿蔔出土辛臭慈憫冬到彼土不見其苗則此方無故不翻也當知此五辛而復葷是以制之故請觀音云五辛能葷不得噉若辛而不葷則非所制如薑之屬苕溪云應師云興渠出烏茶娑他那國長水云此五性熱氣葷味辣修行者食能殺法身如食毒也故須斷之如是世界食辛之人縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次䑛其唇吻常與鬼住福德日銷長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為說法非毀禁戒讚淫怒癡命終自為魔王眷屬受魔福盡墮無間獄孤山云以修禪福故暫生魔天以毀戒罪故終墮地獄阿難修菩提者永斷五辛是則名為第一增進修行漸次云何正性阿難如是衆生入三摩地要先嚴持清淨戒律永斷淫心不餐酒肉以火淨食無噉生氣苕溪云如律中五果之屬皆須淨人以火淨之然後得食防壞生故熏聞云五果一核果如棗杏等二膚果如蓽茇桑椹梨奈等三殼果如椰子胡桃石榴等四𥢶果如香茅蘇荏等五角果如大小豆等以比丘之法不得自手壞生若有所須語淨人言汝知是汝看是等淨人解者以火觸之此名火淨律中更有瓜淨揉淨等今且言火耳以細況粗生果尚須淨食何況食肉傷慈之甚阿難是修行人若不斷淫及與殺生出三界者無有是處當觀淫欲猶如毒蛇如見怨賊長水云涅槃經說菩薩觀愛有九種遇患一如債有餘二如羅剎女婦三如妙衣莖有毒蛇四如惡食性所不便而強食之五如淫女六如摩樓迦子七如瘡中息肉八如暴風九如彗星熏聞云此中誡犯於四重中略誡前二又於二中偏誡淫欲是知刳性之意斯為本歟法華云諸苦有因貪欲為本若滅貪欲無所依止智論云世間無不愛樂五欲於五欲中觸為第一能繫人心如人墮在深泥難可救濟復次若受餘欲猶不失智慧淫欲會時身心荒迷無所省覺深著自沒是故出家法中淫戒在初今經最後垂範序中起教以此為別緣至今修行此為偏誡願諸有學勿輕聖言先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起苕溪云比丘四波羅夷尼復加四波羅夷謂第五不得染心男身相觸六不得染心男捉手捉衣入屏處屏處共立共語共行身相倚共期等八事七不得覆他重罪八不得隨舉大僧供給衣食云云此無正譯義當棄也從衆法絶分為名如彼死尸衆所不受衆法絶分者四人已上凡作羯磨不任僧用故四分偈云諸作惡行者猶如彼死尸衆所不容受以此當持戒資中云如十輪經學行次第若不先學小乘即學大乘無有是處乃至無力飲河池詎能吞大海後行菩薩清淨律儀即梵網所制也亦應如地持及瓔珞所說三聚戒相謂攝律儀戒十波羅夷攝善法戒八萬四千法攝衆生戒慈悲喜捨禁戒成就則於世間永無相生相殺之業偷劫不行無相負纍亦於世間不還宿債苕溪云不淫故無相生乃至不妄故不還宿債以大妄語貪其供養故約位言之應在外凡觀行之中不淫等以相生相殺等如次配於四重亦可無相負纍及不還宿債皆由不偷劫也但上句在因下句屬果并前淫殺不行即無三種相續是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險資中云比如法華現身所得六根清淨即相似位也熏聞云得大神通遊十方果者別而言之此屬身根即如意通若總說者六根清淨皆神通故智者指法華并普賢觀及菩薩處胎經皆以六根而為六通然則他心宿命漏盡同是意根淨也是則名為第二增進修行漸次云何現業阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸應知此中躡前六根淨人粗垢已落而細惑未除故曰於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行十方國土皎然清淨譬如琉璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中苕溪云因不流逸由斷客塵煩惱也旋元自歸漸入如來藏理也塵既不緣下此又進破根本無明前屬似位但云不多流逸今取真證乃是根塵泯亡逆無明流純一真性微細生滅六用不行十方下先顯依報淨有法有喻次顯正報淨有自有他自則三德圓證他則諸佛同體熏聞云琉璃譬國土明月喻真性獲大安隱即涅槃也大經云三德具足名大涅槃皆現其中者謂極果之德入分真之性也是人即獲無生法忍熏聞云忍謂忍可印持決定無繆即能證智也無生法從所斷惑得名若約所證亦名寂滅忍補遺云法華玄文明圓位斷伏中云就事為無生就理為寂滅又方證為寂滅讓果為無生記云惑是事法故約惑滅得無生名名為就事此惑若滅必證實理故約所證名為寂滅當知始從初住終至妙覺一一無非惑滅證理維摩疏因經初嘆菩薩逮無所得不起法忍釋云不起法忍即是大無生忍亦名寂滅忍問下歎淨名但言無生當知不起法忍秪是無生何用寂滅釋不起法忍答在因讓果說名無生若通論無生秪是寂滅之異名也從是漸修隨所發行安立聖位長水云夫論地位者皆是諸佛菩薩親證境界約斷伏次第發真妙用功用淺深以立位次起信論云相似覺隨分覺究竟覺以分地前地上及究竟位華嚴經智度論約入大海辨功用淺深但遲速有異分根性利鈍如涉長途非無里數諸大乘經若就平等法界無佛無生則無地位可立若依心生滅門有迷有悟熾然修證差別不同孤山云華嚴最初頓說位次宜委方等部中則唯瓔珞般若部中則唯此經是則四味各有一經委悉明位也前三經皆兼別圓今經唯圓以開顯故當知下文結益雖借小果之名論其妙行所階同一圓位耳前云地位中間無諸委曲斯之謂矣苕溪云此中別指初住以上名為聖位若下文云以三增進故能成五十五位真菩提路則通取十信也是則名為第三增進修行漸次上二漸次且約粗細前後分別若圓修者豈不以違其現業為創心發觀之本歟夫現業之體既屬無明非中道正觀無以違也圓人所修尚無先空次假之理何有斷辛而不持戒豈有持戒而不修中當知三種漸次說有先後若得意者同時而修也故第一漸次即云修菩提者永斷五辛也當知菩提無漸次漸次取菩提菩提名覺非中觀而何又下文總結諸位云如是皆以三增進故善能成就五十五位真菩提路以此明之孤山云事漸理圓猶是一往譬如滄溟太霄詎有涯量由操舟舉翮之異而里數生焉此下乾慧地等即後二漸次之所階也補遺云三漸次乃入位方便約位秪在名字即中以下入位初是五品故也又下云由三漸次成就五十五位真菩提路經言真位故五十五若兼似極通五十七皆目漸次也而第二便云得通游界第三即云獲無生忍者皆將後所證顯其功能以示淺深之相耳其實三種漸次秪在名字位中觀成方入乾慧阿難是善男子欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性明圓鎣十方界乾有其慧名乾慧地欲習初乾未與如來法流水接苕溪云欲愛乾枯者且從粗惑言之若通說者即圓修三觀頓伏五住乃觀行成相也根境不偶者此與上文塵既不緣等名義雖同粗細誠異現前殘質不復續生者由欲愛乾枯則於世間永無相生相殺之業故此身若謝來報不生人法二執了無實性故曰執心虗明即惑成智體具寂照故曰鎣十方界鎣或作瑩徹明也大品十地初名乾慧天台於圓教十信前立五品位且曰義推如大品乾慧地也五品位者一隨喜二讀誦三說法四兼行六度五正行六度法華分別功德品格量後四品功德隨喜品格量初品功德噫智者隋時此經未至而所立名位懸契佛心非聖人孰能是哉補遺云此乾慧文正接前三漸次位前既持戒刳其正性此言功成故得欲愛乾枯耳殘質不生者言此行者觀力明著必能入相似位或證無生故示此身乃分段末後之生故言殘質必入十信故言不復續生也例如家家以由聖者起大加行必無不斷大品惑而命終者故下文云即以此心中中流入即以此心中中流入苕溪云以觀行心緣中道理相續無間流入初信熏聞云智者云實心繫實境實緣次第生實實迭相注自然入實理止觀義例釋此一偈通於觀行相似以入分證補遺云彼釋曰心若繫境境必繫心心境相繫名為實緣復由後心心心相續心心相繫名迭相注即是心注於境境注於心心心境境念念相注如是次第剎那無間自然從於觀行相似以入分證故云入實圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住苕溪云圓妙開敷即見惑先落三諦似顯也次三句妙圓等釋成上句謂從乾慧真妙圓心重發此位真妙信心心與理冥故曰妙信常住補遺云次二句初信正斷見惑兼除四思苕溪云信心住者信為能住理為所住如無著立十八住判金剛般若始終地位亦何必初住方受住名真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住念心中捨身受身即分段生死一切習氣即思惑正使下文明五不還天所斷欲惑亦名習氣又應通指二死為捨身總目五住為習氣以上文云過去未來無數劫中故若爾則習氣之義不可取大論垢衣香器為喻第三云二乘雖破三毒不了了盡譬如香在器中香雖去餘氣仍存又第三云如乳母衣久故垢著以淳灰淨浣雖無有垢垢氣猶存妙圓純真真精發化無始習氣通一精明唯以精明進趣真淨名精進心補遺云至是乃出識陰區宇精進心中從真妙圓重發真妙明了諸妄然後獲此妙圓純真進趣真淨苕溪云化變也變諸妄習純成真明言其精也唯以下示其進也心精現前純以智慧名慧心住補遺云慧心中心精至智慧者真精發化精性成就不待執心然後純是智慧執持智明周遍寂湛寂妙常凝名定心住定心中執持至常凝者前言智慧此言智明智受覺明湛而不流故曰寂湛妙而無作故曰寂妙此定心也故曰常凝周遍寂湛謂定之用寂妙常凝謂定之體定光發明明性深入唯進無退名不退心心進安然保持不失十方如來氣分交接名護法心獲法心者按圓位至此斷三界思盡即六根清淨之正位配瓔珞屬七住對大品當佛地約婆沙齊三十四心智者云三藏佛位望六根清淨位有齊有劣同除四住此處為齊若伏無明三藏即劣既是發真斷惑之大節故特示云十方如來氣分交接補遺云恐取六地齊羅漢七地道觀雙流入假化物故與如來氣分交接若取斷惑大節秪成聲聞氣分交接又頗合護法之名熏聞云氣分交接者以似證之理即諸佛性雖未真證而覺了智與佛潛通覺明保持能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名回向心苕溪云回向中覺明保持即護法心也上氣分交接則自心他佛相應相冥今回佛慈光向於佛境則與我智明相對相照故曰猶如雙鏡等回前覺明在佛光中所謂回因向果也向佛安住釋上句也己智佛光兩法相對雙鏡義也又約十方如來對照亦然故曰其中妙影等心光密回獲佛常凝無上妙淨安住無為得無遺失名戒心住戒心中回向既成同佛常寂常寂之體即是無上妙淨明心安住此心正防無明微細之患故得戒名荊公云前言以妙力回淺矣此言心光密回深矣前言妙影相入淺矣此言獲佛妙淨深矣所謂密回者機括獨運非粗浮所見經言因戒生定因定發慧今慧心在定心前戒心在定心後此所謂定非發慧定乃超過慧境周遍寂湛寂妙常凝者也此所謂戒非生定戒乃獲佛常凝無上妙淨無為性戒者也住戒自在能遊十方所去隨願名願心住願心住准天台圓教未斷無明生同居者名為願生正符此文又說十信出假利益衆生今遊十方亦合其義真道應生同居未斷無明似道或願或通來生同居今此隨願能遊十方止觀諸教出假圓教下根出假云十信六根淨時即遍見十法界事若是入空尚無一物既言六根互用即是入假位也阿難是善男子以真方便發此十心心精發暉十用涉入圓成一心名發心住苕溪云智者以瓔珞十心對十乘觀法法華玄文善修平等法界乃至善修無著即入願心約圓初住具明十德住三德一切佛法乃至第十信心寂滅自然流入薩婆若海章安云應是轉似為真一住具十今云真方便者謂真家之方便又真即方便皆以中道心修故十用涉入圓成一心乎准本業瓔珞經欲入初住修前十信心經一劫二劫三劫得入初住是住中增長百法門所謂十信心心心有十今云十用涉入即百法之謂矣心中發明如淨琉璃內現精金以前妙心履以成地名治地住治地住中如淨下二句釋治義以前下二句釋地義心中發明謂去惑染故得如淨琉璃內現精金之義非治不至此也以前妙心智也智以照理如履地然此釋地義也苕溪云能證心如琉璃所顯性如精金治理也依前心地以觀治之心地涉知俱得明了遊履十方得無留礙名修行住修行住者上治地由境得名今修行從智受稱境發於智故云心地涉知等以智遍修故云遊履十方等行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住孤山云生貴住中分真智與究竟智等名行與佛同分證理與究竟理等名受佛氣分如中陰下以喻顯之究竟權智如父實智如母任運相合如自求父母密齊果德如陰信冥通斯則稟佛遺體初託聖胎也自求猶言自然求之也中陰非久居之地其勢必自然求之不待教也既遊道胎親奉覺胤如胎已成人相不闕名方便具足住孤山云具足住中如胎已成等此喻雖在真因而自行利他之相同佛不缺容貌如佛心相亦同名正心住正心住中容貌喻應用心相喻理智補遺云左傳曰人心不同猶若面焉心不同面亦不同由心之不正也心同面同由心之正也身心合成日益增長名不退住孤山云不退住中色心互融不相妨礙故曰合成十身靈相一時具足名童真住資中云十身靈相即盧舍那也聲聞身緣覺身菩薩身如來身法身智身國土身業報身衆生身虗空身此十種身如隨色珠顯現自在菩薩雖未如佛分得此相熏聞云彼談十身一一具十乃成百身荊溪以四身攝之謂化攝業報智即報身虗空屬法餘皆應攝孤山復作三身收之謂虗空即法智即是報餘皆屬應又云若約空生大覺國土依空則虗空之身亦宜屬應彼文問既屬三四何故十身皆名舍那答以別圓地住所現之身正是實報餘身皆是此身轉變從本受稱故曰舍那又盧舍那者寶梁經翻為淨滿以諸患都盡故稱淨衆德悉圓故云滿十身雖異淨滿是同然于同中須知別相不可三四混而無甄故荊溪云彼通云身故云十身盧舍那別釋如來故不應云業報國土佛等補遺云法華文句記云若欲通收彼經十身應開為四云云虗空屬法者維摩疏弟子品阿難章釋空聲云空聲者法身之聲如普賢觀之所明也然法身無色華嚴如何云現此經如何云相荊溪料簡法無應有應即法身何求異也吾今此身即是法身若爾則何獨虗空為法身耶須知如虗空性遍一切故故以虗空為法身也十身通云舍那記主意謂一從本受稱故二淨滿義同故十身外相勝劣自分既稱舍那名為淨滿既淨且滿寧非尊特外相一一無分齊故起信所謂隨所示現即無邊既名為報豈非尊特記主意隔而不融四明意融而不隔得意失意不在茲乎准華嚴八地方現十身今八住具足者正顯今圓已齊彼別也何以十身釋童真名良以十身舍那翻淨滿義童真無染與淨滿相當矣形成出胎親為佛子名法王子住法王子住從理起用故云形成出胎紹隆佛種故曰親為佛子前第五住名入胎此云出胎皆就名制義非地位當然自初住來已入聖胎就垂化邊已名出胎也前名生貴故云入胎此稱王子故曰出胎表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌項住灌頂住云表以成人堪行佛事華嚴云轉輪聖王所生太子母是正后身相具足坐白象寶妙金之座張大網幔奏諸音樂取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位菩薩受職亦復如是諸佛智水灌其頂故名為受大智職菩薩彼法雲地名灌頂菩薩今此十住亦分得也然圓教分真以來悉有應用論其智力不無優劣故初住百佛世界現十界像利誘衆生位位竪入倍倍增勝經中所明各就一義若論一位具諸地功德則十義俱遍十住既爾下去皆然補遺云太子出則撫軍入則監國即分委之義表謂表儀即弱冠之義男子二十有成人之禮取譬灌頂阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行長水云歡喜行有二義一具足妙德故歡喜二十方隨順故歡喜隨順又二謂能化隨順及所化隨順也善能利益一切衆生名饒益行自覺覺他得無違拒名無瞋恨行無瞋恨行者自覺不為無明所違故無恨覺他不為衆生所拒故無瞋種類出生窮未來際三世平等十方通達名無盡行一切合同種種法門得無差誤名離癡亂行孤山云無盡行中種類出生化十界身化復作化也窮未來際益物無盡竪遍三世橫周十方離癡亂中妙智了達塵沙法門異名別說同歸一理故離癡亂則於同中顯現群異一一異相各各見同名善現行善現行中同中現異達理即事故異相見同達事即理故同中現異達理即事於義已足何須更明異相見同達事即理須知並由理具方有事用不明理具則非善達補遺云於性中現相差別則同中顯現羣異於相中見性無二則異相各各見同如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行苕溪云界全是塵名現塵塵容界相名現界須彌芥子相入攸同維摩涅槃皆說菩薩不思議用能以須彌之高廣納芥子中荊溪云須彌容芥謂容入於芥芥容須彌謂芥受須彌今現塵現界其相亦爾十方虗空於一微塵可滿足者顯十方不大也一一塵中現十方界者顯一塵不小也種種現前咸是第一波羅蜜多名尊重行尊重行中第一波羅蜜多即般若度也大品云智慧輕薄般若尊重故此名焉如是圓融能成十方諸佛軌則名善法行法名軌則諸佛所師一一皆是清淨無漏一真無為性本然故名真實行善法行全性起修故成軌則真實行全修是性故皆無為阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度衆生滅除度相回無為心向涅槃路名救護一切衆生離衆生相回向長水云十行位中即依體起用且論神通化物未言滅除度相今此攝用歸體順寂滅義故除度相約義雖異為行必同若不然者豈有證真大士猶懷度生之相耶壞其可壞遠離諸離名不壞回向苕溪云壞其可壞從所壞境說遠離諸離約能壞智論不見可壞之相是名不壞儻存度生之能所則有無明留礙之患不見所壞無明不存能壞中智故名不壞本覺湛然覺齊佛覺名等一切佛回向精真發明地如佛地名至一切處回向覺齊佛覺言其智也地如佛地言其理也皆因果禮同故云等也至也世界如來互相涉入得無罣礙名無盡功德藏回向補遺云言本覺性智齊十方大覺理性之地遍一切處也世界能容如來則是諸法具足性淨功德此藏義也於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根回向孤山云於同佛地至取涅槃道者謂於諸佛理地起萬行真因依此真因發越揮散周遍法界以取究竟涅槃之道行從理起名隨順平等能生道果名為善根真根既成十方衆生皆我本性性圓成就不失衆生名隨順等觀一切衆生回向十方衆生皆我本性非有衆生也性圓成就不失衆生非無衆生也非有非無名為性圓成就所謂我皆令入無餘涅槃而滅度之不失衆生也所謂實無衆生得滅度者皆我本性故蓋性圓成就生佛體同不失衆生唯識各別即一切法離一切相唯即與離二無所著名真如相回向孤山云即一切法假也離一切相空也二無所著中也真得所如十方無礙名無縛解脫回向性德圓成法界量滅名法界無量回向性德圓成者三德妙性於此圓成不見十界高下差別故云法界量滅阿難是善男子盡是清淨四十一心次成四種妙圓加行擕李云據瓔珞等經皆不別列四加行位若唯識等論則以地前四十心為外凡資糧位十回向後別名暖等為內凡加行位今四加行正如唯識所說彼於地前分內外凡位者乃別教一途之義以登地是菩薩聖位聖位難入故開此加行耳今經借別名圓如仁王云三賢十聖住果報妙圓加行簡異偏小也若法華玄文取瓔珞五十二位明別教位則以十信為外凡住行向為內凡於內凡中分四加行十住為暖十行為頂十向為忍及世第一皆云義推如暖等今經於此別加四行秪是十向後心長水云大小乘經論明於五位謂資糧加行通達修習究竟位也然有開有合不定明說諸小乘論及大乘法相即顯說四位名四善根是順決釋分若瓔珞仁王華嚴等經即合而不論攝在第十回向唯此經中具顯四位蓋以圓融之教一多無礙秪於一忍圓開諸位不開則已開則具明故於十向後備論四種妙圓加行即以佛覺用為己心若出未出猶如鑽火欲然其木名為暖地長水云佛覺果智也己心因心也將發此智故云若出猶在其因故云未出猶如鑽火熱相先現火出不久火喻果智木喻因心鑽喻加行火出則木盡智發則因亡又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地頂謂依暖地心修佛果智智觀於心故如足履地心相垂盡故若依非依高山喻當位之心虗空喻所依之理無明未盡故下有微礙心佛二同善得中道如忍事人非懷非出名為忍地忍取信順義今心佛二同等即信順也如僧中辦事忍則默然既不懷疑亦不出說數量銷滅迷覺中道二無所目名世第一地若迷中道及覺中道皆是數量即世間義耳今既消滅二無所目當出世間然猶未入初地故名世第一蓋經文四位前後相望為言初暖位用佛觀心頂位以己齊佛暖中心能即佛故云若出無明所覆故云未出頂中佛依心顯故云若依無明未破故曰非依如云下有微礙即無明未破而非依者也所以二位自他用與不同者申暖取鑽火之喻故取佛智研心也頂喻登山以己從佛佛實高妙若登而履焉忍位觀力進勝於前故曰心佛二同得其中道以暖用佛同心頂乃以心同佛似有所偏今能總用二同則不偏心佛為中道也言善得中道者反顯前二偏於心佛未善者也如忍事人者忍事之人未能無心於可不之間尚有欲說不說之念譬此忍位雖忍心佛不偏中道之善猶未能亡心佛之相似得未得也非出謂不說似得其忍也世第一中數量消滅者能亡忍位心佛之迹也迷覺中道者心迷佛覺也忍位於此心佛迷覺善得中道但未能亡其迷覺之迹今能亡遣故曰二無所目也良由中道非心非佛迷悟安有哉雖則能亡心佛之迹無明未破破在密邇故於世間為第一焉應科云暖位用佛同心觀頂位用心同佛觀忍位總攬二同觀第一亡遣三同觀問此四加行破幾品無明答位既開四惑亦何合玄文云無明雖無所有不有而有不無階品一往大分為四十二然其品數無量無邊由是觀之須開四品設復不開秪合云總屬初地一品以十向後一破初地無明故阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地孤山云覺通如來智同佛智也盡佛境界理齊佛理也三諦圓融名佛境界比前曰盡其實未盡以初得法喜故名歡喜異性入同同性亦滅名離垢地真際云離垢地中由前於大菩提善得通達名異性入同同性亦滅者若見於同即為垢矣華嚴云譬如真金置礬石中如法鍊已離一切垢淨極明生名發光地明極覺滿名𦦨慧地補遺云發光雖名為光但是智光焰慧雖名為慧乃覺慧也智水也故言淨極明生焰火也故言明極覺滿一切同異所不能至名難勝地苕溪云難勝地登地智名同地前智為異至猶及也無為真如性淨明露名現前地盡真如際名遠行地遠行地盡真如際斯是無際之際理既無際行豈近乎一真如心名不動地補遺云不動地一故不為二邊所動發真如用名善慧地資中云善慧地華嚴明此菩薩具四無礙智作大法師演說無量阿僧祇劫句義無有窮盡故名發真如用阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位慈陰妙雲覆涅槃海名法雲地苕溪云是諸菩薩近指初地而下遠指乾慧以來從此以往謂九地後入第十地修習畢功等對前得名也亦因此地正示第十名修習位者望後為稱也以無緣慈普蔭衆生本涅槃相如雲覆海然慈無別體即上文真如之心菩薩與衆生一如無二如約事暫分故以菩薩能證之心覆衆生所迷之理淨名云一切衆生即涅槃相不復更滅今取因理無涯譬之如海果德遍覆喻之如雲以慈能與樂必對物機而說故作是釋耳慈蔭妙雲覆涅槃海者雲智也海理也法合而妙故名妙雲能蔭一切除其熱惱故名慈蔭慈蔭福德妙雲智慧福智兩足然未能入佛大寂滅海與為一體故云覆也如來逆流如是菩薩順行而至覺際入交名為等覺阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地苕溪云理無逆順由權實智而得二名如來權智下隨機感故謂之逆菩薩實智上合覺心故謂之順至此位時當二智相交之際故名等覺其實雙具二智但佛自行觀理已圓鑒物是正故用於權今自行未極化他是旁故用於實也長水云從真起應反入生死從果入因之始故云如來逆流果法聖智即法流也從因入果從生死入涅槃故名順行而至起應之始行因之極順逆交際只一剎那故云覺際入交此即解脫道前無間道也只於此處立為等覺華嚴合在第十地便明受職唯識亦但破十一種障苕溪云瓔珞云等覺性中有一人名金剛幢慧言初乾慧者由此菩薩以大願力住壽百劫修千三昧今既始獲豈非初耶若疑乾慧之名但在信前不合通後秪如伏忍之名亦在外凡何故仁王通金剛定應知彼之伏忍即今之乾慧以障妙覺無明初乾未與究竟如來法流水接故乾慧取伏惑之義幢慧取衆伏之頂以高出諸地故法華玄文云等覺位若望妙覺名金剛心菩薩若望菩薩名等覺佛又仁王經說每一地有三心謂入心住心出心例知此經覺際入交即入心也金剛乾慧即住心也出心可解上卷六種性等覺性摩尼謂等覺性中有一人其名金剛幢慧菩薩住頂寂定以大願力住壽百劫修千三昧已入金剛三昧復住壽千劫學佛威儀修佛無量不可思議神通化導之法如是重重單復十二方盡妙覺成無上道長水云始從乾慧終至妙覺單復相兼總有十二單則有七謂乾慧暖頂忍世第一等覺妙覺復即有五謂信住行向地以一一位中自具於十故名為復第十二位即是妙覺名無上士無上士者無所斷故方盡妙覺成無上道體即大涅槃三德具足名祕密藏苕溪云單復十二謂單十復十有二也十信十住十行十地即單十十回向即復十以四加行秪是十回向後心耳并前乾慧及等覺位故有二也他解甚異今不煩云或謂凡修四十一心四加行各有單四見復四見具足四見此一十二見行人修止觀時單破三四復破三四具足單復破三四各各十二重此所謂重重單復十二方盡妙覺也大論云始從初心至金剛心頂皆破無明顯法性餘一品在除此一品即名為佛與此同意此經由乾慧地而入十信由四加行而入十地由金剛心中而盡妙覺與諸經不同學者思之是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入阿難如是皆以三增進故善能成就五十五位真菩提路孤山云借事匹理以曉迷情故以十事喻觀察之體謂如幻如焰水月虗空如響乾城如夢如影鏡像如化也列大品淨名等喻泡沫芭蕉雲電三藏五喻也焰幻夢影響衍門五喻也大小相參而說以方等被四教故也大小用喻各有宗途三藏教旨詮生滅實有故用泡沫有體相物為喻衍門教旨詮無生性空故用焰幻無體相物為喻在方等大教雖說泡沫為被三藏於三藏小教說如幻者為被利人若不然則秪約大小分途此從多說若從少說亦可互通如小般若六喻有為亦說如泡乾闥婆城此云尋香城謂十寶山間有音樂神名乾闥婆忉利諸天須音樂時此神身有異相即知天意往彼娛樂因此西域謂諸樂兒亦曰乾闥婆然西域樂兒多善為幻彼幻化城郭須臾如故因即謂其所現城郭為乾闥婆城言尋香者此類尋逐食之香氣往彼設樂以求食者也若釋論云日初出時見城門樓櫓宮殿行人出入日轉高轉滅眼見無實是名乾闥婆城苕溪云三增進者即三漸次也前三文下皆結云是名增進修行漸次五十五位者於前單復十二除於乾慧問何故除乾慧而又不取妙覺耶答既言真菩提路則顯乾慧非真妙覺非路然十信亦非真何獨揀乾慧恐取斷見思以來通得名真不同常途真似之義也作是觀者名為正觀若他觀者名為邪觀五十五位既由金剛觀察三增進故而得成就今簡邪正所以約觀言之須知圓教之外三乘所修皆屬邪觀補遺云金剛觀察以摧壞諸有為義自初發心乃至妙覺無非觀察彼無所有一切心現雖復深入亦無所得但如幻等十種深喻所謂深喻者則應觀一切業如幻一切法如焰一切性如水中月妙色如空妙音如響諸佛國土如乾闥婆城佛事如夢佛身如影報佛如像法佛如化何則不可取捨畢竟空故若但如金剛般若觀有為法如幻如夢非深喻也深入此空乃名實相此非作法無壞滅故若異此觀即生滅法爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持孤山云此經發起為救阿難是故先開圓解次顯圓行行成入位極于妙覺垂範來世有始有終於是文殊請問經名及奉持法長水云文殊智德此會率先阿難遭難登伽佛令持呪往救大衆茫然失守亦為旁問見元諸聖各說圓通如來敕其慎選洎及解行圓畢因果充周故問經名以流後代佛告文殊師利是經名大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海亦名如來密因修證了義亦名大方廣妙蓮華王十方佛母陀羅尼呪亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持資中云大佛頂者如來無見頂相放大智光之所說也悉怛多等相傳云是白傘蓋喻如來藏性本無染遍覆有情也荊公云白以實相純淨為義傘蓋以圓成陰覆衆生為義法王實相楷定衆聖故名寶印清淨妙體照用無涯故名海眼孤山云密因謂圓融定慧非偏小所知故了義謂究竟顯說非方便之談故涅槃云依了義教不依不了義教是也苕溪云大方廣者所說之法也常遍曰大軌持曰方包博曰廣如次配法身般若解脫亦如來藏之三德也妙蓮華王能說之人也即佛頂光中涌出寶蓮有化如來坐寶蓮華中者也十方佛母即所說呪能生諸佛一切種智譬如母焉陀羅尼翻遮持遮二邊之惡持中道之善此從慧立名若首楞嚴從定為目乃左右之稱耳補遺云大方廣所證理也蓮華喻權實法能詮教也詮不縱橫中道之理曰妙曰不也苕溪云此經從天竺灌頂部中流出蓋約密言耳有誦持者則如來智水灌其心頂亦猶剎利之受職也菩薩萬行以首楞嚴為本又修此位者于一心中具足萬行故涅槃云首楞嚴者一切事竟嚴名堅固一切畢竟而得堅固名首楞嚴佛說五名意存四悉故寄妙德而施衆生問既有五名何故經家刪取一十九字為其首題答撮要為名以略收廣也如大佛頂即是大方廣妙蓮華王餘皆易了熏聞云或曰據文殊所問合有二意一當何名是經二我等云何奉持今答名則顯而答持何隱乎釋曰問雖似二意秪是一蓋欲知能詮之名為我等所持之法耳若不了一經大旨將何以為衆生發心受持之法乎然則佛答五名名下五義法在其中故此但云汝當奉持答無所遺矣長水云上來一會已終合云大衆聞佛所說作禮而去以慶喜再有請益時雖隔越問且連環故集經者約問從義合成一部由是未結耳說是語已即時阿難及諸大衆得蒙如來開示密印般怛囉義兼聞此經了義名目頓悟禪那修進聖位增上妙理心慮虗凝斷除三界修心六品微細煩惱長水云獲真三昧故云頓悟禪那得斯陀含故曰修進聖位深證滅諦故云增上妙理漸明智照故云心慮虗凝俱生難除故云微細依大乘說俱生煩惱三界九地雖各九品若智增者入地永伏至佛方斷若悲增者故意令生手鑑云若末那識有四俱生謂俱生煩惱障俱生煩惱習氣俱生所知障俱生所知習氣三界九地各三十六品作佛地障九地共成三百二十四品若前六識俱生有六謂貪瞋慢無明身見邊見有四俱生一俱生煩惱障等四歷三界九地各有九品合成八十一品入佛地障由是智增入地伏而至佛斷然得入地由斷分別謂貪等十使有四分別一分別煩惱障二分別煩惱習氣三分別所知障四分別所知習氣三界九地各有三十六品作初地異生性障都合三百六十品若依小乘亦於九地各分九品然約四果地地別斷故初果身中斷欲界一地九品中前六品惑證第二果二果身中斷下三品證第三果三果身中斷上二界七十二品即得羅漢然此四果復有四向於四果中初為見道次二修道後一無學道且初入見道謂十六心斷三界四諦下八十八使分別粗惑得初果證修道所斷俱生細惑即貪瞋癡慢三界九地各有九品唯欲界一地難斷以此九品共潤七生謂上上品潤兩生次三品各一生次三品共一生下三品共一生今斷六品者初果身中斷一至五品盡名二果向斷至第五品名家家次斷六品盡名證二果故俱舍云斷惑三四品止斷六一來果謂於初果九品中斷上上品損二生次斷三品各損一生次斷二品共損一生猶殘下三品潤惑故一來天上一來人間於此身中斷盡餘三便得那含果謂前九中餘三斷至八品名三果向斷九盡名第三果故俱舍云斷惑七八品名第三果向九品全斷盡即得不還果不還者謂欲惑盡故不還來欲界次斷初禪初品至非想九品凡七十二品斷至七十一品悉名羅漢向斷七十二盡成阿羅漢果名無學道今證二果故斷六品也苕溪云所斷惑相者應有二義一者阿難內證實深而示同二果二者或約一番得益之衆大分言之今雖自他兼舉下文即云善開衆生微細沉惑反顯此中通敘大衆耳次云令我今日身心快然得大饒益方是阿難自述之辭即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開衆生微細沉惑令我今日身心快然得大饒益長水云修道所斷行相難了故曰微細無始俱生故曰沉惑疑網消除故曰快然增進聖位故曰饒益世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何有復地獄餓鬼畜生修羅人天等道世尊此道為復本來自有為是衆生妄習生起文徵此道為本有耶為妄起耶意欲如來廣明因果雖皆虗妄善惡業緣受報好醜終不差忒令諸衆生明信因果不入邪見苕溪云前阿難問位後佛言妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真等於是先約因妄有生明二種顛倒後約滅妄名真明漸次諸位然於世界顛倒中所說十二類生一往且示欲界因果之相其實界趣說而未周今答位既終故躡前妙性之義領其庶彚皆是真如發起如來委談諸趣以此觀之猶是正宗之餘也孤山云此與滿慈所疑其旨一揆但前因佛說根塵等皆如來藏故起疑今因佛說妙性圓明本來無有世界衆生故起疑皆為機緣發斯問耳長水云即俗而真唯一妙覺即真而俗因果不亡此義雙融名為圓了世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄說一切法空生身陷入阿鼻地獄此諸地獄為有定處為復自然彼彼發業各各私受熏聞云瞿曇釋迦前姓初迦維羅衛國有舍夷貴姓舍夷則釋迦別目五百長者共為世尊造立講堂自誓曰沙門梵志乃至群黎不得先佛妄升此堂若有違者罪在不測舍衛太子名曰琉璃因省定外氏入城見堂廣高嚴飾頓止其上貴姓聞之遣使罵辱催逐令出太子懷恚敕太史記之須吾為王當誅此類於後即位領兵伐迦維國殺舍夷人三億乃至佛言彼琉璃王却後七日當入地獄王聞恐怖乘船入海冀得自免水中自然出火燒滅善星比丘是佛菩薩時子出家之後受持解說十二部經壞欲界結獲得四禪而親近惡友退失此定生惡邪見言無佛無法無有涅槃後在尼連河遙見佛來生惡邪心生身陷入阿鼻地獄長水云問意有六文見于三六者謂有定處無定處自然因緣私受同受下文結云不斷三業各各有私因各各私衆私同分非無定處手鑑云淨名云說法不有亦不無以因緣故諸法生無我無造無受者所作之業亦不亡中論云雖空而不斷雖有亦不常罪福亦不失是名佛所說皆此義也謂業雖如幻一念幻惡長劫沉淪一念幻善遠階佛果惟垂大慈開發童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯佛告阿難快哉此問令諸衆生不入邪見汝今諦聽當為汝說阿難一切衆生實本真淨因彼妄見有妄習生因此分開內分外分阿難內分即是衆生分內因諸愛染發起妄情情積不休能生愛水是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行淫男女二根自然流液長水三愛染之情正是衆生生死根本名為內分分亦因義情愛沉下能潤業受生故如水外由內感故有水輪遍十方界憶即是念明記為性念有憎愛故分憐恨由愛起增不離情染內有情染外現其事故皆流水苕溪云此中內分悉約情論以愛為情且言少分如喜怒哀樂愛惡六者皆人之情也是故怨恨亦屬于情情重則悲悲乃成淚阿難諸愛雖別流結是同潤濕不升自然從墜此名內分長水云所愛之境雖別能愛之心是一流謂沉下結諸縛著因既不升果亦淪墜荊公云趣身而入故名內分阿難外分即是衆生分外因諸渴仰發明虗想想積不休能生勝氣是故衆生心持禁戒舉身輕清心持呪印顧盻雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命長水云衆生生死本分由情情著染境因是從墜今以淨境為所欲處但由其想不屬于情乃是衆生分外之事故云外分身輕清顧雄毅夢飛舉聖境現輕身命此五皆是殊勝氣色由想故有苕溪云內分沉下故生愛水外分上升故生勝氣毅得勝之貌熏聞云謂以手結印如瑜伽羂索所示或呪即是印如銷伏毒害呪是三世諸佛陀羅尼印故此舉善法以驗能生勝氣之相若呪龍等惡律儀事非其義也聖境冥現蓋於想中冥密得見諸佛淨土惑於夢中潛通此相阿難諸想雖別輕舉是同飛動不沉自然超越此名外分長水云欣外勝境不由情染相既輕清自然飛動報當超越也熏聞云此約不墜三塗名為超越例如人天俱得名乘亦由戒善等能運載衆生越於惡趣耳荊公云遺身而出故名外分阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現死逆生順二習相交孤山云生從順習死從逆流者以一切衆生皆愛生而惡死是故生則順其習死則逆其習故下云死逆生順二習相交此乃文辭互略秪是生從存住故順習死從變流故逆習耳未捨暖觸謂現陰之末中陰之初熏聞云命是息風連持不斷故暖是身觸任持不壞故識託其中共成三事和合則生離散則死也今文雖不言識而云二習相交即識之習性善惡即內外二分頓現即二分業相下文情想純雜等即隨其業力牽生諸趣也當知現前二分是將來諸趣升墜之權衡昔圭峯密師云欲臨驗終自在不自在但觀日用自由不自由其言雖近可以喻遠曰善惡之業所自作時一生之中何不見自至捨受時方始頓現者人生如夢方作夢時豈能自知是夢非夢要須覺時夢中之事了然自現不待尋繹亦復如是純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生苕溪云據下情少想多但在四天之下驗今純想所生應是忉利以上若單修善禪則唯生上界若兼諸福慧則隨往十方于飛心中旁論福慧故皆云兼以純想是穢土上升之因福慧是淨土往生之業事越分外故曰旁論熏聞云觀無量壽佛經云欲生彼國當修三福云云慧即十六觀此別就西方言之若通說者緣因為福了因為慧隨諸淨願取土往生應知福慧通于深淺今且約初心未斷見愛未出同居橫截五道得生淨土故荊溪云未斷惑者修安樂行是同居淨土之氣分其義明矣情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下真際云情少想多理宜分之一情九想即為飛仙二情八想為大力鬼王三情七想為飛行夜叉四情六想為地行羅剎熏聞云今云飛仙取輕舉義總攝十種以在人天中間與下文次第不別故況地行羅剎尚屬此類豈地行仙等而不逮耶法忍謂于法得忍即諸大菩薩當知情少想多且約十善十惡強弱分之況有善願善心護持佛法等並是衆生分外之事法華玄義明若修十善兼修禪定得粗住細住者乃是兜率天業驗今所說猶屬散善耳情想均等不飛不墜生於人間想明斯聰情幽斯鈍補遺云人報所以聰明者由昔戒善之想所以不能飛舉上升者由情愛幽暗由想故不沉由情故不飛正出均等之義情多想少流入橫生重為毛群輕為羽族七情三想沉下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害已無食無飲經百千劫九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄真際云情多想少亦合分四六情四想流入橫生七情三想墜為餓鬼八情二想生有間獄九情一想生無間獄孤山云生于火際者近于地獄是餓鬼居處順正理論云諸鬼本住琰魔王國從此展轉餘方此贍部州南邊直下深過五百踰繕那有琰魔王都縱廣亦爾受身于猛火中故云受氣猛火縱遇於水亦變成火故云水能害已七熱地獄謂八大獄中第七也長阿含云此四天下有八千天下圍繞其外復有大海周匝圍繞八千天下復有大金剛山繞大海水金剛山外復有第二大金剛山樓炭經云二金剛山亦名二鐵圍山二山中間窈窈冥冥日月天神所不能照彼有八大地獄每一地獄有十六地獄第一大獄名想二名黑繩三名堆壓四名叫喚五名大叫喚六名燒炙七名大燒炙八名無間分別其相具如第十九卷又新譯婆沙論問曰地獄在何處答曰多分在此贍部州下云何安立有說從此州下四萬踰繕那至無間地獄底無間縱廣高下各二萬踰繕那次上一萬九千踰繕那中安立餘七地獄謂次上有極熱次上有熱次上有大呌次上有嘷叫次上有衆合次上有黑繩次上有等活此七地獄一一縱廣萬踰繕那有說無間地獄周回圍繞如今聚落圍繞大城云云秪就此獄自有輕重而此無間非五無間亦應以第六為有間第七為無間是則風火二交過地通于六七也熏聞云身入風火二交過地即地獄中猛風與火交相熾盛也純情即沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄說法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄此言阿鼻即五無間無間有二一身無間二苦無間以五逆所感故名五無間或云無間有五謂受罪苦具身量劫數壽命也此文亦分二類純情造惡則唯墮此界獄中若加謗大乘等則此界壞時轉生他方長水云謗大乘罪最重由是更生十方阿鼻法華云若謗此經其人命終入阿鼻獄具足一劫劫盡更生如是展轉至無數劫俱舍論說阿鼻地獄壽命中劫二十增減為一中劫既言無數此世界壞即往十方阿鼻以謗法罪斷佛種令無量人墮邪見故手鑑云大般若說謗法罪墮阿鼻獄此土劫壞罪猶未畢移置他方又經劫壞復移他方如是巡歷劫盡還生阿鼻千佛出世救之誠難若說所受身聞者當吐熱血而死循造惡業雖則自招衆同分中兼有元地苕溪云此結情多想少及純情之類然橫生者非有元地以毛群羽族散在諸趣故熏聞云俱舍論云傍生住處謂水陸空本住大海後流餘處今從後說是則正言鬼獄二道斯亦略酬阿難所問長水云衆名不一同是一義衆有相似同立分名造業同者共中共變釋要云山河大地地獄等是衆生共業共變唯識有四句一共中共變即山河地獄等二共中不共即田園産業等三不共中共即妻妾男女等四不共中不共即正報身俱舍論說有差別同分無別同分同業共感衆生苦具同受此苦名無差別同分同受此苦謂彼同受鑊湯等若隨輕重受報不同名差別同分雖同感地獄而受苦各異謂彼鐵床此刀山等又彼八塞此八熱等今云元地即差別也謂本造鐵丸因即受鐵丸若等阿難此等皆是彼諸衆生自業所感造十習因受六交報十習因者別指惡業即由十使煩惱於六根門發識造業洎受其報從六根出報與業交故有交報同受地獄即引業招六根別受即滿業致手鑑云唯識云能招第八引異熟果故名引業能招第六滿異熟果名為滿業俱舍亦云一引業一生多業純圓滿猶如繪畫先圖形狀後填衆采等釋要云牽生地獄是引業後受有輕重是滿業俱是衆生妄情習造耳云何十因真際云十習配屬根隨煩惱根本有六謂貪瞋癡慢疑不正見或開為五隨有二十謂忿恨惱覆誑諂憍害嫉慳無慚無愧不信懈怠放逸昏沉掉舉失念不正知散亂今淫習即所發之業具足貪癡詐習即諂怨習即恨見即五見枉謂逼壓良善害所攝亦瞋類訟謂相論得失忿恨為先惱之一法性相應故阿難一者淫習交接發於相磨研磨不休手鑑云淫者蕩逸也耽著也如耽書名淫書久雨名淫雨今于色境愛著也律中名不淨行亦名非梵行故智論云淫欲雖不惱衆生心心繫縛故為大罪大罪者能發業潤業故招生死如是故有大猛火光於中發動長水云發業有二一正發即無明二助發即餘惑俱分別也今此十因除淫習是所發之業餘九皆是能發之惑惑有根如下文補遺云內分淫生愛水今十習中淫生火而貪生水者淫有二義一者貪愛故亦生水二者男女二根相磨生暖故受火報上文內分通取愛義故淫生愛水今十習義淫取研磨則生火報荊公云淫習研磨不休自耗其精則火果熾然其生尚有消渴內熱癰疽等疾則其死淫習以摩生火則貪習以及生水此與陽盛夢火陰盛夢水亦無以異雖彼以是復我然我所見非彼所成皆以我所習起是故衆生當慎所習如人以手自相摩觸暖相現前二習相然故有鐵床銅柱諸事熏聞云二習相然然謂燒然此取欲火義說故也孤山云亦是男女相望互為能所乃成二習共感諸文皆爾荊公云銅柱鐵床則是抱持𥨊臥堅覺妄想餘習是故十方一切如來色目行淫同名欲火菩薩見欲如避火坑補遺云形容而名目之荊公云如來了法平等得念失念無非解脫但為衆生色目行淫為欲火耳菩薩或尚有煩惱習氣故見欲如避火坑如淫貪等亦爾二者貪習交計發於相吸吸攬不止長水云貪即是愛根本之數正能潤生于有有具染著為性手鑑云能障無貪生苦為業謂由愛力五取蘊生有即取蘊三有之果有具即能生三有之因相順之因唯是有漏中有業惑及器世間緣起貪故皆是有具攝釋要云有有具者於種種物上生貪如是故有積寒堅氷於中凍冽如人以口吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒氷等事補遺云二習相陵取二人貪習交相校計而有相陵奪義貪者如吸物吸故生寒愛故生水貪之不已如水成氷苕溪云吒波羅三寒聲也青赤白三寒色也更有疱裂二相即八寒地獄熏聞云並居贍部州下大地獄傍具如俱舍論第十一卷是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海釋要云瘴海氣也人呼即病三者慢習交陵發於相恃馳流不息長水云恃己陵他高舉為性故名為慢今云交陵相恃馳騁流逸慢之相也如是故有騰逸奔波積波為水補遺云慢者心有所恃慢必凌物如水騰波如人口舌自相綿味因而水發二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事荊公云愛已掉動故積波為水令彼傷惱故有血河熱沙等事是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺孤山云或云西土有水飲之則癡如此方貪泉補遺云然慢屬于癡癡則不明故同愛屬水水者陰之氣故四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金釋要云衝突也忤觸也逆也火能鑄物由瞋火故鑄成種種金若具也補遺云熱煩不息氣分成堅故感金石等事荊公云瞋能起陽於五性屬木木起陽則發火火尅金則鑄氣氣雖屬金要待火力成體又從火革乃能兵傷物如是故有刀山鐵橛劒樹劍輪斧鉞鎗鋸長水云于諸苦具增恚身心熱惱居懷性不安隱已上皆根本惑攝橛繫罪人杙也手鑑云智論云銅橛律云龍牙杙曲如龍牙可以掛物如劫末時人起猛利瞋心所執草木皆成刀劍非內心之所惑乎如人銜冤殺氣飛動谷響云古注漢書銜含也苞含在心以為遇二習相擊故有宮割斬斫銼刺槌擊諸事孤山云宮割古五刑之一熏聞云五刑謂墨劓剕宮大辟墨謂刺其額而涅之以墨劓謂截其鼻剕謂刖其足宮謂男子則割去其勢女子則幽閉之大辟即死刑斬斫銼皆新之死刑刺即古之墨刑今流罪有之槌擊皆新刑之笞杖類是故十方一切如來色目瞋恚名利刀劍菩薩見瞋如避誅戮五者詐習交誘發於相調引起不住長水云詐謂諂曲罔於他矯說異疑險曲為性或取他意或藏己失不任師友正教誨故此隨數也熏聞云相調猶戲謔也以此誘引而造諸惡如是故有繩木絞校孤山云校枷也易曰屨校滅趾荷校滅耳在足曰屨在肩曰荷荊公云詐習信性劣智即是土性劣水故抽為木而有繩木絞校然信性劣智以造惡故受此惡報若以善權方便能攝衆生與之利樂雖亦信劣更當以此受宮殿園林福報非此惡故如水浸田草木生長補遺云既言發于相調乃以男女奔逃詐妄成事以奔逃必習詐僞也非一朝一夕故如水浸田二習相延故有杻械枷鎖鞭杖撾棒諸事謂相延納是故十方一切如來色目姧僞同名讒賊菩薩見詐如畏豺狼以詐僞人其言必讒賊害正理六者誑習交欺發於相罔誣罔不止飛心造姧長水云此亦隨數誑謂矯誑心懷異謀多現不實矯現有德詭詐為性邪命為業初雖欺誑於事猶近串習誣罔則其心飛空造彌天之奸甚至以聖德自嚴以無根陷衆如是故有塵土屎尿穢污不淨誣罔者以惡名加於良善陷人於罪故受屎溺之報沒溺淪墜之殃如塵隨風各無所見孤山云誣罔暗蔽如塵隨風二習相加故有沒溺騰擲飛墜漂淪諸事荊公云誑習屎尿穢污如塵隨風信性壞散智不淨故沒溺漂淪智勝信故騰擲飛墜飛心造奸故詐引起不住故能有所生誑誣罔不止故能壞而已凡此造因受報各以類應如見業先見猛火聞業先見波濤觸業先見大山來合思業先見吹壞國土是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺長水云刀兵劫時人互殺害虺蝮虺也博三寸首如擘山郭璞云自一種蛇名為蝮虺頭大如人擘指七者怨習交嫌發於銜恨長水云怨即恨也由忿為先懷惡不捨結怨為性不能含忍常熱惱故如是故有飛石投礰匣貯事檻甕盛囊撲孤山云囊撲者囊貯而撲殺之或作幞者字之誤也史記秦始皇囊撲兩弟如陰毒人懷抱畜惡畜惡在懷其猶匣貯車檻等陰毒傷人如飛石投礰等二習相吞故有投擲擒捉擊射拋撮諸事補遺云拋謂拋擲撮謂捉撮是故十方一切如來色目怨家名違害鬼菩薩見怨如飲鴆酒孤山云鴆鳥名其羽有毒以畫酒飲之則死其鳥如梟食蛇蝮雄名運日雌名陰諧以其毛歷飲食則殺人補遺云違害鬼宿有相違今為害身子曾遭其事八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反長水云見謂惡見於諸諦理顛倒推度染慧為性能障善見招苦為業孤山云薩迦耶見即身見謂執身有我戒禁取謂非因計因如持牛狗等戒為生天因此於五利使中略舉其二邪悟諸業即總收餘見竦疏云具云薩迦耶達利瑟致此翻身見百法疏謂于五蘊執我我所等補遺云發于違拒出生相反者謂邪見者各封己見故彼此相戾荊公云有身見則物亦自我故發于違拒有禁戒取邪悟諸業則起輪回性故出生相返是非善惡既有所在則辨鞫隨之矣如是故有王使主吏證執文籍如行路人來往相見主吏必使二人相對而問之如行路人乍得相見而無情如彼邪見相反雖見無情也二習相交故有勘問權詐考訊推鞫察訪披究照明善惡童子手執文簿辭辨諸事以考訊者必用權數如鈎距之類皆由邪見生此之報是故十方一切如來色目惡見同名見坑菩薩見諸虗妄遍執如入毒壑九者枉習交加發於誣謗長水云枉則逼壓良善損惱于他心無悲愍害所攝也補遺云然前誑習發於誣罔與此何別恐前輕此重也前但誑言誣以惡名陷入不義今云誣謗以直為曲逼壓至于死地如前誑習喻以隨風之塵使人不見而已今枉習則曰如讒賊人逼枉良善也如是故有合山合石碾磑耕磨熏聞云磑五對切磑搗磑又言磨者應分旋轉縱橫之異如讒賊人逼枉良善二習相排故有押捺槌按蹙漉衡度諸事長水云既以枉押良善抑捺無辜令稱有罪故感合山等事蹙謂逼迫漉謂振動衡權衡也度丈尺也亦可漉謂潦漉蹙迫潦漉皆捉取之貌孤山云權衡尺度以定輕重長短獄王前有之是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹𮦷長水云讒能害善虎能食人熏聞云疾雷為霆霓雷之急激者謂之霹𮦷抱朴子云雷天鼓也王充論衡云圖畫之工圖雷之狀如連鼓形又圖一人若力士謂之雷公左手引連鼓右手椎之彼文是知先儒但言陰陽薄激而為雷霆者未盡理也必有神物主而行之如庶女叫天齊臺遭擊豈陰陽二氣偏其感驗乎況世有惡人震銘其身者多矣又論衡云盛夏之時迅雷擊折樹木破壞室屋俗以天取龍也其犯殺人者謂有陰過斯可信焉十者訟習交喧發於藏覆長水云此是覆習而言訟者由覆發訟故所言覆者於自作罪恐失利譽隱藏為性悔惱為業謂覆罪者後必悔惱不安隱者既有罪不能自發遂招他訟此訟即是惱之一法忿恨為先追觸暴熱恨悷為性䖧螫為業謂追往惡觸現違緣心便恨悷多發囂暴凶鄙粗言䖧螫也故乃名為訟手鑑云既作大罪常懷怖畏悔箭入心堅不可拔如偈云不應作而作應作而不作悔惱火所燒後世墮惡道謂此覆其過彼說有罪更互喧諍欲隱彌露故發於覆藏也如是故有鑒見照燭如於日中不能藏影故有惡友業鏡火珠披露宿業對驗諸事孤山云應云二習相爭或闕或略耳興福云惡友則證明人意言同類惡人證其訟事也業鏡火珠皆能照其是非是故十方一切如來色目覆藏同名陰賊菩薩觀覆如戴高山履於巨海補遺云陰賊謂陰謀賊害云何六報阿難一切衆生六識造業所招惡報從六根出云何惡報從六根出苕溪云造業招報根識必俱今以識為業而報從根者蓋業並由心報多約色故也熏聞云以六報中唯思屬心故心約能受根說若約所受境說則六皆是色如法華如是報荊溪唯以色法收之長水云造業既從六根而出受報還歸六根因與果交故云交報又下一根受報備歷六根根根皆爾故云交報經文六報並先云業交則知取造業之因循業發現因果交也又一一根交相涉入只就果中說交此云六識造業者且據總相業者招感為義然通總別若能為引業善不善思招感當來第八無記果者是即總報業若為滿業三性思種招感當來苦樂等果者名別報業其第六識通造總別報業若前五識但為助發別報不能發總以強盛隨轉二差別故從六根出六根是彼造具故造既從根受亦根受故從根出手鑑云業望于識有二一本識業是能依識是所依二約六識業是所造識是能造第八無記者謂七趣皆以第八異熟識而為自體無覆無記性攝故唯識云此第八識是界趣生施設本故前五助發者謂五識無執不能發潤無推度故不能造業雖造滿業亦非自能但由意引方能作故若第六識我執無明迷真實義以善不善相應思造業熏于賴耶能感五趣故六識強盛五識隨轉也六識造業者六根但是造業之具如魚鳥之網然六識造復有正助第六正造前五識是助造總報業者引業也以此業于諸業中最勝故即能引生諸趣故善不善思者正是業體善思即為善報之因惡思即是惡報之因由前六造因第八無記受報強盛隨轉者前五不能造引但隨六轉第六造善強盛前五即隨造善造惡強盛前五即隨造惡熏聞云所招惡報從六根出出猶生也現也果自因生境非他現一者見報招引惡果此見業交則臨終時先見猛火滿十方界眼根造罪是見業臨終見境是報與業交以眼根取色色能役心造種種業故見猛火滿十方界神識隨火入獄受報亡者神識飛墜乘煙入無間獄發明二相一者明見則能遍見種種惡物生無量畏二者暗見寂然不見生無量恐如是見火燒聽能為鑊湯洋銅燒息能為黑煙紫𦦨燒味能為焦丸鐵麋燒觸能為熱灰爐炭燒心能生星火迸灑煽鼓空界明暗二塵是眼所取明可辨別故見惡相暗無分別但生恐懼如是下遍歷六根然有旁正正由眼根發識造業故先歷眼今此不明文略故耳下文即具此中以火為苦具主及歷餘根隨根轉變為不可意境也苕溪云問下五報中悉有當根受報之相今眼見火後便云燒聽者何耶答以燒見易明故況下黑煙紫焰星火迸灑等皆眼根所交之報故不別云熏聞云六報互通證真以造業時一根為正餘根為助故今受報雖眼根為首還遍六根也補遺云心思迅疾所見星火迸灑亦取迅疾燒其心慮下去五根中說心並取疾義如云為電為雹為飛砂等二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地長水云聲能鼓動心海如波如濤取此造業故臨終時先見此也亡者神識降注乘流入無間獄發明二相一者開聽聽種種閙精神愗亂二者閉聽寂無所聞幽魄沉沒如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧灑者毒蟲周滿身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄降注下流也耳根所取動靜二境造種種業今受其報亦緣此二開即動也閉即靜也熏聞云亂者怐愗上音寇下音貿愚貌苕溪云上云見火此云聞波諸說弗明今以近義詳之如易云離為目為光坎為耳為水將恐見聞本乎水火之性故發燒注之相也補遺云耳根之報並從波濤注雨凡雨時雷吼惡氣乃天地暗塞之相是眼之境此以意求不可泥雷吼之聲又雨霧毒蟲皆有其氣固為注息之義三者嗅報招引惡果此嗅業交則臨終時先見毒氣充塞遠近長水云鼻根造罪貪嗅諸香衆生身分及男女等香作種種業故招毒氣以受其報亡者神識從地踊出入無間獄發明二相一者通聞彼諸惡氣熏極心擾二者塞聞氣掩不通悶絶於地如是嗅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛砂礰擊碎身體通塞是彼鼻所取境依此造業依此受苦故有二相如是下歷根別受質礙也履猶通也孤山云質應依躓躓踏也通俗文云事不利曰躓魚敗為餒羮敗為爽補遺云鼻根先見毒氣充塞凡氣自下升上神識從之從地踊出也四者味報招引惡果此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界長水云舌根作罪其罪最廣一貪味為罪殺戮必多二發語造業其罪又廣以妄言綺語兩舌惡口比於餘根此最廣博故感鐵網周覆世界也孤山云准眼耳鼻云見聞嗅此應云嘗報言味報者從所嘗為名也貪味則網捕燒野以取禽獸故見鐵網猛𦦨之相荊公云先見鐵網等者以堅覺著味罔害衆生令無所逃亡者神識下透挂網倒懸其頭入無間獄發明二相一者吸氣結成寒冰凍裂身肉二者吐氣飛為猛火焦爛骨髓如是嘗味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下舌識屬火故神識下透挂網倒懸其頭以當納味時受想隨之故長水云吸氣則取味所招吐氣則發氣所致凡吸則寒吐則熱如是下歷根別受承領忍受一切惡味造業之時先是舌根受食知味然後始益諸根大種舌不領味諸根不益受報亦然孤山云為承為忍謂發言承領忍聲甘受或作為認謂招認罪名補遺云為利兵刃取其利兵相擊聲為大鐵籠彌覆國土取其籠閉不通為息之患五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路長水云身根為罪多因男女淫愛等觸貪著細滑隨時冷暖故受合山等事亡者神識見大鐵城火蛇火狗虎狼師子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄發明二相一者合觸合山逼體骨肉血潰二者離觸刀劍觸身心肝屠裂如是合觸歷觸則能為道為觀為廳為案歷見則能為燒為爇歷聽則能為撞為擊為倳為射歷息則能為括為袋為考為縛歷嘗則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙身之所取唯合與離從之造罪感果亦爾如是下歷根別受道觀廳案皆治罪處孤山云合山刀劍並由貪著男女身分而感道謂趣獄之路觀謂獄王之闕谷響云古者每門樹兩觀於其前以標表宮門也其上可居登之則可遠觀故謂之觀人臣將朝至此則思其所闕故謂之闕廳案皆獄吏所有倳插刃也東方人以物插地中為倳側吏反括結也皆取其結縛袋包不通息之義飛舉之墜壓之煎之炙之皆所以惱其心神六者思報招引惡果此思業交則臨終時先見惡風吹壞國土資中云思是意業無質如風故見風相真際云意思生滅迅疾故先感業風亦其思致補遺云既云思業此乃生滅𮜒動之心亡者神識被吹上空旋落乘風墮無間獄發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍如是邪思結思則能為方為所結見則能為鑒為證結聽則能為大合石為冰為霧為土為霧結息則能為大火車火船火檻結嘗則能為大叫喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰長水云意之所緣生滅二塵復能隨五明了取境不覺則荒獨散所感不迷覺苦明了所致皆是邪思造業故爾補遺云前六根中明意根緣生滅二塵意地能記其前塵為生忘失為滅今思業亦受此二報不覺謂迷悶不知所以然即意地忘失之報不迷則知苦即意緣塵生境思以分別為義知其方所分別成矣結聽下先舉大合石取相擊聲也可以例下皆取其聲耳氷霜履之則有聲土霧風鼓之則聲矣熏聞云霧與雺同天氣下地不應曰雺蒙昧也為土者約雨言之即霾也補遺云結息下如上燒息能為黑煙焰今舉火車等皆取煙焰臭氣耳結嘗下准舌根中乃有二義或取嘗味或取說法今六根交報亦存二向如上或餒或爽等舌嘗味也或云耕鉗等舌之觸也今云叫喚等取語言也言悔泣者必有詞亦舌根之事邪思屬心心能變觸屬身根大身小身偃形仰形皆身觸受苦之相阿難是名地獄十因六果皆是衆生迷妄所造熏聞云問據六交報所墮之獄皆云無間然則十習因悉是無間之業耶答如貪習所感八寒地獄非無間也乃至訟習所感業鏡火珠等此是受報前事豈不鑒照有間之人乎故知六交報中且舉無間為首其間不無前七地獄并諸小獄之相請尋阿含樓炭俱舍婆沙等備曉其事若諸衆生惡業同造入阿鼻獄受無量苦經無量劫六根各造及彼所作兼境兼根是人則入八無間獄身口意三作殺盜淫是人則入十八地獄三業不兼中間或為一殺一盜是人則入三十六地獄見見一根單犯一業是人則入一百八地獄資中云六根十因具足同造入阿鼻獄大無間也苕溪云六根各造等者此亦六根具造十因但前後異時故云各耳如一根對境必與意識同起是名各造若加二三等則名兼境兼根也荊公云若所造惡緣事非心則境不兼根緣心非事則根不兼境八無間獄者應同前獄既非經無量劫故知此罪次重于前復恐通舉八獄以輕從重總云無間是則十因或不具者當墮前七也熏聞云智論云八大地獄復有十六小獄而為眷屬謂八寒氷八焰火八寒氷與俱舍大同八𦦨火者一炭坑二沸尿三燒林四劍林五刀道六鐵刺林七醎河八銅橛補遺云此上既同入無間所以兩節不同但約六根十因具不具等為異耳若十因并六根一時具造則入無間經無量劫若不具起或兼九八而下或五根境來則曰兼境前後異時亦具六根十因亦入無間但不經無量劫也例同止觀觀陰發下九境有一時具發九境者雜沓前後發者也初句云六根各造者先舉前後單造也身口意三等者十惡業中唯犯殺盜淫罪雖云口意蓋助成身業也十八泥犂經云火獄有八寒獄有十火在地下寒在天際熏聞云火獄有八應是小獄寒獄有十則與論文不同餘經或說十八寒氷地獄十八熱地獄十八刀輪地獄乃至八萬四千地獄故知獄相差別多品補遺云此單約三業造殺盜淫不具十因故不入無間然前十因亦須造五逆方入無間今三業只造殺盜淫故入十八獄也苕溪云三業不兼等者上明具三必含復義今云不兼兼即復也亦合云一淫但是文略耳三十六獄并下一百八獄未詳名數補遺云約此則知前三業有兼復殺盜淫亦有單復也如身口二業重意但助成正作淫殺而無盜事等類也今此三業單殺盜淫亦單入三十六獄也然身口意必能相離前復者須以二業為重一業輕助今云不兼乃約一業為重二業輕助耳若淫殺盜可直言單復也見見一根等者能見所見單境單根於殺盜淫單犯一業故罪從輕熏聞云問如犯殺時必須作意或復發言乃至身根斷彼物命方結正罪云何單從眼根能犯一業耶答此約六根偏重者言之然于餘根非不相帶有異前文兼境兼根所作皆重故罪從輕也補遺云前三業雖單猶屬復義如身兼眼耳鼻意業貪瞋癡也今此直從六根中眼根乃身之單義矣能見之根所見之境或殺或淫乃入百八獄也雖云眼根亦須約口意并身餘業助成方能造業眼根乃從重者為言耳眼根既爾耳根應云聞聞一根等由是衆生別作別造於世界中入同分地妄想發生非本來有上文五節惡業不同即別作別造也所感獄報各從其類即入同分地也妄想發生等並酬阿難前所疑問熏聞云前阿難問云此諸地獄為有定處為復自然彼彼發業各各私受故今答曰于世界中入同分地又前問云此道為復本來自有為是衆生妄習生起故今答曰妄想發生非本來有復次阿難是諸衆生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形資中云由前十因餘報不同故下鬼趣分成十類貪物盜習貪色淫習貪惑詐習貪恨怨習貪憶嗔習貪傲慢習貪罔誑習貪明見習貪成枉習貪黨訟習熏聞云非破律儀謂聲聞戒也撥無曰非違犯曰破後還罪畢受諸鬼形者若不經地獄直墮鬼趣則如前云七情三想沉下水輪生于火際受氣猛火身為餓鬼畜趣人趣例此說之若於本因貪物為罪是人罪畢遇物成形名為怪鬼貪色為罪是人罪畢遇風成形名為魃鬼貪惑為罪是人罪畢遇畜成形名為魅鬼貪恨為罪是人罪畢遇蟲成形名蠱毒鬼貪憶為罪是人罪畢遇衰成形名為癘鬼貪慠為罪是人罪畢遇氣成形名為餓鬼貪罔為罪是人罪畢遇幽為形名為魘鬼貪明為罪是人罪畢遇精為形名魍魎鬼貪成為罪是人罪畢遇明為形名役使鬼貪黨為罪是人罪畢遇人為形名傳送鬼補遺云本因貪求財物餘習還附草木為怪鬼凡草木為妖者曰怪傳云唯是風馬牛不相及也曰馬牛其風注云風放也牝牡相誘謂之風然則牛馬風佚因牝牡相逐而遂至放佚今淫習之餘言遇風成形者乃遇放佚成形故受魃鬼魃乃女鬼亦曰女妖女子多淫故成魃鬼然則此鬼感淫佚受身故曰遇風成形耳畜若狐狸之類憑之惑人故曰魅鬼媚惑之鬼故曰魅豈非詐之習乎鬼附蛇虺以害人亦怨之習是則遇之者宿有其怨乎瞋其人必録其可恨故曰憶雖欲加之疫癘以騁其私必得其衰運可濟故曰遇衰等鬼附癘病以害人瞋恨之餘矣遇氣成形者以餓鬼居金剛際受猛火氣成身慠氣之人故受餘習之身落其類也貪罔之因乃以無為有故為鬼受形幽暗以魘魅為事起見之習欲其甄明落鬼道中為魍魎鬼亦鬼中之精明者也言遇精為形者附彼精露之物為祟故枉逼良善為成其惡落鬼為役使凡枉人者必有所附故為役使之鬼說者必有黨為鬼附人傳送如世之師巫所謂神降而憑附之也毛詩云旱既太甚滌滌山川旱魃作矣神異經說長二三尺目在頂上其走如飛打之不殺入水則死苕溪云蠱者血蟲為蠱注腹中蟲也魍魎家語木石之怪曰夔魍魎據切韻夔獸名一足無角今恐魍魎似之故抱朴子曰山精形如小兒獨足足向後善犯人或云獨足魍魎好學人聲而迷惑人越人謂之山魈是也阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有孤山云純情墜落者愛水下流業火燒乾者燒乾愛水也補遺云孤山謂燒乾愛水則地獄業謝也業火炎上故隨想心上出為鬼又下鬼業既盡則情與想二俱成空又云是等皆以業火乾枯酬其宿債旁為畜生應知但約業因酬果已足故云燒乾愛水乃至情想成空等非謂愛情已除滅也但燒愛心中所感業水耳下業火乾枯亦然酬鬼報足業火自息故曰乾枯復次阿難鬼業既盡則情與想二俱成空方於世間與元負人怨對相值身為畜生酬其宿債資中云情即地獄之純情想即鬼趣之妄想此想亦情長水云地獄治情鬼中治想情想既盡故云成空然所空者即依情想所發之業也物怪之鬼物銷報盡生於世間多為梟類風魃之鬼風銷報盡生於世間多為咎徵一切異類畜魅之鬼畜死報盡生於世間多為狐類蟲蠱之鬼蠱滅報盡生於世間多為毒類衰癘之鬼衰窮報盡生於世間多為蛔類受氣之鬼氣銷報盡生於世間多為食類綿幽之鬼幽銷報盡生於世間多為服類和精之鬼和銷報盡生於世間多為應類明靈之鬼明滅報盡生於世間多為休徵一切諸類依人之鬼人亡報盡生於世間多為循類孤山云梟類昔為鬼則附物為質今為禽則附塊成形咎類如鵂鶹鵬鳥出表凶衰為其驗狐類附畜為魅死受狐身還遭鬼附谷響云狐妖獸也鬼所乘有三德其色中和小前大後死則首丘郭氏玄中記曰千歲之狐為淫婦百歲之狐為美女補遺云狐色黃故曰中和豐後故曰大後不忘本故曰首丘毒類即蛇蠍之屬蛔類即身內蟯蛔食類謂猪羊等可充庖者服類謂牛馬等應類能應節候即社燕賓鴻司晨警露者也熏聞云傳云少皡以玄鳥氏司分注曰春分來秋分去此當春秋二社之際故云社燕季秋之月鴻雁來賓來之不久若賓客然露下則鳴春秋繁露曰鶴知半夜注曰鶴水鳥也夜半水位感其生氣則喜而鳴雞主晨鳴巽為雞雞鳴節時家樂無憂周處風土記云白鶴性警至八月露降流於草木葉上滴滴有聲則鳴休類有道則現若麟鳳等循類從人養育如猫犬等十並云多者取其業因相類多分為之未必皆爾阿難是等皆以業火乾枯酬其宿債傍為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結熏聞云問此事本是地獄惡業之相那于畜趣後結示耶答前阿難所舉三人且約惡趣極重者問之今佛于畜趣後說者蓋明鬼畜皆是地獄業火燒乾出生其趣免斯報耳故於地獄鬼畜三趣受罪本因十習故畜生文中云酬其宿債旁為畜生等則知寶蓮香等一業備歷三趣故佛于此結示言酬債已足也自報不因前業但以畜生為類故佛不於人報中說之所以人報十類皆云酬足復形是也又下經結示人報云皆無始來業計顛倒則非近指二三生來矣乃是酬足十習已畢復得本形却論無始之業生熟多少而於頑類等形復造相生相殺之業也復次阿難從是畜生酬償先債若彼酬者分越所酬此等衆生還復為人返徵其剩如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直孤山云越所酬謂驅役則晝夜不息烹炮則殺害過分也如彼有力謂有修定學慧之力也應取兼有福德一句為持戒則三學備矣又布施忍辱精進悉名福德則六度備矣不捨人身則為彼奴婢或遭其劫殺等阿難當知若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢苕溪云奢摩他及佛出世此約修定破惑見佛得道方免相害縱有宿業所作不亡至果償之若幻化之非實也汝今應知彼梟倫者酬足復形生人道中參合頑類彼咎徵者酬足復形生人道中參合愚類彼狐倫者酬足復形生人道中參合佷類彼毒倫者酬足復形生人道中參合庸類彼蛔倫者酬足復形生人道中參合微類彼食倫者酬足復形生人道中參合柔類彼服倫者酬足復形生人道中參合勞類彼應倫者酬足復形生人道中參於文類彼休徵者酬足復形生人道中參合明類彼諸循倫酬足復形生人道中參於達類孤山云今謂宿昔之世誰無善惡如人缺債強者先牽故三途業盡乘其宿善還復人中宿善有優劣故人有高下復自畜中餘習故其類頗殊此亦如來大約而言令知因果不敗亡耳其業種差別豈可一槩長水云夫人道受報善因所招總報雖同滿業各異故分十種今此從畜來者乃是餘業旁受非正善業所招然亦順後業感由不正故故言參合他皆倣此苕溪云頑如檮杌愚謂顓蒙佷即𢤱戾不調庸乃鄙俗無識微同皂隸柔若脂韋皂隸民之賤者脂韋以柔順人也農工之民服其勞也手鑑云柔類若詩云夸毗體柔蘧篨口柔戚施面柔補遺云今觀經文人中十類並近從畜類為因良由業因已經地獄鬼界燒治已空餘業為畜今受人報只從畜明可也傳曰心不則德義之經謂之頑從梟來者則真頑矣動為人凶幸灾者矣非愚謂何佷者𢤱戾性不調也狐之猶豫性不調矣庸鄙之俗固多毒害不仁微賤皂隸亦蛔蟯之等類猪羊之畜柔而弗剛牛馬之倫實生勞悴和陰陽之度識旦暮之變固有文思矣陰陽之文如陰陽家流是也知有道而休徵乃為明矣明識善惡如奴戀穎士婢識王敦是也達猶通也循類能順人情為人固能達于人事如芻蕘之言是也文也明也達也非博文明識達道君子是三者乃其苗裔而已故曰參合也阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙孤山云老而不死曰仙仙遷也遷入山也故制字人傍也抱朴子云求仙者要當以忠孝和順仁信為本若德不修而但務方術終不得長生也阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙堅固草木而不休息藥道圓成名飛行仙堅固金石而不休息化道圓成名遊行仙堅固動止而不休息氣精圓成名空行仙堅固津液而不休息潤德圓成名天行仙堅固精色而不休息吸粹圓成名通行仙堅固呪禁而不休息術法圓成名道行仙堅固思念而不休息思憶圓成名照行仙堅固交遘而不休息感應圓成名精行仙堅固變化而不休息覺悟圓成名絶行仙真際云地行者以服餌丹砂存形久固道雖成就身不能飛飛行者餐松啖柏間淡冲和其體輕清故能飛舉遊行者精窮變化察物性元點石為金恤貧哀苦遊於人世空行者運用神氣想化為功其德圓成履空自在天行者咽津固質攝衛持精欲境不交如天無異沇疏云此天不是六欲天如張騫至崑崙山上得見天宮也通行者吸乎日氣潤益姿容吞彼霞光將延世表其道玄著故曰通行道行者習諸呪術禁彼異緣術力既成流功益物照行者用其思念審度境心憶想功成能知彼境即世間他心宿命通耳資中云服餌者食麻仁之類也金石者能化骨成仙也以堅固金石亦約服餌言之良由十仙者皆是存想固形而得成就通行者應有五通即神仙通人絶行者變化不息如尸解之類按道家真誥云道有陰度陽度若鍊形道合呼吸純陽秪自肉身次第變蛻蛻而愈妙身入無形所蛻之皮宛同蟬殼解變之後因無骸骨縱葬墳冢唯劍舄履杖存焉此陽度也若陰度者即為陸仙也言覺悟圓成者謂絶于視聽令如槁木等谷響云堅固交遘者易云男女遘精萬物化生是也神仙傳云彰祖治房中之術蓋此類矣七趣鈔云張陵勸人行房中術而真誥中再三訶赤白之氣穢惡之事今謂精行仙若是其類應如下文云於邪淫中心不流逸者方預斯趣由所習既劣故在天趣之下補遺云服餌乃丹砂麻仁所以地行不飛草木但餐松柏所以輕舉鍊金石可以化骨所以遊行人間飄然若寄耳動止謂神動形止久而能履空也固津間精不交欲境近類于天通行既云吸粹乃通幽玄道行乃呪術之道照行乃宿命他心精行用術房中絶行乃絶于情想然外道亦能修禪得通若十仙中地行飛行等乃身如意通若照行仙既云堅固思念乃是禪定則照行中天眼天耳他心宿命皆有照義荊公云地行仙能壽而不能飛飛行仙能飛而不能遊遊行仙能轉化而遊也空行仙能固氣精遺形焉天行仙出動不淫與天同德通行仙能自通於二精者也道行仙能以術法述道自然照行仙能以思覺默存照應精行仙能以精攝自固絶行仙與十二類以類應者同化熏聞云按劉協滅惑論云道家立法厥品有三上標老子次述神仙下襲張陵太上為宗尋柱史嘉遁寶惟大賢著書論道貴在無為理歸靜寂化本虗柔然而三世弗紀慧業靡聞斯乃道俗之良書非出世之妙典問神仙之道有長生不死之理合居老子之上何故劉協抑為中品答有名無實君子不取何抑之有故牟子曰王喬赤松等神仙之書聽之則洋洋盈耳求其效猶握風而捕影耳又曰堯舜周孔各不能百載而末世愚惑欲服食辟穀求無窮之壽者哀哉昔高僧曇鸞欲求仙方以益其壽乃往江南陶隱君處求之得書十卷將至洛下見中國三藏菩提留支鸞曰佛法中有此長生不死之法乎支唾地曰是何言歟非相比也此方何處有長生不死之門因焚其書若爾今經云存想固形壽千萬歲亦虗妄邪答此土雖無西天或有以彼外道學四毗陀修諸禪定得五神通如金頭仙恐身死故往自在天應知前文所說迦毗羅仙斫迦羅仙等諸大幻師不可以此方外道同日而語況今十仙並由鍊心其道圓成多是捨生趣生乃獲斯壽昔人一向作即生而解往往疑松喬而惑黃老矣阿難是等皆於人中鍊心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣苕溪云前文情少想多輕舉非遠即為飛仙蓋約命終隨業受生而說下文云精研七趣皆是昏沉諸有為相妄想受生妄想隨業今云深山海島絶於人境即別絶報也應知人中鍊心者非止服餌養生而已必兼戒善方曰鍊心別得生理者正由人中之業別感仙趣之報也縱於人間現得長生久視之理其數幾何若生仙趣則千萬歲信有之矣如山海經云崑崙之山廣都之野軒轅之丘不死之國氣不寒暑人皆數千歲此亦衆私同分非無定處若但固形而不鍊心便希千歲是猶見卵而求時夜太早計也世暮神仙不亦惑乎手鑑云人中鍊心者斯不知人命不停過於流水壯色不停猶如奔馬遂守夢幻之質認為堅固長齡長水云生理謂長生之理經中正指仙業有生理即上十種修鍊之法也三乘行法皆佛所教今經尚斥二乘云不識生死根本錯亂修習況修仙道耶固形存心在於長生不死俾此形骸堅固不壞所修妄念即上十種修鍊之法此皆有漏進不如天退又勝人故居山林人不及處名為仙趣然此趣餘經不出以總報同人故今經開者約所修行別故人天二趣所不攝故此皆外道類收然亦禁防非佛正戒但禁粗浮即戒禁取也妄想不真終隨業墜阿難諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄鎣生明命終之後鄰於日月如是一類名四天王天孤山云邪欲心息故澄鎣戒支清淨故生明熏聞云智者云上升之元首下界之初天居半須彌云云於己妻房淫愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天於淨居時不得全味斯蓋於淨居時不得淨滋味也智論有三種味一出家味二讀誦味三坐禪味今淨居猶坐禪也忉利正言多羅夜登陵舍此云三十三佛地論曰妙高孤山云頂四面各有八大天王帝釋居中故有此數荊公云忉利此云能主以帝釋為能主補遺云第四兜率方修欲定此忉利天亦言淨居者則知忉利已上並修欲定而成在兜率故云不得全味所以須焰稱靜多至兜率方云一切時靜乃欲定粗細住成相也逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天熏聞云動謂欲散靜謂寂靜此帶欲界定言之但未得粗住細住以此驗前淨居之人合是創修欲定者也孤山云須𦦨摩此云時分時時唱快樂故荊公云此云善時以蓮華開合知時分一切時靜有應觸來未能違戾命終之後上升精微不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天長水云應謂相應觸即欲境尚猶順而從之故云未能違戾準生兜率尚有執手在人修因故未免欲孤山云兜率陀此云知足于五欲知止足故佛地論名為喜足謂後身菩薩於中教化多修喜足故此天是補處菩薩所居三灾不及此約彌勒居處說餘凡夫天還受三灾壞也長水云一生補處者有二義一約化相此復有三一人中一生二天中一生三下降一生二約實報一生謂於四種變易生死中唯有末後一種名無有生死一位所繫也如上生疏說我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天無心於境境自橫來境自有心己何所味故云味如嚼蠟等以樂變化五欲之境而受用故補遺云在因未免有橫陳相交生彼方能對笑而已但於形交之時味如嚼蠟耳第六天之因於形交中薄味亦無故曰了然超越言橫陳者宋玉諷賦云𪫟惕之心兮狙之床橫自陳兮君之旁樂變化樂字去呼熏聞云生越化地洪鈔云諸天用異熟境此天不爾雖有異熟五塵樂自變化以受用也是則越下而化故曰越化無世間心同世行事於行事交了然超越命終之後遍能出超化無化境如是一類名他化自在天孤山云樂受用他所變化五欲境故以有自在力遣他變化而受用之第五天是化境下四天是無化境以上四天悉空居長水云行事交者此亦橫陳也前雖亡味會境猶起欲心此則無心故云了然超越上之六天皆因欲心漸輕得報漸勝若情欲重者必不生天熏聞云了然超越者亦無嚼蠟之味也問小乘果位尚因欲事喜生退失凡夫何得臨境無心答實如所問豫嘗究之須約一分修禪定者伏惑堅固乃能如是或依佛教修無漏道即九想等不淨觀慧方有斯力經中一往且說離欲之相而未顯示離之所以苟無定慧但令散心凡夫無世間心同世行事者是猶使飢渴之人於飲食無味其可得乎苕溪云准天台師說六欲天業皆以十善為本若兼護法心是四天王業若兼慈化人是忉利天業若兼不惱衆生善巧純熟是𦦨摩天業若兼修禪定粗住細住是兜率天業欲界定是變化天業未到定是他化天業今經止約欲事輕重而分六天者應有二義一是阿難起教之緣故二是欲界受生之本故意令持戒亦扶律之微旨也阿難如是六天形雖出動心迹尚交自此已還名為欲界對人仙二趣得出動之名欲心事迹猶有交合之相故俱舍頌曰六受欲交抱執手笑視淫此言地居兩天則形交焰摩則勾抱兜率則執手變化則對笑他化則相視須知彼文各據六天受欲而說今經秪就人中辨欲事輕重用顯六天感報不同以是應作四句料簡一形交心不交即此經第六亦通第五也二心交形不交即俱舍後二也三心形俱交即經與俱舍皆前四也四心形俱不交如初禪以上也對下人仙二趣故云出動動謂飛舉則人不能出謂出離則仙雖飛行求出然仙趣未出人界應是人界收耶矧既能飛行過人遠矣亦天界收可也如上情少想多中收四王并飛行等是也今獨未能報生天界故云未出雖在人寰亦與人隔長水云人趣雜類壽命短促遷變不常天之福命卒難搖動尚有欲境相遘故云心迹尚交若至定地永無欲對矣手鑑云樓炭經說欲界諸天具有十法一飛來無限數二飛去無限數三去無礙四來無礙五天身無有皮膚筋脉血肉六身無不淨大小便利七身無疲極八天女不産九天目不睡十身心隨意好青則青好黃則黃餘色皆然
