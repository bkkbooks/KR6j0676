body:
  text: 一名中印度那蘭陀大道場經於灌頂部録出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集注明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閲鋟爾時富樓那彌多羅尼子在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為衆生敷演如來第一義諦補遺云世尊指釋迦如來指十方諸佛同證之諦真際云如來藏心於諸說中更無有上名第一義諦世尊常推說法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地苕溪云譬小乘根性遠第一義諦雖承如來微妙法音本不似見何況真聞地謂智之所踐世尊如阿難輩雖則開悟習漏未除我等會中登無漏者雖盡諸漏今聞如來所說法音尚紆疑悔補遺云熏習之習指俱生思為有漏長水云小乘有學方斷分別俱生全在名習漏未除滿慈無學斷盡俱生此約小乘煩惱障說問何故無學尚紆疑悔初果解悟不疑耶答正理論云或有於境智不及愚所論凡夫善通三藏羅漢不識赤鹽以所知障障法界理羅漢雖得無漏煩惱輕故尚紆疑悔所知重故阿難開悟所知則輕習漏未除煩惱則重熏聞云問若據迹論阿難初果滿慈無學阿難尚已開悟何故滿慈等猶紆疑悔耶答遞相起教叩佛宣揚若乃一期觀此二人迷理之心不無輕重何者阿難從初據人法二執迷空如來藏其迷則重滿慈於此懷性相兩疑迷不空如來藏其迷則輕又則空如來藏理猶易明不空如來藏義復難解是故阿難初果發起於前滿慈無學對揚於後阿難希除微細惑意在茲矣若於此經欲分三根從阿難請行已前雖通被三根其得悟者皆上根也請行已後方被中下然於行中有正有助亦可以正為中以助為下世尊若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始資中云前破人法二執顯空如來藏今顯不空如來藏故生此疑熏聞云前文但總略而說且未委明諸法生起之由故今疑問廣說世間性相等義山何大地依報也諸有為相正報也依正各有生住異滅故云次第遷流等又如來說地水火風本性圓融周遍法界湛然常住世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相陵滅世尊地性障礙空性虗通云何二俱周遍法界而我不知是義攸往唯願如來宣流大慈開我迷雲及諸大衆作是語已五體投地欽渴如來無上慈誨爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝義中真勝義性資中云如來常依二諦說法謂世俗諦及勝義諦今說勝義異乎常說故云真勝義性令汝會中定性聲聞及諸一切未得二空回向上乘阿羅漢等皆獲一乘寂滅場地真阿練若正修行處補遺云定性不到方等法華者回向上乘指到法華而未悟者二類俱到此會有以知今楞嚴開權之教矣所以楞嚴得開定性在座蒙益者功歸法華彼云其不在此會汝當為宣說定性已蒙法華得記之人豈與已前定性為比但今從本受稱云定性耳是則楞嚴座中定性不蒙法華開顯豈得廁於其間哉然此特言練若蓋有謂而發定性聲聞久晦迹山間辟世蘭若今來法會辭以闢之耳孤山云未得二空者未得大乘生法二空亦未得大乘性相二空山家所談大小乘各有生法二空阿含云無是老死名法空蓋指五陰是老死之法無誰老死名生空如問誰老死必答是我老死此則妄執五陰以為我也以小乘人能達六道假實皆空故而未達四聖假實皆空故故云未得二空耳此約全奪而論若全與者則已得小乘二空若半與半奪則云小乘已得人空而未得法空或言菩薩得法空者但從勝變名其實圓人達十界假名空名人空達十界實法空名法空此文明指定性皆獲一乘遂知五性之宗乃方便之說明矣五性者三無二有袒於彌勒宗於天親折薪於玄奘克荷於慈恩立言垂範自為極唱今準此經顯知權說熏聞云楞伽經云一聲聞性二辟支佛性三如來乘性四不定乘性五無性謂一闡提佛地論莊嚴論瑜伽論皆說五性大同楞伽寂滅場地者無中邊相故名寂滅地有二義能持能生既持諸法復生妙智也阿練若此云間靜處或云阿蘭若此云無事處謂中道之理離二邊喧動無二邊諍事也即以此處為正修行處正修行處者非三教之偏邪曰正三觀圓觀名修行所觀三諦名處即此處名阿練若也豈在遠人煙絶放牧然後為阿練若哉苟心觀不明任居絶谷喧諍滋甚苕溪云寂滅指得果之地練若指修因之處因果所依皆是實相故曰寂曰真也熏聞云問意欲令未得空者而得於空而此與不空如來藏義云何銷會答如說空華元由醫目縱有所見知華本空談不空義亦為顯空耳荊公云得人空者知衆生無性得法空者知法無性汝今諦聽當為汝說富樓那等欽佛法音默然承聽佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣說性覺妙明本覺明妙孤山云本亦性也變其文耳以本元自性既能所雙絶而寂照互融即寂而照故曰妙明即照而寂故曰明妙寂即三諦俱寂照則三諦俱照秪是本性之覺妙明互融故作兩句說耳蓋性覺本覺中道之體也妙明明妙空假之用也體用不二空假相即如來藏性髣佛在茲然此句義與性色真空性空真色辭異意同上云忽生山河大地下云無同異中熾然成異即循業發現之謂由當機未悟故滿慈發起如來重示又前文正明破妄顯真此下多說從真起妄故資中以空不空二藏收之頗得其旨長水云顯不由他故云性覺性自覺故性自明故豈由於他顯非有始故名本覺本來覺故豈因始有又體無改易故名性覺相非生起故名本覺體相寂滅心言不能及故稱妙靈鑑不昧昏惑不能暗故名明妙明明妙左右言耳富樓那言唯然世尊我常聞佛宣說斯義佛言汝稱覺明為復性明稱名為覺為覺不明稱為明覺苕溪云原佛所舉二覺之義皆真覺也今牒前為問良恐滿慈謬解此覺性雖本爾而現是無明必須藉智起修照了此性方名為覺故佛二問乃是約性約修而說也初問為復性體本明絶能絶所稱名為覺次問云為覺不明稱為明覺者不明猶云無明也為是覺了無明顯於明性方稱明覺耶富樓那言若此不明名為覺者則無所明答意正順次問之義方稱為覺若謂無明即名覺者是則覺體無所照明佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性上二句牒前答意滿慈所謂覺者必假能覺之智方顯所覺之性故今亦曰有所非覺蓋言若有所覺則非真覺又恐疑云若無所覺應無能明耶故復示曰無所非明蓋言無所覺中亦復非有能明之智也此以性斥修顯修為妄由無明尚混能所未亡究竟覺明始同本性故前云見所緣眚覺見即眚本覺明心覺緣非眚下二句釋上無所非明也無明即非明變其文耳意云上謂非明但是無於妄明非謂無於覺湛明性性覺必明妄為明覺本性之覺必具湛明之性以不了故妄為能明之明所覺之覺覺非所明因明立所所既妄立生汝妄能問滿慈初疑藏性清淨云何忽生山河大地至佛問覺義滿慈乃謂由覺不明稱為明覺據斯答意佛應但示覺理之智為妄何故復說迷理之惑為妄廣明立法之相乎答秪緣前問山河後答明覺涉於五法立修二義不空如來藏正取立法旁通立修以修有智行因果亦屬不空至因果泯亡方顯本性空如來藏是故如來作此兼顯先據答意破能覺之非真次順問情示所生之唯妄微言奧旨固不徒然無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異此明所立境界下云虗空為同世界為異彼無同異真有為法即顯示其相也此經所說迷真起妄多是先說無情世界次說有情因果如前云晦昧為空空晦昧中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸等又下明三種相續先世界次衆生後業果耳如是擾亂相待生勞勞久發塵自相渾濁由是引起塵勞煩惱上言勞者且屬無明下云塵勞正謂見思煩惱補遺云今研味經文斟酌起信配六粗三細性覺必明妄為明覺業相也覺非所明至生汝妄能轉相也無同異中至因異立同現相也同異發明至塵勞煩惱六粗也起為世界廣明依正之法准起信論業相初動與真差異不分能所即此經妄為明覺也藏法師疏云如是轉相雖有能緣以境界微細故猶未辨之准此則轉相亦有所緣以微細故不說即此經覺非所明因明立所所既妄立生汝妄能也以本性為所豈非微細乎起信云三境界相以依能見故境界妄現即此經云無同異中熾然成異等也前業轉微細能所不分故無同異生起依報色空故曰熾然成異對上業轉得熾然名對下六粗還成三細耳異彼所異者前業與真已自成異今境界之異與前不同因異立同同謂虗空同異發明謂依前境界生起六粗相待生勞謂色空之境與正報有情能所相待生於勞想也勞久發塵塵謂塵染即智相中分別愛增等也起為世界下廣明依正之法即前現相生起六粗者也前但略言此下委示答滿慈忽生之問也起為世界靜成虗空虗空為同世界為異彼無同異真有為法苕溪云由煩惱故變起依正空界屬依有為屬正界是器世色相差別故云起云異也空是頑虗不動常一故云靜云同也彼指上辭真猶實也上云無同無異名濫於理今指其體實有為法耳何者衆生正報兼乎色心造作善惡靡不由此以有心性故非如世界之異以有色相故非如虗空之同相待立之故云無同無異也然有為之法實通依正既以世界為異則知別就衆生得名如滿慈所問云何忽生山河大地諸有為相豈獨問依而不問正故華嚴云何等名有為法所謂三界衆生況下文云精研七趣皆是昏沉諸有為相豈非顯以正報名有為耶又文殊云迷妄有虗空依空立世果想澄成國土知覺乃衆生此與今文三義符合但空界有前後之異耳覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界孤山云四輪持世其實土輪金輪水輪風輪此不言土輪者土與金同是堅性俱屬地大故此但言四大則已攝四輪矣谷響云彼說四大此談五行五行數廣而義狹以不言風故四大數狹而義廣地攝土木故苕溪云覺明空昧者真覺起於妄明見於虗空晦昧之相也亦可覺明二字皆屬於妄以下云明覺立堅故相待成搖者夫風以動為性元由心動之所感也是以空昧形於外覺明搖於內從微至著故有風輪矣俱舍論云謂諸有情業增上力先於最下依止虗空有風輪生因空生搖牒上文也堅明立礙謂堅凝妄明成立質礙也夫金以堅為性亦由情堅之所感也輔行以地大為事堅執心為情堅應知七識六識俱有執義故第七識亦名染汙意與癡愛見慢四煩惱相應常時審諦思量執取第八為我若第六識即人法二執是以空既妄立搖於妄明執堅凝故有金輪矣彼俱舍論風輪之上次有水輪水輪之上方有金論謂諸有情業增上力起大雲雨澍風輪上滴如車軸積水成輪復有別風搏激此水上結成金此與彼異者彼約安立世界自下升上以成其次此約生起世界由內感外以成其次然大小義別不須通會堅覺下二句牒前二文風金下三句正明火大孤山云變化性者火能變生為熟化有成無也寶明生潤等既風金起火而火復蒸金故金潤下流遂成水大谷響云若以五行論之金生水金是水之母水是金之子故生潤即金之含有也火尅金火是金之賊既母被尅故子下流成水輪也如釜中含水下以火蒸則其水騰氣流汗而下也然此四大風金則由妄心而起火水復由風金而起下文結云遞相為種義見此矣長水云由前所既妄立生汝妄能所即影明能即妄覺此之覺明全是無明無明昏鈍遍迷法界即成空昧一明一昧一動一靜剎那生滅相待不息於內生滅即名為搖於外即成風輪初起是故世界之初風輪為始虗空即為世界所依故下文云迷妄有虗空依空立世界無明生滅形待不息故云因空生搖執認所明堅持不捨故云堅明立礙於內即是覺明堅執於外即成金輪次起故云彼金寶者明覺立堅故知寶性因覺明有是故衆寶皆體堅而用明也堅覺等二句指前二性為生火之由於內則生滅不停堅執不捨於外則動搖不息堅剛難壞互相摩觸而有火生如取火法鑽鐩與木一堅一動火能鎔散成熟萬物故云為變化性寶明生潤等於內則愛明堅執燥心熾盛於外則寶潤火蒸遂成流水也如世蒸物之有汗流故一切業種非愛不生一切草木非水不長補遺云夫外之四大莫非從內心發現如熏聞所引下文云因諸愛染發起妄情情積不休能生愛水就此一節經文則知因於內愛發於外潤矣又曰是故衆生心憶珍羞口中水出此引現喻驗前外感如小乘諸論明三灾分齊初禪內有覺觀躁動外感火灾二禪內有喜心外感水灾此乃因愛感水之明據矣據此則前火大亦因內瞋感於外火也經云遞相為種者此從四大相生而說故也例如五味若相生義則乳從牛出之後次第轉變而五味其實皆從牛出也吳興謂貪淫者愛烈火銅柱之報者應知如云因內喜故外感水灾此等流果也若受烈火之報此乃異熟增上之果耳又據第八經文淫心中若貪愛義則外感水耳二根研磨生暖則受火報二根相觸則受銅柱然小乘宗水輪在前金輪在後與此不同者而不知風輪持水即是堅礙約相在後舉性在初故風輪後即說金輪手鑑云意云秪此風輪其性堅礙便是金之本性又地以堅持為性即是金之相也以小乘淺近唯據相說大乘了義兼於性相故云在後在初也釋要云然此但明外相相生若約內心則由愛心故也愛心沉下故感水輪下文云心發愛涎舉體光潤內有燥心故感火起內心生滅故招風輪內心堅執故感金輪故知四輪皆由圓發即是如來藏體循業發現也故迷為礙悟則自在也此約性故金先水後彼約相故水前金後殼師云論妄則金乃居先說常則水居其下安立論其現勢了妄推本為先兩義既成寧勞貯妨又彼但知增上業感而不知是何因種以教非了義粗相說也手鑑云此結判也內身外器皆謂增上業之所感而不知一念妄心變茲三境釋要云不知何因種者不知賴耶變生也然說自梨耶猶為隱密其實性中本具良由理具方有事用也鏡之像性水之波性可方之也熏聞云問風金水輪既云持世顯有次第何故下文復云火騰水降交發立堅乃至水勢劣火結為高山等答經有兩節初明四大因起則次第不雜後明諸相發揮則交參而說是故輪名局前大義通後其體無別皆藏性發生不應以次不次為妨也火騰水降交發立堅溼為巨海乾為洲灘以是義故彼大海中火光常起彼洲灘中江河常注水勢劣火結為高山是故山石擊則成𦦨融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水孤山云水交於火火交於水其勢相敵而立於物故曰交發立堅濕為巨海水降之所立也乾為洲灘火騰之所立也觀海中火起則知火交於水也視洲中河注則知水交於火也爾雅云水中可居曰洲又曰灘沙出郭璞云水中沙堆曰灘水勢劣火謂水大少火大多以此相合則結為高山是故下舉融擊以驗其二大所成也土勢劣水比說可知手鑑云物類志云海西郡有崦岫石其色赤白如以兩石相打則水潤之不已潤盡火出山石皆然炎起數丈經日不滅黑風撲滅其石如故又夷陵難留城有石穴把火入行百餘步有二大石相去可一丈許名為陰陽石陰石常潤陽石常燥若歲月旱鞭陰石則雨若水潦鞭陽石即晴又西域有水火村村有阿耆波沴水旱潦湛然不流常沸以火投之遍池火起煙𦦨數尺以水灑火火更增熾竹木投之並成灰盡交妄發生遞相為種孤山云交妄發生謂兩妄交合而生諸事也始則明昧相待成風輪終則水土相合成草木中間諸事盡由二大而起也遞相為種者如覺明空昧相待成搖為風輪種因搖立礙為金輪種風金相摩為火大種金火復為水大種水火又為海洲種水土復為草木種應了此諸妄法於一真性如空中華華處空處本無有異纂注云華處即空處華滅則空存故觀妄具唯見真具熏聞云為種發生即是妄具妄體無實唯是覺明故云真具具無具相彼此誰名谷響云如珠具寶全體瑩徹實無寶相彼謂具也此謂無也一體互融彼此何在故無定名世界相續既然下二相續其旨亦爾長水云外相雖爾皆由內心內心無變外豈差別經且約外故云遞相為種以是因緣世界相續復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知苕溪云明妄即妄明也非也者言此妄明之體更非他法所成金是真覺起於妄明而為過咎覺明為咎已是妄能故今但言所妄既立由妄明之性非局而局故曰明理不踰以是下示不踰相下云元依一精明分成六和合同業相纏合離成化資中云胎卵有情要因父母同業相感熏聞云由於過云曾與父母愛習相纏故於中陰入胎之際復與父母欲想交感然後託生濕化有情不因父母各隨情想離合合處濕生離處化生擕李云合離成化者四生之總名也下文云情想合離更相變易是也孤山云同業相纏者與父母同業更相纏縛也合離成化者於愛境則合於憎境則離由此愛憎成其變化而托胎也釋要云同業者父母及子皆起想愛方受生也又同業者同人業同畜生業等業異則不生也見明色發明見想成異見成憎同想成愛孤山云妄心見妄境故曰見明色發即於中陰見其父母明見想成者依妄境起妄惑也異見謂父是所憎境同想謂母是所愛境女子托胎反此荊公云從性見起名為見明見明然後色發如盲眼前唯見黑暗則不能發色從見明起見為明見明見然後想成如明眼人無分別見則不能成想流愛為種納想為胎交遘發生吸引同業故有因緣生羯羅藍遏蒲曇等流注也流愛於母見父遺精時謂是己有從此識托其中故涅槃明十二因緣無明有二一潤業無明謂過去煩惱也二潤生無明即托胎時於父母起憎愛也納想為胎者有福之人想其母胎如華林殿堂薄福之人唯棘樹圊廁交遘發生謂男女會合染心成就吸引同業謂吸引過去同業入胎也俱舍明胎中凡有五位一七名羯賴藍此云凝滑二七名頞部曇此云皰狀如瘡皰三七名閉尸此云軟肉四七名健南此云堅肉五七名鉢羅奢佉此云形位今略舉前二等取餘三熏聞云流愛為種納想為胎者愛之與想十二因緣中識也若想已入胎則屬於名下羯羅藍等即是色也長水云種謂已受愛取所潤即異本之種故云流愛為種胎即正約現行一念識心生起之時然種即想愛俱為種胎即想愛俱為胎經文存略故各舉一也釋要云異本之種者此不同藏識中未受潤散名言種子此是泡疱異本已受愛潤之種也即有支如世間穀麥已苞浸者也胎約未生起或二句俱約託胎時種即愛父母遺體為己所有想即福德想如林殿薄福想如棘廁等手鑑云異本種者愛取未潤時名未起種由愛取潤已即泡貌異本名現起種故涅槃云云今即流注想愛於母謂父遺精是己有識託其中一處和合故曰流愛為種等初即分別之愛次即俱生之愛父母與子三處情想互相遘遇引發吸取界趣同業令歸一處結成胎藏故云結交遘發生吸引同業自業為因三處情想為緣父母與子等者先由愛染相牽如磁石吸針男女遘精自爾發生胎中之事釋要云三處情想者子亦於父母起愛想也俱舍云九處命終心皆須生愛想界趣同業者同其界類也若異界別類則無受生理胎卵濕化隨其所應卵唯想生胎因情有濕以合感化以離應情想合離更相變易所有受業逐其飛沈四生起時業與情想相應之處即便受生故云隨其所應情想合離四生皆具今各舉一據多分說然俱舍說人畜各具四生鬼通胎化二生地獄諸天中有唯化生也人具四生者卵生如毗舍佉母卵生三十二子又般遮羅王妃生五百卵生已羞耻恐為灾變以小函盛棄殑伽河隨波而去下鄰國因觀水次遣人接得經數日間各出一子養大驍勇所往戰征無不從伏時彼鄰國久為冤讐欲遣征討般遮羅王極大憂怖王妃聞之慰諭王言不須愁惱此五百子皆我兒也夫子見母惡心必息妃即登城告五百子說上因緣若不信者各張其口妃按兩乳成五百道各注一口從此和好濕生有布穀陀王頂疱中生又髀生王是髀疱中生又羅衛女從長者庭樹中生即韋提希夫人是也化生即劫初下為人種也胎生可知旁生四者俱舍云化生金翅鳥能食四生龍濕生金翅鳥能食三生龍胎生金翅鳥能食二生龍卵生金翅鳥能食一生龍鬼有胎生如目連見一鬼母曰我晝夜生五百子隨生隨食竟不能飽補遺云此之四生義通三界蓮華化生不同四數法華文句釋經蓮華化生引胎經云蓮華化生者非胎卵濕化之化生也非化而言化耳實不如四生中之化生也又顯性論四生一觸生二嗅生三沙生四聲生荊溪云此四但攝胎卵二生濕化但染香處不須此相熏聞云俱舍論曰若濕生者染香故生謂遠嗅知生處香氣便生愛染往彼受生隨業所應香有淨穢若化生者染處故生謂遠觀知當所生處便生愛染往彼受生隨業所應處有穢淨豈於地獄亦生愛染由心倒故起染無失云云孤山云濕以合感者必須與物相合方受生故化以離應者以無而欻有不假物相合自能受生故補遺云情想者乃群生之通病故四生無不有之今經中一往以想在卵生情在胎生此二據內心以分也濕合化離據孤山云此釋則此二約外形以分也應知卵存出殼之思故名曰想胎鐘俱生之愛故名曰情濕以物合受生化乃形離自變皆一往分屬不可盡理而求也熏聞云飛沈者猶升降也應以三善三惡分之資中云情想不常剎那變易或先胎而後卵或先濕而後化離合無定故云更相變易等如下十二類生中一一皆有八萬四千飛沈亂想唯佛與佛乃能知之故俱舍云於一孔倫具一切種因非餘智境界唯一切智知證真云有情無始熏造一切界趣種子在本識中唯佛能了且舉孔一類尚難知況餘類耶以是因緣衆生相續富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本苕溪云欲貪通乎四生今正約胎生言之又胎生復通今多就人倫辨之以其易見故也貪愛同滋貪不能止則諸世間卵化濕胎隨力強弱遞相吞食是等則以殺貪為本以強殺弱因食成貪不滋口腹則屬瞋恚以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本問此與殺貪何異答殺貪未論酬償先債今約過去於身命財非理而取故互來相噉以責其盜也如下云從是畜生酬償先債若彼酬者分越所酬此等衆生還復為人反徵其剩乃至若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相銖猶如轉輪互為高下若無後文顯之此文難見熏聞云惡業俱生者謂人與羊惡業所牽生生相值汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏縛唯殺盜淫三為根本先示盛貪業果相續兼於殺貪汝愛下次示欲貪業果相續以是因緣業果相續富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始孤山云三種顛倒秪是依正而此依正悉從理變明了知性即性覺妙相寂而常照也因了發相即因明立所迷真起妄也從妄見生即所既妄立生汝妄能由茲能所故有依正山河大地是依前結世界相續也諸有為相是正結前衆生業果二種相續也前說虗空無業果名目此談業果不云虗空者前論妄相須示虗空以迷妄有空依空立界故既言有為則已攝業果今明相續空無斷絶何俟復云又三種相續攝六法界如殺盜淫三種顛倒皆是重濁之相尚無諸天清升之業況有三乘變易之果業果既爾驗衆生中化生之義雖通天界亦應多是人等五趣耳富樓那言若此妙覺本妙覺相與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生本妙覺明衆生本具之理也如來心佛界空顯之理也究佛理與生同故佛果非增生理與佛同故生界非減無狀猶二無故也生理本與同而寂然無相既因起妄忽生山河佛既與生同今雖證悟何時起妄亦生山河生理同佛既妄佛理同生亦應起妄生佛彼此理俱同云何有起有不起佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟所出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟谷響云民之聚居故名聚落佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊孤山云此喻妄因本空破前習漏復生疑富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷先合初諭次合次諭熏聞云謂因中所迷雖無而有亦有能覺之智果上所悟妄心既盡唯真智獨存亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是狂人為愚為慧孤山云此喻妄果非有破前山河復生疑佛言如汝所解云何問言諸佛如來妙覺明空何當更出山河大地如汝所解印其領諭云何問言責其昧法又如金礦雜於精金其金一純更不成雜如木成灰不重為木苕溪云金喻菩提礦喻習漏山河如木涅槃如灰熏聞云金礦者金璞也谷響云古文作𥐫字書礦周禮丱人掌金玉之地注云丱之言礦金玉未成器曰丱丱字呼猛切圓覺云如銷金礦金非銷有既已成金不重為礦經無窮時金性不壞不應說言本非成就諸佛如來菩提涅槃亦復如是孤山云菩提智德也涅槃斷德也妄因妄果體元真無妄唯真稱妙覺是以照真不變則菩提之用彰達妄本無則涅槃之功著能照所照能斷所斷混而唯一寂無所寄而不妨法身智斷體用昭然蓋因中全菩提為習漏即涅槃為山河猶礦之與木也果上全習漏為菩提即山河為涅槃猶金之與灰也礦本不再顯妄法之永亡金灰不渝示真證之常住四諭交映妙旨存焉補遺云自滿慈再問如來悟已何時復生山河等顯悟中法門也所以前苕溪云涉於立法立修二義熏聞又曰正取立法旁通立修正指今文從本覺性立果中法門但滿慈正明迷真起妄故立九界染法之後略明果證也長水云如來喻釋二一約真如門釋二約生滅門釋初門泯相顯實故約迷方空華以喻無明及山河等元來不起體不可得迷心翳眼雖有起滅正方虗空了不移動妄心妄境似有生滅真妙覺明何曾改變次門即覽理成事故約金礦灰木可鍊可燒以喻果成惑滅一門四諭皆顯悟後灰不再迷然四諭中二三同意前就圓悟之理生佛俱是本真故舉迷方空華元來不起非後始滅故責滿慈見妄有滅尚是顛倒豈況復待習漏再生後約不壞修證因果之相故說銷礦出金燒木成灰迷方空華則始總元無金之與灰燒鍊方現意云圓頓之理雖無迷悟不妨成異既有多生習障還須背習顯真真顯則究竟清淨更無再迷若但用前二諭則撥無迷悟因果之相便成邪見但用後二喻即成衆生覺性本來不淨失真常理亦成邪見故說四事各諭一法方盡其理富樓那又汝問言地水火風本性圓融周遍法界疑水火性不相陵滅又徵虗空及諸大地俱遍法界不合相容富樓那譬如虗空體非群相而不拒彼諸相發揮所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映應以日雲等七通喻七大爾雅云風而雨土成霾釋要云隨義對法當以明對識大能了別故暗空大動風大清根大根能照境而體消淨故濁氣火大熱氣上蒸故映水大霾地大霾即黃沙也詩云終風且霾於意云何如是殊方諸有為相為因彼生為復空有熏聞云殊方者方所也以諸相發揮非同一方故若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中宵雲霧之之時不生光耀當知是明非日非空不異空日觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真唯妙覺明妙覺明心先非水火云何復問不相容者長水云妙覺明心與佛同體本來無妄由乎強覺忽認所相便有妄生佛今已得妙空明心何時忽然復起諸妄此即牒而縱之責無窮過也熏聞云妙覺明心先非水火者譬珠非水火水火從緣若人以緣而難於性者非其智也真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現苕溪云以真不守自性隨緣所現有種種相釋要云汝心既有空相藏性即隨業感乃現空相如以醜形對鏡則現醜像或發地則現地發水則現水或盡法界衆生同發空相則遍法界現空相餘亦然也云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據孤山云各行則循業俱發隨去則妄境俱現同觀是一知二是虗各行既二驗一是妄釋要云日喻妙明影喻所明人喻強覺水喻無明熏聞云匠人之法平物以水的謂射的丹面白的是也並取定則之義富樓那汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界是故於中風動空澄日明雲暗衆生迷悶背覺合塵故發塵勞有世間相苕溪云色攝四大對空成五前問地水火風本性疑水火性不相陵滅即相傾虗空大地不合相容即相奪孤山云真理隨緣變成妄境如全水成波其水既遍故其波亦遍以此彼即水故衆生迷悶謂九界衆生不了即理而變而以無明妄心執之為實我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪滅塵合覺故發真如妙覺明性我以妙明不生不滅合如來藏者此略明也妙明謂一心三智以此一心不生滅智契合生滅故云合如來藏此即究竟契合也而此究竟乃由名字等契合而至是故圓中互即咸合藏理而凡聖自殊而如來藏下廣示契合之相也先明契合之體如來藏即中也唯妙覺明即真也圓照法界即俗也是故下次明契合之用即是由境智契合能起大用所以一多自在大小相容滅塵下總結也滅塵即息妄合覺即歸真苕溪云妙明謂寂滅之智不生不滅謂智體真常此皆能合也如來藏即所合也此約自行以修泯性次對化他全體起用而如來藏牒所合之理唯妙覺明牒能合之智圓然法界示鑑物之用欲令易解取譬言之如來藏如鏡之體妙覺明如鏡之光圓照法界如鑒現像雖三而一雖一而三是故下一為無量等總列四句皆顯此義不動下別示其相初二句一為無量也道場指寂滅之地依此起應應遍十方亦猶華嚴中不動不離而升而遊次二句無量為一也身謂法體故能含受十方虗空虗空必攝世界則一切法趣一也於一下四句小中現大也毛端現剎即正中現依塵裏轉輪即依中現正大中現小是義易信所以略之滅塵下三句總結前義不思議用非修所成是故云發今不言用而言性者並由理具方有事用長水云前五句標二種自在不動下二句釋一多自在也身含下六句釋大小自在前二句正中現依於一下二句正中現依正亦是依中現依正坐微塵下二句依中現正餘句含在其中可以意得手鑑云餘句者謂依正凡有六句一依內現依如塵中剎海二正內現正如毛孔現佛三正內現依四依內現正五依內現依正六正內現依正釋要云疏配對闕正正依依若欲具者即經毛端現剎即依中現依毛端現寶王即正中現正華嚴十種自在亦不離此手鑑云經云佛剎微塵數如是諸剎土能於一念中一一塵中現第一句也又云如來一一毛孔中一切剎塵諸佛坐菩薩衆會共圍繞演說普賢之勝行第二句也又云於一微細毛孔中不可說剎次第入毛孔能受彼諸剎諸剎不能遍毛孔第三句也又云如於此會見佛坐一切塵中亦復然佛身無去亦無來所有國土皆明見第四句也又云一一塵中無礙身復見種種莊嚴剎一念攝生普令見獲無礙意莊嚴者第五句也又云一毛孔內難思剎等微塵數種種住一一皆有遍照尊前衆會中而說法第六句也又成四句一或唯依佛即剎故二或唯正剎即佛故三俱四泯此約體也相即互亡故無有六一佛即剎者佛身即是法性土故廢己從他佛體虗故土外無法性無二故二剎即佛身者剎體即是法性身故廢己從他剎體虗故佛外無法性無二故由性無二以性融相故身土相即三俱者謂有身有土不相壞故若無身土無可相即故四泯者謂佛即剎故非佛剎即佛故非剎以互奪故也而如來藏本妙圓心非心非空非地非水非風非火非眼非耳鼻舌身意非色非聲香味觸法非眼識界如是乃至非意識界非明無明明無明盡如是乃至非老非死非老死盡非苦非集非滅非道非智非得非檀那非尸羅非毗梨耶非羼提非禪那非般剌若非波羅蜜多如是乃至非怛闥阿竭非阿羅訶三耶三菩非大涅槃非常非樂非我非淨孤山云此約真諦示如來藏非心含四陰地水火風是色陰次非入界總非六凡界次非緣覺界次非聲聞界總非二乘理智得即理也次非菩薩界先非能趣行次總非所趣理次非佛界先非能證人三號是也次非所證法涅槃四德是也怛闥阿竭名如來阿羅訶云應供三耶三菩云正遍知涅槃是總四德是別以是俱非世出世故世結六凡出世結四聖藏理即空無有十界故並非之初由無明故有妄識妄識所變即有空界空界現故結成四大四大起故即有根塵根塵合故遂有諸識根境識三為業性故乃成十二因緣流轉生死為對治故即有出世觀智諸法出世利鈍不同遂分三乘次第會三歸一即有佛果果有能證所證即分菩提涅槃涅槃具德即有常樂我淨是故展轉相由以立名字各無自性一切皆空即如來藏元明心妙即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得即檀那即尸羅即毗梨耶即羼提即禪那即般剌若即波羅蜜多如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨以是俱即世出世故孤山云此約俗諦示如來藏理即無而有十界宛然故也即如來藏妙明心元離即離非是即非即孤山云此約中諦離即離非雙遮之體也是即非即雙照之用也夫如來藏體唯三諦譬若總名摩尼體即瑩寶圓三耳是故三一相即不縱不橫新伊天目況意可識熏聞云涅槃云祕密之藏猶如伊字三點若並則不成伊縱亦不成如摩醯首羅天主面上三目乃得成伊云云谷響云彼方字有新舊亦猶此土之篆隸也以篆為舊以隸為新是故西土舊則縱橫新則不爾狀若此方草書下字一點居上二點在下如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見但斥凡小正對滿慈是二乘故其實偏教菩薩亦不能測譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發長水云琴等喻衆生妙音喻藏性妙指喻實智發喻起用汝與衆生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起由不勤求無上覺道愛念小乘得少為足長水云汝與衆生合前琴等寶覺真心合前妙音按指即智契於理發光即大用現前汝暫舉心等合前無妙旨也孤山云按指謂如來昔於因地以三觀智觀己妄心即妄成真方登正覺如得妙指妙音克諧更舉海印發光助成音發之義資中云大集經云閻浮所有色象大海皆有印文此諭如來法身性海普現一切世間之相也此為釋伏難難云若一切即真我等云何與如來身不同妙用故今釋云汝雖具有寶覺真心未得妙用以塵勞妄念未清淨故富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪回今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切衆生何因有妄自蔽妙明受此淪溺究竟有二意若就外現則無學小聖無明全在故未究竟若就內祕則分真大士有上地惑故未究竟諸妄圓滅即極果斷德獨妙真常即究竟智德長水云由滿慈初疑云何忽生山河大地乃至佛說性覺必明妄為明覺所既妄立生汝妄能由是展轉皆從妄立雖知能所俱妄又疑妄從何生蓋前問云何忽生山河大地佛答因迷而有此中復問因何有迷佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝汝豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見嗔責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故興福云演若達多此言祠授孤山晨朝是喧動之初喻起妄心之始照鏡喻妄心推畫分別愛鏡中頭喻取著妄境妄事易著如眉目可見真理難知如瞋責己頭等背悟向迷如無狀狂走也四趣則背善向惡人天則背苦向樂二乘則背有向空菩薩則背邊向中悉名狂走手鑑云此有理有事而理實事虗理實故不變即頭與鏡也事虗故隨緣即照愛瞋走也斯則由照故愛愛故瞋瞋故走返此即不走矣故下文云汝但不隨分別世間乃至云演若達多狂性自歇望下走歇可為四句一走六凡也二歇菩薩也三亦走亦歇權小也四非走非歇如來也俱諭性覺走歇二途兩俱存故熏聞云魑魅山澤之怪老物精也佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄資中云心境不實故名為妄若實有因豈立斯稱耶自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返如是迷因因迷自有初如一人忽然妄說遞遞相承乃至多人及推其本了無所實迷真既久雖佛與汝發明是義猶未能返還其本此寄滿慈以責群妄如是迷因因迷自有謂無狀忽生非從他有熏聞云既稱為妄云何有因即無住則無本自諸妄想展轉相因即見愛四住之本若論通別二惑同在一念念體無始猶如空華則見愛亦無因耳識迷無因妄無所依尚無有生欲何為滅得菩提者如寤時人說夢中事心縱精明欲何因緣取夢中物資中云若了迷性無因自有亦無別法而為所依是則妄體猶如空華元無生滅因指自體依謂依他二俱叵得故無生滅得菩提者義通解悟況復無因本無所有如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失資中云迷者自失理無失也富樓那妄性如是因何為在汝但不隨分別世間業果衆生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇苕溪云三緣即業果相續中殺盜淫三因即三種貪親生為因疏助為緣以殺盜淫是身根所造之業三種貪是意根能造之惑惑親業疏因緣之義彰矣意云汝但不隨妄想分別世間等相則殺盜淫緣自然而斷以緣斷故欲貪等因亦復不生即指此因名為狂性歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證補遺云劬勞言時長行遠經三僧祇之謂肯綮即是筋骨盤結之處以諭諸教地位委曲之相言妄心歇處真性直顯不須歷劫勤求地位委曲也前云如是乃至始終地位中間永無諸委曲相今文顯云修證知就地位言也肯綮出莊子養生篇云技經肯綮之未嘗而況大觚乎肯綮者是牛兩骨中之微細肉也云刀到骨處遊刃於交際之間未嘗有微礙房相潤文用庖丁解牛理與神遇不以目視類證妙旨不假漸修一超直入譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠非從外得苕溪云衣喻五陰珠喻藏性由無明故不覺乏妙用故窮露佛界如本國九界如他方求人天樂取偏小益猶乞食馳走妄情暫失真性本圓猶雖貧珠在佛如智者教如示珠證理起用則致大饒富也即時阿難在大衆中頂禮佛足起立白佛世尊現說殺盜淫業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣此阿難以現說教理而證菩提從因緣得也故云世尊現說殺盜淫三緣斷故三種貪因不生緣三貪不生故心中狂性自歇緣狂性歇故因菩提成斯則因緣皎然明白云何如來歷破因緣而今又云狂性自歇歇即菩提勝淨明心本周法界不從人得何籍劬勞肯綮修證而頓棄此破彰證真之大因緣耶我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目揵連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏此以現在破結證真以從因緣得菩提也身子路逢馬聖見其威儀異常問云汝師為誰所說何法馬云諸法因緣生諸法因緣滅我師大沙門常作如是說身子聞即得法眼淨歸告目連亦得法眼淨今云聞佛因緣乃推其本也今說菩提不從因緣則王舍城拘舍梨等所說自然成第一義言呈若非因緣返成外道自然意謂不許自然是必還成因緣惟垂大悲開發迷悶佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是佛體阿難之意以本覺妙明為自然以斷惑所顯修所得性為因緣故云因緣自然理窮於是先案定而後破之阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣先以自然破因緣頭本自然不可轉變也本自其然不藉因緣也無然非自其頭始終無失無變無一時而非自然也何因緣而狂走耶若自然頭可因緣故狂何不自然頭亦以因緣而失之今本頭不失無因狂怖則顯其妄出曾無變易何藉因緣本狂自然本有狂怖未狂之際狂何所潛不狂自然頭本無妄何為狂走此以因緣破自然若謂狂與不狂元不假因緣皆自然有是則狂性向所本有未狂之際狂何所潛藏而了無狂相耶如不狂自然則頭本無妄因何為狂走之如頭本真靜妄而狂走因緣自然亦妄計耳若悟本頭識知狂走因緣自然俱為戲論真頭本來無妄亦顯妄本無因是則因緣自然俱無安立是故我言三緣斷故即菩提心補遺云阿難正落因緣疑如來以菩提不從人得頓棄因緣佛引達多失頭以顯因緣為妄不關真體此有二意一據體性二據行相若據菩提體性非彼因緣如頭本自然狂與不狂何關真體業惑存亡不關真性我言三緣斷故者但識彼殺盜淫業本為虗妄菩提自然顯現究論體性何關因緣菩提心生生滅心滅此但生滅滅生俱盡無功用道次據行相者斷惑顯理必涉行位則菩提心似屬因緣生滅之法故以住前智生惑滅為因緣登住理惑一體為自然又以分證理惑為因緣極證無理無惑為自然非因緣義近在初住遠在妙覺也長水云此結示三一俱盡生滅顯無功用若有執言真心可得分別可亡斯則菩提心生生滅心滅但是生滅無生滅滅方無功用如圓覺云有照有覺俱名障礙是故菩薩常覺不住照與照者同時寂滅此顯地上證無生理得無功用也若有自然如是則明自然心生生滅心滅此亦生滅若有二字是牒阿難前計本有覺性為自然世尊謂滅生俱盡無功用道如又立自然是則自然心生生滅心滅此亦宛然成生滅是則對待法曷有自然之義哉無生滅者名為自然絶待無生滅之跡可假名自然長水云三縱立自然寄顯生滅二一縱立正顯若於此有自然者豈有生滅名為自然無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性孤山云諸相雜和喻自然心生生滅心滅非和合者喻本無生滅元是菩提長水云二舉況重明舉淺況深也世間人說生滅和合名和合性非和合者則無生滅方名自然就彼縱況本來理體却名自然本然非然和合非合合然俱離離合俱非此句方名無戲論法孤山云對破和合說本自然和合既非本然焉是苟執為實還成戲論如對短說長既無其短長名豈在非然非合猶云非長非短也絶待之理於茲復顯矣合然俱離牒其境絶離合俱非顯智亦絶離則能亡智合謂所亡境言合以彰其然其境既亡其智亦泯如前火木薪既燒矣火亦自燒此則對待既絶能所亦亡恍如托空唯覺無得如是解者方無戲論釋論云佛坐道場時不得一法實空拳誑小兒誘度於一切長水云三雙非二離正示忘情本然示忘情本然自然也和合因緣也二皆不立故云俱離此離亦離故云俱非具足應云離合離然之離亦後俱非也藥病齊遣空病亦空圓覺亦云遠離為幻亦復遠離離遠離幻亦復遠離斯則言語道斷心行處滅方無戲輪耳菩提涅槃尚在遙遠非汝歷劫辛勤修證釋要云若以自然因緣之心求二果者甚遙遠也長水云雖經劫數勤苦修習終莫能及雖復憶持十方如來十二部經清淨妙理如恆河沙秪益戲論熏聞云長行重頌并授記孤起無問而自說因緣譬喻及本事本生方廣未曾有論議都成十二名廣如大論三十七汝雖談說因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪摩登伽心淫火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫阿那含此云不來不來欲界生故已斷欲界九品俱生名為出欲淤泥以接引小乘故重施小而皆解圓今云那含即圓教似位孤山云令汝解脫得離淫室也長水云問阿難尚在初果登伽却證第三者一約權實阿難示迹現多聞無功故在初果登伽實人顯呪力功大速證第三二約根行阿難圓頓根發前文悟解或入信住登伽小機雖得第三若望圓信霄壤有異是故阿難汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦孤山云圓修止觀則不漏落二種生死亦不失三諦義理無漏既深憎愛非淺捨妄取真去事就理悉名愛憎如摩登伽宿為淫女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦一念熏修無漏善故或得出纏或蒙授記長水云登伽過去為婆羅門女名為本性今從昔號故曰性比丘尼如何自欺尚留觀聽苕溪云略舉見聞以攝覺知即六妄也阿難及諸大衆聞佛示誨疑惑銷除心悟實相身意輕安得未曾有重復悲淚頂禮佛足長跪合掌而白佛言熏聞云釋論云何等是實相謂菩薩入一相知無量相知無量相又入一相智者曰即空故入一相即假故知無量相即中故又入一相此與前文約三諦示如來藏義趣符合補遺云實相亦云實想若從境為名應言實相若從智為名即云實想補遺云惑除捨生死重擔息肩於藏性輕安之義無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沈冥出於苦海熏聞云五住迷暗如沈冥二死漂流如苦海世尊我今雖承如是法音知如來藏妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮修習補遺云心具如含心生如育熏聞云國土皆是佛之化境故云如來我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入孤山云天王天子也心遊理外喻以旅泊佛有法界喻以天王華屋如真心受賜如開解宅因門而入譬理由行而證也唯願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲如來無餘涅槃本發心路令有學者從何攝伏疇昔攀緣得陀羅尼入佛知見作是語已五體投地在會一心佇佛慈旨孤山云涅槃圓果也心路圓因也舉果以請因耳補遺云小乘煩惱子縛斷名為有餘生死果縛斷名為無餘今此大乘五住二死究盡常住真心究顯故云必獲如來無餘涅槃補遺云自等覺已還皆名有學孤山云陀羅尼此云總待法華明三陀羅尼即空假中三義也三陀羅尼者旋陀羅尼旋假入真也二百千萬億旋陀羅尼旋真出俗也三法音方便陀羅尼中道法音能為初住方便也今請一心三觀攝伏妄想行門欲入初住三智五眼一時開發故云入佛知見熏聞云今請一心三觀者此是通途行門若據別意再請最初方便也爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法衆生發菩提心開無上乘妙修行路宣示阿難及諸大衆汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義云何初心二義決定阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與界地覺為同為異補遺云初決定義審三止觀當與極果三德體同方是圓修因果不二如來勸詳審此心與佛相應乃是入華屋之行也阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處苕溪云空假離中皆名生滅中即空假是謂佛乘法華明聲聞緣覺不退菩薩不測佛智良由於此次科初以是下喻妄體無常二阿難下喻真性常住以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故則汝身中堅相為地潤濕為水暖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁若順現文色陰為始識陰為終即同五濁次第以義言之始則有識終乃成色準法疏云心王了其總相心所了其別相以識創起但緣青等總相次取境像即是想心次領納前境即是受心次起貪等造作即是行心前三無記未能成業疏文云由業招報即是色陰故云始則有識終乃成色補遺云然以五陰倫次自有色心王數不同論師多云識在三心之前諸大乘經識居最後今謂以譬言之如世君臣尊卑則前王而後數此可如諸論師所云也若臣為君之所使今受想行三為識所使義當如臣在君前以聽命也此則數前而王後可矣若乃五陰列色法在心法前者昔白樂天興濟師書以五陰十二因緣倫次不類為問洪老追云夫色等五陰乃三苦已成之軀十二有支乃三世生因之法此亦可以盡其大略既以陰法別為五位說之通言陰則正指現前報陰法耳此報陰法原始由乎歌羅邏時心識無此以何為投托之所故五陰前列色法而後列心法也欲於五陰推以因果劫如記引百法疏文亦如此經下文云生因識有若滅從色除者正從陰起之始而除之也熏聞云五疊者疊重也此以五陰為五重何則四纏是色陰視聽覺察既是六根根必發識及受想行即五陰具矣補遺云此中因明與佛同體則證常樂我淨與佛異體則入九界生滅渾濁本明其同因言其異也生滅渾濁則有四大五濁經中以四大六根明渾濁體五濁明渾濁相自從始入終下明濁相也此經以五陰對五濁以示其相不同諸經云何為濁阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是苕溪云合文從略應以妙明之心合於清水纏疊之體合於土塵九界妄想攀緣翳理如世間人取土投水下別顯五濁即水土汩然之貌也孤山云餘經明五濁以五利為見五鈍為煩惱衆生但攬見慢果報立此假名命以連持一期色心為體摧年促壽故云命濁劫無別體但以四濁聚在其時故名劫濁熏聞云准悲華經人壽八萬至三萬歲未有濁名至二萬時為五濁之始也今文蓋約五陰妄想為五濁故辨魔中色陰有堅固妄想受陰有虗明妄想想陰有融通妄想行陰有幽隱妄想識陰有罔象虗無顛倒妄想是故色陰盡則超劫濁受陰盡則超見濁想陰盡則超煩惱濁行陰盡則超衆生濁識陰盡則超命濁以後驗前知是五陰阿難汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁此依色陰夫四大五根五塵同名色陰今約眼根見空塵而說者以渾濁義顯故以成住壞空四皆名劫故此蓋如來方便巧示即指阿難目所對空名為劫濁補遺云見與虗空俱遍十方有一不遍則有邊畔可分矣孤山云有空無體質故有見無覺者見空之時無好醜違順可覺故以無體之空織無覺之見而兩無其實此即土失留礙渾濁真性過在茲乎熏聞云應知五濁皆就阿難現前而示是故五節文初並云汝見汝身等汝身現搏四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁孤山云此依受陰領納所緣之境名為受而有六種謂六觸因緣生於六受但境有違順非違非順之別故六受亦有苦受樂受不苦不樂之異補遺云見聞覺知本非留礙為四大所織見不超色耳唯聽聲而已水火風土本非覺知為六識所轉亦能發知如四大淨色能見能覺也旋猶轉也識心依之轉無知為知此為受陰者旋令覺知即受納前境之謂也既有前境則有分別屬見濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁孤山云此依想陰能取所領之緣相名為想而有六種謂取所領六塵之相為六想性發知見即能取六想容現六塵即所領六相以此交織妄成想陰渾濁真性名煩惱濁長水云六識分別三世遍緣釋要云意識能緣三世依正之境復能執受憶過去境即獨散意識緣落謝塵識現在塵即明了意識隨前五所取緣現量境誦習未來諸有境界即未形兆事預思念也即獨散意緣比量境能分別體從前見濁覺知所起所分別相即是六塵所現影像故云性發容現離塵離覺無相無性互相交織擾亂相熏名為煩惱想像所取之境亦有六想擾亂真性名煩惱濁釋要云憶識誦習者意識緣三世境也能分別識性從見聞覺知所發故云性發知見所分別相從六塵現故曰容現六塵離六塵無所憶識誦習之相故曰離塵無相離見聞覺知無能憶識誦習之性故曰離覺無性興福云憶念過去識對現在補遺云長水云誦習未來諸有境界今謂誦習雖通興福既以憶識別對過現則誦習之義且對未來矣憶識等皆想陰之義利鈍二使亦由此生煩惱濁也補遺云六識妄性附於根塵生起知見於六塵境分別六相故容現六塵容謂容貌即相也又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成是第四重名衆生濁孤山云此依行陰造作之心能趣於果名為行行有六種大品般若說為六思思即是業熏聞云釋論以意業為思業因四種法生謂見聞覺知即六思也謂於六想之後各起不善業善業無動業也知見即六思業運即隨善惡遷移國土亦世間也如私心雖戀鄉井以官事須往他例六道往還義亦可見相織者即知見欲留業運常去妄成行陰而去留假合渾濁真心名衆生濁知見欲留業運遷去即六道往來之事彼此必有假名生焉衆生濁矣汝等見聞元無異性衆塵隔越無狀異生性中相知用中相背同異失準相識妄成是第五重名為命濁此依識陰了別所緣之境名為識識有六種即六識也元無異性者了別之心唯一故衆塵隔越者六塵不同故牽生六識故云無狀異生眼不別聲耳不別色是相背也適言其同而用相背適言其異而性是同故無准定以此交織妄稱識陰識住命在識去命謝渾濁真性故名命濁補遺云今此命濁正屬識陰以此識陰合論六識性中相智唯一識陰而已用中相背自有六識不同此之兩句妙盡五陰識五陰法相所言性者識陰之性此非心性也所言用者六識不同各有發用也長水云命是報法依業所引第八識種連持色心不斷功德名之為命釋要云命是報法者由前世業法之所感故遂有修短之殊夫受身者命暖識三不相離也命即氣息報風連持不斷色心可久命不連持色心則變暖即遺體之色識即心主前六見聞元本一識由六根異遂成分離識用雖分體唯一種斯則同中立異異處見同同異失准互相交識於總報體便立命根名為命濁釋要云總報之主唯一本識故云無異六塵隔別見聽爰分根塵異故識乃分離取六塵境性中相知者唯一本識為體故用中相背者眼惟了色不別聲等阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇死生根本依不生滅圓湛性成苕溪云前云若於因地以生滅心為本修因而求佛乘不生不滅無有是處今云見聞覺知生滅心也常樂我淨不生滅性也因果事異故遠心性理同故契死生根本即六根也依不生滅謂了生滅即無生滅是則因地發心與果地覺無異故云圓湛性成補遺云不遠而遠六位乍分故言遠遠而不遠六而復即故云契擇謂簡也止觀去丈就尺去尺就寸居正觀之前故言先擇又云灸病得穴伐樹得根今云生死根本也依不生滅圓湛性成正觀不思議境也今人言智者若見楞嚴不說止觀信矣夫彌顯前文五濁為五陰揀四取一為根本也此初義中教修止觀以識心為根本若第二義根本煩惱通明六根為煩惱根本與此似異然經中既以見聞覺知遠契四德則六根中六識為所揀之境與下不異也以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心孤山云既知清水濁水濕性不殊妄心真心諦理不二當須達妄無妄了濁元清故云以湛旋其虗妄滅生也伏還元覺者初心達了惑實未破故云伏也即是伏無明還法性耳得元下唯觀常住法性即是圓因故云為因地心此即住前名字觀行相似位也問此約修行名字虗解豈是圓因答起行必在名字位中故行成方名觀行故苕溪云以圓湛之性旋虗妄之心斯蓋修三止觀照立諦境熏聞云當以虗妄滅生為因緣所生法以止寂之以觀照之成三諦境伏斷生滅證無生滅也伏還下因該十信釋要云湛即定旋即伏以定旋伏虗妄亂動之法成本真性故曰伏還元覺長水云修之次第如天台圓頓止觀廣明然後圓成果地修證苕溪云果通分滿孤山云初住分證常果妙覺究竟常果並由住前觀無生滅心而成如澄濁水貯於靜器靜深不動沙土自沈清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明明相精純一切變現不為煩惱皆合涅槃清淨妙德既知濁即清必澄濁令清既了妄即真故能息妄歸真非保其濁守其妄也故今以澄濁況之澄喻修觀濁水喻妄心即前云容貌汩然名之為濁此中牒前喻耳欲顯前五濁以成五清靜器喻圓人身器也不為境動喻以靜器靜深不動者深猶久也即觀行雖成而能忍六根雖淨而無法愛故登初住無明頓破如沙土自沈中理分顯如清水現前法華明穿鑿高源大師亦以見水為初也初住所斷無明名為客塵以初住法性如主如空故而言伏者望於妙覺悉名伏道唯佛名斷伏猶斷也仁王云三賢十聖忍中行唯佛一人到其源去泥下喻極果也泥喻上地惑也元品已盡故云永斷涅槃云無上士者名無所斷明相精純究竟理顯也一切下明隨機所感十界現形皆名淨用故云不為煩惱而用顯體故去皆合涅槃等也然德必具四略舉一淨耳熏開云若唯識等論初地頓斷見惑二地已上漸斷思惑此別教義也若圓說者從初住去皆見思雙破以違理由見感報由思乃至妙覺方盡其惑第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當審詳煩惱根本此無始來發業潤生誰作誰受苕溪云應知初義明因地發心即止觀當體與果地覺即止觀所依也次義明煩惱根本即止觀所破也說有前後行無異門合而言之秪是以無緣智緣無相境破無明惑耳雖境智惑三相帶而說既分二義旁正之意自可甄明前義以觀境為正煩惱為旁後義反是言發業潤生者此指煩惱也誰作誰受者此推根本也意顯六根自作自受阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無形相無結解故則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界生纏縛故於器世間不能超越六根引外賊則六塵起內賊即煩惱內外惡賊能劫真性若知根本賊無能為苕溪云外之六塵內之六識皆由眼等引發和合所起煩惱害如來藏由此等謂由六根所起煩惱故發業潤生乃有無始衆生世界等阿難云何名為衆生世界世為遷流界為方位汝今當知東南西北東南西南東北西北上下為界過去未來現在為世方位有十流數有三孤山云上示兩種世界一衆生世界是正報二器世界是依報以由正報纏縛故於依報不能超越故今但約正報而明補遺云尋常正報明世界義世謂差別異謂五陰界分今以三世十方為正報之世界也此中正明衆生六根正報而經文約三世十方者為示六根所有功德本與依報世界相涉而成故也一切衆生織妄相成身中貿遷世界相涉貿遷者交易遷移也世界相涉是貿遷相謂以世涉界以界涉世也補遺云指十類正報與根塵十法交相遷動故曰身中等又亦可身中二字的指十類貿遷二字的指根塵世界二字即三四四三也此文總示變疊之體也而此界性設雖十方定位可明世間秪目東西南北上下無位中無定方四數必明與世相涉三四四三宛轉十二熏聞云此於十界簡六取四中謂四維在四方中間故言無定方者且如東南維既屬兩向是無定方補遺云上下二方無的指其方位自何為上自何為下流變三疊一十百千纂注云疊重也以少增多凡有三重謂一十一百一千才言一十便該十二矣以過去現在未來涉東西南北既成三四十二以東西南北涉過去現在未來亦成四三十二蓋方三疊初則為十惡所依之處次則正論十惡所起俱遍十二故成百二十眼等三根只成八十蓋所依方世元缺一分故耳若約性中相知為言則亦成百二十矣故總結云六根功德各千二百三則明乎十惡互嚴謂一惡為所嚴九惡為能嚴故成千二百總括始終六根之中各各功德有千二百長水云此約衆生身中云六根取境十分功德作用名為功德非同法華持經所熏令成淨用然染淨雖別皆從本有熏力而成故彼此文數量無異纂注云若准法華疏釋六根功德初約持經方軌乃論三業十善次約理境則明十界十如今經既明煩惱色心為圓通觀境故約十惡以釋其數然經又云我今備顯六湛圓明本所功德數量如是者蓋由此十惡體全是性惡法門故如來欲令機緣當處解脫全體緣通言中有響故以功德明之耳孤山云此明性中相知下明用中相背苕溪云此據六根了別之性是同故云各各功德有千二百下對六塵了別之用有異所以功德全闕不等阿難汝復於中克定優劣如眼觀見後暗前明前方全明後方全暗左右傍觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德如鼻嗅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻唯八百功德如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身唯八百功德如意默容十方三世一切世間出世間法唯聖與凡無不包容盡其涯際當知意根圓滿一千二百功德資中云眼者一方三百旁觀二百又得二分之餘共成五百并前三百總成八百長水云耳者十方俱擊鼓十處一時聞動有分限故說邇遙靜非涯量云無邊際俱耳根之境故此雙顯鼻者出入中交共成三分一分四百闕於中交故唯八百苕溪云鼻中通息出入前後兩不相交孤山云舌取能言說不論嘗味若取嘗味其德則劣以合中知故身言離一合雙者離中不知是闕一分合時能覺有違有順故具二分補遺云准眼根八百功德以方涉世須以四方定其數目今鼻身二根八百既屬以世涉方明之豈亦不以三世定之耶須知此不可定局也且如入息若屬過去中交屬現在出息屬未來也但出入中交必落其時則前後自分身覺違順亦然如先覺違境屬過去正覺順境屬現在離一屬未來也或前或後不可定局為其不可定故經疏不言也離則根境單一故闕其知合則根境雙觸故知違順真際云意識獨生遍緣諸法故云默容孤山云此經明六根功德與法華不同今示發覺初心令知顛例處所故辨六根優劣之用意在阿難擇於耳根以為修證之本彼明依經修行已發相似之解而六根清淨互用無方雖眼八百亦具餘五根功德乃至意根亦復如是熏聞云法華疏云按三業安樂行即有十善一善有十即百善一善中有十如即千善就化他為二千約如來室衣座三即成六千五種法師悉具六根清淨一一根有一千功德也復次一心中具十法界一一界皆有十如即成一百一根通取六塵即有六百約定慧二莊嚴即成一千二百根根皆爾若論六根清淨則不言其功德多少若言莊嚴則能盈能縮能等等莊嚴者根根六千若言千二百顯其能盈若言八百顯其能縮若言清淨無盈無縮無等云云即同今文一根既反元六根成解脫阿難汝今欲逆生死欲流返窮流根至不生滅當驗此等六受用根誰合誰離誰深誰淺誰為圓通誰不圓滿熏聞云此於六根且令詳簡任其去取故皆云誰乃審定之辭據理言之眼耳則離鼻舌身合意深五淺耳圓餘非若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍孤山云佛意令依耳根修證一日之功倍餘根一劫我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進苕溪云此指六根妄明功德全是真明本性所具由真具故所以妄具佛勸詳擇雖意在耳根而阿難示迷未即領悟下文且隨疑問以破執情後敕諸聖各說圓通文殊所辨辨觀音所證發明之旨方遂於茲十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨資中云根無優劣即同去掘經云所謂彼眼根於諸如來常具足無減修了了分明見智者於止觀中釋云彼是九界於諸如來常者九界自謂各各非真如來觀之即佛法界具足無減修者觀諸眼即佛眼一心三諦圓因具足無有缺減了了分明見者照實為了了照權為分明修論圓因見論圓證乃至六根皆作是說今就初門且辨優劣阿難白佛言世尊云何逆流深入一門能令六根一時清淨佛告阿難汝今已得須陀洹果已滅三界衆生世間見所斷惑然猶未知根中積生無始虗習彼習要因修所斷得何況此中生住異滅分齊頭數孤山云見諦所斷之惑即八十八使修道所斷之惑即八十一思真際云此修所斷惑無始而來與身俱生眠伏藏識故曰根中積生等熏聞云虗習虗妄結習孤山云生住異滅即同體無明分齊頭數謂初住已上至於妙覺四十二品釋要云見道修道所斷之惑即我執分別俱生也今以我執粗而法執細粗中尚未全除豈況於細以非彼所知之境界故故云何況等生住等者此一期四相是粗細妄念故有本末分齊頭緒數量謂生滅各一住四異二據論所說十信凡夫覺滅相三賢覺異相十地覺住相位滿覺生相覺生相者動念都盡唯一心在故論云心無初相而言知初即謂無念若得無念者即知心相生住異滅乃至皆無自立本來平等同一覺故既云動念都盡本來一覺正當圓根修證也故上云若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍是知絶念之慧方能了知生住異滅分齊頭數既無此慧不了何疑今汝且觀現前六根為一為六長水云一六之情正是法執執根是實有一六故阿難初果雖破我執尚有所餘煩惱俱生猶未斷故況此法執是所知障無明住地此障最細名為根生生住異滅分齊頭數熏聞云不了一六即是無明故約此推破用顯藏性非一非六也問據阿難迹論修惑尚在那忽於此便破無明答既已開顯須明圓行豈復作意先破俱生故但破無明而俱生自落冶鐵之譬不亦然乎補遺云四念處云如火燒鐵鐵雖未鎔垢在前去正觀記云猶如冶鐵粗垢先除阿難若言一者耳何不見目何不聞頭奚不履足奚無語若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承是故應知非一終六非六終一終不汝根元一元六孤山云非一終六用中相背故非六終一性中相知故而此六一同異失準並是虗妄終不下正顯真性無六一相阿難當知是根非一非六由無始來顛倒淪潛故於圓湛一六義生汝須陀洹雖得六銷猶未亡一金剛般若云須陀洹名為入流而無所入不入色聲香味觸法故此即六銷也猶未亡一者執有涅槃也以小乘所證全是無明故熏聞云止觀釋智障云當彼破惑名之為智若望中道智還成惑又輔行云二智之體是無明故補遺云銷六之義且就初果破見分齊一番銷六塵義言之如破無明有分破之義今分破六塵亦名銷六以執涅槃為未亡其一如太虗空參合群器由器形異名之異空除器觀空說空為一苕溪云太虗喻如來藏群器喻六根異空如見精等彼太虗空云何為汝成同不同何況更名是一非一則汝了知六受用根亦復如是由明暗等二種相形於妙圓中黏湛發見見精映色結色成根根元目為清淨四大因名眼體如蒲萄朵浮根四塵流逸奔色孤山云二種相形者所既妄立也黏湛發見者生汝妄能也流逸奔色即熾然成異也苕溪云黏湛發見者由明暗等塵染起淨性也他皆倣此長水云本一圓常妙湛明性所相妄現分明暗殊明暗相形動覺湛性性相和合執成妄覺故云黏湛發見斯則所既妄立生汝妄能也見精即妄覺也能所相熏互相交織根結便成故云結色成根既覺明相雜則強覺影明具惑之性黏湛合成由是名為清淨四大即勝義根也清淨四大者染中說淨也能照境發識有增上勝力非同染礙粗相故曰清淨勝義根色屬不可見而有對礙故寄世俗根所依處蒲萄之相表顯勝義奔取本境明暗之相故云流逸奔色下之五根大意皆然釋要云由明暗等二種相形者妄見初起明暗未形此約惑性冥具說也見精映色方彰明暗之相也黏者和合執著之義也由妄執故動覺湛性發成妄見也見精即第八見分最細故曰精色即第八相分由能見故境界妄現由相織故結成六根眼體者眼謂勝義體即浮塵即勝義所依之體也浮根奔色者即勝義在浮塵中流趣奔色也擕李云見精下勝義根雖用能造所造八法為體熏聞云能造即地水火風所造即色香味觸擕李云是不可見有對色能照境發識乃聖人所知之境其義深遠非同塵境粗淺故名清淨此是染中說淨非無漏妙明之淨也因名下即浮塵根亦名世俗根以粗淺易知故翻前立名亦用能所八法為體今言四塵者但舉所造也問浮塵但以勝義為依處不能照境發識何以言流逸奔色答理實勝義然浮塵是所依處舉所依顯能依也又連上清淨四大為言義亦無失熏聞云如蒲萄朵喻浮根之相也餘經所說或與此異有云眼如秋泉池耳如卷樺皮鼻如盛計筒舌如偃月刀身如立戟槊唯意根未見別目補遺云如蒲萄朵等皆狀勝義清淨四大為非凡夫所見故假以明之若是浮塵自可目擊何假引喻只如次經云因名眼體等乃指上清淨四大之形狀耳下句云浮根四塵顯是勝義之所依非指蒲萄如浮塵根也顯宗論曰眼根極微居眼星上體清徹故如秋泉池耳根極微居耳穴內旋還而住如卷樺皮又舊婆沙論云舌根鄰虗如半月彼說於舌中央如毛端量非舌根鄰虗所覆又新婆沙論曰云何眼等諸根極微安布而住如香荾華清徹映覆令無分散有說重纍如圓而住體清徹故如頗𦙁迦不相障礙鼻根極微居鼻頞內背上面下如雙爪甲舌根極微布在舌上形如半月繫說舌中如毛端量非為舌根極微所遍據此等文豈屬浮塵根耶言流逸奔色等此明勝義有照境發識之功耳由動靜等二種相擊於妙圓中黏湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲長水云聽精妄覺也既動靜互相擊發鼓真成妄失其真性遂發聽精卷彼聲形結影成根聲性虗散故須卷攝以成聽義既卷成根還如卷葉由通塞等二種相發於妙圓中黏湛發嗅嗅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪浮根四塵流逸奔香通塞相發覺明映香於妙圓湛結成鼻處香氣上騰根垂下取如雙垂爪由恬變等二種相參於妙圓中黏湛發嘗嘗精映味絞味成根根元目為清淨四大因名舌體知初偃月浮根四塵流逸奔味恬變交參真妄黏合心境相結攬以成根約所依相如初偃月熏聞云有味為變無味為恬恬靜也觀次文云嘗精映味絞味成根當知正取變義為舌根所對之境然由恬變二種皆能發於覺了之性是故對根相等而示前鼻之通塞下身之離合等例此可知由離合等二種相摩於妙圓中黏湛發覺覺精映觸搏觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸長水云離合觸摩湛圓隨妄覺觸相待搏取成根能造前造二俱八法是不可見寄所依處如腰鼓顙熏聞云腰鼓顙或作𣞙埤蒼云鼓𣐎也補遺云顙息朗切額也若作此𣞙桑朗切鼓匡也字書云鼓材也今取杖鼓顙故云腰鼓顙也𣐎龍龕手鑑音瓦腰若今杖鼓繫著腰中者也顙則鼓之匡也然腰鼓之顙兩頭濶中央狹今之人身何以似之邪按婆沙論此明女根非通明人之身根也如舊婆沙論云女根鄰虗如大指新婆沙曰身根極微遍住身分女根極微形如鼓顙男根極微形如指鞘准此則知女根之形中狹兩濶似腰鼓𣞙以男根似指顯之可以意曉所以此經明女根為身根者正為除衆生欲想之別意耳登伽起發別意可知由生滅等二種相續於妙圓中黏湛發知知精映法覽法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法長水云妙圓無動生滅妄陳黏湛成知知還攬法根境既結奔取無休以六根中隨一攝故如前五根亦名四大居在身中不彰外相如幽室見手鑑云謂此意根大小乘中各不同故正法念經形如蓮華上有七葉朝開暮合色法所攝光明經云意根分別一切諸法大乘意根即第七識法相宗亦云是心然云色云心皆是虗妄既迷一真心亦質閡如前文云起為世界故此妄心亦同色法而破修實教中顯圓回之義非權小堅執為實應立量云意根是有法定色法故為宗因云以六根中隨一攝故同喻如前五由是意根亦名四大然此意根本由生滅妄塵所結妄塵不離妄覺影明若以有色無色為諍論者猶邀空華結為空果正顯虗妄也是知權小說心但得其末末盡本元故互相靜論其過如是故云猶邀空華等故此所明六皆四大無相違也此結歸經旨也孤山云根元下此取肉團心根為慮知之所託也故勝義根還是清淨四大如幽室見即浮塵根為意思託附如處幽室谷響云即慮知託在肉團之內也今人肉團有病則慮知喜忘所為失常故醫藥所治在肉團耳熏聞云列子曰魯公扈趙齊嬰二人有病同詣扁鵲謂公扈曰汝志強而氣弱故足於謀而寡於斷齊嬰志弱而氣強故少於慮而傷於專若換汝之心則均於善矣遂飲二人毒酒迷死三目剖胸探心易而置之投於神藥既寤如初二人辭歸於是公扈返齊嬰之室而有妻子妻子不識齊嬰亦返公扈之室有其妻子妻子亦不識二室自相訟求辨於扁鵲辨其所由訟乃已是故今經以意處肉團而外緣法塵如在幽室而窺於外故云浮根四塵流逸奔法補遺云舊婆沙云意既無體不可說形量今經就慮知所託肉團則如幽室之相也圓嶽二師並以意託肉團為幽室見非也此文上下並明清淨四大勝義根相意之勝義者清淨四大託於肉團之肉引發意思而外緣法塵如處幽室而見於外六根之中眼之勝義發在於外唯此意之勝義在肉團內故有室之喻耳又前五根皆有竅穴通外唯意所託包在肉團亦能引思故譬幽室又應如幽室如意之浮塵根也以勝義根附託其內故云見耳為顯意之浮塵猶如幽室非意所託何名幽室正法念經云如蓮華開合者是也熏聞云睡眼則合覺寐則開也阿難如是六根由彼覺明有明明覺失彼精了黏妄發光由彼覺明真明也有明明覺妄明也迷彼真明故云失彼精了成此妄明故云黏妄發光謂染著妄境發生妄明長水云性覺之體本有真明由彼妄覺影明忽起遂令真元隱於精了失其明性妄覺影明自相黏執相熏擊發結成六種知見之光故此六根由迷發見是以汝今離暗離明無有見體離動離靜元無聽質無通無塞嗅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相隨拔一根脫黏內伏伏歸元真發本明耀耀性發明諸餘五黏應拔圓脫苕溪云阿難所疑一入六淨正釋在此熏聞云如於耳根不修動靜即是脫黏智契於理名為內伏餘皆例此長水云執境成根因根有礙執心不起諸境自亡既不相纏自然圓脫下文云見聞如幻化三界若空華聞復翳根除塵消覺圓淨淨極光通達故云復歸元真發本明耀楞伽云不了心及緣則生二妄想了心及境界妄想則不生妄既不生即發明耀皆斯義也補遺云一根脫黏其餘五根應時亦拔應言其疾圓言其俱也不由前塵所起知見明不循根寄根明發由是六根互相為用苕溪云寄二種根覺明開發故千二百功德根根互用也寄根明發如智論云報生天眼在肉眼中此乃寄於肉眼而發天眼今亦如是覺明知見寄諸浮塵勝義而發也孤山云用有真似似如法華法華經法師功德品受持法華經當得八百眼功德乃至千二百意功德以是功德莊嚴六根皆令清淨真用如華嚴具問谷響云晉本華嚴三十五云菩薩有十種眼所謂肉眼天眼慧眼法眼佛眼智眼明眼出生死眼無礙眼普眼餘五根皆有十種手鑑云此顯證真起用約位明之即相似分滿也前云從何折伏疇昔攀緣得陀羅尼入佛知見斯由隨拔一根脫黏內伏故得不由前塵所起五眼三智開明而互用自在也無漏意識引五識生一一皆能通緣一切境故然六根既自在六識六境亦自在由是根境識三皆自在故方曰互用若細分別有十二重謂各有四句一根自在四句一根發六識六根發一識一根照六境六根照一境二識自在四句一識依六根六識依一根一識緣六境六識緣一境三境自在四句一境應六根六境應一根一境牽六識六境牽一識前云十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體下文諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相應念化成無上知覺皆如此境界耳阿難汝豈不知今此會中阿那律陀無目而見跋難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念孤山云何那律陀云無滅釋要云大論云得天眼人中最為第一者阿尼盧頭色界四大造色半頭清淨佛眼四大造色遍頭清淨跋陀羅云賢善殑伽河名云天堂來驕梵鉢提云牛相熏聞云下云於過去劫輕弄沙門世世生生有牛呞病今取其舌似牛故云異舌知味也舜若多云虗空然此六人或是凡夫業報或是小聖修得斯皆妄力尚不依根小聖神通由修根本事禪而得既不能知發本明耀故皆屬妄實而言之即如來少分之用豈唯小聖凡夫亦然何況圓脫豈無互用長水云既為風質者此約體不可見故云元無以佛力故故能暫現亦顯有定自在色無業色也無色界天淚下如雨正是此事得滅盡定大小俱有然修意不同謂滅六全分盡七染分釋要云留淨分不斷要持種摩訶迦葉入雞足山待彌勒佛俱舍即云已入涅槃餘說入定聖說誰爾若例今經付囑阿難故知入定涅槃俱不可測然上所說欲顯真覺不假根塵且引六人略以為比於中有業報者有修得者有發真者修得發真正是真用業報所感以淺況深俱是不由於根而覺知無失耳手鑑云如亢倉子視聽不用耳目陀無足而行魚無耳而聽蟬無口而鳴不食而味吸風飲露而資蚯蚓無舌而歌熏聞云諸滅盡定即九次第定中滅受想定久滅意根謂先曾得定故圓明了知此約出定時說不因心念還指曾滅意根阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯銷氷應念化成無上知覺苕溪云真智如湯妄境如氷了妄即真化成知覺阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類彼人以手循體外繞彼雖不見頭足一辨知覺是同前明真覺不由於根故舉那律無目能見等今示真覺不假於緣故指世人暗中有辨彼人即合眼之人循體謂繞他人之體知覺是同言暗中知覺與明中所見不殊凡夫尚有不假緣而能有辨況聖人真覺何藉緣發乎緣見因明暗成無見不明自發則諸暗相永不能昏根塵既消云何覺明不成圓妙先指妄次顯真略示明暗諸緣例爾阿難白佛言世尊如佛說言因地覺心欲求常住要與果位名目相應世尊如來位中菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞資中云菴摩羅識白淨無垢識熏聞云天台依攝大衆說菴摩羅識名無分別智光即第九淨識也離倒圓成鑒周萬有名大圓鏡智地論云大圓鏡智離一切我我所執乃至能現能生一切境界諸智影像及一切身土影像又云此智是諸如來第八淨識也問今七種名同在果位體必無別何故攝論以菴摩羅為第九地論以大圓鏡為第八耶答第八有染淨二分總含一切有漏無漏有為無為等法是故攝論開淨分為第九地論不開即指淨分明為鏡智問開與不開何者為善答兩論被物各隨所宜不可定計互相排斥然據諸論所說第八識若至我見永不起位即捨梨耶之名別受清淨之稱是則果位名菴摩羅天台所依攝大乘義取第九識者非無深致補遺云光明玄文云若依攝論如上染金之文即是圓意土即阿陀那染即阿梨耶金即菴摩羅即圓說也地攝二論立識互諍天台雖欲息諍列十種三法依攝論立菴摩羅為第九識一者圓融文會二者類通義便孤山云七名雖異其體元同要其所歸秪是究竟所顯一心三諦耳無染無闕故清淨圓滿不遷不變故體性堅凝金剛王喻於堅義若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果世尊若離明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺苕溪云進思常果退惟修因及進思修因退惟斷滅疑情宛轉如循環然補遺云然阿難已聞根塵皆如來藏何緣復疑是斷滅法又聞鍾顯聞性常與寶手開合等顯見性不動其義大同何重示此今恐大衆宜聞再演又席間後集不聞前義故使大權重結問勢如來慈力再有指陳如來先說湛精圓常違越誠言終成戲論云何如來真實語者惟垂大慈開我蒙吝佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑即時如來敕羅睺羅擊鐘一聲問阿難言汝今聞不阿難大衆俱言我聞鐘歇無聲佛又問言汝今聞不阿難大衆俱言不聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大衆又言俱聞佛問阿難汝云何聞云何不聞阿難大衆俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絶則名無聞補遺云鐘聲為音震物曰響生法師曰敲空作響擊木無聲如來又敕羅睺擊鐘問阿難言汝今聲不阿難大衆俱言有聲少選聲銷佛又問言爾今聲不阿難大衆答言無聲有頃羅睺更來撞鐘佛又問言爾今聲不阿難大衆俱言有聲少選有頃皆須臾也佛問阿難汝云何聲云何無聲阿難大衆俱白佛言鐘聲若繫則名有聲擊久聲銷音響雙絶則名無聲佛語阿難及諸大衆汝今云何自語矯亂大衆阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲唯聞與聲報答無定如是云何不名矯亂夫聞性離聲無生無滅何因擊鐘而言其聞既言其聞何故再擊又言其聲是知言聞不合謂聲言聲不合謂聞自語矯亂信不誣矣熏聞云阿難報答無定義同於詐而復錯亂實為大權之妙阿難聲銷無響汝說無聞若實無聞聞性已滅同於枯木鐘聲更擊汝云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者此以聞對聲正簡妄聞以顯真聞知聞也是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無此以聲對聞正簡聲塵以顯聞性汝聞妄聞也汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通說聞無性阿難通疑六根離塵無體如來別顯聞性常者誠欲發耳根圓通之機也如重睡人眠熟床枕其家有人於彼睡時搗練舂來其人夢中聞舂搗聲別為他物或為擊鼓或為撞鐘即於夢時自怪其鐘為木石響於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏長水云睡人六識歸種思覺不行但任運聞即真聞性若唯約喻睡人應無聞性但約不隨根起非由作意故是真聞苕溪云所舉寐事驗妄識至昏而真性不昧補遺云惑砧杵聲為鐘鼓響睡中昏想也怪鐘聲是木石音聞性不昧也聞性不昏即見精不動去真猶一間耳若脫聞見即真如體不即不離意亦可見矣谷響云遄速也縱汝形銷命光遷謝此性云何為汝銷滅復恐惑者謂寐雖不昧死豈不滅耶故重示爾以諸衆生從無始來循諸色聲逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺苕溪云通別二惑俱名塵垢真以所證皆號法眼此眼具五方曰清明
