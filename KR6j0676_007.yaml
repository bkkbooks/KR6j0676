釤婆釤十悉怛多鉢怛囉四百一十一摩訶跋闍嚧瑟尼釤十二摩訶般賴丈耆藍十三夜波突陀舍喻闍那十四辮怛隸拏十五毗陀耶槃曇迦嚧彌十六帝殊槃曇迦嚧彌十七般囉毗陀槃曇迦嚧彌十八哆姪他十九唵二十阿那隸四百二十一毗舍提二十二囉跋闍囉陀唎二十三槃陀槃陀你二十四跋闍囉謗尼泮二十五虎𤙖都嚧甕泮二十六莎婆訶二十七阿難是佛頂光聚悉怛多般怛羅祕密伽陀微妙章句出生十方一切諸佛十方如來因此呪心得成無上正遍知覺十方如來執此呪心降伏諸魔制諸外道十方如來乘此呪心坐寶蓮華應微塵國十方如來含此呪心於微塵國轉大法輪長水云悉怛多般怛囉云白傘蓋即指藏心不與妄染相應故云白遍覆一切法故云蓋從此流演祕密神呪故云呪心又是一切呪中之總要故無有一佛不因此呪而成正覺制諸魔外應諸國土轉大法輪也苕溪云總言呪心者即前文云斯是如來無見頂相無為心佛所説心呪也熏聞云此以心呪釋心呪疏云從如來藏心之所流出故名呪心又云或是十方如來心印法門故名呪心亦是祕密藏中精要之法故名呪心此取呪中精要釋呪心故智者説心有三種一慮知心二草木心三積聚精要心今祕密藏是積聚之義呪心即精要心然呪謂呪詛亦曰呪願佛以此語詛願衆生生善滅惡革凡成聖若果羸之呪螟蛉也是亦密詮首楞嚴義與前顯説力用無殊但被物之異耳天台止觀五略初發大心方言中云質多者天竺音此方言心即慮知之心也天竺又稱汗栗馱此方稱是草木之心也又稱矣栗馱此方是積聚精要者為心也此經心之一字要須原其梵語隨文對翻方能定其法喻親切補遺云此約出生佛界以顯神呪之功也初二句總明次十方下別明言十方諸佛得此呪故八相成道初因此呪心者為因地入道門該乎兜率降神入胎出胎出家逾城等相也得成正覺成道相也執此呪心者呪有破惡義內執破惑心外以降魔也乘者下至第八行儀轉法輪也法華明以諸法空為座此言諸佛以呪心為所生之法亦如之所以外坐蓮華應物也含者具法義呪以具足百界千法故外能微塵現大也十方如來持此呪心能於十方摩頂授記自果未成亦於十方蒙佛授記十方如來依此呪心能於十方拔濟群苦所謂地獄餓鬼畜生盲聾瘖啞怨憎會苦愛別離苦求不得苦五陰熾盛大小諸橫同時解脫賊難兵難王難獄難風水火難飢渴貧窮應念銷散十方如來隨此呪心能於十方事善知識四威儀中供養如意恆沙如來會中推為大法王子持者念力內有念持之力外能授衆生記莂也自果未成者此言十方諸佛自凡入聖初入分果未成妙覺故蒙佛記也授記于人并自蒙授記必資內念之力也依取依賴義自行依賴神呪以道化他亦依賴之也隨取侍奉義自行隨奉神呪外能侍奉知識等也補遺云諸文云五陰盛涅槃十一云何名五陰盛苦生苦乃至求不得苦名為五陰盛苦此則八苦前七為別後一為總為有五陰盛身故故有衆苦亦如老子云吾有大患為吾有身故知必須直下忘我本無有身受彼生死非作故無本性無故孤山云灌頂經云大橫有九小橫無數熏聞云彼經第十二云一者橫病二者橫有口舌三者橫遭縣官四者身羸無福又持戒不橫為鬼神之所得便五者橫為劫賊之所剝脫六者橫為水火漂焚七者橫為雜類禽獸所噉八者橫為冤讐符書魘禱邪神牽引未得其福但受其殃先亡牽引亦名橫死九者有病不治又不修福湯藥不順針灸失度不直良醫為病所因于是滅亡又信世間妖孽之師為作恐動寒熱語言妄發福所犯者多心自不正不能自定卜問覓殺豬狗牛羊種種畜生解奏神明呼諸魍魎鬼神請乞福祚欲望長生終不能得愚癡迷惑信邪倒見死入地獄展轉其中無解脫時是名九橫補遺云橫為冤讐等者為字去聲呼本為假符書害怨讐者反以邪神牽引未得報怨之福反受其也為作恐動寒熱言語者邪師因其寒熱之病附出誑言以恐動之也卜問覓者凡病者必求因也解奏神明者解字古買反欲解散其也奏若道士奏章涅槃亦説有九橫死涅槃高貴德王品云有九種因緣能夭其壽一者知食不安而反食二者多食三者宿食未消而更食四者大小便利不隨時節五者病時不隨醫教六者不隨瞻病者教七者強耐不吐八者夜行為惡鬼打九者房室過差谷響云夫昔因不純今多枉橫假修心行道之力藉祕呪冥加之功枉橫俱消各盡天命且世之迷者率冀富同猗頓壽類容彭朝為蟬翼之善暮望丘陵之福而不省聖力冥資翻謂佛言無驗法言曰壽可益歟曰德曰回牛豈不德耶曰德故爾如使回也殘牛也賊焉得爾注曰言復甚也且儒之達者尚知潛益而不以病夭為疑況學佛之徒了三界空華見世間夢事何富壽之有乎若然者則克荷斯經無慚德矣十方如來行此呪心能於十方攝受親因令諸小乘聞祕密藏不生驚怖十方如來誦此呪心成無上覺坐菩提樹入大涅槃十方如來傳此呪心於滅度後付佛法事究竟住持嚴淨戒律悉得清淨行取按行上能治下之義內心以神呪治己惑業外能開小即大也誦謂剎那無間之義于此祕密藏心剎那無間而成無上道坐道場入涅槃故能從因通至果地至涅槃相也文中因説通義兼前成道也傳持之義直至滅後與前第九同涅槃相也亦可成無上覺指妙覺與分果不同也總云出生如是初住分果八相也孤山云然此並是密説常住真心周遍法界故有因果自他生善滅惡若福若智等種種功德耳若我説是佛頂光聚般怛羅呪從旦至暮音聲相聯字句中間亦不重疊經恆沙劫終不能盡亦説此呪名如來頂汝等有學未盡輪回發心至誠取阿羅漢不持此呪而坐道場令其身心遠諸魔事無有是處阿難若諸世界隨所國土所有衆生隨國所生樺皮貝葉紙素白㲲書寫此呪貯於香囊是人心昏未能誦憶或帶身上或書宅中當知是人盡其生年一切諸毒所不能害西竺貝葉此土紙素書呪信受者三毒不起諸魔遠離阿難我今為汝更説此呪救護世間得大無畏成就衆生出世間智出世間智三乘妙心即時頓悟若我滅後末世衆生有能自誦若教他誦當知如是誦持衆生火不能燒水不能溺大毒小毒所不能害如是乃至龍天鬼神精祇魔魅所有惡呪皆不能著心得正受一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味一切惡星并諸鬼神磣心毒人於如是人不能起惡毗那夜迦諸惡鬼王并其眷屬皆領深恩常加守護荊公云正受亦名正定正定中所受境界謂之正受異于無明所緣境故圓覺經三昧正受熏聞云厭蠱者應法師云厭鬼名眠內不祥伏合人心曰厭蠱腹中蠱謂蠱行毒也聲類作弋者反謂蟲物害人也正法華經有蠱狐舊維摩經有妖蠱應師並同聲類音之今但音古補遺云梵網亦云生金銀毒謂此二物和毒味損物者也阿難當知是呪常有八萬四千那由他恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍設有衆生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子何況決定菩提心者此諸金剛菩薩藏王精心陰速發彼神識是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑熏聞云那由他此當萬億俱胝此當千萬見應師音義荊公云那由他此當京數俱胝此當億數金剛藏王慈恩翻首楞嚴為金剛藏然則此諸菩薩證此定故以是為名補遺云陰心精速謂金剛藏王得如來藏心去惑純精陰密神速發彼持呪之人神識也興福云初鬼神獲恩後遁迹潛加從第一劫乃至後身生生不生藥叉羅剎及富單那迦吒富單那鳩槃荼毗舍遮等并諸餓鬼有形無形有想無想如是惡處是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處熏聞云富單那一云臭餓迦吒富單那此云辛奇臭餓迦吒蓋即竭吒富單那此云辛臭鬼此諸衆生縱其自身不作福業十方如來所有功德悉與此人由是得於恆河沙阿僧祇不可説不可説劫常與諸佛同生一處無量功德如惡叉聚同處勳修永無分散如惡叉聚喻與諸佛無分散也是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齋戒自成齋戒苕溪云于未受持時謂犯戒已未經懺悔重受之時也此約在家者言之出家二衆次文別説阿難是善男子持此呪時設犯禁戒於未受時持呪之後衆破戒罪無問輕重一時銷滅縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一住悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮熏聞云珙鈔引俱舍頌曰約處唯除北約人除扇榹敕皆反四身一語業三殺一虗誑一殺生加行無間一劫熟隨罪增苦增八比丘分二以為所破僧云云補遺云言五逆罪約處除北洲約人除黃門四屬身業破僧口業三屬殺破僧但虗誑出佛身血但殺之加行方便罪耳不成正罪故又佛不可殺故一逆乃受一劫無間獄罪熟謂生彼也隨罪增苦增應是凡二逆受二劫等八比丘分二以極少言之也本八比丘為一切衆破之成二衆更相是非四人已上成衆故以八比丘言之若俱舍明殺父殺母殺阿羅漢破和合僧出佛身血破僧提婆白佛欲出家佛不許學通欲破僧行出佛身血佛在阿耨達池説我于耆闍崛山經行提婆于高崖舉石以擲我頭山神以手接石小片迸墮傷佛胟指出俱舍業品扇榹黃門也北洲并黃門以父母于子少愛心無重恩故非無間業四身一語業前四屬身業破僧屬口業三殺一虗誑破僧一虗誑也一殺生加行出佛身血以如來佛身不可害故得殺生加行罪無根本罪無間一劫熟隨罪增苦增一句明時處一句明苦增隨有多逆感無間若多若具故八比丘分二以為所破僧破僧有二謂轉法輪僧并羯磨僧轉法輪僧唯在佛世羯磨僧通佛滅後破轉法輪以有佛故須九人破羯磨以八人以八比丘分二四為正衆四為邪衆又有同類五逆阿難若有衆主從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯銷雪不久皆得悟無生忍普賢觀云衆罪如霜露慧日能消除今呪力亦然復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或身上帶此悉怛多般怛羅者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方國土必定不生邊地下賤何況雜形命終尚能隨願往生諸佛淨土況世間所求而不獲耶阿難若諸國土州縣聚落飢荒疫癘或復刀兵賊難鬬諍兼餘一切厄難之地寫此神呪安城四門并諸支提或脫闍上令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆銷滅苕溪云支提翻靈廟或名可供養處又云有舍利曰塔無舍利曰支提如阿含有四支徵知倚反謂佛生處得道轉法輪入滅資中脫云闍梵語翻幢也阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢五穀謂麻黍稷麥豆十億曰兆聖法在處尚無惡夢況餘災橫阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生衆生種種災異有此呪地悉皆銷滅十二由旬成結界地諸惡災祥永不能入長水云八大惡星謂金木水火土羅計彗雖有善宿變即成災九執曜除日月取計都為八孔經云日月及熒惑辰歲并太白鎮及羅睺彗此皆名執曜由旬正言踰繕那此云合應計合爾許度量也或云此無正翻乃是輪王巡狩一停之舍猶如此方館驛然彼由旬數有大小或四十里或二十里諸經論中多用小數耳補遺云按經史凡吉凶先見之徵曰祥伊訓曰伊陟相太戊亳有祥桑穀共生于朝是故如來宣示此呪於未來世保護初學諸修行者入三摩提身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及衆中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語熏聞云具四緣故方獲其益謂依我壇場一如法持戒二所受戒主逢清淨僧三于此呪心不生疑悔四憶持此呪者當自惟念于是四緣為全為缺苟初緣未具第三罔知而持戒不疑能無自勵每讀至此傷痛盈懷雖口誦之惟勤且心通而弗逮焉知來者不如經乎苕溪云心通不出三義一者證果即端坐百日有利根者不起于座得須陀洹也二者發解謂縱其身心聖果未成決定自知成佛不謬三者宿命謂是人應時心能記憶八萬四千恆河沙劫周遍了知得無礙惑説是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所説我當誠心保護如是修菩提者爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏補遺云陰陽相感薄而為雷電雷光也而言師與伯者必有神物主之也復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事苕溪云無色界天但無粗色非無細色故有稽首白佛之事涅槃云非想等天若無色者云何得有去來進止如是之義諸佛境界非諸聲聞緣覺所知中陰經亦云無色界天禮拜世尊華嚴云菩薩鼻根聞無色界宮殿之香仁王云無色界天雨諸香華阿含中説舍利弗入滅時無色天空中淚下如春雨細故知無色非無色也昔人偏計豈唯暗大亦昧小宗而涅槃云非二乘所知者非全不知蓋言未了細色之相故補遺云無色界有無不可偏計須考三界得名所從上下相對相望別約一邊得名通而論之無欲則已出三界無色則已離五陰若言無色界無色陰者為順無色界名亦偏計故涅槃非二乘所知分別無色界色屬別教智故也又無色界天不列天衆而在雜衆者以其無色非前天之儔類故與風神無形者類而言之故在雜也無色有細色則小聖天眼亦合見之何故斥非所知應恐小乘天眼但總相見若去來進止非佛菩薩法天二眼不能知也爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此況救護末世修三摩提正修行者世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恆令此人所作如願孤山云以上群靈皆獲本妙心住首楞嚴能建大義示現菩薩諸天鬼神等像護持行人耳而言以寶杵碎首者夫大聖之訓物也或用攝受或行折伏羣邪之屏迹也或感其惠或畏其威惟此二途咸令得度今行折伏俾畏其威若涅槃殺一闡提法華破諸惱亂仙豫之誅淨行滿足之僇衆生皆由住無緣慈得一子地乃能如是耳慈念衆生如一子故涅槃明四等成就住二地慈非喜住一子地捨住空平等地此皆分真所得而外現折伏耳谷響云涅槃云殺一蟻子得罪殺一闡提無罪釋曰蟻子無辜殺之結罪闡提惑衆殺之有益法華經羅剎女白佛言若不順我呪惱亂説法者頭碎作七分如阿梨樹枝補遺云阿梨樹此方無故不翻其樹似蘭香枝若落地必為七分故也出慈恩大鈔涅槃明如來往世為王名仙豫由五百婆羅門不信大乘王盡殺之由謗法故墮地獄中既生而起三念知是地獄知因謗法知由王殺乃改心自責俄捨地獄生甘露鼓王佛剎得一劫壽僇亦殺也字亦作戮晉譯華嚴善財至滿幢城滿足王所見無量衆生犯王法者身被五縛或斷手足或截耳鼻或挑雙目或斬身首或投沸灰或疊纏身油灌以火焚之善財問云何修道答言我成就菩薩幻化三昧十惡衆生不可教化我為調伏化作苦治令捨惡具善得樂發心具一切智當知我於蟻子不生害心何況人耶阿難即從座起頂禮佛足而白佛言我輩愚純好為多聞於諸漏心未求出離蒙佛慈誨得正重修身心快然獲大饒益世尊如是修證佛三摩提未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大衆一心佇佛慈音瞪矒瞻仰苕溪云阿難所請斯有二意一者既受行門必有次位如得門入宅須知堂室淺深是故請之二者經初佛語阿難心言直故如是乃至終始地位中間永無諸委曲相前解行圓融則心言直矣地位無曲未知其相因此請之未到涅槃謂究竟涅槃至何漸次得修行目此問入地之正行準下三種漸次初則除其助因所謂五辛未為正行至于第二刳其正性所謂淫心由是之故修三摩提能得第三違其現業乃至獲無生忍所以第二漸次名為真修即修行之目應知涅槃如所到之境諸地如所由之道修行如能履之步三法若具則首楞嚴教能事方畢矣長水云住有因果惑有粗細智有明昧斷有淺深證有分滿用有優劣苟昧斯旨非真修行墮增上慢以我教中隨進德修業勝劣不同故立五十七位漸入漸深不同外道天魔都無涅槃最極果即位所至處乾慧最初因即位發基處信住行向及四加行名四十四心即信解行地名為修行初地見道乃至等覺名為證入即分證果知諸地之名而未能辨名下之義修證行相故此問也即示其不解爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩提求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝説阿難大衆合掌刳心默然受教苕溪云刳猶去也去其妄念以受真教佛言阿難當知妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄長水云此為分別一敘迷真起妄為立位之因地位之興本由迷悟妄迷真起本性即虗故有斷分斷即成悟悟有淺深因成階降階降既分名位斯別若不迷真焉有斯位故須敘也滅妄名真是稱如來無上菩提及大涅槃二轉依號資中云由不了一法界相忽然起妄名為不覺翻此不覺了本無生名之為覺即菩提之號因不覺立也由迷有生生即有滅翻此生滅顯不生滅即涅槃之號對生滅立也生滅既滅更無所依故名轉依以真如為迷悟依轉此迷依以為悟依故名轉依自智境界轉所依藏為涅槃菩提涅槃初非一異但轉迷名無上菩提轉有名大涅槃從有故迷以覺故空有性自空非有滅空故生死涅槃無相違也興福云轉依有六一損力益能轉謂初二正位補遺云謂資糧加行對前入位方便故言正也以勝解漸愧力損本識中染種勢力益淨種功德漸伏現行亦名為正轉依二通達轉由見道達真方斷二障粗重證一分真實轉依也三修習轉謂諸地漸斷俱生證真轉依也四果圓滿轉謂究竟以金剛定永斷本來一切粗重頓證佛果圓滿轉依也五下劣轉謂二乘厭苦欣寂證真擇滅無勝堪能也六廣大轉謂大乘位俱無欣厭通達二空雙斷二障頓證無上菩薩涅槃有勝堪能名廣大轉依也今取廣大而言可悉此六轉依以天台四教斷之前四別位第五藏通六在圓頓經言二轉依號如真性無相由迷悟故假名生焉轉依之語諸文不異轉依之義隨文不同雖則不同其歸一也無非為明返妄歸真生滅對不生滅妄對乎真轉妄依真號菩提也轉生滅依不生滅號涅槃也法華玄記云言轉依者轉染依依于淨在染則種子依于梨耶在淨則轉于能依以成第九當知梨耶不離染淨阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因顛倒不生斯則如來真三摩地苕溪云明世界相續唯在依報謂四大因起等今世界顛倒蓋指正報即十二類生也世界顛倒為指正報者恐未然也三世四方顯是依報彼明世界顛倒之相生出十二類生非直指十二類為世界也長水云前明三種相續今明二種顛倒即攝業果故也長水以業果在衆生中孤山以業果在世界中以十二類即業故也補遺云此下二顛倒文科節初阿難至真三摩地為總標次阿難下別列二倒初衆生顛倒又二初明迷真次迷本下倒相於迷真中兼示下文世界迷真故言建立世界及諸衆生言及衆生者即下世界中十二類生業果也次阿難下二世界顛倒阿難云何名為衆生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸衆生孤山云性明圓故謂由真心本具諸法如明鏡中圓具像性因妄明心變動真性故曰因明發性由發性故遂起分別故曰性妄見生從畢竟下結顯上文全真成妄也補遺云真如不變名性隨緣名心一真如中具此二義由性者不變也明心者隨緣也由有性中圓明隨緣之故衆生妄生照覽因以妄動發其性也性中加妄遂有見生故曰性妄見生也經中特安圓字即顯隨緣之性生出妄明荊溪云真如是萬法由隨緣故即此義焉苕溪云此有下四句上二句皆能所相生有即苦果因即惑業非因者如前文云既稱為妄云何有因所因者如前文云自諸妄想展轉相因下二句總明上二句皆無實體住者依也推末至本了無所依故知從畢竟無成究竟有正是顛倒之義補遺云上文云成究竟有即衆生苦惑業也此之四句言其苦惑業相初二句總示此有所有者指上成究竟有故曰此有言所有者謂苦果從惑業生也初句云苦果也次句云惑業之因故曰非因所因也住所住相者言苦惑業三皆是住著之法若求其住之相了不可得三道即三德故無根本然則成究竟有有之一字別指苦果已成之法迷本圓明是生虗妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生由是故有衆生顛倒苕溪云有身故生有受故住生住心法于諸有中展轉發生斯即前文業果相續也如卵生等既是色質豈非身耶苦受等領納現境對三相論之即是住相生力至成業者生即是果力即是業熏即動業之惑以欲貪為本如現在生身由過去業力之所發明復由現在起惑熏成未來善惡之業也同業至相生者七趣衆生隨其妄惑各有同業相感因于殺盜淫三所感之業則有相滅相生之事長水云淫欲故相生殺盜故相滅亦可云異見成憎故相滅同想成愛故相生補遺云意云真如非身受心法而迷妄故展轉發生身受等法阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成孤山云從畢竟無成究竟有故有東西南北之分段指此分段名之為界然其所有本無其因故非因所因此唯妄住故云無住所住既非真性常住則有過現未來遷流不住三世成矣補遺云前文從畢竟無成究竟有雖在衆生顛倒中明義兼世界故今牒之云是有等但今文以四方界義為有是前苦果依報依正同以惑業為因故曰是有所有非因所因以明三世義也所以有三世遷流者良由惑業不斷故也三世四方和合相涉變化衆生成十二類孤山云以世涉方以方涉世俱成十二所以衆生正報因果和合亦成十二是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復長水云內有動相外感風輪故有聲現因空生搖堅明立礙故有色立金風相摩則有火光火則有氣氣則香也寶明生潤火光上蒸由斯流水水有冷暖故成觸也觸分澀滑與舌相對則有味生五境合意則名為法此六塵境與內六根妄想和合雜亂由此造作一切諸業故成業性業必有報十二品類因此區分故成輪轉資中云根塵各六成十二苕溪云因動有聲如擊鼓撞鐘之類文殊云音聲性動靜此就聲塵當體為因以動之一字不對餘塵説故若更就當體分之則動為其因聲如其果從因聲有色至因味知法則展轉相因皆以餘塵為因遞相為果以顯六亂之相不同十二因緣次第之義故當知展轉相因雖有十二而但云六亂者正顯根塵各從其類兩兩相望雜亂而起最後云知法者知即意根法即法塵以後例前則有聞聲見色等義況云六亂妄想是知見聞覺知皆歸妄想聲香味觸略舉四塵窮十二變總結根境補遺云因以世界相涉變化衆生則是動義故動生聲為初一往六塵為倫次義非定論也亦可因色有聲有法等方成六亂經文且示一塗為言一旋復者約根塵十二次第一翻旋轉之相也乘此輪轉顛倒想故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想孤山云依㲉而起曰卵生含藏而生曰胎生假潤而興曰濕生無而忽有曰化生也如是四生由內心思業為因外㲉胎藏濕潤為緣約藉緣多少而成次第卵生具四是以先説胎生具三濕生具二化生唯一謂思業也此依瑜伽所解真際云前四生為總次八類為別從總開別故成十二阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沈亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞資中云動即是風風即是氣故云和合氣成羯邏藍者入胎初位準俱舍論胎中分位有五胎卵未分皆同此也孤山云八萬四千非八萬四千煩惱塵勞為其種類乎然此類生以因感果微細行相唯聖盡明止在總知唯妄所為未可委究歷事義趣熏聞云羯邏藍餘經或名歌羅邏此云凝滑或云雜穢狀如凝酥補遺云此十二類生先言世界虗妄等者蓋衆生之心多著境界而感其生成于顛倒如初感外虗妄動則受飛沈動類下去準知然列此十二類生即是別明衆生顛倒之相耳所以上文衆生顛倒其文甚略受生之相皆因外感故別明世界顛倒變化衆生以成上文也由因世界雜染輪回欲顛倒故和合滋成八萬四千橫竪亂想如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞恐指依報能生情欲者為雜染也如形顯之色男女之態皆可欲之境故曰欲顛倒老氏曰不見可欲使心不亂然後感己欲心取彼之境故曰和合滋成資中云人懷正道竪首而行違正從邪故生橫類孤山云遏蒲曇即第二位胎卵已分也熏聞云遏蒲曇此云疱狀若瘡疱由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有濕相蔽尸流轉國土含蠢蠕動其類充塞苕溪云濕以合感故云執著合因暖氣故曰暖成翻覆者飛伏之貌也此約形説謂飛動而伏走也沇疏云違心背信翻覆任情遂感此類飛走不定如蠛昆蟲之類耳蠛小蟲似蚋喜亂飛莊子謂之醯雞昆蟲溫生寒死之蟲資中云蔽尸或云聚血或云耎肉既不入胎故無諸位熏聞云蔽尸即第三位問何故動類唯指初位欲類但言第二趣類止云蔽尸從假類去皆云羯南答若有初位必具後位若有第二必具初後經文一往次第且取一位配之今蔽尸羯南既不入胎故無前位然而蔽尸須至羯南羯南或由蔽尸二往之意可會又假類而下雖皆云羯南其中非無具前三位及第五位即鉢羅奢佉此云形位良由第五于諸類中闕具不定唯有第四其名最通故障類等俱云羯南也補遺云趣謂趣向不可回之義謂執重趣向故受執濡滯言和合暖成者以濕滋氣方有所生由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞真際云妄心浮偽易奪不常舍此取彼故成其觸觸謂觸對即根境和合也孤山云羯南此云硬肉即胎內第四位才生即飛故缺前位苕溪云轉蛻飛行蓋是化生取譬之象列子云天地委蛻下文純想則飛皆取譬也是則轉蛻譬故形之易蛻飛行喻新質之輕舉無而忽有理合在茲脫此生彼如轉蛻飛行若鴿之化鳥鼠之變皆化生義如轉蛻之譬和合觸成者雖則變化必假根境相觸為因或陰陽之氣觸其故身能變新質由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞資中云事日月水火和合光明堅執不捨障隔不通名為留礙精明顯著因此受生故成色相星辰日月吉者為休凶者為咎下至爝火蚌珠皆是此類蓋由世間或依報留礙或義理不通暗于知見心希明著積集受想乃受精明上至九曜下及螢蚌仍能休著及于他人熏聞云爝火者據莊子云日月出矣而爝火不息其于光也不亦難乎釋文云爝音爵然火也一云權火謂小火也字林云爝炬火也珠蚌中陰精熏聞云著成者著陟慮反明也由因世界銷散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沈其類充塞資中云由迷惑不了厭壞色相思無邊空色盡心空厭空絶想乃至有頂沈冥幽隱即無色界外道之類熏聞云問既云無色何謂羯南答應取一分細色通名其類不可責同堅硬之狀當知此方亦化生之類補遺云或有厭有著空心存銷散不成真空明理乃惑暗生焉此外道因禪得生無色之類然此上文長水指今無色不同無色界天今言外道者以邪心得生不同正定非久還墜所以神呪功能中指為惡處也又吳興下文以舜若多空神銷今無色者今謂既云八萬四千其類充塞亦可兼指風空神也真際云空散銷沈通指四空補遺云今謂亦可別對四空方允其類充塞之義空指空處以脫色籠故散指識處緣識生定未免散亂故銷指無所有處銷前識心故沈指非想非非想處到空之底故由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞資中云蹈迹附影之類皆從意想所生論因或如外道凡夫祠禱神明託附形象終身奉事志慕靈通因果相酬故生其類熏聞云罔象猶云倣像蓋不真之貌也莊子云水有罔象釋文云水神名補遺云操心不實故曰罔象影附于人故曰影顛倒也凡此之類必資憶想因既不正死受鬼報由因世界愚鈍輪回癡顛倒故和合頑成八萬四千枯稿亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞資中云外道計無情有命金石堅牢或習定灰凝思專枯稿心隨境變遇物成形如華表生精黃頭化石之類是也谷響云晉張華字茂先時燕昭王墓有妖狐謂華表曰我聞張司空多學欲往干之如何對曰張司空博物君子也非但損子亦于吾狐不聽刺投華華與論天下人物多為其所折謂華曰天欲雨請辭去華固留之謂左右曰我聞巢居知風穴居知雨不是狐狸即是者鼠乃密令人斫華表然而照之為狐狸而去梵云劫毗羅此翻黃頭頭如金色因以為名恐身死往自在天問天令于頻陀山取甘子食可延壽食已于林中化為石如床有不逮者書偈問石後為陳那菩薩斥之其石裂矣補遺云形如稿木心若死灰不合真如只成愚鈍癡暗人耳傳曰心不則德義之經謂之頑今以不合真理乃成頑也由因世界相待輪回偽顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞資中云和合巧偽改故作新或假託因緣遞為形勢資身養命業果相循不從自類受身故名非有色相等有情身內八萬戶蟲並是此類相待猶言相假凡染以己假他之謂水母俗謂之蝦蛇一名蟦形如羊胃無目以蝦為目由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想由是故有非無色相無色羯南流轉國土況詛厭生其類充塞資中云有一類生因聲呼召引發性成如蝦蟆等以聲附卵熏聞云孤山引顯識論云雌孔聞雄者為鳴于是有身彼謂之聲生又莊子云蟲鳴于上風雌應于下風而風化注曰蟲以鳴聲相應不待合而便生子故曰風化論因或是樂為淫聲習以生著從自性類不假他成名非無色相藉聲誕質故曰無色補遺云凡言性者稟自然之質也今相引假他而成性分非顛倒是何歟言非無色者必先假自質也言無色者假聲而生也如長水曰雖從聲感假自性質如蝦蟆等以聲附卵然後長養非聲則壞苕溪云呪詛亦呼召耳由物類相感若厭禱而生也由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞資中云誣罔取他約為己有名罔顛倒背親向義寄死託孤忘本蒸嘗認彼宗嗣是其因也嘗者祭也爾雅曰春祭曰祠祠之言食夏祭曰禴新菜可礿秋祭曰嘗嘗新穀也冬祭曰蒸進品物也罔者以無為有之謂苕溪云以異質故非有想相以相成故成想羯南蒲盧俗謂之蠮螉取彼桑蟲以為己子由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞資中云父母有愛名非無想相冤無有愛故云無想亦可梟鏡有情非無想也附塊抱樹而生其子乃無想也長水云冤對相酬連環不止託至親之父子發至冤之殺害豈非怪哉初生託質互有想愛故云非無想相後時成大父母遭食故云無想也資中云問既是冤對無感生緣何得用附而生冤中有愛答如畜豬羊貪殺故養豈非怨中亦有愛乎長水云答託質須資愛想殺害由乎先業愛想無常由業所運始雖起愛後變成憎故遭其食孤山云按史記孝武本紀云祀黃帝用一梟破鏡梟鳥名也食母破鏡食父黃帝欲絶其類使百物祀皆用之破鏡如貙而虎眼今云鳥者恐譯人誤或鳥字合是等字耳熏聞云土梟見爾雅注梟不孝鳥也自關而西謂梟為流離其子適大還食其母述異記云獍之為獸狀如虎豹而小始生還食其母故曰梟獍是名衆生十二種類苕溪云金剛般若卵胎濕化乃至非想皆通三界今十二類義必無殊觀乎現文唯無色羯南似通上界其十一種悉是欲界之相耳此蓋如來隨宜所説且就現前幽顯可驗者略而示之幽如鬼神精靈等顯如魚鳥龜蛇等若以有頂外道解無色者未必然將恐欲界亦有斯類如舜若多神豈在四空乎應知下文廣談七趣秪由此中説相未周前後相成方見經旨此中生數雖多趣相則略若以七趣一期觀此十二類生猶缺地獄修羅二趣然餘五趣亦未委明大槩且言迷真起妄故有類生破妄顯真故有諸位迷悟相翻意在于悟從悟説位用酬前文阿難之請
