body:
  text: 一名中印度那闌陀大道場經於灌頂部録出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集注明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閲鋟阿難汝問攝心我今先説入三摩地修學妙門求菩薩道要先持此四種律儀皎如冰霜自不能生一切枝葉心三口四生必無因真際云心三貪瞋邪見口四妄言綺語兩舌惡口前妄語謂大此妄言即小或舉總數耳總雖云四別在後三熏聞云四棄如根本十三僧殘等如枝葉前約破戒壞其善根則喻云如人以刀斷多羅木今約持戒滅其惡本故喻云自不能生一切枝葉心三口四即僧殘等業行之體也亦攝四棄前後方便然貪嗔癡俱生之惑非定心無以伏斷此中且就餘萹俱者言之蓋止其粗相也成論云戒如捉賊定如縛賊慧如殺賊應知三障皆名為賊持戒所捉正在業報兼於煩惱耳阿難如是四事若不失遺心尚不緣色香味觸一切魔事云何發生若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛羅無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所説心呪熏聞云宿習通論則該四重等一切惑業以無始來熏習成種故別論則正語淫習以欲界凡夫最難防慎故何以明之如下文特指阿難與摩登伽恩愛習氣又壇室中令置烏芻瑟摩之像由此聖者宿多貪欲因觀暖觸而得圓通故又前阿難遭淫所攝佛敕文殊將呪往護而不用餘呪者得無別意乎長水云前雖廣説持戒清淨皎如冰霜既不造新已離魔事然有無始宿習垢障塵沙如影隨形與道為妨或數病數惱多淫多瞋邪師魔嬈諸難競起皆是無始不善凡夫始學道力微弱不能排遣故佛有妙神呪能滅宿世惡習令無嬈亂道力速成不遭退屈前説定慧破煩惱障復明戒學但止罪業今説神呪能破宿殃兼除報障三障苟亡不證何待釋要云持戒但遮現業若有無始冤橫宿殃不能排遣或於禪中發來三種治魔亦不得免唯有建立道場持呪禮佛等則他力可治且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚淫女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚于順風有何艱險熏聞云女經云阿難昔五百歲曾與此女而為夫婦彼小乘經蓋言其近耳苕溪云愛心永脫指初聞呪得阿那含成阿羅漢指前文殊簡圓通後若爾由聞法故方成無學何謂神力冥資耶良以密承呪力顯藉法音內資外熏乃能速證若但因呪而不由法者何故前云性比丘尼聞説偈已成阿羅漢塵譬宿習風如神呪順風揚塵散之則易誦呪除習脫之匪難若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀此不成就戒成已後著新淨衣然香間居誦此心佛所説神呪一百八遍據下文云先持聲聞四棄八棄後行菩薩清淨律儀今所持戒應通大小若出家者除戒體本淨當須懺淨如更稟菩薩律儀彌益其善若在家者或先受近事戒或但受菩薩戒以下正修有白衣故熏聞云四分律儀云弟子知和尚犯戒知不應如是人邊受戒知雖受不得戒如此具知則不成受反是成也南山云餘之九師律無正文準可知也若梵網所説須于先持菩薩戒法師前受若千里內無能授者得于佛菩薩形像前自誓受戒而要見好相補遺云今此先持比丘清淨禁戒允合止觀二十五法方便末世先須持戒清淨止觀持戒清淨中有四意第四名懺淨初云事理二犯俱障止觀定慧不發然約小乘犯有輕重輕者可懺重不可懺若犯重者佛法死人小乘無懺重法若依大乘許其懺悔如四種三昧中説真際云誦呪一百八遍表除百八煩惱也熏聞云苦下具一切集滅離三見道除于二見上界不行恚并十俱生及十纏成一百八然後結界建立道場求於十方現住國土無上如來放大悲光來灌其頂阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪淫持佛淨戒於道場中發菩薩願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟孤山云佛本是無心淨故有水清月現感應自然若見此相當觀空寂是佛彌顯是魔則滅熏聞云證真云凡入道場若不依天台止觀但恐邪正難明彼論即是修首楞嚴三昧行法阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末法修行建立道場云何結界合佛世尊清淨軌則佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺已下取其黃土和上旃檀沈水蘇合薰陸金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地方圓丈六為八角壇苕溪云上言場地如今之墠下既名壇必須起土為之是則先除地為場後別取黃土和香為泥於其場上以泥塗起令成壇相除掃也鄭云封土曰壇除地曰墠國語云壇之所除地曰場起土即封土也謂起土界也此在室中擬安供具高低之量可以意取荊公云水性劣火結為高山山土也土信也雪山廣大香草清水所生此譬廣大信心大力白牛純白無雜雖有大力而隨順衆生此譬大乘佛性肥膩香草譬妙善清水譬淨智糞譬遺餘旃檀除熱風腫譬能除苦惱淨善大乘佛性依廣大信心以淨智妙善資養成就其遺餘尚非粗穢可和合除苦惱淨善與衆生嚴成寂滅場地平原譬起信者平等廣心上有五色以黃為正此譬中道正信十香譬十度能窮智淵底為智度沈水能沈至水底者也或神力或智慧力或淨行力無不具足而能遠到為力度旃檀或赤或黑或白上旃檀則若所謂一銖聞四十里者也以精合神得佛力持一切魔事不能留難為願度蘇合殺鬼精物除邪通神明者也一切能入無非善行為方便度雞舌可入諸香令人身香者也畜精智起明見為慧度零陵能止精明目者也治心調氣除毒去邪滅穢起淨為禪度金除心氣蠱毒鬼疰及臭者也離睡眠蓋寤寐常覺為精進度青木能寤魘寐者也一切能忍如無痛覺為忍度薰陸能止痛者也除身不善獲得解脫無瘡疣色為戒度白膠能除身惡氣去瘡疹者也和合諸度令衆不實所有以脫內苦為施度甘松能和合衆香除腹脹下氣者也若不能如前但能以平等廣心起中道正信依此諸度發清淨行為入佛性方便亦足以嚴場地細羅為粉合土成泥則以甚微細智合中道正信也熏聞云方圓丈六為八角壇當取徑有丈六正得其宜如方等行法亦令作壇縱廣一丈六尺壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香爐間華鋪設莊嚴香爐純燒沈水無令見火取白牛乳置十六器乳為煎餅并諸砂糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩谷響云八月露水得陰氣之正長水云諸佛菩薩不食此食為令增福示現而食使修行者福慧具足速得圓滿如佛受純陀最後供養令其具足檀波羅蜜此亦如是每以食時若在中夜取蜜半升用酥三合壇前別安一小火爐以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎爐內燒令煙盡享佛菩薩熏聞云兜樓婆香舊云白茅香也孤山云享獻也祭也或作饗饗者鄉也鄉之然后能饗焉謂中心向之祭乃見饗荊公云壇前南方正等覺地蜜五合蘇三合則參伍和合別安小爐則應粗而大趣妙而小兜樓婆赤香合覺淨善也煎取香水合覺淨智也沐浴其炭則淨治無煩惱煙合覺慈力也然令猛熾則欲熾盛光明投蘇與蜜燒令煙盡則欲滅和合煩惱令盡食時與物交中夜與物辨于此二時皆饗正等覺以合覺淨善淨智無愛見慈力熾然光明滅和合行令煩惱盡此乃內所以享佛菩薩令其四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那釋迦彌勒阿閦彌陀諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩并藍地迦諸軍茶利與毗俱胝四天王等頻那夜迦張於門側左右安置長水云懸幡列像一一皆令影現鏡中欲使行人熟此境界則於事事無礙法界之理易得證耳若時若處一念之中遍歷十方遍見諸佛遍行佛事遍得供養一念既爾塵塵皆然苕溪云西域當陽皆取東向所是左右則右尊而左卑也此方敷置或可隨宜應以尊居右卑居左如智論以舍利弗為佛右面弟子目連為佛左面弟子不唯西域此方古者亦以右為尊太尉勃親以兵誅諸呂氏功多平欲讓勃位乃謝病文帝初立病之問平曰高帝時勃功不如臣及誅諸呂臣功亦不如勃願以相讓勃於是乃以大尉勃為右丞相位第一平徙為左丞相位第二又高紀二月行自雒陽趙臣田叔孟舒等十人召見與語漢廷臣無出其右者注曰古者以右為尊言材用無能過之者故云不出其右也藝文志曰墨子宗祀嚴父是以右鬼注曰右猶尊尚也又漢書曰以御史大夫周昌為趙相高祖曰吾極知其左遷然吾憂趙非公無可者注云是時尊右而卑左故謂貶秩為左遷諸侯王表曰作左官之律注云漢時依上古法朝廷立列以右為尊仕諸侯為左官凡引諸文以明右尊左卑者比見不曉此旨見身子為右面弟子右肩侍父之説凡此經論輒有改其字及作異解者故此若隨時之變則設其次位以左為尊亦復何妨但不得擅改經字熏聞云藍地迦青面力士也軍茶利等未見所翻頻那夜迦舊云頻那是豬頭夜迦是象鼻此二使者也荊公云陀羅尼集經壇場法有藍毗迦軍茶利座孔明王經藍毗迦羅剎也有大神力具大光明藍地迦蓋即藍毗迦也蘇悉地經有忿怒軍茶利菩薩從執金剛問法又陀羅集經有金剛軍茶利菩薩所謂軍茶利者當是此菩薩一字佛頂輪王經有毗俱胝菩薩又毗盧遮那神變經曰右邊毗俱胝手垂數珠鬘三目持髮髻尊形猶皓素圓光色無比所謂毗俱胝當是此菩薩頻那夜迦障礙神也蘇悉地經云一切魔族頻那夜迦自帝釋四王皆護法涅槃云我今所供雖復微少令汝具足檀波羅蜜斯乃因少果多也又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉熏聞云蓋表如來藏理事交徹一為無量無量為一荊公云此八鏡佛智也與彼八鏡互相攝入於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教第三七中於十二時一向持佛般怛羅呪至第七日十方如來一時出現鏡交光處承佛摩頂苕溪云所言每一百八遍常於六時誦呪圍壇至心常行一百八遍斯是行道遍數補遺云華嚴日夜各分為初中後肇師注小般若三時云從旦至辰名初日分從辰至未名中日分從未至戌名後日分此經意顯捨身無間若諸經六時者應隨四時日夜刻數多少長短均而分之苕溪云願教如梵網經十大願等熏聞云梵網云若佛子常應發一切願孝順父母師僧一願得好師二同學善知識三教我大乘經律四十發趣五十長養六十金剛七十地使我開解八如法修行九堅持佛戒寧捨身命念念不去心十若一切菩薩不發是願者是犯輕垢罪又云若佛子發是十大願已持佛禁戒作是願言寧以此身投於熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行等云云補遺云三七日約數多止于三者以陽數至於九故也諸經顯密又多止于七者如法華文句云數法有小七大七大七有七七四十九記云此方數法黃帝所立有二不同下數十萬為億上數億億為億七數亦然故以七七而為大七于小七成四十九也今謂大七至于四十九者以大衍之數五十其用四十有九故也諸法約數必須隨順世法應陰陽五行之數數與非數皆如來藏中法耳何世法之有哉然億億為億恐應云萬萬為億荊公云三各七日合覺數也建立道場以禮佛法僧為最初方便故初七中至誠頂禮如來菩薩阿羅漢號誦呪行道則依不思議力發行一時常行一百八遍則示以此除百八煩惱二七發願則已發行方以願力持之有願無行則願無實三七十二時一向持呪則純依佛不思議力十二時則倍初七中七行道道場以精進成就故十方如來一時出現鏡交光處則所謂能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入也手鑑云五悔之法依離垢慧所問禮佛法經總有八重一供養佛二讚佛德三禮佛餘即五悔又智論云菩薩晝夜三時各三事功德無量轉得近佛若依善戒經但有二事謂懺悔回向皆隨時廣略然悔名陳露先罪悔名改往修來除惡業障然有二種若犯遮罪先當依教作法悔之若犯性罪應須起行此復二種一事行如方等經及禮佛等二依理觀如普賢觀端坐念實相名第一懺衆罪如霜露慧日能消除禮佛下別明對治禮佛除我慢以我慢故不能禮敬今摧我慢山即是除惡起信敬善勸請除謗法障起慈善根隨喜除嫉妬障為慶悅故平等善根回向破狹劣障成廣大善心無限故發願破邪倒罪即導前四令至所在一願至初住真因二願至妙覺極果文殊問經云晝夜六時勤行五悔不假苦行能至菩提如斯五法尚能入位況滅罪乎釋要云行人建立道場自供養凡有八事能治八障成就八善一供養除慳貪障感大富貴二歎佛除口障得無礙辨三禮佛除我慢障得尊貴身四懺悔除三障四魔得依正具足五勸請除謗法障得多聞智慧六隨喜除嫉妬障得大眷屬七回向除狹劣障成廣大善八發願除退屈障能總持諸行願如束物所行即無舒散垂終若得願力則惡念不生不牽惡道即生善處即於道場修三摩地能令如是末世修學身心明淨猶如琉璃苕溪云此觀行淨或六根淨阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就方等陀羅尼云行此法時十人已還天台依之經有明制不可踰也世有修法華等行者或多增人數或長延日限廣邀士女來會香華止存誑俗之心寧為感聖之道至有燒身臂指先告四方縱不苟財亦成沽譽內盲理觀外掇譏嫌如此師徒豫見之矣大經云有四種法為大涅槃而作近因一者親近善友二者專心聽法三者繫念思惟四者如法修行若離四法勤修苦行得涅槃者無有是處彼誡但修苦行實求涅槃者尚為不可況沽譽乎況苟財乎真修行人請思此語從三七後端坐安居經一百日重聞云此與止觀所説九十日常坐一往是同但今兼前三七日行法為異故下判屬半行半坐三昧應知正修首楞嚴定亦如普賢觀云端坐念實相妙勝定經云但能直心坐禪即是第一懺悔問前科經文從持戒誦呪以來俱名助行今端坐修定豈非正行耶答前乃分其大綱不可責其細目況今略示坐儀日限更不委明定相豫嘗有此經禮誦儀一卷以備早暮熏奉之式須者行之有利根者不起於座得須陀洹縱其身心聖果未成決定自知成佛不謬孤山云須陀洹按位即圓初信若依涅槃乃是初入別圓地住苟不然者豈得自知成佛不謬耶汝問道場建立如是苕溪云天台止觀示四種三昧攝一切行法一曰常坐如一行三昧二曰常行如佛立三昧三曰半行半坐如方等法華四曰隨自意如請觀音等諸大乘經今經所屬亦半行半坐也壇法行相此土末世行之惟艱然所誦呪下文亦許不入道場故使有緣隨器受益阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥護其力尚未親聞唯願大慈重為宣説悲救此會諸修行輩末及當來在輪回者承佛密音身意解脫于時會中一切大衆普皆作禮佇聞如來祕密章句爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆遍示現十恆河沙金剛密迹擎山持杵遍虗空界補遺云此第六番放光經初説呪往護頂放百寶無畏光明光中亦出千葉寶蓮有佛化身與此事同皆為表法所説呪法無上尊極故從肉髻者經初收光收必自髻全以所收之光再為發揮宣説前來往護神呪百寶光表百法界千葉華表千如有化如來坐華表千法同一覺性從佛頂現表千法是佛所證無上之法化佛頂又現十道百寶光表千法門佛理齊也然初從佛頂現化佛又從化佛現金剛密迹擎山持杵表此神呪即生善滅惡之用熏聞云無上依經云頂骨涌起自然成髻大衆仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣説神呪谷響云畏金剛擎山持杵愛如來坐華放光由茲二事兼并懷抱孤山云諸經神呪例皆不翻天台會釋不出四悉檀意一云呪者鬼神王名稱其王名部落敬主不敢為非此世界義二云呪者如軍中密號唱號相應無所訶問不相應者即執治之此為人義三云呪者密默遮惡餘無識者如微賤人奔逃異國訛稱王子因以公主妻之而多瞋難事有一明人從其國來主往訴之其人語曰若當瞋時應説偈云無親遊他國欺誑一切人粗食是常食何勞復作瞋説是偈時默然瞋歇即對治義四云呪者諸佛密語唯聖乃知如王索先陀婆一名而具四實謂鹽水器馬也群下莫曉唯智臣解之呪亦如是秪一法語遍有諸力病愈罪除生善合道即第一義具此四義故存本音五不翻中即祕密故不翻谷響云