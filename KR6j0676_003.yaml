body:
  text: 一名中印度那蘭陀大道場經於灌頂部錄出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集註明石孟後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閱鋟復次阿難云何六入本如來藏妙真如性長水云梵語鉢羅吠奢此云入亦云處境入之處也釋要云六根不能亡緣反照為境所入從此引心起惑造業輪迴罔極亦是識生處故然根境二法俱識生處今分六根別破故唯以根為入也熏聞云根能受境吸覽前塵故偏名入也阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相苕溪云前色陰中譬如目睛瞪以發勞則於虗空別見往華等相蓋以目喻真以勞喻妄以華喻色今指前說故云即彼目睛等兼目與勞下斯取前文能喻之根便為此中所喻之法以彼勞目正是眼入虗妄之相故斯取前文能喻之根便為此中所喻之法者問若爾此中以何為能喻耶答同是菩提瞪發勞相即能喻也然此能喻帶法言之菩提即覺從覺生妄如瞪發勞經意云彼色陰中所說目之與勞亦是覺明瞪發勞相勞相即空華也應知前文空華徧喻九界五根之色此中空華但喻九界眼入之相前寬此狹不可混同當知眼入乃至意入皆如空華故云六文並云同是菩提瞪發勞相問何不直就根塵推破見性而須指前勞目之事乎答夫根塵徧迷悟必從要故指凡夫易解之妄事用開阿難未了之執情向下塞耳聞聲畜鼻覺觸例亦如是蓋例如勞目皆易解之補遺云六入文並云瞪發勞相者此總喻六入根境並是勞相瞪以喻妄目空喻菩提六入中雖有譬如有人之文乃是就法假設曉訓其義若直就六入根境而說妄義不顯故假設瞪目塞耳以顯虗妄也吳興作法喻兩節而釋以由六入同一瞪目之喻知前是法也則知瞪與塞皆曉訓六入妄義唯同是菩提瞪發勞相中瞪字乃是譬喻喻於妄動之初六入中眼瞪耳塞等却是所喻動妄之相也觀下身意兩人之相方知六入雖有譬如之言只是法耳荊公云菩提一切如也以合空則寂以合塵則勞因於明暗二種妄塵發見居中吸此塵象名為見性此見離彼明暗二塵畢竟無體由塵發見故名眼入離塵無性是謂虗妄他皆倣此熏聞云二種妄塵者前指勞目且據明緣示其妄相明必對暗相待而成此見離塵既無實性則一切眼入皆同虗妄耳等諸入義例咸然如是阿難當知是見非明暗來非於根出不於空生非於根出破根而推識也上云見性下云聞性乃至意入名覺知性性即識也若非識者豈可諸根未發識時已有見聞之義耶應知破根而推識者以現前六根生滅難見故從諸識推而破之識若不生根云何立譬如草木之根能生枝葉方名根耳枝葉若死知根已枯以喻觀法大意可見問若爾但破十八界於意即足何須徧破六入十二處耶答蓋隨所計實法有異故分三科至論推破必須三事相兼而說何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明若從根生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入不於空生者證真以此句破無因生前非於根出破自生非明暗來破他生即成三句若合自他為共性者四句意也問前五陰中既以空為他生今證真何故以空為無因耶答凡四性之義隨文分別不可局定前文空外無別他性之義故得以空為他蓋虗空亦是眼根所對之境今文既有明暗之說可對他生空對無因於義甚便是故當知眼入虗妄本非因緣非自然性阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相苕溪云言譬如者此以假設其事曉訓令悟故云譬如非取比況之義也下文亦爾因於動靜二種妄塵發聞居中吸此塵象名聽聞性此聞離彼動靜二塵畢竟無體孤山云耳聞動靜猶目見明暗也諸經所說對聲有聞緣明有見今文了義靜亦名聞暗亦名見鼻聞通塞意知生滅例亦如是熏聞云靜亦名聞等為顯性常故下文云聲於聞中自有生滅非汝聞性為有為無了義著矣如是阿難當知是聞非動靜來非於根出不於空生何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根生必無動靜如是聞體本無自性若於空出有聞成性即非虗空又空自聞何關汝入是故當知耳入虗妄本非因緣非自然性阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相急畜其鼻畜謂縮氣畜猶縮也熏聞云通塞對塵虗實對根根虗則塵通根實則塵塞因於通塞二種妄塵發聞居中吸此塵象名齅聞性此聞離彼通塞二塵畢竟無體當知是聞非通塞來非於根出不於空生何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當迴齅汝鼻空自有聞何關汝入苕溪云機者弩之有發聞之義故取譬之是故當知鼻入虗妄本非因緣非自然性阿難譬如有人以舌䑛吻熟䑛令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相因甜苦淡二種妄塵發知居中吸此塵象名知味性此知味性離彼甜苦及淡二塵畢竟無體如是阿難當知如是甞苦淡知非甜苦來非因淡有又非根出不於空生何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味根本無自性若於空出虗空自味出汝口知又空自知何關汝入長水云味猶甞也補遺云虗空自味至何關汝入者然此四句似乎相濫應知上二句明味塵下二句明舌入是故當知舌入虗妄本非因緣非自然性阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因於勢觸兼身與勞同是菩提瞪發勞相以此合覺之觸顯於離知者孤山曰離合俱覺猶動靜俱聞明暗俱見也因於離合二種妄塵發覺居中吸此塵象名知覺性此知覺體離彼離合違順二塵畢竟無體如是阿難當知是覺非離合來非違順有不於根出又非空生熏聞云非離合來此破共生以離亦對塵故非違順者破他生不於根出破自生又非空生即無因也何以故若合時來離當已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入是故當知身入虗妄本非因緣非自然性阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相苕溪云寤則覽塵斯憶睡則失憶為妄又唾中有夢寤中有忘皆是覽塵失憶之相憶之則生忘之則滅故下文云因於生滅二種妄塵也以妄對真即是顛倒此二妄塵復為生住異滅四種細相念念遷流吸習此相中歸意根補遺云孤山以記忘為習吳興意謂意根覽吸此記忘之相若學習然長水云吸習中歸者覽此生滅全歸意根熏習不斷苕溪云四相剎那前後不雜故曰不相踰越因於生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體孤山云前舉四相今唯二者以生攝住以滅收異而且以憶者為生忘者為滅內塵法塵也見聞逆流者以憶故則能逆緣落謝五塵即覽塵斯憶也熏聞云落謝五塵阿毗曇名無表色亦云不可見無對色補遺云今謂亦可言逆流者心緣現量心常尋求見聞之境此名為順今落謝塵境返入心故得逆流之名是則心隨於境名順約現在五塵說也境隨於心名逆約落謝五塵說也流不及地者以忘故則成緣於思不及處即失憶為忘也資中云眼耳取外塵境剎那流入意地從外入內名為逆流至第二念緣之不及故云流不及地也如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生熏聞云非寤寐來破共生非生滅有破他生不於根出破自生空生如前何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性若從空生自是空知何關汝入資中云列子云其寤也形開其寐也形交交即合也寤寐二相自是形之開合汝覺知性則無別體故云同於空華是故當知意入虗妄本非因緣非自然性釋要云意根是第七識梵語訖利瑟吒耶末那此云染污意意者恒審思量名之曰意相宗所說但能緣內計第八見分為內我若小乘但說一切諸法皆從六識建立不說七八二識然心亦多種相宗說七識為心根是不可見法非同色法可見勝義也若肉搏心即形如蓮華上有七葉即浮塵根也然今經不論色與不色盡是菩提性中無明勞相皆同空華無體可得即是藏性故也復次阿難云何十二處本如來藏妙真如性阿難汝且觀此祇陀樹林及諸泉池於意云何此等為是色生眼見眼生色相資中云六根六境為生識處故以生義推之長水云前已破根今正破境然亦相對而破故雙問也苕溪云初五陰中以喻比法用破執情次六入中指假設事顯其妄相今十二處乃至七大即於現前見聞之境及近所目擊者示其藏性是則經文從疎及親去假就實善巧開發之意了然可別矣阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色初以根為能生色為所生若見空時所生之色既銷能生之根亦滅故云銷則一切都無色相既無牒前義也誰明空質責其失也若謂色銷根滅其誰明見空之體質乎空亦如是應云若復眼根生空相者見色非空空性應銷等次若復下以色為能生見為所生若觀空時能生之色既銷所生之見亦滅故云亡則都無例前應云見性既無誰明空質空亦如是此義可了故佛言存略或譯者省之誰明空色者若破空生眼見應須責云誰明色相今兼含二義故曰空色熏聞云誰明空質者語以推人意存破法即眼根也然此中破處還復破根者以根如揑目色如空華揑若不生華則隨殞乃至法處例此可知是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性阿難汝更聽此祇陀園中食辦擊鼓眾集撞鐘鐘鼓音聲前後相續於意云何此等為是聲來耳邊耳往聲處擊皷以作眾撞鐘以靜之阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處若復汝耳往彼聲邊如我歸住祇陀林中在室羅城則無有我汝聞鼓聲其耳已往擊鼓之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響若無來往亦復無聞孤山云上以我喻聲城喻阿難耳林喻餘入耳我入城內則林中無我如聲入汝耳他耳豈聞次以我喻耳林喻鼓聲城喻鐘聲我歸林中則城內無我如耳往鼓處鐘處則無若無來往亦復無聞者聲不來耳耳不往聲聞義不立是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性阿難汝又齅此鑪中旃檀此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生旃檀木生於汝鼻為生於空熏聞云旃檀者一云此方無故不翻或曰義翻與樂釋論云一切香木中旃檀為第一谷響云一銖者律歷志云二十四銖為一兩今云一銖言其少也熏聞云張華博物志云有西國使獻香者漢制不滿斤不得受使乃私去著香如大豆許在宮門上香聞長安四面十里經月乃歇又任昉述異記云千里松香聞於十里亦謂之十里香阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非旃檀云何鼻中有旃檀氣稱汝聞香當於鼻入鼻中出香說聞非義若生於空空性常恒香應常在何藉鑪中爇此枯木若生於木則此香質因爇成煙若鼻得聞合𫎇煙氣其煙騰空未及遙遠四十里內云何已聞釋要云但騰阿難計辭自然破得有力蓋由阿難計其香氣生於木中即破云木自燒爇成煙因何得有香氣煙若便是香氣則鼻聞時其煙應須蒙合汝鼻煙且槃旋未至遙遠四十里內何故已聞是故當知香鼻與聞俱無處所即齅與香二處虗妄本無因緣非自然性阿難汝常二時眾中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中阿難若復此味生於汝舌在汝口中秪有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知若生於食食非有識云何自知又食自知即同他食何預於汝名味之知若生於空汝噉虗空當作何味必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚既常受鹹了不知淡若不識淡亦不覺鹹必無所知云何名味苕溪云黑石蜜者善見律云甘蔗糠也其堅如石是故當知味舌與甞俱無處所即甞與味二俱虗妄本非因緣非自然性阿難汝常晨朝以手摩頭於意云何此摩所知誰為能觸能為在手為復在頭釋要云按摩之法常式皆然遺教經中佛令比丘當自摩頭省覺內身俾令進道也省內則剃除鬚髮省外則瓦鉢壞衣令除貪以速證也若在於手頭則無知云何成觸若在於頭手則無用云何名觸若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性阿難汝常意中所緣善惡無記三性生成法則此法為復即心所生為當離心別有方所補遺云此文足可以為山家學者決止觀揀境之蓍龜也天台大師正為揀能緣識陰能造心境真際云意識所緣法塵之境三性不同假實有異補遺云如云惡五陰實法也惡眾生假名也善無記例知軌生物解互不相涉故云生成法則補遺云此中所緣三性乃是法塵心所亦通三性非指心王自通三性若止觀揀境唯觀識陰心王者蓋通觀善惡無記之心體如輔行云一者諸心不出於識是也言生成法者此心所法從心王生故曰生成如善心數軌則善王以成法則所習者善也惡與無記例此可知阿難若即心者法則非塵非心所緣云何成處若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量即汝即心云何汝心更二於汝若非知者此塵既非色聲香味離合冷暖及虗空相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立孤山云知則名心者離心有法法既有知亦名為心也異汝非塵者異汝則非汝心有知則非汝塵既異且非則是他人心矣即汝即心者防轉計也云何下難也汝心唯一云何有二根塵俱知是二心也若非下此意法塵非是五塵五塵及以虗空攝一切法熏聞云問法有二種一心法謂相應諸心數法二非心法謂過未來色法等是則五塵等外更有心法今何以云攝一切耶答此中為破法若非知須屬五塵及以虗空故云攝耳若是心法自屬上文所破也皆現量境自屬五根法塵既不屬五是故責云當於何在離合冷暖即觸塵也都無表示者以意法無形緣落謝五塵故既於色空之境不見法塵之狀豈是空外別有法塵耶心無所緣處義安在荊公云法自性空非是塵也此若有知即是汝心以何為法此若異汝又非是塵則同他人心量以何為法是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性復次阿難云何十八界本如來藏妙真如性長水云梵語䭾都此云界界是因義根境識三互相因故又種族義根境識三各一種族又六根乃至六識自為種族孤山云此十八界雖相對推破而正在六識其根與境前已破故本如來藏者妄執既破藏性即立故此一經原始要終而皆即破即立雖或偏破而未甞不立雖或偏立而未甞不破文有出沒旨常圓備破即空也立即假也破立相即即中也三諦三觀何文不爾讀者行者勤而照之阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界苕溪云如汝所明者小乘所解因緣生法皆是實有不了即空據彼詰之因破其執也他皆倣此阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界若因色生空無色時汝識應滅云何識知是虗空性若色變時汝亦識其色相遷變汝識不遷界從何立從變則變界相自無不變則恒既從色生應不識知虗空所在若兼二種眼色共生合則中離離則兩合體性雜亂云何成界真際云汝見指根也以是不可見有對色故非青等色故不可見能照境發識故可對此是勝義根非浮塵根既不可見即無表示孤山云次若因下破有三意一識隨色滅二界義不立若色滅識不滅則一遷一不遷兩類不同何名種族故云汝識不遷界從何立若隨識滅兩法已滅界相何存故云從變則變界相自無三常不知空惟既不變既從色生秪令識色不應識空也長水云若兼下若根境合生中界者此識中界知不知別故云中離若成別者此識中界一半合根一半合境故云兩合兩合若成有雜亂過知與不知同一界故界義應非釋要云離別也若言根境俱生此識此中間識須有知不知別也若許兩別則知自合根不知合境故云離則兩合又離則兩合者若實別者即知與不知二法合成一識故云離則兩合是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性補遺云孤山科為結無離計若根境識三處都無乃結無也則眼與色下離計也然則眼與色及色界三者應云識界三可也乃至下文皆然似難曉其意恐則眼結上自生與色結上他生及色界三結上共生若云識者不顯共義所以意界文中結云則意與法及意界三乃從根標共義舌身亦然據理合根境雙標共義前三後三互現其義本非因緣總指三性自他共也下去五文意亦如是阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生許聲因聞而有聲相聞應聞識不聞非界聞則同聲識已被聞誰知聞識若無知者終如草木不應聲聞雜成中界界無中位則內外相復從何成長水云初若因下破勝義根也若無前境根自無知若實無知更有何識次若取下破浮塵根也設取浮塵之耳容有聞者若無動靜亦不成聞云何將此可見浮塵雜色觸法為識界耶則耳下雙質二根也聲能生識何假於聞若無於聞聲亦不有縱謂識因聲生又許因根有相則聞聲時即是聞識若不聞識非是界義若聞於識識則同聲既能了之識作所聞之境誰為能知知此聞識自若無下總破境生不應下破共生孤山云識若雜成則一半屬聲一半屬聞故云界無中位既無中識則內根外境義皆不成是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取齅知動搖之性若取肉形肉質乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界若取齅知又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在以香為知知自屬香何預於汝若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及旃檀木二物不來汝自齅鼻為香為臭臭則非香香應非臭若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體若鼻是一香臭無二臭既為香香復成臭二性不有界從誰立若因香生識因香有如眼有見不能觀眼因香有故應不知香知即非生不知非識香非知有香界不成識不知香因界則非從香建立既無中間不成內外彼諸聞性畢竟虗妄肉形即浮塵齅知即勝義苕溪云若名為觸即是身根所覺之塵故曰名觸即塵孤山云言空是汝則不見形言身是汝則不能知兩求不得是無所在伊蘭臭樹也苕溪云從二物不來下以根從境破境既有二根應成兩先定云為香為臭次責云臭則非香香應非臭意在俱聞墮兩鼻之失也若鼻是一下從以境從根破根既唯一境云何二二性不立識界奚存已上皆破根生也問上云以香為知知自屬香豈非破境耶答斯蓋對根而說正破勝義次文不對根辨方破境生也若因下破境生如眼有見既不能返觀其眼例香有識豈能返知其香縱許汝識能知香者此則不合言從香生故云知即非生設若不能知此香者又何名識稱了別耶故云不知非識香不因識識不由香是則界義俱不成立孤山云中間識也內外根境也是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自甞舌為甜為苦若舌性苦誰來甞舌舌不自甞孰為知覺舌性非苦味自不生云何立界若因味生識自為味同於舌根應不自甞云何識知是味非味又一切味非一物生味既多生識應多體識體若一體必味生鹹淡甘辛和合俱生諸變異同相為一味應無分別分別既無則不名識云何復名舌味識界不應虗空生汝心識舌味和合即於是中元無自性云何界生苕溪云鹹淡甘辛略舉四味詳則有六更加苦酢補遺云按涅槃經以劣三修斥邪三修用茲六味恐今文旨舌中泛舉不必言六言和合者眾味共成也俱生者本性不易也變異者燒煑異本也斯等種相若為能生一識體者所生之識既一能生之味豈殊是則一切味塵混而無別苟無別識界義不成熏聞云又一切味下以根從境破識體若一下以境從根破孤山云初因舌是破自生二因味是破他生三虗空是破無因生四舌味和合是破共生前後諸文皆爾此中最顯是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界阿難若因身生必無合離二覺觀緣身何所識若因觸生必無汝身誰有非身知合離者阿難物不觸知身知有觸知身即觸知觸即身即觸非身即身非觸身觸二相元無處所合身即為身自體性離身即是虗空等相內外不成中云何立中不復立內外性空即汝識生從誰立界孤山云麤尋曰覺細伺曰觀觸塵合離是身覺觀之緣既無觸緣則無覺觀也物不觸知秪是物不知觸耳既身知有觸則知是身時即受觸知受觸時即是身也若即唯是觸則無身相若即唯是身則無觸相苕溪云次從阿難下乃是委破初文身觸各生之義先簡物不觸知次顯身知有觸既了身知有觸則曉身觸同時既曉同時故知身觸各生兩無所以合身下推合與離此破中間識界下文內外不成結破根境也中云何立結破中間也是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以法為界阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意唯同與異二性無成界云何立若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝汝識決定依於法生汝今諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅所因既無因生有識作何形相相狀不有界云何生苕溪云又汝識心下俱舍論云集起名心籌量名意了別名識此云識心同彼第七思量即意根也兼了別性同彼第二第三即意根所生之識也熏聞云經文前後皆指阿難現前第六識心破其情執秪可取俱舍小宗釋此三義補遺云思量即彼籌量名意了別性即彼了別名識經意指彼二三同是意所生識故云兼也然彼第二亦云意者蓋識之異名耳故婆娑中明心意識三無有差別如火名焰亦名為熾亦名燒薪熏聞云彼論問曰心意識此三何別答或別不別言不別者心即意識如火名熾等秪是一心有三差別言有別者名即差別或云過去名意未來名心現在名識或云在界名心在入名意在陰名識等上引俱舍釋今經義亦約不別而別分此三名也是故意識名同但約先後以分二義長水云若因意下破根生識法生故心生無故不起離緣下例破所生以無根而況識又汝識下總問同異識心八識也思量七識也了別六識也七八二識俱第六根亦同名意故此總問二俱有過若因法下破境生識五塵不即意攝以各有對若離色下正顯離塵無體生則色下破轉計釋要云七八二識俱第六根者唯識云五四六有二七八一俱依即第六識以七八二識為所依根故云六有二也亦同名意者起信有五意識故七八二識俱得名意也補遺云長水云八識名心七識名意第六名識同在第六名為意根者只緣阿難大眾將破無明故有此解四明光明記以七八同在無記良由七八唯依第六而住釋要云所思者所思惟境也發明者由所思境引發顯明意根故也以由塵發知故今正破第六識兼七八破也苕溪云同意下謂若識同意云何復有能生所生若識異意則應所生同于無情又縱計云所生無識則與能生體性非類又若救云所生有識此識既無前法可緣必須反識其意意若為境根義不成熏聞云世間諸法不離五塵者問前意法處推所緣法則云此塵非色香味等今何取五塵為法耶答前文正推法處故對落謝五塵言之此中既破意識須對現前五塵而說以五意識從現境生故非意所攝者此據意法斥之言五塵之法自屬五根所攝非意家法入之分也資中云以五塵之法各配五根離五塵外意無別法長水云法塵之法故云法法所因即法塵也擕李云色空動靜通塞即色聲香三塵也合離即味觸兩塵生滅即法塵然生滅但是五塵相通離五無體故云生則諸法生滅則諸法滅也苕溪云初破根生次破境生不破共生者例前可知熏聞云應云若意法共生合則中離離則兩合體性雜亂云何成界補遺云此中生滅亦指上六六中意入生滅二塵當以憶忘以言生滅言生則色空諸法等生即意地覽塵斯憶也滅則色空諸法等滅即意地失憶為忘也是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬唯垂哀愍開示眾生中道了義無戲論法孤山云阿難既執昔所談世諦疑今所演第一義諦將恐眾生聞昔和合則滯於有聞今排擯則溺于空不達中道動成戲論故請開示也熏聞云皆因四大和合發明者應知四大有內有外內謂正報外謂依報前五陰中色必具四大一往通內外二往唯在內下七大中地水火風一往通依正二往唯在依空大對四皆屬于境并根與識還是重破三科之法聖言被物各隨所宜得益不同故茲異說耳釋要云又此七大即前三科也地等五大即前十二處根大即六入識大即十八界但以為門不同宜樂有別故重說耳谷響云戲論謂同兒戲言論而無實理也爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世間戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍汝今諦聽吾當為汝分別開示亦令當來修大乘者通達實相孤山云恨無始來一向多聞是厭小也慇勤啟請十方如來得成菩提妙奢摩他等是求大也亦可指法華中阿難默然承佛聖旨阿難如汝所言四大和合發明世間種種變化阿難若彼大性體非和合則不能興諸大雜和猶如虗空不和諸色若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息阿難如水成冰氷還成水次阿難下明彼大性本真則非和合故引虗空喻之即同下文性色真空性空真色也生而復死死已還生故曰生死死生即終始相成也今生後生今死後死故曰生生死死即生滅相續也次舉二喻以相續如火輪相成如氷水荊公云如水成氷留礙不通氷還成水流通無礙此氷與水但是一性四大和合則如水成氷性真圓融則氷還成水補遺云經意言七大之性本是真常體虗無性非不和合又若和合失其真性便有死生之咎此總非文大意如此熏聞云阿難唯執世諦蓋據小宗如來兼破真俗斯約大義汝觀地性麤為大地細為微塵至鄰虗塵析彼極微色邊際相七分所成更析鄰虗即實空性阿難若此鄰虗析成虗空當知虗空出生色相孤山云三藏二乘析法觀空故約彼解以破其執熏聞云汝觀地性者此指析法差別之性也下水火風等皆是俗諦性耳前云若彼大性則指四大之中真諦性也墮文釋義不可混同如地持中有二法性一事法性性差別故二實法性性真實故孤山云言隣虗塵者以此塵極微鄰於虗空故七鄰虗為一透金塵七透金塵為一透水塵七透水塵為一兔毛塵七兔毛塵為一羊毛塵七羊毛塵為一牛毛塵七牛毛塵為一隙中遊塵有解云諸瑜伽師作析色明空觀以假想慧力分分析麤色一微塵猶有十方分但名微塵不名極微更析此微為七分即無十方分位名為極微亦為極略色亦云鄰虗亦云色邊際以不可分析故若析之則成虗空長水云微塵有方分微也鄰虗塵無方分微也即是極微色邊際相今指有方分微名色邊際隨經所出不須和會熏聞云經中言析彼極微者乃通相呼微塵為極微也補遺云若據鄰虗即是極微方名色之邊際今經析極成鄰乃指微塵為極微亦名色邊際所以熏聞記云此乃通相呼微塵為極微也良由望彼隙塵豈不名為色之邊際通名極微耶孤山云阿難下謂既能析色為空亦可合空成色今汝問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗又鄰虗塵析入空者用幾色相合成虗空若色合時合色非空若空合時合空非色色猶可析空云何合若合鄰虗自成方分以類各合非互相成資中云若空不可合色從何生故知此色本無自性汝元不知如來藏中性色真空性空真色清淨本然周徧法界隨眾生心應所知量循業發現孤山云此文別斥下文通斥別則阿難不了藏性通則世間妄起執計然不了真心故起妄計起妄計故不了真心文雖各指義乃同歸此理雖無始本具阿難亦無始本迷故云汝元不知也如來藏即心性中道也即俗而真故云性色真空即真而俗故云性空真色以真俗即中故並云性三諦圓融不一不異非縱非橫名如來藏涅槃亦謂之祕密藏也谷響云以合攝三諦故受藏名是佛所證故名如來藏也眾生在迷理與佛等是故藏性凡聖一如非偏小知復稱祕密俗故十界宛爾故曰性空真色真故生佛寂然故曰性色真空此言理具非關事造故云性也理具如摩尼具寶事造如摩尼雨寶理具如水具波性事造如因風起波若不具寶性餘珠應雨寶若不具波性大地應起波是故一家明圓必談理具深符佛旨妙得自性若說若行皆須了具荊溪云問一心既具但觀于心何須觀具答一家觀門永異諸說該攝一切十方三世若凡若聖一切因果者良由觀具具即是假假即空中理性雖具若不觀之但言觀心則不稱理小乘奚甞不觀心耶但迷一心具諸法爾若不爾者何名發心畢竟二不別成正覺已何能現于十界身土然理必融事事豈殊理理事雙泯故曰清淨本然如水必融波波不離水波水尚一理事誰分心佛眾生三無差別彼彼互攝一一相融故曰周徧法界我心既具生佛皆同今從的示故但云心究竟而言則是我心佛心生心展轉互徧名無差別隨眾生下名藏性隨緣造十界事也則是隨染淨心順差別業發現十界依正之果耳九界高下通名妄染五即聖賢總號真淨以圓五即通為佛界故也由心染淨故業差別然則佛界本了無別對待九界悉名差別隨妄染心順黑惡業則發現三塗依正隨妄染心順白淨業則發現三善依正隨妄染心順無漏業則發現二乘依正隨妄染心順亦漏亦無漏業則發現菩薩依正若以六即甄明則九界隨順妄染心是理即理具而情迷者也如西處無東妄認為東佛界隨真淨心是五即稱理而悟者也悟有淺深故有五位高下長水云無妄相應具無漏法故名清淨非是有為故云本然無所不在故云周徧此則種性體德體量悉具足耳若識此法成三妙觀方知一塵具一切佛法一切心法一切眾生法靡不皆在一微塵中即見盧舍那即見自己即見一切法如一微塵一切法亦爾釋要云成三妙觀者若能體達依正之法性色真空是即空觀所謂一空一切空無假中而不空體達性空真色是即假觀所謂一假一切假無空中而不假色空不二是即中觀所謂一中一切中無空假而不中斯則三觀一心非縱橫並別故台宗諦觀名別體復同是故能所二非二纂註云觀經云是心作佛是心是佛天台疏云是心作佛者佛本是無心淨故有亦因此三昧心終成作佛也是心是佛者向聞佛本是無心淨故有便謂條然有異故言即是心外無佛亦無佛之因也妙宗鈔云釋中二句二初作是別明二初約能感能成釋作作有二義一淨心能感他方應佛故名是心作佛言佛本是無者法身妙絕無有色相見故心淨故有者眾生淨心依於業識熏佛法身故見勝應妙色相也二三昧能成己之果佛故云亦因等也復名作佛初作他佛次作己佛二約即應即果釋是是亦二義一心即應佛故名是心是佛向聞等者佛體無相心威故有是則心佛及以有無條然永異經泯此見故言心是應佛心外無佛二心即果佛故名是心是佛即亦無佛之因一句也既心是果佛故無能成三昧之因也眾生心中已有如來結跏趺坐豈待當來方成果佛初是應佛二是果佛此乃消釋經疏之文若論作是之義者即不思護三觀也何者以明心作佛故顯非性德自然有佛以明心是佛故顯非修德因緣成佛應知外道諸句三教四門所有思議不出因緣及自然性故佛頂經明乎七大皆如來藏循業發現一一結云世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義彼云世間該於九界今於一念妙觀作是能泯性過即是而作故全性成修則泯一切自然之性即作而是故全修即性則泯一切因緣之性若其然者何思不絕何議不忘既以作見絕乎思議復以作是顯於三觀以若破若立皆名為作空假二觀也不破不立名之為是中道觀也全是而作則三諦俱破三諦俱立名一空一切空一假一切假也全作而是則於三諦俱非破非立名一中一切中也即中之空假名作能破三惑能立三法故感他佛三身圓應能成我心三身當果即空假之中名是則全惑即智全障即德故心是應佛心是果佛故知作是一心修者乃不思議三觀十六觀之總體一經之妙宗文出此中義徧初後世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義苕溪云世間通指九界熏聞云別而言之多指人天至別教菩薩已還以謂識心分別計度因緣自然等此如初卷中云諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬補遺云七大中斥世間無知通雖九界別非四趣一者有文如記所引初卷二者有義良以四趣底下慮不及此稟權教者皆名無知不了實義故名為惑執成名相故名曰為因緣義含自他共三性自然即無因性餘皆倣此阿難火性無我寄於諸緣補遺云無我猶言無體也如下水性無定風性無體汝觀城中未食之家欲炊爨時手執陽燧日前求火阿難名和合者如我與汝一千二百五十比丘今為一眾眾雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優盧頻螺迦葉波種乃至阿難瞿曇種姓擕李云陽燧者熏聞云古文作鐆應法師云五石之銅精也崔豹古今註云以銅為之形如鏡照物則影倒向日則火生以艾炷之也又淮南子云陽燧火方諸也論衡曰於五月丙午日午時銷煉五方石圓如鏡中央窪天晴向日出火也如我下例非和合義問破七大中何故唯此火大例和合耶答前地大和合義踈其執易破從火洎識和合義親所計難破且如火性以俗諦觀之灼然因于鏡日艾三和合而生今以眾人和合詰其根本各各不同用顯諸法和合皆是虗假都無真實火大既爾須將此義貫下五大亦復如是所舉舍利弗等三人不同例同鏡日艾三也水風等三隨義可解補遺云記主意以舍利弗等三人例同鏡日艾和合之義水中珠空月三風中衣空面三亦可例同三人和合之義故曰水風等三梵語僧伽此翻眾眾即和合義和合但是假名離彼實人無別體性熏聞云婆羅門者應師云此訛略也具云婆羅賀磨拏義云承習梵天法者其人種類自云從梵天口生四姓中勝唯五天竺有餘國即無諸經中言梵志亦此名也孤山云優盧頻螺云木瓜林迦葉波云龜氏瞿曇星名從星立姓至於後代改姓釋迦阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有孤山云紆屈也縈也曲也亦可訓勞資中云日鏡相遠日去人間四萬踰繕那熏聞云一踰繕那二十里也汝猶不知如來藏中性火真空性空真火清淨本然周徧法界隨眾生心應所知量阿難當知世人一處執鏡一處火生徧法界執滿世間起起徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義阿難水性不定流息無恒如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水長水云迦毗羅此云黃赤色斫迦羅云輪鉢頭摩云赤蓮華訶薩多未詳或翻事水太陰精月也孤山云月正中曰晝方諸出水珠也淮南子曰方諸見月則津而為水論衡云十一月壬子日夜半時于北方鍊五方石為之狀如盃盂向月得津高誘註曰方諸陰燧大蛤也熟拭令熱以向月則水生也許慎又注曰諸珠也方石也譯人蓋取後許慎之說補遺云燧字本作鐩亦通作鐆鐩乃是水火鑑也若作此燧本是塞上亭守鋒火又是鑽燧之燧涅槃疏問恒與常何異答不從因緣為常始終不異為恒此水為復從珠中出空中自有為從月來阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降若從珠出則此珠中常應流水何待中宵承白月晝若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行汝更諦觀月從天涉珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有林木既不吐流明知此水非從月降熏聞云皆同陷溺者乙咸乙陷二切水沒也孤山云精猶性也汝尚不知如來藏中性水真空性空真水清淨本然周徧法界隨眾生心應所知量一處執珠一處水出徧法界執滿法界生生滿世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義阿難風性無體動靜不常汝常整衣入於大眾僧伽梨角動及傍人則有微風拂彼人面真際云僧伽梨大衣也熏聞云僧伽梨此無正翻義云雜碎衣以條數多故若從用為名則曰入王宮時入聚落時衣慧上菩薩經謂之大衣袈裟從色得名此是不正色亦云壞色南山業疏云本作迦沙至梁葛洪撰字苑下方添衣名道服也遺教經云著壞色衣三衣通稱此風為復出袈裟角發於虗空生彼人面阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒佛汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和非合不應風心無從自有長水云動靜不同故云性隔心亦性也汝宛不知如來藏中性風真空性空真風清淨本然周徧法界隨眾生心應所知量阿難如汝一人微動服衣有微風出徧法界拂滿國土生周徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義阿難空性無形因色顯發資中云虗空與色二俱是假亦相因有體不離色故小乘以明暗為體大乘以空一顯色及極逈色為體上見空明顯色下見空明逈色今謂此經空大先立後破涅槃虗空亦復如是何以明之彼經佛說眾生佛姓猶如虗空此即立也迦葉乃以虗空對於四大謂空是有故佛以一十復次而遮其非意恐眾生認所喻之性同能喻之空此即破也今言空性無形者蓋云無依正之形耳而亦因依正之色顯空大之相故云因色顯發斯則正取涅槃能喻之空非無色也故下文鑿井得空乃是逈色之類況前文云縱令虗空亦有名貌下文云見覺頑空等然則頑空豈無色耶應知今經說空為大者以明迷妄有虗空依空立世界又言發真歸元此十方空皆悉消殞是故次四大後須說空大此先立也至下文作三句推之方是破也補遺云今謂今經破妄中所明空者乃空一顯色同涅槃引喻顯佛性徧之文今顯真中所明空者乃如來藏性同涅槃佛性之空破凡夫妄情也資中順經破妄因色顯發以明空體如室羅城去河遙處諸剎利種及婆羅門毗舍首陀兼頗羅墮㫋陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少孤山云剎帝利王種也奕世君臣仁恕為志婆羅門淨行也守道居正絜白其操毗含商賈也貿遷有無逐利遠近首陀農人也肆力疇壟勤身稼穡凡茲四姓清濁殊流婚嫁不通飛伏異路頗羅墮真諦翻捷疾亦利根慈恩云婆羅門凡十八姓此居其一旃陀羅云嚴幟惡業自嚴行持標幟謂搖鈴持竹也此空為當因土所出因鑿所有無因自生阿難若復此空無因自生未鑿土前何不無礙唯見大地迥無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出若因鑿出則鑿出空應非出土不因鑿出鑿自出土云何見空汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出補遺云若因土出至空何不出者此因土中有二初破空出土入井次若無下破轉計空無出土入井也空有為入既為所破恐轉計云空無出入也破云空若無出入則非因土出而有空相既不相因顯是一物也土則出時空何不出空土既同何得土去空留耶汝更下破共生佛意更合審諦之相乃在下文如云鑿從人手乃諦審也土因地移乃諦觀也文中雖有三諦字初一句總標耳下文根大中有四審字初一句總標下三審字審其明暗空三不能生根大至下識大中只有二詳字乃對見相二義空大中因土是自生因鑿是他生二義合是共生經文從鑿空虗實去只是重結無因耳意云鑿實空虗二者體性相乖故不相為用猶言不相為因又若因土出下破有二義一約空土相異破二若無出入下約立土相即破若此虗空性圓周徧本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅苕溪云四大後所以點空均名五大者蓋諸經常談唯四而已此既異彼故特言之下根識中其例亦爾通名大者且從事立智論云佛說四大無處不有故名為大苦言大性周徧必須指事即理攝末歸本不可名而名之是為如來藏也阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入汝全不知如來藏中性覺真空性空真覺清淨本然周徧法界隨眾生心應所知量阿難如一井空空生井十方虗空亦復如是圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義阿難見覺無知因色空有見覺即見精如鏡鑑像得現量境非如識之分別青黃故曰無知以前破識破見原有二層皆對空顯破故四大後又舉空見識本如來藏以迷妄故分一精明而為見聞覺知與六和合也有不達斯旨者強以見覺為勝義根此大悞矣勝義乃清淨色法所成是法相宗語下文明云性見覺明覺精明見明矣如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異擕李云此問四句一同二異三亦同亦異四非同非異但經文分兩同異各成一句阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時非暗若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成若此見精與暗與明非一體者汝離明暗及與虗空分析見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異從何立見明暗相背云何同離三元無云何或異分空分見本無邊畔云何非同見暗見明性非遷改云何非異分析見元即見精明元下文謂見根也心法而云根者此六如根為輪生死證妙常之根本元一精明所分故也荊公云相見無性離三元無性見無相本無生滅汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出見覺空頑非和非合不應見精無從自出擕李云前四句破因緣生此破無因自然生也若見聞知性圓周徧本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅孤山云前於六根廣破眼見餘根並略今類通顯示其性皆徧聞即耳根覺即鼻舌身根知即意根不言覺者略也長水云然小乘多出四大大教始有空名根之與識同名大者未見經出諸圓實教圓觀諸法根境識三周徧不動雖有其義不立大名今此特出真為最後究竟垂範也釋要云大教始有空名者大乘中說五輪即地水火風空也空性周徧時處悉有故名大根境識有周徧義者圓覺云覺性徧滿圓無際故當知六根徧滿法界根徧滿故當知六塵徧滿法界等又光明亦有六大皆不彰灼准此七大最顯明也或可單牒見之一根意云見性本無見性可得也覺知此性也阿難汝性沉淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異汝曾不知如來藏中性見覺明覺精明見清淨本然周徧法界隨眾生心應所知量如一見根見周法界聽齅甞觸覺觸覺知妙德瑩然周徧法界圓滿十虗寧有方所循業發現長水云曾則也鼻舌二根境合始覺故名甞觸覺觸身也覺知意也補遺云如上六根文中佛難鼻根聞香同身觸難則知鼻等亦得觸名以鼻別香臭舌辨甘辛乃是甞觸甞猶試也身不能試香臭等但名覺觸耳然准今文甞觸猶在乎舌以味到舌觸義尤著煙氣到鼻觸義猶疎是故今文甞觸在舌矣荊公云六根皆受性於覺故於見言性見覺明覺精明見耳聽鼻齅舌甞身觸及意知根亦與見同皆受覺性言覺觸則身根性覺言覺知則意與舌根性覺耳鼻二根推類可知所謂性見覺明覺精明見者覺明從覺起明覺精合神有覺亦與知同體以見非知故可言精而不可言知也上言見覺無知則其不可言知明矣見性屬覺以明合精故先言覺明復言覺精矣世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義阿難識性無源因於六種根塵妄出汝今徧觀此會聖眾用目循歷其目周視但如鏡中無別分析汝識於中次第標指此是文殊此富樓那此目犍連此須菩提真際云根俱照境故如鏡中識有了別故能標指此識了知為生於見為生於相為生虗空為無所因突然而出阿難若汝識性生於見中如無明暗及與色空四種必無元無汝見見性尚無從何發識若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發若生於空非相非見非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別孤山云處此二非者非相非見也空則同無言無識也應云無則同空互其言耳有非同物言有識也既生於空已無相見之物是故責云縱發汝識如何分別若無所因突然而出何不日中別識明月汝更細詳微細詳審見託汝精相推前境可狀成有不相成無如是識緣因何所出識動見澄非和非合聞聽覺知亦復如是不應識緣無從自出補遺云汝更細詳總標也微細詳審別舉也詳之審之乃對見相長水云和謂了別澄謂照境熏聞云識動見澄非和非合者此約根識動靜相違名非和合若望他境還破自生耳若風大中云風空性隔非和非合既對境論乃破他生也若火大中云日鏡相遠非和非合此乃自他相望正是破和合性隨義而說故非一塗若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅荊公云識雖在六根而性非從所性非從所即非因緣亦非自然阿難汝心麤浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有汝元不知如來藏中性識明知覺明真識妙覺湛然周徧法界含吐十虗寧有方所循業發現荊公云於空云汝心昏迷空性覺故於見云汝性沉淪見性外現故於識云汝心麤浮識心內潛故浮則但認浮根麤則不達識精所謂性識明知覺明真識者明知受明於覺覺明從覺起明識體是知受明於覺故先言明知後言覺明言妙覺者覺妙於此言十虗者識及六根所起用處有而不實故云十虗風無實體依土發現故云國土水火為世間用故云世間色不言世間國土者離色無世間國土離世間國土無色空所圓滿非特世間國土又非有而不實故云十方方無遷流空亦如是補遺云含吐猶卷舒也十方虗空在真心中為小故能卷舒之世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義爾時阿難及諸大眾蒙佛如來微妙開示身心蕩然得無罣礙長水云三科七大即相即性本自不生今則無滅生滅去來皆如來藏圓徧不動清淨本然此是如來宣勝義中真勝義性故云微妙開示身心圓明故云蕩然更無諸法可為所疑故無罣礙是諸大眾各各自知心徧十方見十方空如觀手中所持葉物向執心在身中謂言是我真性今知空在心內如片物持於掌間下文亦云空生大覺中如海一漚發一切世間諸所有物皆即菩提妙明元心心精徧圓含裹十方孤山云上云各各自知即能覺之智心徧十方即所覺之理常住真心徧融十界故曰十方天台釋法華經深達罪福相徧照於十方亦云十方即十界也見十方空者謂十界脩業發現之空也迷妄有空比真為小故以掌葉為喻一切世間等謂依空立世界也即十界循業發現依正之法耳皆即菩提等謂十方虗空十界依正一法叵得皆我真心含褁十方者即此真心具足十界而非斷滅觀此文者豈疑無情有性無情作佛之說耶向執心外有法今悟法法唯心離實相外無法可得故世間物皆菩提也菩提云覺覺即是佛若執無情無佛性者請看此文縱信無情有性仍說不具諸法遂令佛性派成其二一具法佛性謂有情性二不具法佛性謂無情性若此派分何異他說無情草木無佛性耶今立量示云一切草木是具法定具諸法故為宗因云有佛性故同喻如有情正教量云地水火風均名七大性真圓融皆如來藏妙覺湛然周徧法界含吐十虗寧有方所手鑑云立量示謂西域諸賢聖僧所解法義皆以三量為定一比量二現量三佛言量亦名正教量比量者以宗因喻比度也如遠見煙必知有火亦非虗妄現量者親自現見不假推度自然定也佛言量者以諸經為定也若但憑佛不自比度證悟者秪是泛信於己未益若但現量自見為定不勘佛語焉知邪正外道亦親見所執之理修之亦得功用自謂為正豈知是邪若但用比量既無聖教及自所見約何比量比度何法故須三量勘同方為決定然今但用二者以未親證故故西域諸師既以親證三量備矣反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從太虗處我心中尚如片物在掌更觀所生微質於心大小若何故舉空中一塵存亡此辨喻至小也如湛下再舉漚喻了身無生也前喻猶存小相今喻相本無生故此二喻各顯一意纂註云若以文往觀則有空塵一喻可無海漚一喻有海漚一喻可無空塵一喻若以義往求則非空塵一喻無以顯心徧而身局非海軀一喻無以顯身局即心徧二義相須故用二喻亦猶河圖洛書相為經緯八卦九疇相為表裏前後文雖為顯心徧身局且欲見身心一體故並用海漚一喻二卷六卷至辨魔文欲談此心至大虗空世界至小故復以雲點太清為喻觀者詳之了然自知獲妙本心常住不滅了謂顯了然語辭也明解在心故云自知迷妄名失了悟為得既言常住不滅故非新得但顯現耳禮佛合掌得未曾有於如來前說偈讚孤山云圓頓之解昔所未有而今得之妙湛總持不動尊此下四句即顯三寶初句是能說教主即佛寶次句是所說經教即法寶後二句是受益之人即僧寶佛證三德之理說三德之教阿難前以三德為請今獲三德之益故此讚述也今文六字是讚一字是號妙湛即讚真諦是般若德也總持是讚俗諦即解脫德也不動是讚中諦即法身德也又即三而一故曰妙湛即一而三故曰總持即非三非一故曰不動譬摩尼珠即瑩徹即具寶即體圓雖三宛然而是一珠雖是一珠而三宛然故涅槃云如來之身亦非涅槃摩訶般若亦非涅槃解脫之法亦非涅槃三德各異亦非涅槃是故不一不異如摩尼珠者名大涅槃是佛所證也然茲所證乃由因中修乎三止三觀寂照心精而得斯果故阿難前請云然動啟請十方如來得成菩提妙奢摩他三摩禪那最初方便蓋請如來自行之因欲依修學既蒙開示已悟常心故還以三觀之因所克三德之果以讚於佛也尊即十號歸一由證此三號世中尊首楞嚴王世希有上四字是號下三字是嘆首楞嚴大定之總名此云事究竟冥三德之理故曰究竟別而往目即奢摩他等三焉阿難以別名而請今舉總名而嘆以顯圓定三一一三展轉無礙也出偏小上喻之以王是則行從理而得名教從行而立稱若然者教行理三悉號楞嚴而今正舉能詮以歎也五時設化逗機非一未若純顯圓常直明心性故於如來在世五十年間所說經中最為希有一教希有開權顯寶故二行希有圓融妙定故三理希有常住真心故銷我億劫顛倒想不歷僧祇獲法身億劫顛倒想謂無始無明也長水云初句斷障即前身心蕩然得無罣礙從無始來妄認四大六塵緣影為身心相迷己為物觀大觀小皆為顛倒虗妄亂想今聞開示不執不認故名為銷孤山云若藏教如迦旃延子明四階作佛義三阿僧祇修六度行百劫種相好因然後樹下斷結獲五分法身此歷僧祇非不歷也若通七地齊羅漢八地扶習潤生經無數劫然後七寶菩提樹下一念與真理相應斷除殘習氣獲真空法身此亦歷僧祇非不歷也若別教地前緣修萬行動經塵劫方入初地分證中道法身又如唯識云地前方歷一僧祇初地滿二僧祗八地至等覺方是第三僧祇然後至妙覺位乃獲究竟法身此亦歷僧祇非不歷也此皆方便之談時長行遠今言不歷即圓悟自心名大直道法華八歲龍女南方作佛華嚴初發心時便成正覺胎經云凡夫賢聖人平等無高下唯在心垢滅取證如反掌皆與此文同焉圓人一生尚有超登十地者況初住乎說乃超諸位入於如來妙莊嚴海圓滿菩提歸無所得又云此經圓頓如教行道直成菩提此乃圓修圓證不斷而斷無成而成豈待時劫方成佛道哉長水云下句悟道即獲妙本心常住不滅也阿僧祇云無數劫波此云時分方便教說一切諸佛皆於無數劫中修波羅蜜然後成佛今於此會言下頓悟獲妙本心常住不滅何歷僧祇之有乎故下文云歇即菩提不從人得何藉劬勞肯綮修證又云彈指超無學又圓覺云知幻即離不作方便離幻即覺亦無漸次皆此義也然據今文且敘解悟如文云各各自知心徧十方知即解也敘雖論解不無證悟以隨人入位淺深不同且如兩教二乘稟權菩薩圓教根性未發信者悟此境界即是解悟若曾已入信解行位聞法開悟即是證悟更有已入地住即增道損生乃至妙覺破惑證理發真妙用皆隨位淺深而論廣狹願今得果成寶王還度如是恒沙眾將此深心奉塵剎是則名為報佛恩初句敘佛智即佛道無上誓願成也即於此身期獲證果故曰願今次句敘悲即眾生無邊誓願度也下云除惑即煩惱無盡誓願斷悲智二法即菩提心正是道體復以要誓總而持之即三法周備四願具足發菩提心畢於此矣苕溪云初即佛道誓成以攝法門誓學由學法門而得果故次即眾生誓度以攝煩惱誓斷由斷煩惱方度生故長水云了悟覺性即前獲本妙心得法身也二發菩提心即本悲智二願也後修菩提行即向下問修行方便也謂若不了身心云何知正道故多劫修行非真菩提次不發大心無由起行故善財先陳三句同佛化上求下化悲智二心一一先悟妙覺明性從深理生故名深心以此二心承順塵剎諸佛化行無二無別故名為奉四句結報恩大論云假使頂戴經塵劫身為床座徧三千若不傳法度眾生畢竟無能報恩者苕溪云以上願心歸奉塵剎如來是報我佛微妙開示之恩伏請世尊為證明五濁惡世誓先入如一眾生未成佛終不於此取泥洹苕溪云前願度人如釋迦故云願度是眾今願取土如釋迦故曰五濁誓入補遺云此中誓入五濁乃行因與物結緣之相耳法華中聲聞辭五濁者以初入佛道今進道逾深慈悲逾重不辭五濁欲流通也若法華授記淨土乃佛果之化耳大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場前明三德之體故云妙湛等此明三德之用故云大雄等涅槃云佛性雄猛故知大雄是法身之用也又曰是諸聲聞無有慧力故知大力是般若之用也又曰慈即解脫故知大慈是解脫之用也既而理顯智極斷圓乃能無謀而化故今請更開導除我細惑長水云前云未成不滅約時堅論今云於十方界約處橫說舜若多性可銷亡爍迦羅心無動轉真際云舜若多空義爍迦羅堅固義類拔折羅此云金剛阿難懇陳請願二利周圓表此真誠故此比較虗空之性尚可銷亡我堅固心終無動轉
