body:
  text: 一名中印土那蘭陀大道場經於灌頂部録出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌迦釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集注明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閲鋟阿難白佛言世尊如來雖說第二義門今觀世間解結之人若不知其所結之元我信是人終不能解世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧孤山云牒前二決定義審詳煩惱根本同體無明品數至多又迷境不一故曰諸生滅去來常在妄中故曰俱瘧病隔日而發通惑除如安日別惑在如發日涅槃哀歎品中二乘白佛亦舉此喻熏聞云前云則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶斯則已明六根是結而下文請云今日身心云何是結從何名解此有二義一為鈍根者重發起故二雖疑所結意在於解應作二義消此一約阿難權證初果俱生尚在則與果內無明俱滅俱生二約阿難實證初住別惑未盡則與界外無明俱滅俱生若作阿難昔居初果今入初住通敘二義者見惑已斷如安日俱生未破如發日又通惑先落如安日別惑猶在如發日隔日之喻不亦明乎唯願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難衆生得免輪回不落三有作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切衆生為出世因作將來眼以閻浮檀紫金光手摩訶難頂即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祇陀林灌如來頂是諸大衆得未曾有孤山云六種震動表破六根惑也微塵如來光灌此佛表同依此法得成正覺由談解結法門是修證的要雖未即示耳根入處以因此說生起後文故茲現瑞而為表發長水云從前至此四度放光今文諸佛同放仍又同說蓋初為說教破邪次為揀妄顯理次為定見生智今為入觀成行前三依教發解未能除障今文觀成破惑正動無明入法界理故諸佛放光同示解結體無二源故知說教破耶顯真揀妄立信成解皆為今日成行取證故與前文異耳補遺云前第三番釋迦放光照十方灌諸如來頂已旋至大衆此唯彼佛放光却灌今佛之頂仍又同說者前放心光則表佛佛證理是同此事在彼故放光唯彼仍同顯說六根結解所以䇿進破同體惑也於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物長水云覺明初起能所妄生湛性既分六根成異根塵偶對業性即生輪轉無窮生死長縛斯六根為生死結縛之源也一念無念能所都亡根塵識心應時消落無真可得無妄可除覺性圓明法眼清淨斯六根為自在解脫安樂妙常之源也其猶氷水由氣動移雖有變異濕性常一結解同貫亦復爾也阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物佛告阿難根塵同源縛脫無二苕溪云根塵識三攝十八界本如來藏妙真如性故曰同源凡夫迷真故縛聖人悟真故脫迷悟雖殊始終理一故曰無二識性虗妄猶如空華苕溪云同源必兼識性虗妄必具根塵猶織綺之法互現其文也阿難由塵發知因根有相相見無性同於交蘆塵相通指六境知見略示二根根境對論攝十二處斯皆兩法相涉內無實性故喻若交蘆經語巧妙從寬至狹上攝果義故三此攝處義故二下文又略其境單言其根故云知見立知等谷響云至若三數已上言交者並須如數明之謂三交四交等法華云有八交道是也是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物孤山云立知略見無見略知經文互影也執知見實有名立知見此即妄心是生死輪回之本達知見無性名無知見此即真心安樂妙常是則唯一真心更無別法熏聞云阿難請云今日身心云何是結從何名解如來開示阿難現前知見若立知者即名為結現前知見若無見者即名為解無明涅槃乃結解之法爾時世尊欲重宣此義而說偈言真性有為空緣生故如幻無為無起滅不實如空華熏聞云證真云初半頌立有為是空即真性有為空緣生故如幻具足三支比量量云真性有為是有法定空為宗因云從緣生故同喻如幻事次半頌立無為無起滅不實若空華亦具三支比量若取義便須移不實兩字歸上句移無起滅三字歸下句以不實是宗中空義故應立量云真性無為是有法定空為宗因云無起滅故同喻如空華問下半頌無真性言今何強添答上真性言須通下轉云云論標四句與此小異真性有為空如幻緣生故無為無有實不起似空華上卷廣明前二句下卷廣明後二句補遺云三支即宗因喻也現量緣境親證比量度義無謬又宗鏡曰三支校量理貫互明以破立為宗所以教無智而不圓木非繩而靡直比之可以生誠信伏邪倒之疑心量之可以定真詮杜狂愚之妄說故得正法之輪永轉唯識之旨廣行事有顯理之功言有定之力長水云泛論偈頌總有四種一阿耨窣覩婆頌不問長行并偈但數字滿三十二即為一偈手鑑云慈恩云室盧迦三十二字處中頌也西方五種句一短句上五字下三字四句為偈二前句唯六七字還四句為偈三中句八字成句四後句成九字乃至二十六字五長句從二十七字已上不限之也諸論指諸大乘經皆云若干偈即是此也如云華嚴十萬偈等其中結偈處極少餘悉是長行故知十萬之數即三十二字之頌也二名伽陀此云諷頌諷即是頌謂孤起偈即下六解一亡等或名直頌謂以偈說法非頌長行三名祇夜此云應頌一與長行相應之頌由於長行說未盡故雜集云不了義經應更頌釋二為後來應更頌故涅槃云佛昔為諸比丘說契經竟爾時復有利根衆生為聽法故後至佛所即便問人如來向者為說何事佛時知已即用本經以偈頌曰我昔與汝等不識四真諦是故久輪轉生死大苦海四名蘊陀南此云集施頌謂以少言攝集多義施他誦持故如云一切有為法等四句即攝大般若八十餘科二十萬偈為何意故經多立頌略有八義一少字攝多義故二讚嘆者多以偈頌故三為鈍根者重說故四為後來之徒故五隨意樂故六易受持故七增明前說故八長行未說故今此經內於前四中二三所攝八意之內正唯三七兼二五八然又長行偈頌相望有五對立例謂有無廣略雜合先後隱顯又慈恩說偈頌有十謂利鈍前後曲直難易真俗取捨標釋智辨解持說行此十義十對每對皆上字是長行下字是偈頌一為利鈍二根二為前後二衆生三為曲屈曲顯示直直言其事兩樂四為難易兩解難解者長行委曲而說易解者偈頌撮略而說五為真俗兩隨真謂就理直言俗謂隨俗文飾六為取舍兩分取善也舍惡也七為標釋二別標列事理說釋義味八為智辨二殊九為解持二界十為說行二別長水云此文正破無明法執為無為有實體者皆迷真性一真法界本非對待故此對破即是解結之因也應立量云真性有為元空不有從緣生故猶如幻事真性無為本來不實無起滅故猶如空華第二量中先因後宗譯人語便亦無所失言妄顯諸真妄真同二妄猶非真非真云何見所見中間無實性是故若交蘆苕溪云長行但破於妄今恐捨妄取真故重遣之孤山云諸之也語助耳言根塵虗妄則顯涅槃真實對妄說真待對不絶真亦成妄故言二妄龍樹云若法為待成是法還成待對妄說真猶皆遣蕩云何更有妄中根境乎猶非能遣也真非真所遣也非真即妄見即是根所見即境中間下頌相見無性同於交蘆中間謂根境二法體中無性結解同所因聖凡無二路苕溪云欲明解結泛舉所因所因者六根也汝觀交中性空有二俱非迷晦即無明發明便解脫孤山云初二句重牒前喻令審觀言空則蘆有外相言有則蘆中本空以喻根境妄執似有其體元空次二句頌知見立知及知見無見等解結因次第六解一亦亡根選擇圓通入流成正覺二句為華巾結解張本二句為諸聖圓通張本陀那微細識習氣成暴流真非真恐迷我常不開演擕李云梵云阿陀那義翻執持即第八異名以能執持種子根身等令不散壞故且阿陀那識真諦謂之第七者蓋別取第八染分立名唯識百法謂之第八者則通取染淨和合為目解深密經謂之第九者乃別取第八淨分言之故攝論云世尊說法凡有三種一染汙分二清淨分三染汙清淨分譬如金藏土中有三一地界二金三土輪以地譬依他性具染淨二分八識以土譬分別性為生死染分七識以金譬真實性為涅槃淨分九識問陀那之名既通三識何故擕李釋此頌文須云第八異名耶答以順現文名義便故既云習氣成暴流又曰真非真恐迷是則顯有染淨二分雖解深密名為第九不如唯識第八義親補遺云吳興以第八中具有三分譯人隨取一義以立其名果如此言則使第七末那亦第八之異名耶今黎耶外自有陀那如何便指八中染分耶以第七陀那本非異名何須言及但以今經陀那與深密陀那在第九論異名可也今補遺云斟酌陀那名義有異乎吳興之說也擕李曰阿陀那義番執持只就此名可以會通諸異也若七識云執持者蓋執六識為外我八識為內我故名陀那今經云陀那執持義蓋執持種子根身等令不散壞耳若深密陀那執持者蓋取第九為諸識所依故言執持執持名通故使經論立名有異是則今楞嚴執持種子名陀那乃第八異名深密執持為諸識所依乃第九異名豈與夫執我之陀那為同年耶由是言之深密經中陀那自指第九為暴流種子依持之處與今楞嚴不同乃用唯識百法第八異名政由經中真非真之言通乎真妄第八之義也長水云阿陀那云執持即第八識能執持種子起現行故第八多名此名最通三位之中相續執持位也手鑑云多名者或名為心或名阿陀那或名所知依或名種子識此等四名通一切位次局名者或名阿賴耶此名唯在異生有學非無學位或名異熟識此名唯在異生二乘諸菩薩位或名無垢識此唯佛地然通名中唯阿陀那名義最寬通因及果所以不標餘名也三位者一我愛執藏位即一切異生及七地已前菩薩小乘前三果皆起我執執第八見分為我故第八識名阿賴耶此言執藏二善惡業果位即通一切異生至十地滿心二乘無學等位由善惡因感無記果果異於因名異熟識三相續執持位即通因果一切位以第八執持諸法種子等令不散失故名阿陀那也擕李云習氣者謂薰習氣乃種子異名也以第八識中無始習氣微細生滅流住不息故如暴流解深密經云如暴流水生多波浪諸波浪等以水為依五六七八皆依此識然彼經中別顯染中淨相故離八外別說九識理實陀那更無別體佛於小乘經并大乘權教不說此識若說即真則生怖難信若說為妄又撥同斷滅故云恐迷不開演也深密偈云阿陀那識甚微細一切種子如暴流我於凡愚不開演恐彼分別執為我補遺云此與深密偈云我於凡愚不開演意則𠃔同節疏曰凡謂凡夫愚即二乘蓋由如來於小乘經部不詮八九故有是言約教則通當教中亦不說也而孤山吳興並通別圓恐有失意初心聞之起計失之遠矣豈有圓人初心不如八識業用何以為圓人乎豈獨圓人哉別教初心通伏三惑不八九如何可論能造是佛性耶補遺云此下頌文重示前結解法體耳前云知見立知未知法體是何此中明為指無始八識妄執也自心下二句即結相也不取下三句解相也是名下四句示解結之體乃三止也自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立約能解亦如幻故下文云如幻三摩補遺云上自心指陀那妄心下自心指如來藏心衆生妄心乃於如來藏中少分起計蓋指能取之根非幻成幻法則指所取六塵指六塵也本是妙明心體故曰非幻由妄取故成諸幻境即上知見立知也意言由取知見生出境界不取無非幻者若不取著皆如來藏性亦非幻之名尚無況有幻境可得此示知見無見也是名妙蓮華金剛王寶覺如幻三摩提彈指超無學孤山云中道妙法不染二邊如世蓮華不著泥水真空蕩相若金剛寶所擬皆碎妙有禮虗況幻術事其象無實初阿難以三止為請今如來還以三義為歎彈指超無學顯三止之功也若入地住則超小乘阿羅漢位縱入相似亦超無學以同除四住此處為齊若伏無明三藏則劣又縱有觀行亦超無學如太子處胎貴壓羣臣頻伽在鷇聲逾衆鳥補遺云若作超入之超則應以地住佛果為無學無學舉登地住此顯速疾能至大覺然至覺時亦無自果可為所得故云超無學耳准天台意超入無學有分滿也此阿毗達磨十方薄伽梵一路涅槃門孤山云阿毗達磨此云無比法即指前法無以比喻十方如來皆依此法入證涅槃涅槃是果三止是因因能入果喻之以門資中云薄伽梵具足六義所謂自在熾盛端嚴名稱吉祥尊貴於是阿難及諸大衆聞佛如來無上慈誨祇夜伽陀雜糅精瑩妙理清徹心目開明歎未曾有阿難合掌頂禮白佛苕溪云祇夜云應頌又云重頌即頌上長行伽陀云諷頌亦略云偈不因長行但訓美而頌之二頌合明故曰雜糅精瑩此指能詮也熏聞云孤山云前四偈是重頌後五偈是孤起從解結因次第已下今謂前四偈中言妄顯諸真等四句亦是孤起後五偈中自心等五句亦是重頌若然則雜糅精瑩於義惟明妙理清徹此為所詮也我今聞佛無遮大悲性淨妙常真實法句心猶未達六解一亡舒結倫次唯垂大慈再愍斯會及與將來施以法音洗滌沈垢長水云由偈云解結因次第六解一亦亡故此疑之熏聞云性淨等二句當以所詮能詮分之即時如來於師子座整涅槃僧斂僧伽梨攬七寶几引手於几取劫波羅天所奉華巾於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大衆又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大衆亦復如是次第酬佛此名為結真際云涅槃僧此方裙號僧伽梨大衣也興福云劫波羅天即髑髏天四天王太子奉如來巾長水云劫波云時分巾是彼天所奉谷響云疊即布名字或作㲲佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾秪為六結終不至七亦不停五云何如來秪許初時第二第三不名為結佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異於意云何初綰結成名為第一如是乃至第六結生吾今欲將第六結名成第一不不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名佛言如是六結不同循顧本因一巾所造令其雜亂終不得成則汝六根亦復如是畢竟同中生畢竟異苕溪云同謂一真之性理本無差譬巾之體也異謂六根之精事用有別如巾之結也次第所結之巾本是一巾造作六結耳真如之理常住不變畢竟同也衆生妄想確乎不拔畢竟異也以真顯妄言妄難除也異兼一六故吳興以六根之精同為巾結也佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成谷響云酒德頌曰陳說禮法鋒起如劒戟之鋒刃相競逐而起長水云此中應云欲得不成願樂一成復云何得佛意云汝意嫌此六根妄隔樂成一體有何方便而得成一答意若解此六亦不成一以一對六而立六若不生則無所對故無一義補遺云曉喻意華巾之體本無六一之名真性也結綰成六六根也望巾本一涅槃也若解結已六名既廢一名亦無對彼六結得一巾名耳佛言六解一亡亦復如是由汝無始心性狂亂知見妄發發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相苕溪云六根之精元是一真之性以隨緣故在眼曰見精在耳曰聲精等此皆如第二月揑所成故若能隨根脫黏內伏六既融一一亦斯亡如解結已巾亦無用次取不用巾為一亡也良由如來藏心本非六一二乘空之強名為一故曰六解一亡知見發妄此屬能見之相勞見發塵即對所見之境唯妄與勞五住備矣次雙喻其義次示塵勞之相阿難言此勞同結云何解除如來以手將所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏牽右邊又問阿難如是解不不也世尊佛告阿難吾今以手左右各牽竟不能解汝設方便云何解成阿難白佛言世尊當於結心解即分散佛告阿難如是如是若欲除結當於結心補遺云若按二決定義五濁六根無非剎那故知今言結者須指現前生滅妄心為六根要結心也偏掣況不得解結之要也阿難我說佛法從因緣生非取世間和合粗相如來發明世出世法知其本因隨所緣出如是乃至恆沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由苕溪云既令解結當於結心欲使選根而修圓行故示佛法從因緣王反顯若無因緣佛法無由而生也如前文云譬如琴瑟雖有妙音若無妙指終不能發是則圓修定慧是今因緣若三藏中事六度等皆是世間粗和合相長水云中道正觀如幻三昧能解無始無明根結能於彈指超證無學能起無方不思議用此名佛法從因緣生豈同世間所說粗相以佛無明永盡得一切種智故能知此結解因由非餘境界孤山云世謂六凡出世謂四聖知此十界皆因於心隨無明之染緣則出九界隨教行之淨緣則出佛界故法華云佛種隨緣起准法華疏以中道正因為佛種今知其本因皆因於心心即佛種也然而法華正指真心此中正指妄心雖真妄體同理須甄別涅槃云亦有因緣因滅無明則得熾然三菩提燈苕溪云如是下謂佛有權實二智實智冥理權智鑒物權實一念佛理同時理則照窮正性物則察其本末肇論云聖心無知無所不知上云發明世出世法乃至知其現前種種元由者昔權知所鑒也既於情無情等照了不昧顯今所謂解結之法及選根之義悉是鑒物宜然固無差謬矣是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待長水云前云若能於此悟圓通根與不圓根日劫相倍故令選擇阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除苕溪云綰巾成結雖有次第黏湛成根必無倫緒不可以喻而難乎法蓋言見聞覺知六用差別如次第綰生耳選擇六根隨於一根發觀如次第解也慤師云意明六根不可齊觀但依一根入證自然消六斯會經意補遺云就法言之觀一根此根脫黏餘五圓據一根居先故云次第終非約喻必次第解也此正同天台止觀去尺就寸之義佛言六根解除亦復如是此根初解先得人空空性圓明成法解脫解脫法已俱空不生是名菩薩從三摩地得無生忍苕溪云小乘析觀乃是作意先破人執次破法執然後會入空平等理熏聞云毗曇人空法不空成實人法俱空會入空平等理謂偏真涅槃也此涅槃亦空名平等空大乘體觀人法無殊空非前後衍門三教皆名體觀通教但破界內二執不破界外二執別教先內次外圓教內外頓融今言此根初解先得人空亦猶前文如澄濁水沙土自沉蓋任運而然也應知人空是破五陰假名即見惑也法空是破五陰實法即思惑也乃至破涅槃淨法即無明也俱空不生即平等空所空既盡能空亦滅如前火木然諸薪已亦復自然如是三空皆以中道而為觀體從所空言之則有人法平等之異故分三空就能空言之秪一真如空耳空前知見立知故特先言人空也一空一切空其法執等任運自空故曰空性圓明等阿難及諸大衆蒙佛開示慧覺圓通得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母若復因此際會道成所得密言還同本悟則與未聞無有差別惟垂大悲惠我祕嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授孤山云迷真常性如失家鄉飄流生死喻以旅泊無真常智如失父母獨守迷妄喻以孤露我本無心思慮希望而不期為佛兄弟也故以失乳等為況稟言達理了迷非迷故云還同本悟既昔本無迷故今亦無悟迷悟性一本自常然則聞後之性與未聞性無有差別圓通本根佛若不說餘莫能解故稱祕嚴五時教極示滅非久故此宣說名為最後作是下口說身禮顯請既畢而唯以內心默念為機故云退藏密機冀佛冥授謂望佛冥鑒密機而授其要道也補遺云身口請已更以虗心密扣故曰密機爾時世尊普告衆中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢生我法中得成無學吾今問汝最初發心悟十八界誰為圓通從何方便入三摩地孤山云從佛口生從法化生此下二十五聖觀十八界及以七大乃是開合之殊耳識大合於六識根大則合於六根餘之五大則總收六境以六境之體不出地水火風及空故也但言十八則已攝七文云十方如來於十八界一一修行皆得圓滿無上菩提又此十八秪是六根以各開根境識三故是則言其六根其義亦周此亦是證佛所說三科七大皆如來藏心義也補遺云楞嚴行法中所論正行祇是初心二決定義因地發心止觀二法也詳審根本煩惱所破惑相也秪以六根是煩惱之本根根內伏則法法圓通故佛問大衆圓通之門於是二十五聖各從一根一塵則證前根塵結解同體無謬矣至下文殊唯取耳根者乃別順此土機宜非謂圓通獨在耳根也佛問大衆具有二途一謂證前六解一亡遍通根塵隨一而入此通意也二為生起順土當機唯在耳根此意別也應知通處常別如他土以音聲為利則陳那為所取之別矣別處常通觀音之耳根若望他土亦在所陳之例非別而通也由是言之佛欲顯十八界雖俱圓通順土則別須顯門門是別順土義也門門皆圓通義也宗極豈識此意乎孤山云初觀六塵悟道云云此由無始用諸妄想此想不真故有六塵流轉今知常住真心一體無二故隨觀一塵悉得悟道憍陳那五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園觀見如來最初成道於佛音聲悟明四諦佛問比丘我初稱解如來印我名阿若多苕溪云憍陳那姓也此翻火器其先事火故阿若多名也此云無知謂知無生之理故又翻為解故曰我初稱解等大哀經具云解本際擕李云初太子踰城棲隱山谷父王淨飯乃命家族三人一阿濕婆二跋提三摩訶男拘利舅氏二人一憍陳那二十力迦葉往彼營衛彼時捨去及太子成道先為五人三轉四諦法輪佛問解耶憍陳那最初答解淨居諸天亦言其解故以為名熏聞云中阿含云佛滅度後諸上德比丘皆住雞園竦疏引智論云昔有野火燒林林中有雉入水漬羽以救其焚纂要云即雞頭摩寺二說未審妙音密圓我於音聲得阿羅漢佛問圓通如我所證音聲為上孤山云妙音密圓者密悟圓理也或曰涅槃說身因而皆小聖淨名入不二則俱大士唯此二十五聖大小相參而云方便多門歸元無二且陳那身子近悟偏空普賢彌勒久證圓理久近兩異偏圓二殊安得圓通其歸一撥對曰涅槃敘昔則小無大分淨名方等則大隔小乘其談所證豈得相混至若今經二乘作佛與法華同塗闡提有性將涅槃共轍教以開顯偏即圓融故使鹿苑之所證同成一乘之頓理切乎普賢諒無慚德此約實行聲聞也若乃內祕大道外現小乘則鹿苑以來何嘗非大既經發迹一揆何疑此約權行聲聞也悟理既同誰拘遠近以此觀之則小大相參之說怡然理順遠近偏圓之惑渙然氷釋補遺云此下敘二十五聖圓通大小難判如陳那等試云在小今問圓通試云在大敘昔之義豈得已大二說互有不同觀孤山之說所得多矣但以妙音密圓以為悟而吳興立義多有違戾一者此經明十八界皆圓通門引諸聖所入為證若所入大小真中有別何以明圓通義齊耶前解結之法左右偏掣乃非解法豈有圓通仍存小解況圓通之名實從大立固不可用偏真以定斯目二此經已聞法華開顯故諸聖不問大小並入圓通開權非一如云汝諸聲聞乘入菩薩乘又曰定性聲聞皆獲一乘寂滅場地故謂諸聖吳興反責孤山以菩薩二乘檀自開權是何言與三法華已聞師弟之本迹故此經大小不妨並從本地明圓通意如身子等直敘本地並云從曠劫來等而吳興猶欲從迹曲說今補遺曰二十五聖章章必有多段初敘昔所證或大或小也次敘圓通從開顯故一槩從大如陳那章初敘昔證在小也妙音密圓去敘圓通也昔雖在小今已開顯乃悟昔日音聲實圓通門也故曰妙音密圓也我於音聲得阿羅漢者若作小果則于密圓取其少分故昔證小果此中敘圓通猶帶言昔證彰密圓中含容小果耳此從小說若作大消則從今日悟圓通後入地住之無學也已上並從實行而論若從本地久悟圓通所得無學殆非今日之比身子空生富樓那三章直敘曠劫不可猶將區區塵苑之小以為商榷也釋要云了唯聲法門離聲更無一法一切法趣聲也餘皆倣此優波尼沙陀即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名尼沙陀既云觀佛最初成道故知觀不淨相正是小乘無漏行法言悟諸色性者斯乃聲聞悟性念處南嶽師云觀五陰理性念處熏聞云謂觀色不淨觀受是苦觀識無常觀想行無我故雜心論偈云是身不淨相真實性常定諸受及心法亦復如是說以從不淨白骨微塵歸於虗空者由多貪故修對治法成就九想一脹想二青瘀想三壞想四血塗漫想五膿爛想六噉想七散想八骨想九燒想發真破惑即壞法羅漢也備如次第禪門塵色既盡妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上補遺云此章先敘昔證成無學道在小也從色塵既盡去敘圓通又曰得阿羅漢者知與前成無學道有異途矣今敘圓通以妙色密圓我於昔日少分取證顯圓通中含容大小耳下香嚴中得阿羅漢既為妙香密圓亦是大含小義所指先小後大其義然香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相我時辭佛宴晦清齊見諸比丘燒沉水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號擕李云宴安息也晦宴寂也清靜之室謂之清齊資中云非木等者觀性空也凡言性空必推四性今當以木為自煙火為他和合為共空為無因此似衍門觀幻有即空之相下諸聲聞亦多是小乘觀實有滅空之義塵氣倐滅妙香密圓我從香嚴得阿羅漢佛問圓通如我所證香嚴為上苕溪云前云香嚴童子則從菩薩受稱今云得阿羅漢蓋敘昔日所證如下文月光童子初得小果後於佛所得童真名預菩薩會藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦酢鹹淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知承事如來了知味性非空非有非即身心非離身心分別味因從是開悟蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子孤山云苦酢等是六味也衆味共成名和合味直爾采用名俱生味循鍊炮炙名變異味苕溪云由事佛故必聞正法即於味性了生無生空有謂味塵也身心謂舌識也以味從合中知故相對言之味非空故非離身心味非有故非即身心中道之性於是乎顯補遺云金五色皆金石白瑛紫瑛石膏鍾乳石脂五石鍛鍊藥皆金石也因味覺明位登菩薩佛問圓通如我所證味因為上跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家今得無學彼佛名我跋陀婆羅孤山云跋陀婆羅此云賢守自守護賢德復護衆生或云賢首以位居等覺為衆賢之首熏聞云古翻菩薩為開士開士始士也開謂心初開故始謂始發心故資中云准法華經有二萬億威音王佛前後出世最初佛像法中此跋陀等為增上慢毀常不輕故千劫墮阿鼻獄罪畢值佛後出家苕溪云水因謂所觸之因也塵體即能觸之緣也塵本無染體亦常淨能所如幻二邊皆空故中間覺觸之心安然契性矣孤山云得等覺分果也妙觸宣明成佛子住佛問圓通如我所證觸因為上摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫光金塗佛形像自爾已來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心我觀世間六塵變壞唯以空寂修於滅盡身心乃能度百千劫猶如彈指我以空法成阿羅漢世尊說我頭陀為最長水云摩訶迦葉翻大飲光氏紫金光尼在家時婦孤山云即九次第定中第九滅受想定也今迦葉於雞足山尚能入定以待彌勒頭陀新云杜多此翻抖擻熏聞云九次第定謂四禪四空滅受想也妙法開明銷滅諸漏佛問圓通如我所證法因為上補遺云此敘圓通准前應云妙法密圓我於法塵得成羅漢今只云妙法開明語略意周也阿那律陀即從座起頂禮佛足而白佛言我初出家常樂睡眠如來呵我為畜生類我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見照明金剛三昧我不因眼觀見十方精真洞然如觀掌果如來印我成阿羅漢孤山云二觀五根悟道云云此由無始用諸妄想此想不真故有六根流轉今知常住真心一體無二故隨觀一根悉得悟道孤山云阿那律此云如意或曰無貪此人過去以一食施辟支佛天上人間如意受樂故名如意爾來無所乏短故名無貧訶我為畜生增一阿含云佛在給孤園為衆說法阿那律於中眠睡佛說偈訶曰咄咄何為睡螺螄蚌蛤類那律於是達曉不眠眼根便失因是修禪得四大淨色半頭而見觀三千界猶如掌果今云金剛三昧見十方精真而與昔異者此經開顯故約內祕以談昔引物機乃約現小而說苕溪云阿含云修禪蓋總略而示今云金剛三昧則別顯其名非謂金剛唯喻大定地論云二乘得金剛喻定如阿難入電火三昧此喻小乘無漏之智耳智論云那律天眼四大造色半頭清淨佛天眼四大造色遍頭清淨天台智者云三藏佛全頭天眼徹見無礙故知全半之名但約分滿相望不以大小為異也下文善現天尚云精見現前陶鑄無礙況今羅漢發真無漏豈不得云真精洞然耶長水云多樂睡眠如來訶云咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字故訶云畜生類佛問圓通如我所證旋見循元斯為第一旋其妄見修彼真元塵見既消精真洞發一切無礙豈止障外細色而已補遺云旋根本之妄見循藏性之真元圓通之要也若前敘昔雖有精真之言只是鹿苑事耳周利槃特迦即從座起頂禮佛足而白佛言我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息我時觀息微細窮盡生住異滅諸行剎那其心豁然得大無礙乃至漏盡成阿羅漢住佛座下印成無學長水云周利槃特迦此翻蛇奴於路所生或曰繼道資中云槃特過去為大法師善解經論有五百弟子祕吝佛法不肯教人後生暗鈍手鑑云成論曰慳有五種一住處二護他物三稱贊四財五法法慳七報一生生盲二生生愚癡三生惡家四受胎或死五為諸佛惡六善人遠離七無惡不造後生暗鈍即法慳之餘報也宿習善故遇佛出家有五百比丘同教一偈經九十曰得前忘後佛知其根教以數息因茲得道熏聞云我時觀息等此似於數息中修六妙門觀所言六者謂數隨止觀還淨云云前三是定後三是慧定愛慧䇿能發真明故得漏盡成阿羅漢釋要云百日一句者兄見其弟誦之不得乃謂弟曰若不能誦何不還作白衣槃時聞已詣祇洹門泣佛問具答上事佛云成菩提由汝兄佛即以手牽詣靜室令誦守口攝意身莫犯如是行者得度世誦得上口佛曰汝今年老唯誦一偈不足為奇須解其義所謂身口意十觀其所起察其所滅由之生天由之入淵申之得道菩提自然因此心開得羅漢果佛問圓通如我所證返息循空斯為第一憍梵鉢提即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物應念得超世間諸漏內脫身心外遺世界遠離三有如鳥出籠離垢銷塵法眼清淨成阿羅漢如來親印登無學道擕李云憍梵鉢提此云牛王智論翻為牛呞緣起與今經異熏聞云有牛呞病食之已久復出嚼之法華疏云牛若食後常事虗哨其病似之孤山云了味無味名為一味雖舉味塵蓋顯於舌故下即云觀味之知能知乃舌耳法門為味如何顯是舌須知既云如來示我一味清淨乃是佛為說所食之味了無味相亦必須依事中味令體之成法門也非體舌也非物味也內脫身心即正報解脫外遺世界即依報解脫佛問圓通如我所證還味旋知斯為第一補遺云還味是塵旋知是根以舌乃合中知不約味塵無以顯舌是故經文兼味而說今敘圓通亦言其二既言還旋以味舌反歸藏性非體非物畢陵伽婆蹉即從座起頂禮佛足而白佛言我初發心從佛入道數聞如來說諸世間不可樂事乞食城中心思法門不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學孤山云畢陵伽婆蹉此云餘習昔為婆羅門故餘習多慢如罵河神為婢非彼實心蓋習氣也谷響云過恆河水咄小婢駐流河神為之兩派神往訴佛佛令懺謝即合掌云小婢莫瞋大衆笑之懺而更罵佛言本習如是實無高心釋要云雖覺覺痛者雖覺即能觀也雖觀能覺知所覺痛也覺清淨心者覺亦觀也無痛痛覺者無所覺痛及能覺痛之覺也雙覺者兩觀也即能觀觀慧也補遺云然此敘昔在小之文縱遣二覺妄去真存真空而已若下敘圓通中純覺遺身者應以如來藏性即妄是真故曰純覺達陰即法故曰遺身故純覺遺身之言猶附敘小有云也佛問圓通如我所證純覺遺身斯為第一長水云能觀所觀能痛所痛寂無一法故云純覺遺身須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙初在母胎即知空寂如是乃至十方成空亦令衆生證得空性蒙如來發性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見即成無學解脫性空我為無上補遺云此下空生身子滿慈皆敘本地者蓋由此三人如來向已發其本迹之事其義既著四衆知聞故於楞嚴本地直述心得無礙久證空也亦令衆生證得空性顯菩薩根也頓入如來寶明空海同佛知見本地何疑然此三尊者章既同述本地其敘昔之小乃是垂迹之小雖小而大同體權也不同前陳如等敘昔直且在小也若陳如等章敘圓通中含容之小與垂迹之小雖似不同同為同體權也又復應知陳如等非無本地垂迹之小空生等亦合同有含容小乘文寄兩端互現其旨耳又如小般若云我得無諍三昧也非空法不能無礙佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一資中云初以單空空於諸相次以重空空其空相舍利弗即從座起頂禮佛足而白佛言我曠劫來心見清淨如是受生如恆河沙世出世間種種變化一見則通獲無障礙我於中路逢迦葉波兄弟相逐宣說因緣悟心無際從佛所家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生苕溪云世出世間四諦之境也種種變化生滅之相也由眼識明利故云一見則通等此且約解言之長水云心見清淨謂眼識發智見世出世間一切諸法無不通達根本元由斯則得世俗智分別諸法名為法眼孤山云三觀六識悟道云云此由無始用諸妄想此想不真故有六識流轉今知常住真心一體無二故隨觀一識悉得悟道迦葉波兄弟即三迦葉也餘經皆言身子路逢馬勝聞諸法從緣生而得悟道今云逢迦葉波等者彼對小機止聞小法此對大機乃聞大道所問既異從人亦殊苕溪云觀身子在家屬十二年前故不可以人而異於法況今文云聞說因緣義同馬勝緣生之語當知悟心無際即初果見道也故阿含明初聞馬勝說法得須陀洹果後至佛所七日遍達佛法又云經十五日得阿羅漢以是言之見覺明圓亦從小說設作大解則前之悟心須該四果後云羅漢方受真名長水云見覺明圓即真覺妙明圓滿成就從眼識顯斯由如來開示妙法令我獲證故云口從法佛問圓通如我所證心見發光光極知見斯為第一從於眼識發顯智光智光極處即佛知見即三智五眼一時具足故名為極普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其子弟菩薩根者修普賢行從我立名世尊我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁獲安慰令其成就擕李云行彌法界曰普位鄰極聖曰賢此非地前之賢乃是金剛喻定居衆位之頂名之為賢長水云心聞即耳識發明也從於耳識得真圓通入法界理生滅識滅寂滅現前境智相冥一體無二還於心聞起用分別衆生知見可發明者即現其身手鑑云謂不假耳根而於意根便發耳識故曰心聞此即一根發六識名互用自在也然不同餘聖具談初因者則與觀音無異也若然何得不是此界之當機耶謂塵非根則不了別識非根則不發生若不依根如何發識根親識疏是故文殊約此以揀又心聞之義即是真因初心絶分故揀之矣即以心聞合法界體境智無二故法界中所有衆生心中發明普賢行者無不了知無不起應冥顯二機皆獲其益若於下即顯機顯應縱彼下即冥機冥應又機召於應應赴於機乃有四句謂冥機冥應冥機顯應顯機顯應顯機冥應此四為根本一句有四句展轉多句如別所明補遺云按此手摩其頂為安慰䇿進故佛問圓通我說本因心聞發明分別自在斯為第一孤山云心聞發明內證也分別自在外用也孫陀羅難陀即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及俱絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如煙身心內明圓洞世界遍成虗淨猶如琉璃煙相漸銷鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提孫陀羅云好愛妻名也難陀云歡喜己號也慈恩兩名共翻艷喜為簡放牛難陀故標其妻如來親弟教觀鼻端白者以多散亂且以事相止心為入道方便也按禪波羅蜜云五處繼心名繫緣止一頂上二髮際三鼻柱四臍間五地輪外國金齒三藏說此五禪門擕李云前周利槃特觀出入息即約鼻根今約觀識條然有別長水云前作數息即約根說今約觀識緣鼻端白以駐其心令不散動初觀白相經三七日後見息氣猶如煙相此觀成時身心內發若身若器一時空淨內外映徹猶如琉璃此即因觀生滅息相觀心融明將發空慧遂洞身界猶在方便未能忘緣故見其煙變成白相無生空慧既見現前諸息不生純是智慧慧光明照一切皆如世界衆生無非圓妙由斯漏盡當得菩提苕溪云由觀鼻識似發十六特勝禪也熏聞云十六特勝者此禪興六妙門橫竪淺深之異耳此禪始從知息出入乃至觀於棄捨攝四念處能見三界九地所證境界故云圓洞世界等又能於地地中以觀照了破四顛倒發真無漏故云心開漏盡等亦可是通明之相禪門備焉通明謂三事通觀若觀息時即照色心觀色及心亦復如是故曰通明又修此禪能發六通三明故補遺云世尊記我等者前敘昔在小今欲敘圓通指法華授記已悟圓通也佛問圓通我以銷息息久發明明圓滅漏斯為第一富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣說苦空深達實相如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我說法無上苕溪云宣說下指小乘法如是下示大乘義始阿含終般若故云乃至長水云師子吼者無畏說也內以禪定智慧伏斷見愛外以神通說法降制魔外則涅槃城存三寶不絶也熏聞云以音聲輪者謂身輪現通口輪說法意輪鑒機此口輪也助佛輪轉者此法輪也口論是能轉法輪是所轉佛問圓通我以法音降伏魔怨銷滅諸漏斯為第一補遺云滿慈舌識故以法音言之中道法音降無明魔怨也說法可以制外故以魔怨言之優波離即從座起頂禮佛足而白佛言我親隨佛踰城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏承佛教戒如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來衆中綱紀親印我心持戒修身衆推無上孤山云優波離此云上首以其持律為衆紀綱故補遺云綱紀猶言總攝或翻近執以佛為太子時彼為親近執事之臣故資中云此言隨佛出家律云度諸釋種先度波離稍似有異蓋初雖踰城後方入道耳約二百五十戒各有四威儀合為一千循三世轉為三千將三千威儀分配身口七支為二萬一千復約對治三毒及等分成八萬四千今舉全數爾也孤山云性業不由佛制持之性自是善犯之性自是罪如殺盜等遮業由佛遮制犯之得罪如懇土等手鑑云且如一部律中僧尼二部戒本對境制戒雖多不離性遮二種凡對有情境制者名性對非情境制者名遮以一性字收一切性以一遮字收一切遮性自是等者如佛未制戒前輪王以十善戒化人至佛出世比丘有犯而重制故故南山云性惡通於化制又佛出世方有餘戒如墾壞生外道譏言無有慈心損彼命等故佛隨制遮彼之謗故南山云遮戒因過便起應知性遮是所犯之戒業是所招之報又犯性戒得兩重罪一業道二違制苦犯遮罪但有違制故南山引經云受戒者罪重不受者罪輕斯之謂也佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一孤山云次第執心者由戒清淨故發定慧也定持心則止其散慧持心則照其昏故云心得通達苕溪云按下文云先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起是則執心非約定慧明矣然以身心配於大小此據粗細一往分之菩薩非不檢身聲聞亦防意地如諸篇聚制遠方便豈非意地乎今所敘者正言其小故執身及心從粗至細以防身識之微也身識既滅真智現前斯所謂戒淨有智慧便得第一道補遺云此上首章敘圓通文也按下文先持聲聞四棄後行菩薩清淨律儀執心不起今云次第執心指大乘戒直制心地以為圓通也只以此章為規模乃驗前後敘昔在小敘圓通在大為可信矣大目犍連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺伽耶那提三迦葉波宣說如來因緣深義我頓發心得大通達如來惠我袈裟著身鬚髮自落我遊十方得無罣礙神通發明推為無上成阿羅漢寧唯世尊十方如來歎我神力圓明清淨自在無畏孤山云優樓頻螺此云木瓜癃胸前癃如木瓜故伽耶山名即象頭山也亦云城城近此山故那提河名一兄二弟故身子云逢迦葉波兄弟即其人也苕溪云神名天心通名慧性而此心性即意識發明也大乘發如來藏小乘發根本禪熏聞云四禪四等四空總名十二門禪然其神通多依四禪而發孤山云六神通中唯漏盡通是其內證餘之五神通皆屬外用問身子采菽俱逢迦葉同聞因緣何以身子從眼識證真采菽由意識成道答人之根性宿植不同故使聞法得益有異譬如藥草種類若干一雨所潤而各滋茂補遺云文從初至成阿羅漢敘昔證從寧唯世尊去敘圓通也袈裟此云不正色非五方正色也翻梵書本單作後人各添衣字佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一旋無明歸湛性意根法門烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲有佛出世名曰空王說多淫人成猛火聚資中云烏芻瑟摩此云火頭觀火性得道故以名焉孤山云四觀七大悟道分七云云此由無始用諸妄相此想不真故有七大流轉今知常住真心一體無二故隨觀一法悉得悟道長水云貪欲盛者見鬼獄因因為欲火所熾果為業火所燒因果相當俱名火聚苕溪云貪淫盛者現業來報皆招火聚教我遍觀百骸四支諸冷暖氣神光內凝化多淫心成智慧火苕溪云教我下遍觀四大皆是觸塵之境百骸四支地也諸冷暖氣即水火風也三昧既著故曰神光內凝以多欲人火大偏盛故變淫火而成智火補遺云初後遍觀四大知火大盛所以別觀初成小果後發大心將非普現色身以執金剛神輔佛揚化者乎從是諸佛皆呼名我名為火頭我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔怨補遺云於火法門無上首耳從心發大願去敘圓通也佛問圓通我以諦觀身心暖觸無礙流通諸漏既銷生大寶𦦨登無上覺斯為第一暖觸即空故云無礙性火妙發故曰流通內凝外現故生寶𦦨持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現於世或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直谷響云闤市垣也闠市門也毗舍浮佛現在世時世多饑荒我為負人無問遠近唯取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齊我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平苕溪云毗舍浮翻一切自在賢劫前同尸葉佛時出世補遺云七佛過去莊嚴劫後出世次第三佛毗婆尸佛尸棄佛毗舍浮佛現在賢劫前出世次第四佛拘留孫佛拘那含牟尼佛迦葉佛釋迦佛三四中間隔遠空劫止從釋迦種相已來故如戒疏云七佛者並在此土應化迹在百劫之內長水云平治路地待佛經過佛以自證法門開示令平心地一切皆平者心為萬法所依平等含育長養一切故名為地若能平等性觀與此相應則一切法無不平等自在無礙由是佛名一切自在耳孤山云地由心造故心平則地平也我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸刀兵無觸者以身塵界塵一一平等空寂各各不相知各各不相到體本無生故無觸摩我於法性悟無生忍成阿羅漢回心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首苕溪云我于法性下由分證法身而權取小果故以無生忍簡之初自度後化他是謂回心也補遺云經從回心入大去敘菩提所證前敘小證耳雖有無生忍言乃小教真諦耳我有神力者未證四果之前得五通也常平心地等小乘亦談諸法由心則心平時世界亦平也我即心開真空發也見身微塵與世微塵等無差別者若正若依積塵以成本無自體空理平等蓋由持地所敘先為比丘乃至成阿羅漢初敘小證也回心今入去方是大乘故無可疑矣所謂今者非指釋迦一化之中蓋言後時耳長水云此人開悟大乘而證小果者以隨彼意樂要入即入如西域諸菩薩等皆悟大道嫌棄小乘猶如咳唾多因王請即證小果由人意樂豈不然乎佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地補遺云宜陽應乾注經曰月是太陰能生於水與所值佛皆由所習而得名號觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別長水云一味水性更非餘大之所相傾故名無奪補遺云身中之水淨穢不相凌奪仍與外之香水海大小不相凌奪以其性水真空是同故使大小無相奪倫也釋要云從海湧現故曰浮幢准華嚴經華藏海中有大蓮華其蓮華中有諸香水海一一香水海為諸佛剎世界之種華嚴世界在香水中故言浮幢王剎華藏二十重纍高是幢最為廣大故稱王今觀身水與彼海同故無差別水想成時但得無我猶執小相全是於身未亡法見故未無身我於是時初成此觀但見其水未得無身資中云此定果色隨心所變如十遍處入定則有出定則無不同業果色共業同感不造世業方得清淨小乘事障除發得欲定并得無色不見自身今非謂此也准下性合真空方得亡身者乃是陰入皆如達陰即法故曰無身耳然初成此觀已云性水真空何下文遇無量佛方云性合真空邪須知上文只云性水一同但是解心未有證悟下云性合方入證耳當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲願盻而去長水云當為下初修假想雖見其水與香水海等無差別但自心見非通他人今定力轉勝果色亦然乃通他見亦定果也不同十遍處想成自見耳手鑑云十遍處者前身中水與外香水無差別者作此觀時所見皆水即定果色隨心所遍正同十遍處入定則有出定則無十者青黃赤白地水火風空識皆從所觀境遍滿得名也亦名十一切處行相如法界次第孤山云定力增勝能令外見如稠禪師入火光定其室如焚補遺云續高僧傳第十六初習禪傳止列二十三人第八僧稠本傳無入火光定事稠從道房禪師房佛陀之神足也佛陀本傳云造別院居室內有小兒見門隙內炎火赫然驚告院主卒無所見此與月光皆兒童見之相類又後梁法聰禪師至襄陽傘蓋山築室梁晉安王往見一谷猛火洞然良久忽變為水水滅堂現以事相詢乃知爾時入水火定宋高僧傳感通篇玄光傳光見南嶽思大和尚證法華三昧升堂者一人入火光三昧一人入水光三昧通慧傳系曰處胎經以禪定攝意入火界三昧剎土洞然愚夫謂是遭焚若入水界三昧愚夫見謂為水投物于中菩薩心如虗空不覺觸撓此非三乘所能究盡回視曰顧邪視曰我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失孤山云身子居蘭若當道入定有二鬼王是過去世怨以手擊之出定白佛佛言若不入定遭彼所擊必作微塵賴蒙定力得平復耳釋要云經云舍利弗親剃髮竟正身端坐以衣覆頭于時有二夜叉一名為害二名復害爾時復害與為害言我於今日欲以拳打剃頭沙門為害云此有神德汝勿因此受長夜苦時復害以惡熾盛故故以拳打打已地烈現身陷入地獄今云為害經舉同時逢者也苕溪云按智論明諸聖人皆有身苦今言已得羅漢久離病緣者此蓋過去曾取小果既無見思惑業之事是離分段病苦之緣凡夫得病由十因緣一久坐二食不節三多憂愁四疲勞五淫欲六嗔恚七忍大便八忍小便九制上風十制下風今羅漢已離此緣其時回心却入三界本無實疾所以疑之然此菩薩所修三昧與前持地觀法大同但由無明尚在未得無功用道是故出定不知痛緣補遺云淨名經中持世菩薩出定不覺魔嬈疏云別教緣修出定不能即寂而照所以不知例今月光位在地住之前非真修位所以不知瓦礫之事初證法身分亡變易之身身中水性與香水海性同合真如空藏之性爾時童子捷來我前說如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會長水云前猶見水今合真空無水可得皆如來藏故云亡身即證法空也佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉具云吠琉璃此翻遠山寶由觀身心風力所轉觀成得用身心洞徹猶彼琉璃故以名焉所值之佛名無量聲亦由觀風而立名耳經中既云開示菩薩本覺妙明即云觀此世界及衆生身皆是妄緣風力所轉當指初迷覺明動為妄業故有衆生界轉動之風也菩薩用觀窮動轉之源耳達其源則見本妙之不動也從喻得名所證實相內外映徹若琉璃焉故下自敘曰身心發光洞徹無礙開示本覺而觀風者風力即動相既屬于妄欲顯無動無動即本覺也由是欲顯無動而觀於動我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時覺了此群動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙觀察世界身心皆由風動風自何生而動諸物物不動時去至何所風既無從物成妄動故見十方一切衆生狂自鼓閙同一虗妄本無所因依教觀察受教未久即證無生由觀生滅證無生滅故見東方不動佛國我身及器咸即本覺妙明元體故云發光洞徹無礙佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一釋要云意云我既證得本覺與十方如來所傳妙心無異虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身爾時手執四大寶珠照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍苕溪云定光佛即然燈佛也因觀四大色質既得無邊法身為顯此身遍融一切故執寶珠照十方等而表示之上以珠表色此以鏡表心色從心造全體是心故放寶光灌十方等長水云十種光者十身盧舍那也苕溪云華嚴云清淨妙法身湛然應一切前同虗空法也今入塵國應也說三乘法為佛事稱四悉機為隨順補遺云四悉具云四悉檀名出智論悉是華言檀是梵語悉之言遍檀翻為施以歡喜生善破惡入理四法遍施有情故曰四悉檀也南嶽云如大涅槃胡漢兼舉南嶽親證不應錯用天台智者依之釋義佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月證明我從彼佛而得出家心重世名好遊族姓爾時世尊教我修習唯心識定入三摩地擕李云彌勒正云梅怛利曳那此翻慈氏真際云以不達遍計本空依他幻有故耽世名好遊族姓唯遮境有識簡心空唯有自心心外無法手鑑云然此唯識具一切法門而衆生有兩種一多著外色少著內識二多著內識少著外色如上界多著內識下二界多著外色外色多內識少如學問人多向外解破外向內故須此觀又唯心識定有二種謂影像真實地前加行作影像唯識觀初地見道作真實唯識觀一切法以識為相真如為性影像真實雖殊總名唯識觀長水云初修此觀已得對治知世名利有無厚薄皆我自己唯識所變不從他來由此馳求頓爾皆息孤山云此相似位歷劫已來以此三昧事恆沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現長水云此觀初成位當解行今得三昧已入初地名真見道謂以一實根本無分別智與法界冥合能所一如無有二相故唯識頌云若時于所緣智都無所得爾時住唯識離二取相故當爾之時名方親證乃至盡空如來國土淨穢有無皆是我心變化所現孤山云此分真位苕溪云謂盡虗空界所有佛國等唯心所現若以四土言之心即寂光變化即實報方便同居淨穢但是三土之相互有起滅耳從法身識性流出報應無量佛身識性之言乃庵摩羅世尊我了如是唯心識故識性流出無量如來今得授記次補佛處佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依他及遍計執得無生忍斯為第一手鑑云識唯一識復有分別識無分別識故此唯識具一切法門破外向內令觀明白十法界法皆是一識識空十法界空識假十法界假識中十法界中專以內心破一切法若外觀十法界即見內心當知若色若識皆是唯識唯色應知亦有分別色無分別色色寂心寂二俱三昧苕溪云此中三性亦曰三相廣在解深密經及唯識論一遍計所執性二依他起性三圓成實性資中云橫計有情衆生壽者及我我所乃至情非情異執有實體周遍計度名遍計性計有因緣世間和合建立名相執此假相定從種生雖無我執自然種性假色心等為衆生五蘊等法名依他性無漏智體及真如法界名圓成性補遺云昔賢有頌曰白日看繩繩是麻夜裏看繩繩是蛇麻上生繩猶是妄那堪繩上更生蛇麻繩蛇境也蛇喻遍計性繩喻依他性麻喻圓成實性本秪麻耳愚迷不了以麻為繩抑又不了以繩為蛇依他執我遍超我計我本性空圓成一實北方承習豈徒然哉大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧梵語摩訶那鉢此云大勢至孤山云觀經云以智慧光普照一切令離三途得無上力是故號此菩薩名大勢至三昧梵語此翻正心行處譬如有人一專為憶一人專忘如是二人若逢不逢或見非見專憶如念佛衆生專忘謂衆生不念佛者佛恆普應生不能感是故不定逢與不逢或見非見也專忘作專念者非二人相憶二憶念深如是乃至從生至生同於形影不相乖異佛與衆生憶念相應故佛與生如影隨形從生至生永免乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為苕溪云母憶子如佛專憶子逃逝如人專忘縱得逢見不蒙法利與逃逝無異舍衛九億家不其然也熏聞云智論云舍衛有九億家三億眼見佛三億耳聞而不見三億不聞不見子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開補遺云勢至所說心開既而自得如所謂何藉劬勞故云不假方便如染香人身有香氣此則名曰香光莊嚴長水云染香有香氣念佛得見佛因果相稱誰謂不然我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土苕溪云以證驗修念佛之心不可單作事相而解念存三觀佛具三身心破三惑無生忍相方可入焉如資中所引觀經是心是佛等釋之斯亦大要也空觀念報身破通別見思假觀念應身破界內外塵沙中觀念法身破根本無明分別雖爾然復須了即惑成觀觀外無身三一互融非相含然非相生然念之於無念是真念佛矣淨土別指極樂通及寂光補遺云此譬喻文乃有二意一應親機疏喻二機應相親喻欲明相親先舉機疏以誡一人專憶一人專忘如佛念衆生而衆生無機如是二人若逢不逢或見非見既親疏不等則有時而逢有時而見不能常相逢遇然既專忘則當一向不逢不見何故亦有逢見之時須知言忘者必先相識而後專忘以曾識故所以或逢亦可云既一人專忘故不逢見二機應相親譬經二人相憶等也十方如來下合法先喻應親機疏次合相親喻又二初再提前喻事一心門憶佛也理一心門念佛也佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一孤山云無量壽經云念佛者不得如彈指頃念世五欲補遺云念屬意根正論修處亦旁攝諸根根根念佛也意根若淨諸根咸攝故無選擇如念佛時眼不觀色眼念佛矣乃至身不著觸身念佛矣故曰都攝六根根大明矣五觀耳根悟道此由無始用諸妄想此想不真故有耳根流轉今如常住真心一體無二故觀耳根乃得悟道
