body:
  text: 一名中印度那蘭陀大道場經於灌頂部錄出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集註明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閱鋟阿難彼善男子修三摩提想陰盡者是人平常夢想銷滅寤寐恒一覺明虗靜猶如晴空無復麤重前塵影事觀諸世間大地山河如鏡鑑明來無所黏過無縱跡虗受照應了罔陳習唯一精真長水云想陰若存寤則取像寐則成夢此陰既盡雖有寤寐而無夢想是故常一苕溪云准智論明阿羅漢有眠無夢騐今想盡即六根淨以圓觀所破通別二惑猶如冶銕麤垢先除故云無復麤重等虗受照應即受想二陰也受以虗明為本想以取像為義下文云種種取像心生形取等名為融通妄想今覺明中觀諸世間如鏡照物即想陰也了罔陳習謂受之與想已無陳故習氣也補遺云周禮列子夢有六候一曰正夢平居自夢二曰蘁夢驚愕而夢三曰思夢思念而夢四曰寤夢覺時道之而夢五曰喜夢喜悅而夢六曰懼夢恐怖而夢法華文句云唯佛不夢無疑無習氣故從五事故有夢如偈說以疑心分別學習因現事非人來相語因此五事夢五事六候皆本陰熏聞云智論第九十二云眠有二種一者眠而夢二者眠而不夢阿羅漢非為安隱著樂故眠但受四大身法應有食息眠覺是故少許時息名為眠不為夢眠生滅根元從此披露見諸十方十二眾生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇行陰是生滅元以遷流造作故想盡行現故云披露下文云唯生與滅是行邊際今想盡唯行故云披露補遺云皆謂想盡行現故曰披露今謂前云想盡約利根破惑入相似位者說之若鈍根人但是伏惑想陰未破唯得想心凝明而已未可云盡今約澄寂乍伏之相故云披露各命由緒眾生業相自不同善惡乃由緒也唯法眼明乃能知之今位在五品但總相見其生滅相耳命謂性命即業相也根塵生滅皆從行起故曰樞穴沈存中筆談曰莊子言野馬也塵埃也乃是兩物野馬乃田野間浮氣耳遠望如羣羊又如水波佛書謂如熱時野馬陽焰即此物也生滅不定如陽焰故曰野馬孤山兼言浮埃亦悞也孤山云畢殫其類者言盡見其十二類生皆從行出也以行是業能招報故雖未通其各命由緒謂雖未能別相見彼眾生脩因趣果因由端緒已能總相見彼生類俱由行起名此行陰為同生基熠熠光輝閃爍之貌謂行陰微細遷流虗假同於野馬也清擾即下文幽清擾動是也長水云未通各命者雖已了知十二類生總從行出而未知眾生別種在識陰中此即本識業苦種子是眾生各別性命因由端緒也若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超眾生濁長水云性入元澄者行陰若盡遷流性澄歸一藏識名入元澄經云藏識海常住也苕溪云性即生滅之性以旋復為入也元即樞穴之元以精真為澄也習謂習氣即通惑耳如波瀾滅喻意可知超眾生濁者行陰為生滅根元眾生攬生滅為體其元既盡斯濁亦超觀其所由幽隱妄想以為其本資中云微密難知故名幽隱也阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便補遺云指上想陰暫伏凝然明白也方得精研窮生類本於本類中生元露者觀彼幽清圓擾動元於圓元中起計度者是人墜入二無因論長水云於此推窮生類之本唯一行陰幽隱清虗以為一切生滅之元今既披露此外更無眾生之本便執世間無因而起以不知善惡因由差別種子在識陰故即外道論因此而有皆修行至此邪慧忽生名為現發苕溪云想陰既伏煩濁且澄故曰觀彼幽清殫見類生遷流陰穴故曰圓擾動元一者是人見本無因何以故是人既得生機全破乘於眼根八百功德見八萬劫所有眾生業流灣環死此生彼秪見眾生輪迴其處八萬劫外冥無所觀便作是解此等世間十方眾生八萬劫來無因自有孤山云從定發通乘于眼根本分八百通力發用見八萬劫眾生死此生彼過此不見亦是行陰勢力盡處不知識陰生因種子無明所熏感果差別既不見故便執本來無因而有如見飛鳥遠不及處故便計為無此亦如是以眼根塵本唯八百世間通力不越本因若出世通過此無礙設羅漢得亦是世通小乘無漏不見世境苕溪云生機全破者機愈擾動即行陰也不為想陰所覆故云全破眼根八百功德既約三世三方論之今見本無因即乘過去功德下見末無因即乘未來功德斯由定中發宿命通乃令眼根彰此力用業流灣環行陰流轉也冥無所觀外道冥諦也夫善惡業緣唯識變造是人八萬劫外尚不見行何況於識故從此來起無因計資中云善知生滅即是行陰又見行陰熠熠清擾同於陽焰而無實體窮盡生元更無別理名生機全破補遺云此解與吳興不同似各有期致但資中以破為開顯之義耳由此計度亡正徧知墮落外道惑菩提性二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本豎畜生本橫白非洗成黑非染造從八萬劫無復改移今盡此形亦復如是而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因資中云此人既知一切從行陰生本無異因從此向後一切常定亦無異因故言知人生人悟鳥生鳥不知新造異業感異類生故云執末無因而我本來不見菩提究竟亦無得菩提者本既無因末亦不得補遺云是人謂眾生並從生滅起不知造業從心當有異報乃謂人畜報定本既無異末亦應耳苕溪云無復改移者此見一分人畜之類有經長時業果未轉故起斯計如智論明舍利弗觀鴿子身前後皆八萬劫不改其報今行陰中既見此相乃執一切自然而然此即不知十二類生各命由緒也今盡此形等明未來無因亦應見八萬劫以外道通同聲聞故熏聞云智論第十一云佛在祇桓舍利弗從佛經行是時有鷹逐鴿飛來佛邊佛語舍利弗汝觀此鴿宿世因緣舍利弗入宿命智三昧觀見此鴿一二三世乃至八萬大劫常作鴿身過是已往不能復見從三昧起佛又令觀未來世此鴿何時得脫舍利弗入願智三昧觀見此鴿一二三世乃至八萬大劫未脫鴿身過是已後亦不能知從三昧起白佛不審此鴿何時當脫佛言復於恒河沙等劫中常作鴿身罪訖得出輪轉五道由此計度亡正徧知墮落外道惑菩提性是則名為第一外道立無因論苕溪云肇師云外道末伽梨謂眾生苦樂不因行得皆自然耳前經云末伽梨等都言此身死後全滅今計無因雖不云死滅必至劫滿亦同其倫當知諸見不出四句謂斷常雙亦雙非也上二無因即斷見下四徧常及一分無常一分常乃至死後俱非即後三句餘之所計皆源流於此阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四徧常論長水云行陰生滅相續不失故名常所計四種徧一切法故名圓一者是人窮心境性二處無因修習能知二萬劫中十方眾生所有生滅咸皆循環不曾散失計以為常真際云心境二處雖則無因二萬劫來生滅不斷故計為常二者是人窮四大元四性常住修習能知四萬劫中十方眾生所有生滅咸皆體恒不曾散失計以為常孤山云人之生滅不離四大大性不失於是計常三者是人窮盡六根末那執受心意識中本元由處性常恒故修習能知八萬劫中一切眾生循環不失本來常住窮不失性計以為常資中云此於六根及第七識并執受心本元由處性恒不失計以為常舉所依根顯能依識既云心意識中故知觀八識也苕溪云按楞伽云阿梨耶識除佛及入地菩薩諸餘二乘外道修行者皆不能知由是觀之今行陰未盡豈能於此計以為常應知言心意識者通舉八識也本元由處者別指行陰也良以首楞嚴定頓窮八識圓伏五住而於想陰盡處不了行陰微細生滅妄認為常非謂定中已見第八慤師云若了八識何得異計斯語善焉補遺云初就心境觀生滅次就四大觀生滅未為窮盡今從六識至八識中觀其生滅是眾生本元由處方為窮盡六根即六識執受即八識心意識三豎對六七八識亦可橫在三中於此三處凡有生滅並是行陰眾生之元見其不斷乃是性常雖歷七八只觀行陰境次觀四大三觀八識四計想窮心又曰至如行中興計未知識陰之源若了八識元由何論異計若論了八識習氣都亡則徧證圓知何拘八萬既難消釋不可懷疑高掛詞臺待明方決彼文非謂能窮梨耶如前四大屬色豈謂方觀乃寄色推元求其生滅良以此中圓教行人失意之類雖聞八識未窮理源茲乃三摩地人偶同外道耳四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常長水云想陰既盡運動已息不生滅理自然是行此於生滅計不生滅故執為常補遺云前三乃於三處計其生滅不斷為常此計想心滅處細相心滅執為不生滅理勝前三也前三計生滅不斷為常第四計生滅細相似理乃執理為常如見細流謂之止水長水云想元生理者想心乍伏生類根元乃現指行陰細相為生理也更無流止等者以生滅細故不見動靜之相也理中自然者指細相生滅為理有自然相也由此計常亡正徧知墮落外道惑菩提性苕溪云此四徧常所窮之境從廣至狹而成次第初通五陰二局色陰三唯行陰四但是行陰不生滅理補遺云第三乃徧於六七八中計行陰生滅之相耳如前計四大云色陰已消是知於四大上計生滅行陰耳故云窮四大元元即生滅也前雖已觀色陰今究其元也是則名為第二外道立圓常論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論一者是人觀妙明心徧十方界湛然以為究竟神我從是則計我徧十方凝明不動一切眾生於我心中自生自死則我心性名之為常彼生滅者真無常性苕溪云觀妙下重舉觀行湛然下正明起計亦由不了行陰生滅妄謂此處心性湛然以為神我言神我者外道名主諦謂一切法皆是我所悉以此神而為其主熏聞云智論明外道神我即是六識更無異事今於行陰中起計亦是分別事識妄認行陰為不動我二者是人不觀其心徧觀十方恒沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常恒沙國土秪於一大千界內見諸國土耳苕溪云謂三禪以下終為三災所壞名無常種性四禪以上災不能壞名究竟常三者是人別觀我心精細微密猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性我既微細生滅亦然故云即生即滅而此生滅從細至麤相續無間故云一切死生等補遺云以妙明心體徧於十方計為我性而行陰生滅猶如微塵雖流十方以微細故不覺流動因計性無改移為常一邊然則所計我性不動是行之體生滅是行之相能令此身即生即滅此計色身有生滅無常不覺行陰有微細生滅計為不動四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常孤山云知想陰盡者得意即入相似初心失意則因茲起見其失意者乃是命伏為盡非斷盡也前後准此補遺云行陰常流騐前四徧常論中前三直計生滅不斷為常第四計細相生滅為不生滅理執理為常耳苕溪云此四顛倒初觀神我及一切眾生即正報也次觀國土與劫即依報也此二對他明常無常三觀我心及身四計陰等此二約自色心明常無常亦從廣至狹也由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者是人墜入四有邊論一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊孤山云生元即行陰也過未不見故名有邊現在相續故名無邊二者是人觀八萬劫則見眾生八萬劫前寂無聞見無聞見處名為無邊有眾生處名為有邊苕溪云後八萬劫亦合如前三者是人計我徧知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性孤山云但見彼人現我知中而不能知彼人性徧故計彼性以為有邊四者是人窮行陰空以其所見心路籌度一切眾生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊資中云此計行陰滅處為空空故無邊以心籌度復見有生生故有邊世界所有義亦如是窮行陰空非謂能破行陰見空此人見行陰中有生有滅生於偏受遂計滅處為空空是無邊將為所證其生一邊屬於有邊非所窮也苕溪云此四有邊初唯約自二單約他三具自他四重計他一切依正斯則前狹後廣以成其次由是計度有邊無邊墮落外道惑菩提性是則名為第四外道立有邊論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死矯亂徧計虗論資中云准婆沙論釋外道計天常住名為不死計不亂答得生彼天若實不知而輙答者恐成矯亂故有問時答言祕密言辭不應皆說或不定答佛法訶云此真矯亂故名不死矯亂虗論熏聞云節疏云外道計無想天為不死天一者是人觀變化元見遷流處名之為變見相續處名之為恒見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句長水云於一生滅行陰分為八義別見謂常變生滅增減有無也答中略舉六義以不能定其道理但兩楹而答故云亦生亦滅等補遺云互互即是各各諸法各各生處為有亡處為無皆於定中所見二者是人諦觀其心互互無處因無得證有人來問唯答一字但言其無除無之餘無所言說三者是人諦觀其心各各有處因有得證有人來問唯答一字但言其是除是之餘無所言說四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰苕溪云從二至四於前八句有無分出也二三單計第四兩亦有即是無如氷是水無不是有如水中氷四句之中但涉三句未見雙非其計猶麤由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂徧計虗論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流生計度者是人墜入死後有相發心顛倒資中云無盡流即行陰也由見無盡故言死後有相或自固身云色是我或見我圓含徧國土云我有色或彼前緣隨我迴復云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相真際云初計色四句謂色是我我有色色屬我我在色例餘三陰各計四句故成十六苕溪云今謂外道六法我與識異今行陰未破識未當情故不言耳問前三陰既破何故與我復計四句耶答但破其計不破其法色等生滅念念不停即無盡流也然此行陰與常塗所辨麤細不同如百論家以識陰為初想陰居次受陰第三三皆無記未能成業至於行陰方起煩惱造作諸業是則四陰之中行陰最粗此據平常未破時說也今觀行中已破受想須知行陰粗相亦盡唯細相在故通前三陰俱見遷流幽隱之元其實難曉補遺云應知五陰前後粗細二義不同若約造業論之行陰方論造業前三但是無記所以行陰最粗百論意也二約分別論之識陰但總相分別行陰生滅遷流分別最細今取所破次第行陰微細生滅在後為細也百論又以想在受前由先有想心方受於境若爾受想二心前後無在但受境後想心為強故諸文多說耳從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸苕溪云上四陰與我既死後有相或復妄計煩惱菩提理亦如是以煩惱由陰而生菩提由我而證言畢竟者即兩性並驅入未來際也由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中死後有相心顛倒論通結五陰正在前四又雖在前四義唯行陰耳又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性消散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相見其下明色受想三陰已滅由見先來三陰滅故乃計現第四陰俱無明入無想從陰性下明現前色陰盡也此質下以現前況死後也色陰既爾受想行亦然是故例云如是循環等補遺云此現觀色陰虗融無礙不可得其質礙之相況滅後耶從此或計涅槃因果一切皆空徒有名字空竟斷滅苕溪云涅槃因果依現陰而修後陰而證陰既叵得修證何有耶由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無相心顛倒論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論補遺云雙計有無非謂只計有無而已計有非無計無非有二者相破成雙非也色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相苕溪云謂三陰無亦如行陰之有行陰有亦如三陰之無四陰各二故名八俱非相如色陰之一有亦不可無亦不可見有消融乃非有也例行陰不無是亦非無良以行陰生滅之細不可破滅因計為有反非前無又將前無可非今有補遺云此下釋出雙計有無相也觀色等中已破云無非今行陰現存之有又觀行陰之有非前色等之無若於四陰之中隨觀一陰便有此計言有相無相者即前標云雙計有無自體相破也有相非無無相非有也良由行者兼前已破三陰在行陰中故起此計又計諸行性遷訛故心發通悟有無俱非虗實失措苕溪云此計雙非也色受想等皆名諸行悉有遷訛下文云甲長髮生氣銷容皺乃至念念不停即其相也於前四陰雙非有無亦有八俱非義此見既細所以的就行陰言之此別就行陰計俱非也諸法生滅遷變不定心中開通雙非之義見其生故非無又見滅故非有補遺云虗實即生滅也生實虗滅二者相破故云失措由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性是則名為第八外道立五陰中死後俱非心顛倒論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者是人墜入七斷滅論長水云是人見行陰念念滅處名後後無孤山云七斷滅者欲開人天色開四禪無色合一此計七處滅已不生也或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前銷滅滅已無復身滅者欲界人天也欲盡滅初禪欲染已盡故苦盡滅二禪極喜無憂念故極樂滅三禪之樂極故極捨滅四禪捨覺觀喜樂故無色捨色礙故然則極捨之言含其二也由此計度死後斷滅墮落外道惑菩提性是則名為第九外道立五陰中死後斷滅心顛倒論苕溪云此計應從第七外道流出但前約橫論今約竪說若攝橫歸竪則前無相屬今身滅也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論長水云行陰滅而復生故云後後有也或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪迴生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟補遺云或以欲界為正轉依者正明欲定之相也良以欲定成時不見床鋪事障乃是定心之正報能轉依報故下即云觀其圓明苕溪云初禪無憂者已離欲惱得輕安故由此計度五現涅槃墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論苕溪云此計應從第六外道流出橫竪攝屬亦如七九之類熏聞云攝前橫相屬今竪義一往屬欲界二往通四禪補遺云前第六計有相橫約法相不依三界次第故得竪名與彼流輩臭味是同故論攝屬熏聞云一往屬欲界者指彼第六計色即是我四句一往只在欲界二往可通四禪以四禪外道寧無此計但據其或固自身之言似如欲界之色前標後後約所見境起計今云現涅槃約已證即身以說然此計從第六外道流出既不同死後斷滅似同死後有相以不見五處微細生滅便謂安隱現得涅槃阿難如是十種禪那狂解皆是行陰用心交互故現斯悟眾生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄汝等必須將如來心於我滅後傳示末法徧令眾生覺了斯義無令心魔自起深孽保持覆獲消息邪見教其身心開覺真義於無上道不遭枝岐勿令心祈得少為足作大覺王清淨標指苕溪云前色受想末皆云無令天魔得其方便今行陰後云心魔下識陰後云見魔心見不出見愛二惑即煩惱魔也於受陰中第五生無盡憂心不欲活猶死魔也并所觀五陰即陰魔四魔具矣熏聞云前色受想等且據大節判屬天魔其間不無煩惱之相心見不出見愛二惑矣此約通論不可將二惑分對兩陰以行陰中識中除定性二乘外皆邪見故既有見惑任運有背上使即受惑也若以止觀十境收之正屬見境亦兼禪境長水云想陰未盡猶引外魔今想陰盡行陰明露但於所覺境界別生異見執此為是故云心魔補遺云魔起於心自貽伊戚尚書云無起穢自臭上色受想觀境猶麤故外致天魔今行識既細但於內心邪僻成魔亦一往耳理必互有熏聞云自起深孽說文云禽獸蟲蝗之怪謂之孽今言心魔自損如彼之怪銷息猶除滅也補遺云不遭枝岐者惡道異端枝岐則亡羊必矣勿令心祈求也五陰中魔並生於希須躁進耳阿難彼善男子修三摩地行陰盡者諸世間性幽清擾動同分生機倐然墮裂沈細綱紐補特伽羅酬業深脉感應懸絕於涅槃天將大明晤如鷄後鳴瞻顧東方已有精色六根虗靜無復馳逸長水云行陰即世間體性世間有三義一有生滅二有漏三可破壞既墮世間同以行陰生滅為性苕溪云諸世間性即十二類生行陰體性也同分生機謂與諸類同其分齊生滅之機倐然下見行陰盡相行是業性能持諸陰如羅網之有綱紐焉補特下明不牽來報應猶報也補遺云脉者幕也幕絡一體也業能牽生如幕絡不斷孤山云三德涅槃名第一義天補遺云指前行陰若破即入相似將登分真於中道涅槃之天將曉如後鳴鷄東方將明之精色相似三諦也五陰之中若於色陰盡則五陰皆破已入相似不復更修受等之觀為鈍根者歷五陰說但前伏後觀耳豈有受想盡入相似位復至行陰修觀如後鳴鷄等邪如色陰盡則曰見諸佛心如鏡現像受陰盡則曰得意生身想陰盡則曰猶如晴空無復麤重前塵影事與今瞻顧東方已有精色並在相似無復優劣以由一陰若破惑去理顯入位之相更無高下故也苕溪云五陰伏有次第斷無前後今取將破別惑為後初破通惑為先斷伏頓漸如下所辨行陰既盡故曰虗靜不感分段生死故曰無復馳逸內外湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沈發現幽祕此則名為識陰區宇識陰披露故得湛明下文云又汝精明湛不搖處於身不出見聞覺知即其相也識息煖三和合成命受生之際識陰為先而此元由復是人法二執生本今觀中所見雖未銷盡且無行業招引來報故云諸類不召又見十方一切依正唯識所變故云已獲其同精色不沈即湛明也發現幽祕無所覆也受命元由即是識陰既是類生種子元由不起煩惱不作新業由是執果無受生故云諸類補遺云精色不沉發現幽祕只此二句是識陰區宇之相前受想行已伏今觀識心明湛故精色不沉而幽祕發現也識心望受想行最為幽祕譬若即主處室使令居外故識陰體得幽祕名觀由執元者觀識陰之由復為二執之元觀破執元所以諸類不召若於群召已獲同中銷磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠瑠璃內外明徹名識陰盡是人則能超越命濁苕溪云群召雖異識體是同若於同中銷磨六根見愛之惑則能合成一體開為六用六用不隔皆悉通鄰即法華所明六根清淨也長水云世界身心皆唯識現今識陰盡唯見覺體明妙如淨琉璃一切無障礙名內外明徹身心為內世界為外俱無所得故云明徹前文云十方國土皎然清淨譬如琉璃內懸寶月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍則知識陰盡者是隨分覺也文殊亦云一處成休復六用皆不成塵垢應念消成圓明淨妙觀其所由罔象虗無顛倒妄想以為其本孤山云罔象亦倣象皆不實貌阿難當知是善男子窮諸行空於識還元已滅生滅前後發境並在觀心中今為顯示境界所依故寄陰盡次第相由而說應知陰盡縱發彌益正解若在觀行心中發動者隨之則邪制之則正當以此意統括其文則於行位不惑方隅補遺云於識還元者夫心體只一本無王數之別由攬境故受等潛生今因觀力受等乍伏旋見心源只指心王為元也下十魔初並云若於所歸蓋指今還元也去彼受等還歸心體以為照覽因而生計也而於寂滅精妙未圓能令己身根隔合開亦與十方諸類通覺覺知通㳷能入圓元若於所歸立真常因補遺云於識心元用禪那故能解達圓融六根不隔故曰圓元即所計真常之因也諸類通覺謂達其覺性不同前文已獲其同是唯識也苕溪云覺知下重牒所發結歸陰元也斯亦功用暫得如是不生勝解名善境界由起邪執故墮外道種類生勝解者是人則墮因所因執娑毗迦羅所歸冥諦成其伴侶迷佛菩提亡失知見真際云因所因執認圓明為真常計真常為妄本熏聞云上因指體即圓元也下因對用既真為妄本能生諸法故對諸法之用立所因之名也補遺云初認識心虗融為常因又計諸法從此因生故云長水云據下七段皆云能非能等獨此為因所因者何耶答一切諸法皆從識變正是所因以不了虗妄執為實因故同外道下文直顯當體虗妄故云非能等也是名第一立所得心成所歸果違遠圓通背涅槃城生外道種補遺云從此真常之因成於常果是我所歸阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸覽為自體盡虗空界十二類內所有眾生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提亡失知見孤山云能非能執謂我是能生彼皆所生資中云摩醯首羅即大自在天三目八臂外道所宗如俱舍破能生世間有何義利耶是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我徧圓種補遺云立能為心者計我心為能生將感自在天能現無邊身之果以彼有現無邊身之能事故如云生大慢天是也計一切眾生皆從我生故我心周徧又因前薄有圓解而生此計仍存圓名又善為子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷生滅安住沈迷行者因觀識心體了寂滅而謂寂滅是心所依不解達陰即理却疑身心從彼流出此執心外有理為能生故屬邪矣苕溪云從彼流出者此指所歸識陰為彼以識陰圓元為常自己身心及十方虗空為非常非常即生滅也既見非常從常流出乃計生滅即是常住下文知無知執義例亦然資中云自在天與前不別此天現有生滅妄計為常故云在生滅中早計常住補遺云此乃判彼成邪寂滅之解未能即陰猶在生滅而計常住太早計也不了理即於陰故曰既惑不生也而棄陰於理外故曰亦迷生滅也生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見補遺云計自在天為伴侶者計十方空從寂理出能生所生氣味相類故也是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種立因依心欲依此求常住果也言因依者即識陰依理也生倒圓種者心外求理非倒而何又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所知知徧圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇徧知補遺云由觀心中發於知解既徧一切便謂草木與眾生同原其所計並由僻解經論因茲生計如上所計識陰自體能生十方眾生豈非因聞黎耶生法乎又計寂理生出諸法豈非因聞法性生法乎今計草木有生豈非由聞涅槃瓦礫佛性之說乎草木有性圓頓正理窮真源本體其理可通就末事以論正墮邪見豈有人死而復為其草木耶生勝解者是人則墮知無知執婆吒霰尼執一切覺成其伴侶迷佛菩提亡失知見孤山云知無知執者草木無知強謂有知也夫常住真心一體無二用諸妄想依正乃分是故眾生草樹悉如空華皆是有情自心所變執情不了以謂一一草木各各有知遂說木死為人人死為木未明一體謬計徧圓違遠圓通職由於此婆吒霰尼兩外道號涅槃云婆私吒及仙尼是也彼謂一切覺知乃云草木有命今所發見正與彼同是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融根互用中已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此群塵發作本因苕溪云圓化者謂觀中所見圓融變化唯識之境也一切發生即四大之相也觀塵成就別名地大以此群塵通指四大既見此等並由圓化乃計修因證果不出火之光明水之清淨等故曰發作本因立常住解是人則墮生無生執諸迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見立常住解生無生執者謂四大之生即常住之無生也迦葉波亦婆羅門別姓下所并者總攝其類是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓明計明中虗非滅群化以永滅依為所歸依明中虗者前云罔象虗無是也非滅群化非猶破也群化即四大等生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見孤山云歸於無歸故云歸無歸執無想天滅心心所舜若多主空神也是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種補遺云此計虗無必成無想外道空果又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓常固身常住同於精圓長不傾逝苕溪云識陰精明湛不搖處名之為常今見其常乃執色身同此精圓也生勝解者是人則墮貪非貪執諸阿斯陀求長命者成其伴侶迷佛菩提亡失知見長水云身本無常實不可貪以為長久今堅貪著故云貪非貪執阿斯陀此云無比即長壽仙也是名第七執著命元立固妄因趣長勞果違遠圓通背涅槃城生妄誕種補遺云趣長勞果恐取勞苦之義莊周曰勞我以生今求長生延命非法性身秪成勞苦之果耳又善男子窮諸行空已滅生滅而於寂滅精妙未圓觀命互通却留塵勞恐其銷盡便於此際坐蓮華宮廣化七珍多增寶媛縱恣其心真際云觀命互通下謂於羣召已獲同中無彼召因恐亡其果故却留塵勞也苕溪云此約在家修禪得通者說故有廣化七珍多增寶媛之事美女為媛補遺云命即性也行人觀識之性通乎真俗真俗共有此性故曰互通今觀空性欲存俗諦不達體同便謂永寂則絕事相故有留塵勞增寶媛乃墮邪欲也孤山謂將復真而反戀俗是也蓋由行者僻解經論不壞俗諦致茲魔境生勝解者是人則墮真無真執吒枳迦羅成其伴侶迷佛菩提亡失知見孤山云真無真執者將欲復真而反戀於俗也吒枳迦羅未見正譯此既能化欲境受用即是欲界自在天類也是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種邪思因者既於定中發此邪念不能善察由此熾盛起塵勞事故同天魔耳又善男子窮諸行空已滅生滅而於寂滅精妙未圓於命明中分別精麤疏決真偽因果相酬唯求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進孤山云命明即識也謂於識陰圓明之中忽發小解因此分別苦集是粗是偽滅道是精是真也又知苦果酬集因滅果酬道因於是見苦斷集唯求道滅感應也既發小解乃背圓融常樂我淨之道今於四德略舉其一所謂下釋成上意生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見無聞僧者妄執小道以為究竟故與夫謂四禪為四果增上慢人為害一揆是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融清淨覺明發研深妙即立涅槃而不前進本觀識陰三諦圓融而偏著妙空遂生小解故即安立涅槃化城而不前進中道寶所也生勝解者是人則墮定性辟支諸緣獨倫不迴心者成其伴侶迷佛菩提亡失知見諸緣獨倫者緣覺獨覺佛世滅後故有二焉是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不化圓種補遺云圓覺之性寂照雙運㳷心只是求寂一邊今於圓覺三諦僻取㳷心成支佛湛明之果也生覺圓明指支佛空寂資中云耽寂滅果成捨生障是名不化圓種故唯識云聲聞畏苦障緣覺捨生障長水云證識覺之圓明無悲化之妙用故云不化圓種補遺云然則正以支佛不能化物故云不化圓種又亦可云支佛根性無師自悟出無佛世雖佛不能化之故云不化所以有焚身移徙之事自謂與佛不兩立也阿難如是十種禪那中塗成狂因依迷惑於未足中生滿足證皆是識陰用心交互故生斯位眾生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄聲聞圓覺不成增進大妄語者別指前八也前八通名外道邪魔亦可別指七是外道八是邪魔俱未斷惑故云墮獄二乘異此故云不進汝等存心秉如來道將此法門於我滅後傳示末世普令眾生覺了斯義無令見魔自作深㜸保綏哀救銷息邪緣令其身心入佛知見從始成就不遭岐路苕溪云言見魔者見以違理為名前八違真中二理起界內邪見後二違中道理起界外邪見以二乘智即無明故又前八中七純是見八具見愛以留塵勞生勝解故問前受陰盡已超見濁何至行識二陰又發諸見耶答前約斷位得意生身者言之今在伏位於二陰區宇中發也此五陰文若迷斷伏之義雖有妙辨其何以銷之如是法門先過去世恒河劫中微塵如來乘此心開得無上道如是法門且指識陰禪那見相過去諸佛無不覺了入佛知見故曰乘此心開識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨瑠璃內含寶月補遺云初示次證諸根互用者識陰乍伏諸根暫得互用之相乃入五品乾慧也言金剛者以圓修止觀得金剛名此非等覺後心由乾慧之名濫通特以菩薩金剛揀之菩薩揀二乘金剛揀偏教如是乃超十信十住十行十迴向四加行心菩薩所行金剛十地等覺圓明次示超證利根行人因此互用不歷五品超入十信或入住等入於如來妙莊嚴海圓滿菩提歸無所得孤山云金剛乾慧是妙覺無間道轉入解脫道即妙覺也故云入於如來等也妙莊嚴海是福究竟圓滿菩提是智究竟歸無所得是理究竟福即解脫智即般若理即法身不縱不橫三德祕藏於茲具顯遠討其因實由初心修奢摩他三摩禪那三止之功也此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事奢摩他中毗婆舍那者即定而慧也苕溪云微細魔事總括五陰所現之境也前結識陰云乘此心開今結五陰云覺明分析當知由分析故心開互現其文也魔境現前汝能諳識心垢洗除不落邪見陰魔銷滅天魔摧碎大力鬼神褫魄逃逝魑魅魍魎無復出生直至菩提無諸少乏下劣增進於大涅槃心不迷悶大力鬼神等別指想陰中年老成魔之類褫驚也熏聞云張平子東京賦云奪氣褫魄注曰褫驚也謂奪移神氣驚散魂魄若諸末世愚鈍眾生未識禪那不知說法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫於禪堂或帶身上一切諸魔所不能動苕溪云夫反妄旋真非行不克行之大略唯信法焉從聞法而入者曰信行從思惟而入者曰法行然其二行必假相資今云未識禪那即法行者未識五陰禪那現境也不知說法謂不知以信行而資法行也由是之故名為愚鈍若於三昧好樂修習佛慮斯人為魔所惱故囑阿難勸持神呪也嘻世學大乘者熟不自謂得真三昧果以信法二行審之空空如也或讀此經安有自省愚鈍誦寫其呪而防諸魔事乎然則大明不能破長夜之昏慈母不能救亡子之苦悲夫汝當恭欽十方如來究竟修進最後垂範孤山云夏滿說經前春示滅滅在不久故云最後垂範谷響云前去之春故曰前春非已過之春也阿難即從座起聞佛示誨頂禮欽奉憶持無失於大眾中重復白佛如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併銷除為次第盡如是五種詣何為界唯願如來發宣大慈為此大眾精明心目以為末世一切眾生作將來眼佛告阿難精真妙明本覺圓淨非留死生及諸塵垢苕溪云精真中道也妙明寂照也寂故即假照故即空三諦融通元無塵垢總名本覺圓淨此單論真性也乃至虗空皆因妄想之所生起此單論妄想生起諸法也斯元本覺妙明真精妄以發生諸器世間如演若多迷頭認影妄元無因此合明真妄發生世間所以爾者無前單論則不知離義無後合明則不知即義迷頭認影事匪條然於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是眾生妄心計度立因緣性謂自他共性并下自然則四性備矣彼虗空性此指體性之性既由迷妄有虗空依空立世界空猶幻有世界可知故法華云知法常無性者是也眾生於無性中惑為因緣及自然性皆是妄心分別計度阿難知妄所起說妄因緣若妄元無說妄因緣元無所有何況不知推自然者補遺云謂若只知妄從真起則有妄想因緣可言也若能了妄即真無妄可起則妄想因緣亦無可言者矣是故如來與汝發明五陰本因同是妄想苕溪云以結前所譚亦生後所故汝體先因父母想生汝心非想則不能來想中傳命如我先言心想酢味口中涎生心想登高足心酸起懸崖不有酢物未來汝體必非虗妄通倫口水如何因譚酢出是故當知汝現色身名為堅固第一妄想汝體父母遺體也想謂欲想子在中陰時若無欲想則不能來父母欲想中受胎如我下次引前破想陰喻顯此妄想谷響云先因父母想生者世有不因交合而因想有胎是知體因想生彌為可騐熏聞云按千寶搜神記曰漢末零陵太守有女悅郡門下書佐而因於牖間乃使婢取佐盟水而飲之有娠既而生子至能行太守乃見椽吏抱兒眾中使求其父兒直上書佐腋推之化為水眾大驚遂以女聘書佐焉以是明之雖有因合不因合之異莫不皆由想乎人見兒化為水之說以為詭譎而不顧百年在世亦同此兒矣攬遺體而成遺體亦水也一旦死滅壞爛仍是水矣果零陵小兒之可驚則眾人盡可驚也彼既詭譎此安得不詭譎乎妄想而生大哉佛說長水云通倫猶言同類也即此所說臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想苕溪云當知色受想三陰妄想相由而起必不相離故前文云汝體先因父母想生下文云種種取像心生形取皆同懸崖酢物之想由是明之此三妄想其體粗現非如行識幽微難見所以前三陰中所發天魔其相亦粗後二陰中所發心見二魔其相亦細補遺云想於臨高而令真受酸澀此言因想生受由因受生能動色體此言因受動色如因心受愛境則身業運動有所為也苕溪云汝今下正示受相也順益即樂受違損即苦受合有非違非順即不苦不樂受但文略耳補遺云汝今現前下蓋前文乃附譬喻以明故也由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想初二句牒前受陰由前文云因受動色則是由汝念慮使汝色身也身非念倫下次生起想陰也雖云因受心故能動色形且心色非類如何以身隨心耶所以能動色者功在想心故曰種種取象心生形取與心念相應故受動色也種種取像必因心想之形形對像生取彼懸崖之像必先心想有茲形取方能令身受於酸澀功在想心矣窹即下明想心不斷也言融通者無色心窹𥧌之間故也熏聞云身非念倫下正明融通妄想之義謂身之與念色心兩殊且非倫類汝身何因至與念相應者誠由妄想融通使之然耳又非但融於色身亦乃通諸夢寐故曰窹即想心等苕溪云心生形取謂心念若生形質必取想高酸起取之騐也窹𥧌等者由想成夢以顯妄念當無間然化理不住運運密移甲長髮生氣銷容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想此若非汝指化理不住等云何體遷指其甲長髮生等如必下若謂體遷實是汝者何不覺此相代之相以不覺故行陰生滅名為幽隱補遺云上文只就色陰明遷變理故此通例諸法遷變之行又汝精明湛不搖處名恒常者於身不出見聞覺知若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌筭苕溪云今文即以見聞為精明動用為常體何則識無所存徧在諸根根對境時雖涉於用用在無記未起善惡指此無記名為精明湛不搖處若約分齊明之者五識五意識及第六心王皆是其處也佛恐眾生計此為常故寄阿難先且定云名恒常者若實精真不容習妄此破其常也精謂精明真即恒常何因下示妄習相念念受熏者以昔覩寄物納種在識若不受熏覆覩前異必無記憶之相既不忘失則知中間常為無明念念熏習熏習即妄何精真之有乎補遺云此中明識陰而立精湛者蓋由行人已次第觀五陰窮諸行空生滅乍伏故觀行中識心亦精湛也良以惑使乍伏觀力使然非已破惑顯理故下判此不出見聞覺知者還成第六王數故也舉喻覩一奇物歷年俱忘者如伏惑之相也覆覩宛然者惑起故失其湛明也阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習非汝六根互用合開此之妄想無時得滅故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒微細精想六根互用等始破見思故妄想得滅即麤垢先落也問上文受熏約無明說今妄想滅何止見思邪答無明所熏亦見思種子故前指見物有憶有忘正是麤相今種現雖盡而根本猶存非謂六根得真互用問此首楞嚴體無不圓宗無不極至於破陰力用何短乎答非是力用不恊體宗由辨魔中五十重境皆從分段五陰妄想中現今齊此論滅故且至六根互用若如前文反流全一六用不行即破根本無明有異此中顛倒妄想也熏聞云且約通惑未除凡有所熏皆見思家種子也如荊溪云未淨六根已來所有王數名見思家王數此其例焉既有憶忘復名妄想非麤而何況至六根淨位此相則滅麤義愈彰矣阿難是五受陰五妄想成汝今欲知因界淺深唯色與空是色邊際唯觸及離是受邊際唯記與忘是想邊際唯滅與生是行邊際湛入合湛歸識邊際補遺云五陰中各有因界色淺而識深長水云唯色與空等者色謂形色空謂顯色俱色蘊攝妄色妄空互形顯故略舉色空攝一切法此以依對正釋准第四云汝見虗空徧十方界空見不分有空無體有見無覺相織妄成名為劫濁又第九云若色陰盡能超劫濁故今知言色者須對依報外色示之資中云觸離是受者觸有苦樂離即成捨俱名為受真際云記忘是想者記憶忘失取像攀緣皆想分齊記憶忘失亦可云記如寤忘如𥧌苕溪云生滅是行者三相遷流俱屬行陰略舉生滅以攝於異湛入合湛等者湛生滅之際入精明之處方名合湛合同也以形相異而識體同故補遺云上之湛字乃行伏識顯之體也言入者謂此識心涉入根境也合湛雖入根境而無根境取著之相與彼相合也如前文云內外湛明入無所入是也此五陰文唯識陰就理而明者蓋此釋疑文聯識陰並就此義而說也此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併銷事非頓除因次第盡我已示汝劫波巾結何所不明再此詢問孤山云約生則由內造外從細至麤如著衣也故迷理有識乃至見色約滅則由外至內從麤至細如脫衣也故悟理色盡乃至識盡補遺云此明五陰兩重次第若從生法識為能生色最居後若從觀破次第從外向內色陰在前如四念處法相是也此亦一往若直觀心為萬法之源識亦居初也苕溪云理則頓悟至因次第盡者以此四句俱就觀行位伏義釋之謂依理頓悟乘悟修觀用觀併銷而其五陰任運麤者先除細者後盡故曰事非頓除因次第盡前文所明五陰區宇次第而顯者即其義也但此併銷有盡未盡盡在七信未在已前熏聞云問夫五陰妄想不出見思且初信斷見二信至七信斷思此圓家麤垢先落之位也今乘悟併銷為是先見後思為復見思雙斷答應有二義若先見後思亦名併銷以此二惑皆徧五陰故當知初信則併銷五陰中迷理之惑二信至七信則併銷五陰中迷事之惑若見思雙斷義亦有憑如瓔珞本業云舍利弗於第六住值惡因緣退入凡夫外道乃至千劫作大邪見及五逆等荊溪云身子於十住中第六心退恐是爾前見思俱斷至六心時見猶未盡今以圓信例彼別住見思俱斷故曰併銷補遺云舍利弗六住退起信論云非其實退為初學未入正位而懈息者恐怖令彼勇猛故宗鏡云權教中六住可有退位實教中為稽滯者責令進修如舍利弗示現聲聞非實聲聞所作方便皆度眾生法華文句記云如瓔珞意身子於十住中第六心退恐是爾前等此伸通權教中六住有退義由見思俱斷故六住有見所以有退今記主准此文明實教中亦有見思俱斷之義然山家教門四教斷惑諸文所明斷見思則必無俱斷唯有此一文說之俱斷之義舊學未有定論今謂諸文前斷見而後斷思者此約障理障事惑體不同故也然有俱斷義者約別圓兩教用觀不同藏通必須修八忍八智入無間三昧斷見故也准理權教俱斷可有退者實教俱斷無有退者圓觀勝故准理如此何必求文上文所明五陰若能盡超五濁者即其義也然今總判五陰盡在七信者一按文二詳義且按文者前色陰盡見諸佛心如明鏡中顯現其像受陰盡得意生身隨往無礙想陰盡虗受照應了罔陳習行陰盡於涅槃天將大明悟識陰盡即得現前諸根互用凡此五者豈非皆自六根清淨之明文乎二詳義者如前說色陰妄想云汝體先因父母想生汝心非想則不能來想中傳命以此觀之色由想生色陰若亡想陰必盡想陰若盡既無陳習豈非已斷思惟煩惱耶況想陰之前受陰盡時得意生身若不斷思出分段死安得意生乎受盡尚爾想行識盡不亦例然又見色陰盡者能超劫濁前明劫濁從見虗空徧十方界即名為濁是則劫濁盡時不應見空空見若除受等四陰復何所在故知五濁超必同時不可以長途所談校其倫次也補遺云約理約解無陰可論豈容次第故行人乘此悟解頓除五陰也如義例說上根利智直聞是言病即除愈不俟立境立觀也約事約行必須揀境以為用觀之處五陰之中必先一陰為境一陰若破四陰隨破故曰事非頓除因次第盡也言次第者非謂先色次受等一一用觀但一陰居初為境餘陰同破乃名次第如上所明解縈之喻就六根言之一根若破餘根同伏乃名次第非謂先眼次耳等所以如來下文即引同此喻以責再詢正同解結次第一解六亡一陰若盡五陰俱破名曰次第汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界自辨魔來齊此流通行也阿難若復有人徧滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不自此文至盡經流通教也付囑流通唯行與教耳阿難答言虗空無盡珍寶無邊昔有眾生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充徧皆施珍寶窮劫思議尚不能及是福云何更有邊際熏聞云問中三意一徧滿下舉種子多二持以下示福田多三承事下明敬心多以此三多為校量本答中於三多中略舉種子福田自攝敬心施佛七錢田種俱少也佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示未學是人罪障應念銷滅變其所受地獄苦因成安樂國熏聞云一念者准仁王云一念中有九十剎那故知一念言其少時也幸哉一念之頃滅惡尚爾況多時乎況終身乎既云諸佛如來語無虗妄不可以別時意趣消遣斯文般若受持四句勝捨三恒之全身圓覺分別半偈超化百恒之小果用彼詳此不亦如是句偈尚爾況全章乎況盡經乎願諸見聞勵力敷贊成安樂國者以果顯因也即地獄因成安樂國補遺云小般若一日三分以恒河沙身布施聞經不逆其福勝彼經云假使有人教百恒河沙眾生得阿羅漢果不如有人宣說此經分別半偈得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及長水云此有多義故獲勝福一所弘之經是佛極談教理行果皆不思議故二末世多障能於此時流通是經實希有故三施福唯得生死之報但是自利弘經利他令至無漏之果故由是一念超越前施資中云此經有四不思議謂教理行果皆殊勝故且如來藏體理不思議次辨圓通行不思議及說神呪教不思議後明地位果不思議阿難若有眾生能誦此經能持此呪如我廣說窮劫不盡依我教言如教行道直成菩提無復魔業苕溪云前利他得福此自利成道或以此義釋成上文謂開示未學得福斯勝者良由眾生於教誦持乃至成道所益大故熏聞云能誦此經能持此呪即顯密二教也依我教言如教行道謂依顯教行正助二道亦可依顯教行正道依密教行助道依顯密二教皆行正道佛說此經已比丘比丘尼優婆塞優娑夷一切世間天人阿修羅及諸他方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去苕溪云初發心者圓教外凡或內凡也皆大歡喜通該凡聖興福云此聽法歡喜者可列為三十六眾也孤山云既聞談常扶律即偏解圓同服醍醐咸霑妙益故大歡喜谷響云大論云三義故喜一能說人清淨二所說法清淨三依法得果清淨今謂前二屬應後一屬機又如次配三寶三皆清淨機應事畢是故歡喜然論釋般若義該三教今唯圓頓粗妙可知補遺云此經部同法華開權圓頓若對般若分別粗妙猶約判義開則無非一妙而已
