body:
  text: 一名中印度那蘭陀大道場經於灌頂部録出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集注明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閲鋟如是我聞一時孤山云如是所傳之法我聞能傳之人會機會理之時故云一時熏聞云涅槃後分云佛垂涅槃阿難問佛如來滅後結集法藏一切經初安何等語佛言當安如是我聞一時佛住某方某處與諸聖衆而說是經智論云三世佛經初皆稱如是語所傳法者謂結集家傳佛能詮所詮之法也能詮文與佛不異曰如所詮理無非真實曰是又文如其理理如其文然理通四教則如是之法偏圓不同具如天台諸經疏分別其相今簡偏取圓唯一如來藏心是經法體能傳人者孤山約四教義明四種我聞一我我聞聞二我無我聞不聞三無我我不聞聞四非我非無我不聞非不聞前三種是昔所聞方便之義後一我聞是今正意會機會理之時者會合也謂今教下合現未之機曰會機上合常住真心曰會理機理會合一義在茲真際云阿難指下如是之經我從佛聞一時說教時也長水云我即阿難自指五蘊假者然一切法佛說無我今稱我者我有四種一凡夫遍計二外道宗計三諸聖隨世假立賓主四法身真我經指後二非邪慢心而有所說故無過矣聞謂耳根發識聽受雖因耳處廢別從總故稱我聞諸方時分延促不定故但言一時手鑑云鑒則上下延促不同橫則四洲參差不同佛真際云梵語佛陀此翻覺者苕溪云佛地論云具一切智一切種智離煩惱障及所知障於一切法一切種相能自開覺亦能開覺一切有情如睡夢覺如蓮華開故名為佛熏聞云應知一切智一切法者真諦智境也一切種智一切種相者俗諦智境也以照真故離煩惱障能自開覺以照俗故離所知障能覺一切有情如睡夢覺如蓮華開者總譬二智覺了之義也又夢覺喻真智一物叵得故華開喻俗智具見諸相故在室羅筏城祇桓精舍孤山云在者住也以佛內住首楞嚴能建大義故迹住精舍以利羣生熏聞云論明四種住義一天住謂布施持戒善心也二梵住謂慈悲喜捨四無量心乃至非想天因也三聖住謂空無相無作三三昧也四佛住謂首楞嚴等百八三昧力無畏等八萬四千度人法門也佛雖住定示同人法行住坐臥四儀宛然斯由自受用身內冥法性外應羣品故曰能建大義迹住者迹以對本為名約土言之則本住寂光迹居堪忍也室羅筏具云室利羅筏悉底或云舍衛即中印度憍薩羅國都城之號新翻豐德以國豐四德故一貨財二欲境三多聞四解脫祇桓正云逝多此翻戰勝太子之名也生時父王與外國戰勝因立美號即須達市園造立精舍以施於佛祇桓正言逝多此云勝氏須達具云須達多此云給孤獨亦曰善施給孤獨長者聞佛功德深生尊敬願建精舍請佛降臨佛告舍利子瞻揆唯太子逝多園多爽塏尋詣太子具以情告太子戲言金遍乃賣善施聞之心豁如也即出藏金隨言布地有少未滿太子請留意佛此誠良田宜植善種即於空地建立精舍世尊即之告阿難曰園地善施所買林樹逝多所施二人同心式崇功業自今已去應謂此地為逝多樹給孤獨園補遺云非粗暴所居故曰精舍與大比丘衆千二百五十人俱皆是無漏大阿羅漢比丘含三義清淨活命名乞士能斷煩惱名破惡當剃髮至受戒時魔王言是人必得涅槃故名怖魔由此因中三名能成果上三號即應供殺賊無生也長水云四人已上乃至無量能作說恣羯磨法故名為衆孤山云三迦葉兄弟有千弟子舍利目連共二百五十人或云五十是耶舍弟子先並事火翻邪入正感佛深恩而常隨侍無漏者內冥中道不漏落二邊阿羅漢含果上三義也準涅槃四依品第四依即十地菩薩名阿羅漢補遺云孤山用涅槃四依品十地菩薩迹示四果明之然既直用中道釋無漏當亦直用大釋何羅漢名迹示四果還成小名也今用唯識論解之論云此識無始恆轉如流乃至何位當究竟捨阿羅漢位當究竟捨又曰若諸菩薩得菩提時頓斷煩惱及所知障成阿羅漢及如來故又應知法華文句解大阿羅漢名從昔立所言大者揀異慧脫今是無礙俱脫故稱大今首楞嚴已經開顯則當以大乘釋大破障中無明為殺賊入證中道為無生赴十界緣為應供佛子住持善超諸有此衆已經法華開權發迹故今歎德從實從本而言如云開方便門示真實相決了聲聞法是諸經王即開權文又云知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺此發迹文也能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘範三界長水云法有摧碾煩惱義喻之若輪自既摧惑亦能轉教令他破惑孤山云此諸尊者見佛始卒佛所說法皆悉隨從故於今經及以涅槃妙堪遺囑涅槃中佛語文殊今以此法付囑於汝乃至迦葉阿難等未來復當付囑如是正法谷響云如身子目連先佛入滅則不至涅槃然今經云於時迦葉在靈鷲山入滅受想定至佛滅後始來阿難在娑羅林外為魔所罥至佛垂滅方來弘大範法也毗尼是三界之大法稟之則出生死故律銓也銓量輕重犯不犯等故應身無量度脫衆生拔濟未來越諸塵纍補遺云此十二句歎德文不同法華還同小歎既已開顯直從大歎又復此經乃最後垂範正為未來扶律談常故歎中言住持言遺囑言毗尼言未來也今以十二句節為二段初二句歎自行中初句歎智德故言住持次句歎斷德故言超有次十句歎化他二乘缺於化他故今廣歎所缺也初二句總歎即是下文遺囑弘範等為威儀也但今總言下去別列耳言成就者以於化他儀式已能間習無有遺失故言成就次八句別歎為四初二句堪遺囑次二句堪依止三二句堪垂化四二句堪拔苦其名曰大智舍利弗摩訶目犍連摩訶拘絺羅富樓那彌多羅尼子須菩提優波尼沙陀等而為上首孤山云諸經列名不同或尚年臘則先陳如或尚聲德則先身子今從尚德之例熏聞云臘者終歲祭祀之名也夏曰嘉平殷曰清祀周曰大漢曰臘臘獵也取禽獸祭先祖也或云臘者接也新故交接也故經律中謂七月十五日為佛臘日取此義擕李云具云舍利弗怛羅此翻身子以其母好身形故以子連母而呼也亦云鶖子母眼明淨如鶖鷺之眼故摩訶目犍連正云摩訶沒特迦羅此翻采菽氏以上古有仙好食胡豆尊者是彼苗裔故也孤山云拘絺羅此云大膝膝蓋大故舍利弗舅氏也長水云富樓那父名此翻滿彌多羅尼母名此云慈連父母名故云滿慈子孤山云那男也尼女也增一云我父名滿我母名慈諸梵行人謂我為滿慈子須菩提此云空生以生時家中倉庫皆空故蓋解空之吉兆也占者言所現之相既善且吉故亦名善現善吉焉資中云優波尼沙陀此云塵性以觀塵性空得道故復有無量辟支無學并其初心同來佛所辟支不歎德列名者厭喧樂靜多在空間不為衆所知識此是部行遇佛回向者若麟喻者出無佛世三千世界獨一而出如麟一角麟喻名出俱舍爾雅云身牛尾一角春秋感精符曰麟一角明海內共一主也獨覺亦爾大千唯一故以為喻孤山云辟支迦羅此翻緣覺觀十二因緣而悟道故亦翻獨覺出無佛世也無師自悟故苕溪云經家既云并其初心正是師徒共集實部行也部行亦出無佛之世如法華疏云部行緣覺在無佛世師徒化訓補遺云經云復有知與前聲聞常肩隨者也下文顯有十方之文則驗此中乃釋迦之高弟也不然豈釋迦法會自無稟支佛教者乎但諸經所列或合歸聲聞衆中今開為二衆耳今定此經所列二衆大小之義有二焉一者已經開顯則前云羅漢後云無學並從大乘為言無學則位該地住初心乃在十信已還也二者從本立名二乘已經開顯入圓稟教自名菩薩今從本為名云羅漢支佛還從小教消名可也言無學者準析玄云至此位中四智已圓無法可學故名無學言四智者一我生已盡苦諦智二不受後有集諦智三梵行已立道諦智四所作已辦滅諦智此就小乘解也若以大準小則當云三德已圓無法可學故稱無學但地住分顯無學妙覺究竟無學也如前引唯識論文阿羅漢實通大小故也熏聞云所以不列雜衆者且事起自恣非俗衆所參是故但有三乘僧也谷響云菩薩衆別序備即經云恆沙菩薩來聚道場是也至齊畢旋歸王及大臣長者居士俱來隨佛願聞法要事在明日故有俗衆屬諸比丘休夏自恣十方菩薩咨決心疑欽奉慈嚴將求密義即時如來敷座宴安為諸會中宣示深奧法莚清衆得未曾有迦陵仙音遍十方界恆沙菩薩來聚道場文殊師利而為上首孤山云屬當也休夏謂九旬已滿自恣律開三日七月十四十五十六也長水云自迷所犯恣任僧舉當悔清淨或云自恣自謂自己之過恣謂恣他所舉孤山云菩薩具云菩提薩埵大論云菩提名佛道薩埵名成衆生用諸佛道成成就衆生故又菩提是自行薩埵是化他左傳云訪問於善為咨欽奉顯菩薩之心慈嚴明如來之德敬請楞嚴之祕說故曰將求密義手鑑云凡入三昧各有六意一此真三昧是所證法體故欲說此法要須心冥此體二非證不說故三顯此法非思量境故四觀根審法故五顯說證皆同故六成儀軌故然此宴坐宣示即大定大慧也至下阿難一向未全蓋闕此也如來欲談大定故以大慧為本定能發慧非慧莫談一經大旨已現斯矣未說密義先說餘經不散其衆乃演斯典亦猶法華以前說無量義淨名以前說普集經但今所指未來此耳熏聞云密義者且通指大乘法要謂咨決心疑之外方將更求大乘微密之義前自恣文雖曰比丘必兼於佛自恣屬戒宴安是定宣示為慧聖人應物垂範則三學存焉問據何經律知佛自恣答增一云如來同僧坐於草座告諸比丘我欲受歲又新歲經云佛自叉手向諸比丘悔過等孤山云迦陵頻伽此翻妙聲本出雪山在㲉中即能鳴其聲和雅聽者無厭熏聞云恆沙者大論云恆河沙中一切算數所不能知唯佛及法身菩薩能知其數孤山云文殊師利此翻妙德以分證法身般若解脫三德故時波斯匿王為其父王諱曰營齊請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩彼斯匿此云和悅新云鉢邏犀那恃多此翻勝軍諱日亦曰忌日祭義曰忌日必哀稱諱如見親齊者齊也不過中食以齊身口而內表中道焉熏聞云宮掖班固西都賦云後宮則有掖庭椒房呂向注曰掖庭宮名在天子左右如肘掖也羞熟也謂熟食也城中復有長者居士同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齊主長水云十德具足三品居財故云長者守道自怡寡欲蘊德故名居士手鑑云三品者天竺之俗多以商估為業遊方履險不憚艱辛彌積珍財有年數矣上者奉王餘皆入已財盈一億德行又高便稱長者居士為王輔佐彼土數法萬萬為一億也此為下品十億中百億上天竺以積財巨億為長者守道居正為居士谷響云韓子曰重厚自居謂之長者玉藻云居士錦帶注曰居士道藝處士也熏聞云飯僧者謂以食請僧飯之唯有阿難先受別請遠遊未還不遑僧次資中云先受別請或因他事而非齊也長水云涅槃經說阿難不受別請蓋不隨佛受別請耳熏聞云四分律明請僧有二種謂僧次請別請也雖律開別請而諸文中多斥別請偏讚僧次十誦律云別請佛及五百羅漢不如僧次請一似像極惡比丘成論云僧次請僧如飲海水即飲衆流既無上座及阿闍黎途中獨歸其日無供以非僧次應諸齊主塗中獨歸顯無伴侶此為下文遭術張本其日無供謂祇園間遠更無檀越致供是故入城乞食孤山云阿闍梨此云軌範師手鑑云阿闍梨律有五種一出家二受戒三教授四受經五依止受戒及依止多已十夏者為之餘皆多已五夏者為之即時阿難執持應器於所遊城次第循乞心中初求最後檀越以為齊主無問淨穢剎利尊姓及旃陀羅方行等慈不擇微賤發意圓成一切衆生無量功德應器梵云鉢多羅也以其體色量皆應法故熏聞云律明鉢體大要有二泥及鐵也色者熏作黑色赤色或孔咽色鴿色等量者大鉢受三斗小者受斗半中者可知南山云此姬周之斗也準唐斗上鉢一斗下者五升檀越此云施主熏聞云於所遊城即室羅筏城心中初求最後檀越望前僧次是為最後孤山云淨即剎利王族也具云剎帝利此翻田主西域記明此姓云奕世君臨仁恕為志穢即旃陀魁膾也谷響云梵語旃陀羅此翻屠者正言旃茶羅此云嚴幟謂惡業自嚴行時標幟搖鈴持竹為自標故魁帥也膾切割也方行等慈謂平等大慈也欲令淨穢皆趣菩提故云圓成無量功德阿難已知如來世尊訶須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗長水云善現捨貧從富飲先捨富從貧皆為淨名所訶故云心不均平資中云今言如來者就佛所印歸功世尊經彼城隍徐步郭門嚴整威儀肅恭齊法城隍城池無水曰隉爾時阿難因乞食次經歷淫室遭大幻術摩登伽女以娑毗迦羅先梵天呪攝入淫席淫躬拊摩將毀戒體長水云摩登伽義翻本性此女過去名曰本性以今本昔亦名性比丘尼資中云娑毗迦羅即金頭仙食米臍外道師事梵天而得此呪孤山云摩登伽經云阿難昔五百世曾與摩登伽女而為夫婦愛習未忘故有斯事苕溪云將毀戒體者蓋言此女欲破阿難所持之體即淫戒無作之體也故下文云彼唯呪汝破佛律儀八萬行中秪毀一戒心清淨故尚未淪溺若將毀二字屬於阿難雖曰不犯豈無疵乎如來知彼淫術所加齊畢旋歸王及大臣長者居士俱來隨佛願聞法要資中云如來常儀受請齊畢皆為說法今既速歸必有所為故王臣大衆隨從而來于時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結加趺坐宣說神呪孤山云頂表法身光表報身化佛表應身光從頂出即智由理發遍照百界故云百寶而有化佛說呪者即理智相冥能起大用析惡攝善熏聞云蓮以表實華以表權應身起用不離權實二智是故化佛趺坐其中遍照百界者六凡四聖十界互具也折惡攝善者折登伽之惡攝阿難之善熏聞云結加趺坐聲論云以兩足趺加致兩䏶如龍盤結敕文殊師利將呪往護惡呪消滅興福云文殊密說妙解邪方是則阿難亦不顯聞但蒙冥護故第七卷云雖蒙如來佛頂佛呪冥護其力尚未親聞若據登伽經但是世尊自說一呪解彼淫術提獎阿難及摩登伽歸來佛所孤山云摩登伽得益證阿那含而經家不敘者下文顯故云摩登伽淫火頓歇得阿那含也此是呪後得第三果至攝還佛所聞經至文殊簡圓通竟成阿羅漢若據登伽經說聞呪時未言得益尋求阿難自到佛所且非文殊提獎而歸及聞說法亦得阿羅漢道然則兩經並由聞經方證四果但是大小機見不同然約實行則機熟得道之時由阿難牽以欲鈎故使後入佛智也若使大權則同阿難發起斯教以益群機耳問彼經聞小乃得四果此經聞大何故亦證阿羅漢耶答彼經明小正隔於大此經說圓何妨證小機既不同故無妨也阿難見佛頂禮悲泣恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便法華云昔於空王佛所同時發心阿難常好多聞我常勤精進是則如來由全道力定慧均修故能速證菩提降魔制外我由偏著小慧尚住初果反遭邪術勞佛慈救悲泣悔恨其在茲焉多聞者偏習小慧也未全道力者不修大定也然小乘豈但無楞嚴理定亦無圓融佛慧以今如來現通演呪悉從理定而發故使阿難知小慧之非而偏請大定也然圓融定慧體本無殊對機施用不分而分寂照斯別故下請三意以該定慧補遺云今謂阿難權以發起宜從小釋無始之言是久遠之時耳苕溪云今觀阿難啓請已涉楞嚴法門一經所談皆酬斯請熏聞云首楞嚴即奢摩他等總名奢摩他等即首楞嚴之別號資中云准圓覺經奢摩他以寂靜為相三摩提以幻化為相禪那俱離靜幻二相此大意與一心三觀相應寂靜相即空觀也幻化相即假觀也俱離相即中觀也孤山云得成菩提者證茲圓果由彼圓因圓因者何即一心三止楞嚴大定是諸佛一路證果之門也故曰妙奢摩他三摩禪那最初方便如來酬請正宗演說名相雖異旨在此三今釋此為二一正釋二會通初正釋者涅槃名三一奢摩他此云止二毗婆舍那此云觀三優畢叉此云止觀等止體靜觀體明等即明靜不二也阿難雖專請於止以即一而三故所以此止即觀亦即平等三一互融是以稱妙妙故方曰楞嚴大定耳故今於一止復有三名謂奢摩他此言體真止止於真諦三摩具云三摩提亦曰三摩地此云等持即方便隨緣止止於俗諦禪那此云靜慮即息二隨分別止止於中道第一義諦體真止知因緣假合幻化性虗故名為體攀緣妄想得空即息空即是真故言體真止此與奢摩他名義吻合方便隨緣止者知空非空故言方便分別藥病故言隨緣心安俗諦故名為止今云等持即是俗諦三昧也名異義同息二邊分別止今云靜慮者靜即息也慮即二邊分別也名異義同此三止名義出摩訶止觀即天台智者大師所行法門也二會通者此之三止即三觀以即照而寂即寂而照故奢摩他即空觀三摩即假觀禪那即中觀龍樹曰因緣所生法我說即是空亦名為假名亦名中道義蓋謂此矣然則成菩提之方便者豈踰於三止三觀耶是知一經始末不出斯旨也阿難始以三法為請既蒙開示至乎領解還以此三而歎於佛故下經云妙湛總持不動尊妙湛即空智也總持即假智也不動即中智也及佛為富樓那說如來藏本妙圓心非心非空即心即空離即離非三諦炳然如指諸掌及為阿難說六解一亡而結歎云是名妙蓮華金剛王寶覺如幻三摩提華開蓮現喻即中也金剛堅利喻即空也如幻有形喻即假也洎文殊簡示圓通亦以此為歎故曰阿難汝諦聽我承佛威力宣說金剛王如幻不思議佛母真三昧但以佛母喻中道為異耳其於諸文中重重演說一一破迷或用於空或談於假或顯於中言偏意圓悉具三法蓋酬阿難三止之請也苕溪云圓覺三名既同今經沇師所解故如其義涅槃中三雖二名有異其體亦同但禪那以雙遮為離優畢以雙照為等而孤山專用天台三止配今三名者斯又得經之深也何則止屬於定觀屬於慧阿難既以多聞小慧自咎正以楞嚴大定為請大定非三止而何況三摩禪那顯是定名雖此定即慧而所主從別若然則豈唯見孤山得經之深抑亦知天台三止冥符聖言矣最初方便者阿難所請有通有別通謂奢摩他等是諸佛成道之法也別謂最初方便即當機發行之由應知下文從破心見以去酬其通請如佛告阿難有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽等至辨諸聖圓通本根酬其別請如佛告大衆吾今問汝最初發心悟十八界誰為圓通從何方便入三摩地舉要言之唯觀音所觀耳根圓通方是此經最初方便熏聞云殷勤下請果人因地所修行法故曰十方如來得成菩提等應知得成菩提即究竟覺智也妙奢摩他三摩禪那即圓教真似乃至外凡所修定行也雖首楞嚴通因通果今正在因因果相沿始終一貫補遺云資中用圓覺經作三觀釋孤山依涅槃翻奢摩他為止一中開三作止釋今觀二師孤山所得多矣且如圓覺三法經中亦名為定如彼經云爾時便有二十五種清淨定輪又偈云辨音汝當知一切諸菩薩無礙清淨慧皆依禪定生所謂奢摩他三摩提禪那是知彼圓覺三法尚可直作三止消釋況今經乎況涅槃經顯以奢摩他翻定又三摩名等持禪那名靜慮並定法名義三止消文復何疑乎問資中以奢摩他等對於三觀其義如何答對義無咎但當時立名所主在定故以三止消之為便耳問三摩名等持如何見是定法答三摩乃方便隨緣止圓覺謂之唯觀幻化乃是以止定法平等持於假法使不散亂故名等持耳問曰吳興以涅槃三名直對今三義如以毗婆舍那對今三摩優畢叉對今禪那是義然否又止觀云止即是斷斷通解脫觀即是智智通般若止觀等者名為捨相捨相即是通於法身止即奢摩他觀即此婆舍那他那等故即優畢叉通三德如前據此奢摩他對解脫合對於假今吳興以為體真止毗婆舍那對般若合對於空今吳興以為三摩乃與止觀對義不同何耶答曰凡對當義乃是一往不得盡理且奢摩他名定以寂靜為行止觀從名故對解脫今吳興從行乃曰體真毗婆舍那名慧慧則分別為義止觀從名故對般若吳興以分別屬假故對三摩並是一往會通不可致詰也又涅槃第三十云奢摩他者名為能滅能滅一切煩惱結故名為能調能調諸根惡不善故名為寂靜能令三業成寂靜故名曰遠離能令衆生離五欲故名曰能清能清貪欲嗔恚愚癡三濁法故以是義故故名定相毗婆舍那名為正見亦名了見名為能見名曰遍見名次第見名別見名別相見是名為慧優異叉者名曰平等亦名不諍又名不觀亦名不行是名為捨又孤山以三止消今經文則知天台三止有懸合矣故止觀云此三止名雖未見經論映望三觀隨義立名釋論云菩薩依隨經教為作名字名為法施立名無咎若能尋經得名即懸合此義也今果得之楞嚴矣今謂圓覺三名顯云是定亦唐譯之經彼為最親故知三止懸合二經矣又準涅槃云善男子為三事故修奢摩他何等為三一者不放逸故二者莊嚴大智故三者得自在故復次為三事故修毗婆舍那何等為三一者為觀生死惡果報故二者為欲增長諸善根故三者為破一切諸煩惱故準此經文止觀各開三義即是三止三觀之明文次第對義在文不差故谷響云涅槃云為三事故修奢摩他此乃止中具三之明證也而與阿難所請之三宛若符契然而大師親見涅槃而不指之者豈非欲使學者自得之乎長水云方便多種今問成佛妙行復云最初者意請成妙行之方便也淺深雖異俱方便爾如圓覺經方便隨順圓攝所歸即有三種此指妙行即方便也如下經文佛問圓通從何方便入三摩地即指入妙行之方便也今文請即通問下文答則別說如下文云有大佛頂首楞嚴等即許成道妙行也復先徵詰發心推逐妄執破群疑顯藏性令信解不謬阿難於是因此了悟發菩提心等此則信解真正成本起因若無此因縱歷多劫修諸行門皆成邪僻猶如煮沙欲成嘉饌終不能得故圓覺中示三觀顯諸輪一一皆云悟淨圓覺此經亦爾從初至第四卷半已來則總明信解真正為最初方便也信解雖正明識藏心多聞無功不逮修習如得大宅罔知入門故請修行從何攝伏佛即具辨止觀為正修法止觀成處名真三昧入此行時須有方便方便之法不離根門入一無妄餘皆清淨故問二十五聖復敕文殊令揀此即以根門順機為最初方便如下文云我今欲令阿難開悟二十五聖誰當其根何方便門得易成就此則的取從聞思修為最初方便最初之義先解後行無出於斯從聞思修為方便者但取耳根順機易入得為最初方便從者隨順也若初心隨順聞思修而修即是方便若違而背之即非方便也又阿難竦己從邪由無定力故歸見佛即請行門如來未即為說却約心見徵解意云解若真正行可無邪手鑑云方便多種者不出教行二種也法華云更以異方便助顯第一義此經云歸元性無二方便有多門淺深異者圓覺即故深此經之故淺俱是入道之方便也長水云前後兩度說經初從此去至標經名是酬問正說分次從說是語已下至不戀三界為請益再陳分於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨孤山云前通敘同聞不言菩薩別序集衆不言二乘此中備有三乘驗前二序影略互現耳佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難此云慶喜解飯王之子如來成道夜生淨飯王既聞太子成道斛飯又奏宮中生男舉國欣慶因名慶喜是佛堂弟故云汝我同氣重聞云孤山云南齊褚淵居嫡母喪去官王儉歎之曰雖事緣義感而情均天屬義感謂非所生也天屬猶天性也蓋譯人取此潤色佛言耳解飯王之子者初師子頰王有四子一曰淨飯二子一悉達二難陀二曰解飯二子一調達二阿難三曰白飯二子一摩訶男二阿那律四曰甘露飯二子一跋提二提沙諸經明佛出家成道皆云二月八日夜苕溪云阿難既厭多聞而欣妙定如來欲談是義先詰妄緣故問發心見相之由為止散入寂之本迷解之要並在於茲長水云父母妻子是恩愛之深者世人以捨粗重恩愛為其至道而不知修行見愛尚是妄心故審問之後方推破阿難白佛我見如來三十二相勝妙殊絶形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落孤山云見相實有生滅宛然緣此發心安趣常果交遘易曰男女遘精萬物化生熏聞云三十二相始足下安平終頂有肉髻荊溪尊者云三十二相是藏通極果故知阿難發心示同凡小之見也長水云欲愛之生純是不淨大集經中具說受生皆由父母與己識情爭相愛欲由是託彼赤白二滴為識所依一處和合名歌羅邏而漸增長至於出胎五穀長養雖成人相如革囊盛糞故云膿血雜亂熏聞云琉璃具云吠流離耶此云不遠謂西域有山去波羅奈城不遠山出此焉後人徒玉別為琉璃寶因以名佛言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉熏聞云一切衆生即下文十種異生也正言六道亦兼三乘以六道受分段生死三乘受變易生死皆有輪轉之義故孤山云常住真心即下文如來藏心圓融三諦也用諸妄想謂九界衆生不達此三本唯一念於是六趣見其俗此即賴緣之假也二乘見其真即偏空之理也菩薩見其中別教地前唯觀但中皆由不了圓融妄生取著故致輪輪二種生死二種生死出勝鬘經由五住之因招二死之果補遺云勝鬘經云有二種死謂分段死不思議變易死分段死者謂虗僞衆生不思議變易死者謂阿羅漢辟支大力菩薩然變易稱不思議者如唯識云改轉身命故有變易妙用難測名不思議又煩惱有二種謂住地煩惱及起煩惱住地有四種謂見一切處住地欲愛住地色愛住地無色有愛住地此四住地生一切起煩惱起者剎那剎那相應心荊溪云五住為二死作因汝今欲研無上菩提真發明性應當真心酬我所問荊公云真妙覺明若以空明則有空現地水火風各各發明則各各現若俱發明則有俱現衆生為妄發明性如來為真發明性是名生滅與不生滅二發明性十方如來同一道故出離生死皆以真心心言直故如是乃至終始地位中間永無諸委曲相長水云諸佛同道脫苦得樂皆由真心者此有二種一發言無虗假二向理之心無別岐路今此經意須具二焉始令發言無妄終成向理心絶方為十方同道孤山云言者心之聲由心直故所言真三諦直常名心直了義頓說名言直由此心言乃能趣道阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂熏聞云夫如來身相乃因緣所生法也隨機所見四種不同謂生滅無生無量無作四見雖異一境是同今欲破生滅之心顯無作之理故舉所緣之境以問能緣之見如醫設藥先審病源補遺云阿難既云我見三十二相受樂出家如來欲推破心見二門故先問之將何所見問見也誰為愛樂問心也阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死資中云此正陳妄體由乎心目故下破此乃成心見兩門補遺云何難先總答云如是愛樂用我心目下別答云由目觀見如來勝相答將何所見也心生愛樂答誰為愛樂也長水云目即眼根心即意識佛告阿難如汝所說真所愛樂因於心目若不識知心目所在則不能得降伏塵勞心目是本塵勞是末若迷其本群末難除譬如國王為賊所侵發兵討除是兵要當知賊所在孤山云王譬真心賊譬妄想真為妄轉如國被侵發兵討除喻修止觀補遺云此經誠所謂與止觀陰符知賊所在立陰境也發兵討除修止觀也若云觀真以喻難之非討賊也熏聞云西域四兵謂象馬車步也周禮司兵掌五兵謂戈柲六尺六寸祕兵媚切柄也殳長尋有四尺車戟常酋矛常有四尺夷矛三尋八尺曰尋倍尋曰常酋近夷長又步卒之五兵則無夷矛而有弓矢討釋文治也誅也使汝流轉心目為咎汝合國王心目合賊吾今問汝唯心與目今何所在阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面荊公云於十二類生除空散消沉土木金石二類是為十種異生資中云先舉凡心在內次舉佛眼在面故知我眼浮根四塵亦在我面心亦身內以眼根淨色既不可見故指浮根四塵標眼所在熏聞云青蓮華眼天竺有青蓮華其葉修而復廣青白分明有大人目相故以為喻我今觀此浮根四塵秪在我面如是識心實居身內擕李云浮根四塵即外五根名浮塵根然內五根皆清淨四大所造屬不可見有對色也又內外五根皆其八法所成能造四大地水火風所造四塵色香味觸今浮塵眼根中能造四大性不可見故指所造也熏聞云外五根名浮塵根者浮謂粗浮塵以染汙為名染汙真性故根以能生為義能生五識故內五根即勝義根也屬不可見有對色者准毗曇明三種色一可見色如青黃等二有對色謂五根五塵若云不可見有對色但云五根四塵三不可見無對謂法入少分今內五根亦言色者以是清淨四大所造非粗顯之質故不可見荊公云正出為本旁出為根首為元本為命元為性根為相根若所謂浮根四塵離塵無相故根為相元若所謂根元清淨四大四大性空清淨本然故元為性本即如來藏也涅槃皆從如來藏出本一而已根則不一涅槃受性於本故本為命所謂浮根者以有根元故流逸奔境者名為浮根也所言塵者一切有相皆攬塵成體及其蔽也還散為塵如此經則以搖動者名為塵義根亦塵也謂之根者譬如木根以塵為相無有自性非四塵不生非四塵不養若根離塵即乾而死死即還空衆生六根亦復如是以塵為相無有自性非四塵不生非四塵不養若根離塵欲愛乾拈無復法潤即現前殘質不復續生還合空性本異於此但以根元所出得名為本故經以無住無本為無住本佛告阿難汝今現坐如來講堂觀祇陀林今何所在世尊此大重閣清淨講堂在給孤園今祇陀林實在堂外阿難汝今堂中先何所見世尊我在堂中先見如來次觀大衆如是外望方矚林園長水云講堂身也阿難心也如來大衆五藏也下文戶牗根也阿難汝矚林園因何有見世尊此大講堂戶牗開豁故我在堂得遠瞻見孤山云此三問將破心目之執故先定之爾時世尊在大衆中舒金色臂摩訶難頂告示阿難及諸大衆有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨阿難向以三名為請今如來但舉三摩提者圓通三止舉一即三故下云奢摩他路其意亦爾熏聞云唯指因中所履之法名莊嚴路此三摩提乃即慧之定況復具足萬行不亦莊嚴義乎由因通果故謂之路佛告阿難如汝所言身在講堂戶牖開豁遠矚林園亦有衆生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處孤山云欲破執心在內故泛指其人以例之按定阿難之答也身喻內心堂喻人身林喻外物熏聞云說文云半門為戶穿壁以木為窗即牖也阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身如人在堂先見如來頗有衆生先見身中後觀外物以無有人先見身內故茲責問即是破也補遺云頗字普歌反少也意言不問其多還少有人能見身中否縱不能見心肝脾胃爪生髮長筋轉脉搖誠合明了如何不知必不內知云何知外孤山云身內至近尚不見知況外物至遠乎長水云境風外動妄想內熏識浪潛生為自心相空華幻化起滅無從不了本如遂或久執及推所在妄謂身中反覆窮研理無所據故佛結指令悟其非是故應知汝言覺了能知之心住在身內無有是處阿難稽首而白佛言我聞如來如是法音悟知我心實居身外熏聞云稽首稽稽留也以頭至地多時為稽首所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際一切衆生不見身中獨見身外亦如燈光居在室外不能照室是義心明將無所惑同佛了義得無妄耶佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿齊汝觀比丘一人食時諸人飽不阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽資中云心若離身即同他食他食既非我飽他知何關我身孤山云前云受請今言從我乞食者提獎阿難在赴請日為彼演法事應隔宵故指即日循乞為例我已宿齊者即我一人已飽也齊乃經宿方食故曰宿齊谷響云謂待明相故加宿之一字足顯齊義纂謂今日明相現時方可得食熏聞云循與巡同摶食即第八云段食是也今存古翻佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外擕李云兜羅此云細香長水云梵語兜羅此云氷或言兜沙此云霜斯皆從色為名也熏聞云兜羅綿手謂佛手柔耎而加以縵似此綿也是故應知汝言覺了能知之心住在身外無有是處阿難白佛言世尊如佛所言不見內故不居身內身心相知不知離故不在身外我今思惟知在一處佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裏猶如有人取琉璃碗合其兩眼雖有物合而不留礙彼根隨見隨即分別長水云琉璃喻根眼喻於識眼根色淨不能礙心同琉璃碗不礙於眼隨照一境心隨根知若此成立乍觀可爾洎乎推破同喻不成要知同喻不成者法喻不齊也此是因明家缺量也比量者須立三支無過方能成立於法既無同喻即三支缺也或有宗因無喻或有宗喻無因或有因喻無宗等皆名缺量今既喻則遠近俱見法則但見山河不見其眼故不可以琉璃為同喻也補遺云准琉璃合眼之喻應伏勝義根裏然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃佛告阿難汝心若同琉璃合者當見山河何不見眼若見眼者眼即同境不得成隨若不能見云何說言此了知心潛在根內如琉璃合真際云此責阿難有法喻不齊之過喻見琉璃法不見根縱許見根根即是境若是境者不得言隨是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處阿難白佛言世尊我今又作如是思惟是衆生身腑藏在中竅穴居外有藏則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何苕溪云初計心在身內佛以不見腑藏為破次計在外復招身心相離之難又計潛根且乖琉璃籠眼之喻今立內外欲免前之三過也何者良以有藏則暗故見暗時既名為內何必須見身內之物有竅則明故見明時即名為外豈應更責外不相干內外若成自顯此心不在一處亦異潛根也然則雖云見外所執心體還成在內以開眼見明不同燈在室外故熏聞云須知見有內外體實在內此與初執不可雷同長水云腑或依府白虎通云人含六律五行之氣而生故內有五藏六府五藏謂肝心肺腎脾也六府謂大腸小腸胃膀胱三焦膽也府為藏之宮府胃者脾之府膀胱者肺之府三焦者腎之府也膽者肝之府大腸小腸心之府莊子曰人皆有七竅以視聽食息七竅謂眼耳鼻口今正言眼補遺云何難既被破於潛根又計此心通於內外但與前內外不同今云心在內為藏府所閉故見暗不能分別焦府則逃前不見焦府之責復因七竅則能見外此心逐物又居於外但此在外又與前計在外不同前云心實居外如室外之燈今云見外因竅穴明心自居內又逃前身心不相干之責文中所計文並有內外佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此室暗中皆汝焦腑熏聞云焦謂三焦或作膲黃帝難經云三膲者水穀之道路氣之所終始也上膲在心下下隔在胃上口自膈已上中膲在胃中口不上不下自臍已上下膲在臍下當膀胱上口楊玄操云膲元也天有三元之氣所以生成萬物人法天地所以亦三元之氣以養身形若不對者云何成見若離外見內對所成苕溪云此縱計也合眼見暗名為身中開眼見明何不見面若不見面內對不成苕溪云牒計之難若謂合眼見暗名為內對焦腑義者何不開眼見明亦有外對面目之相外相既無內義何在補遺云阿難計閉眼見暗成於內對者且如居暗室中一室之暗皆成汝之焦府邪是使身外之暗室並成內對之義良由閉眼之時等為一暗何能分於身內邪今謂此文秪是重牒前計以為難詞耳今別科之使其顯然自佛告下破執為二初破內又二初破內見次若離下破內對初又二初按定即經云此暗境界與眼為對不對等次若與下正破一約有對破內義二若不下約無對破見義初又二一設難二若成下立妨次若離下破內對又二初牒前計經云若離外見內對所成者如前計云開眼見明閉眼見暗乃是外見內對之義不同意明離於外見內對自成今重牒之欲使內外兩相例難義不得成故下破中應今所牒雖雙牒內外意在破內次正破中二初准外破內次若不下結或破意初經文云合眼見暗名為身中此二句亦牒計也開眼見明何不見面此二句准外也由前所計合眼見暗即是焦府內對之義逃於不見焦府之責今准此義於開眼中亦立外對見面之義故曰何不見面次結成破意經云若不見面內對不成在外見既不可立外對見面之義前云閉眼乃有內對之義亦安有耶此中欲令彼所計外見內對兩相為妨不能兩立所以重牒云若離等也見面若成此了知心及與眼根乃在虗空何成在內苕溪云見面若成復以前難縱其所計若在虗空自非汝體即應如來今見汝面亦是汝身熏聞云身合云眼以眼屬身分故通言之汝眼已知身合非覺汝眼在空空中有知知既離身身合無覺必汝執言身眼兩覺應有二知即汝一身應成兩佛所執與難豈其然乎蓋防至鈍者耳補遺云次破外二初縱經云見面若成且縱汝成於見面之義恐他計云雖不炳然見面既心識在眼根中已與面作對即是見面外對之義故今且縱此計也何以知其然邪准下破文既云此了知心及與眼根乃在虗空意云若作此計須是心眼在空可也若附在面外對不成也次奪又三一約心眼在空奪若欲立見面外對之義須是心眼在空方許此義既無是理見面不成故曰此了知心等也言何成在內者由阿難雖計通內外心體實在於內由竅明故由內外見故心亦有在外之義今既心眼在空則向云在內義亦墮矣二約心眼同他奪若計在空已非己有全同他體矣則是現今如來見汝之面即是汝身之眼矣故曰若在虗空等也三約二身無兩覺奪若心眼離身身合非覺知若欲身眼各自覺知應有兩心至成佛時須有兩人成佛耶此意且就凡迷一人無成兩佛縱奪其執不可以悟中果地一佛遍應恆沙謬解也是故應知汝言見暗名見內者無有是處苕溪云不言見明為外者略也又見外為見內從正計結也阿難言我常聞佛開示四衆由心生故種種法生由法生故種種心生我今思惟即思惟體實我心性隨所合處心則隨有孤山云心生法生境從心起也法生心生心逐境遷也長水云第八本識變生三境故云心生法生境界風動能起識浪故曰法生心生今雖通舉要取後句法生心生以為所據應知秪就現前分別事識而論轉計亦非內外中間三處孤山云亦非三處翻前四計也內即在內外即在外中間即潛根補遺云此計隨合阿難意云思惟之心實在於我若求所在不定一處但隨根塵合處我心即依根而合前塵又如下文難有體中如汝以手自桎其體汝所知心等即是身根觸塵生識心也又今云根塵合心隨生者若根親塵疏則心生於根若塵親根疏則心生於塵不定一邊故曰隨合不同下文中間定在一處也言亦非者謂非定在此三處但隨一而有也內外該三謂前計內計外計內外也中間即潛根潛伏勝義不內不外且曰中間望下第六之中間還屬於內佛告阿難汝今說言由法生故種種心生隨所合處心隨有者阿難欲計法生心生故通舉二句蓋佛常有此語故也其實只就下句為計所以佛破秪牒其下句是心無體則無所合若無有體而能合者則十九界因七塵合是義不然孤山云心既隨合而有則自無體若本無體而能合者則十九界與七塵一俱無體亦應能合彼既不爾此云何然以界但十八塵唯有六故苕溪云是心無體則無所合體猶性也夫心性遍在諸法假緣而生譬如火性寄諸陽燧因與日合故能出火若無有體而能合者此猶火本無性隨所合物火則隨有豈應爾耶補遺云如世之火自有體性然後假於陽燧為緣而能發焰若云心自無體假緣能合者狀似火自無體乃出陽燧耳熏聞云問阿難所執但似內心無體非謂外塵無體以云隨所合處心則隨有若爾秪可云十九界因六塵合何故云七耶答凡言界者以種族為義如心有體則與有合心既無體應與無合由是論之須云七塵若有體者如汝以手自桎其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面孤山云既無來處心體自無阿難言見是其眼心知非眼為見非義真際云阿難意謂見自是眼心但能知不可以心為見故云非義而不知根不自見心依根見故下破其眼獨能見佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死以門喻眼以人喻心室中之門所以通出入而見內外也必在乎人今以眼自能見物不假於心政似不假於人門自能見外矣阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復遍體為不遍體長水云一多心體也遍局身體也若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成若多體者則成多人何體為汝若遍體者同前所挃若不遍者當汝觸頭亦觸其足頭有所覺足應無知今汝不然孤山云挃應無在謂非定在一支也若言四支各自有心故觸一支餘支不覺則成四人何支是汝既俱觸俱覺則非不遍資中云挃應無在謂挃頭即是挃足無所在故補遺云謂阿難謂心有體佛以一多難之若此心體是一者且如擊汝一支令其四支俱覺其痛癢否是則擊左其右無恙固其理也若云俱覺其痛癢是則欲擊汝左只須擊右亦可故曰挃應無在若挃有所則擊左必左一體之義安在耶挃遍不遍義又從前一體義中復難此二以由前難一體挃其一支四支不覺則知所計一體不成恐他被破多體之後復執前一體之義所以挃一支其四支不覺者良由心體不遍故此復難俱觸俱覺則不遍又非是則難其遍與不遍正恐計其不遍其遍義與前一體義同但相帶來耳是故應知隨所合處心則隨有無有是處阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外如我思惟內無所見外不相知熏聞云實相之名雖遍四教既約內外推破其心則是衍門三教之義此應是法華前被機通說今阿難泛引其言而為所據補遺云此正當同諸聲聞在方等會時聞說諸大衆經所說實相離性離相不在內外入雖獲聞大教出還自執小宗今被窮逐徵心所在妄此引之為據不知此何言也長水云外不相知云在外則不相知也內無知故在內不成身心相知在外非義今相知故復內無見當在中間孤山云相知故不在外塵內無見故不在內根佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身處謂依報處經文云為復在處為當在身正以依正相對而問也若在身者在邊非中在中同內在身邊則中間不成在身中則同前在內蓋凡言中者必對兩邊而中之相貌必不至迷惑也欲問阿難中之體狀故此問起若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂孤山云若無表示心則無體若有表示中則無定熏聞云表標准也阿難言我所說中非此二種如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在真際云眼能發識是增上緣色能牽生是所緣緣補遺云法華玄記云四緣者因緣具足三因次第緣心心數法次第而生緣緣如識生眼識增上緣諸餘緣也三因謂生因習因依因止觀記云新譯次第緣名等無間緣緣緣名所緣緣大品云欲知四緣當學般若補遺云准大論四緣一因緣謂相應因共因自種因遍因報因是五因名為因緣二次第緣心心數法次第相續無間故名次第緣三緣緣心心數法緣塵生故是名緣緣四增上緣諸緣法生時不生障礙故名增上緣准今眼能發識取無障之義乃增上緣從所緣之色生出貪愛能緣之心而論牽生豈非所緣緣耶佛言汝心若在根塵之中此之心體為復兼二為不兼二若兼二者物體雜亂物非體知成敵兩立云何為中資中云物即塵也體即根也物無所知體有所知故云物非體知知與無知相形而立故云成敵兩立補遺云體謂眼根有知并上文阿難云眼有分別等且眼根雖是勝義亦四大色如何云知如前阿難以眼見心知佛難若眼能見門能見不據此根亦無知耶又復心在根塵之中正得中義如何難云物非體知成敵兩立云何為中耶且如空假二亦相敵如何論中須知眼色為緣生於眼識此二句據經五識對五塵也此是初剎那時眼已發識則眼有分別矣不同前文單以勝義為眼根也又曰識生其中者乃是同時意識阿難指以為心言物體雜亂者使心兼二處則知共無知心體既已混殽中邊於焉雜亂矣言成敵兩立者凡言中者雙非二邊今以心體兼二則心同眼識之體敵彼物塵只成二邊中義已矣矣兼二不成非知不知即無體性中何為相孤山云離知不知之外復以何相表心有體既無體性將何為中要若存根境可生中得之識根境既無教誰生得識之體性體性既無名去聲何為中故云中何為相是故應知當在中間無有是處阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不長水云既非內外中間即知心無所著而不知佛意破妄無體令識本真如云三際求心心不有心不有故妄元無妄元無處即菩提生死涅槃本平等不了此意謬立無著舉世修行多作此計但一切時都無所著即我真心而不知執此無著亦是妄想楞伽云無心為心量我說為心量故下破之釋要云蓋為遣彼妄執令知諸法無性全是一真則了萬法皆無所得故云無著佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無苕溪云欲破無著先以外境定之在即有也無者心不見境也境既本無心何所離而云無著耶纂注云阿難計此心俱無所在以為一切無著名之為心佛却以一切為在為無為難者蓋言若一切俱無所在則是一切本無矣境既本無云何說汝心無著耶若言一切俱有所在則是汝心亦俱有所在矣心既在境又云何說汝心無著耶無則同於龜毛兔角云何不著補遺云涅槃經世間有四種無第四畢竟無如龜毛兔角止觀記云兔角龜毛見者以此二物喻於斷見一向全無此名斷見故成論云兔角龜毛鹽香蛇足風色等是名為無此取走兔水龜為喻若飛兔陸龜容有毛角故大經云如水龜毛如走兔角或破見如止觀記或遣著如三藏有門明我人衆生如龜毛兔角求不可得有不著者不可名無苕溪云有不著者心見其境也境若是有心則成著豈名為無耶無相則無非無則相相有則在云何無著無相則無謂境亡則心滅非無則相謂心存則境生次二句者夫相不自有由心在故有心不自無由相盡故無是有相而言無著者不可也是故應知一切無著名覺知心無有是處孤山云總此七番似破四性在內潛根見內似自性在外似他性中間似共性隨合無著似無因性故龍樹云諸法不自生亦不從他生不共不無因是故說無生是故知如來七番破使介爾妄心無逃避處妄賊既除真王得顯無生之理於茲見矣利根上智已合潛悟但為中下之輩更廣說耳苕溪云若四性未破此覺了心世而非諦破性執已乃名世諦世諦虗假猶存於相若破此相方名真諦亦曰第一義諦故天台智者大師云世諦破性真諦破假假破即相空性破即性空由是言之經文七番義含二空也熏聞云世諦破性謂破性執已方顯世諦也真諦破假假即世諦復破此世諦乃顯真諦也假破即相空性破即性空者止觀云若四句推性不見性是世諦破性亦名性空四句推性即自他共無因也若四句推名不見名是真諦破假亦名相空四句推名謂內外中間常自有也輔行云空非前後二諦同時為辨性相前後說耳經文七番義含二空者佛世對機言約義備今據本宗觀道詳而論之非好煩也理必然也人法皆有性相者止觀云此性相中求陰入界不可得即是法空性相中求人我知見不可得名衆生空荊溪曰今蒙依智論中論等立此二空非用法相者所逮補遺云山家教門所明二空多所屬對真俗二諦有云為顯二空同時故今謂應作二意明之一則顯相執正屬假故一則顯二空必同時故不自生等雖破性執猶存不生等相正屬於假名為俗諦若欲空者相亦不存俗即乎真體不二故二空同時一體而顯長水云凡情所計雖復萬差因依之處不過此七欲推妄體先破所依其猶城陷則賊亡巢傾則卵覆徵雖有七處則成五第五第七無別處故隨合無著似破能依正意在所見內同破在內隨合同破無著手鑑云隨合文云是心無體則無所合無著文云無則同於龜毛兔角爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺於淫舍當由不知真際所詣梵漢兩儀聽衆咸坐欲有請問從座而作如禮請益則起更端則起將有承聽必須復坐經有退坐一面儒有居與汝言皆令攝儀受法無謬也大論云佛法中諸外道及白衣來到佛所皆坐外道輕法白衣如客一切五衆身心屬佛是故皆立若得羅漢如舍利弗須菩提所作已辦是故聽坐餘雖得道亦不聽坐大事未辨結賊未破故袒者肉袒也致敬之極西方俗儀見王者必肉袒示非敢有犯佛教亦隨此用此方謝過則肉露兩肩彼土則卑之於尊表將執役蓋兩土風俗不同耳衛齊豹作亂過齊氏使華寅肉袒執蓋杜氏云肉袒示不敢與齊氏爭胡跪亦云互跪左右膝交互跪地有所啓請名為互跪若兩膝著地名為長跪亦先下右膝為禮經云月天子前下右膝叉手合掌者若指合掌不合良由心慢而情散亂必須指掌相合斛飯王子佛得道夜生於諸弟中是最小故同母兄弟四人各有二子如來兄中最長阿難弟中最小孤山云猶在預流未得四果永無三漏又於大乘未得初住中道無漏三漏一欲漏謂欲界一切煩惱除無明二有漏謂上兩界一切煩惱除無明三無明漏謂三界無明中道無漏不漏落二邊即界外無明住地前約權示此約實論惟願世尊大慈哀愍開示我等奢摩他路令諸闡提隳彌戾車作是語已五體投地及諸大衆傾渴翹佇欽聞示誨苕溪云闡提正云阿闡提迦此翻無欲謂不樂欲涅槃也亦言一闡底柯此翻多貪謂貪樂生死不信正法也隳毀也彌戾車惡見也意請如來開示圓妙以毀不信撥無者之惡見耳舊解或謂彌戾車是惡見之名或言彌戾車是邊地賤處今謂惡見據因賤處據果欲使闡提隳現在惡因毀未來惡果義悉可通惡見依興福所解資中云應是邊邪不正之見以不正見死墮邊地下賤也熏聞云五體或名五輪以五處圓故即二肘二膝頭頂請罷展體深樂聞也涅槃又云一闡提此云信不具或云焚燒善根此即斷善根衆生也爾時世尊從其面門放種種光其光晃耀如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽孤山云面門口也六種謂聲形各三也震吼覺三聲也動起涌形三也震動者形聲略舉其一耳然此現端凡表四意謂教行人理也口放種種光表從一理演出衆教即此方真教體清淨在音聞也六種震動表依教修行破六根惑即一根既反源六根成解脫也十方合成一界表十界染淨同一真心即漚滅空本無況復諸三有諸大菩薩皆住本國表圓人行門雖殊各證本理即歸元性無二方便有多門也請觀此端豈非表發因聞起行行成證理為分真聖人即即是密表此土衆生當從聞思修入三摩地當爾之時豈無利根覩瑞之意而懸解歟為末悟者故須發言開演破妄破相委示行法簡辨易成談其地位點出魔境然後方能悟入也隱隱有聲曰震砰磕發響曰吼令物覺悟曰覺自下升高曰起搖揚不安曰動疄壟凹凸曰涌長水云六種震動如華嚴說手鑑云彼云爾時華藏世界海以佛神力其地一切六種十八相震動所謂動遍動普遍動涌起震吼擊一一皆令三言震即是聲動即是形聲兼吼擊形兼起涌故有六種搖揚不安為動忽然騰舉為涌自下漸高為起殷殷有聲為震雄聲郁遏為吼磅磕發響為擊又大般若經有二種六動一六相動即同華嚴二六方動謂東涌西沒西涌東沒南涌北沒北涌南沒中涌邊沒邊涌中沒然動之所為依勝思惟梵天經有七一令諸魔怖故二為說法時衆心不散故三令放逸者生覺知故四令衆生觀說法處故五令成熟者得解脫故六令隨順問正義故七即破十八界故荊公云將從見根說是本覺明心故面門放光如百千日此大因緣法爾動地故六種震動此心現圓則覺遍法界故十方國土一時開現將令會衆悟根隔合開故佛之威神令諸世界合成一界十方菩薩同學此法故各住本國合掌承聽六種震動者震遍震等遍震動遍動等遍動也衆生或喜或駭則心動心動則身動動或不遍遍或不等等遍動則甚矣震亦如是佛說妙法有大因緣則諸天魔梵人與鬼神或喜或駭身心震動故地應之如此衆生身與地通一性耳佛之威神者陰陽不測之謂神神也者妙萬物而為言者也神在萬物更為可測不可測者在佛而已故佛言威神佛告阿難一切衆生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮沙欲成嘉饌縱經塵劫終不能得資中云梵語惡叉聚此云綖貫珠無始無明熏習成種種必有果綖貫珠其子似沒石子生必三顆同蒂以喻惑業苦三同時具足經云諸法於識藏藏於法亦然更互為果性亦常為因性手鑑云無明熏習者以二障各有三一現行二種子三習氣種習最細唯佛斷盡經云等者諸法即一切色心漏無漏法也識藏即黎耶也七為能熏八為所熏現行色心是果性熏成種子是因性後時現行還成因性故曰更互也喻惑業苦者謂三子曰聚以生時三顆同蒂以表三道同時具足由惑潤業由業招苦無始已來一念迷真三道流轉若細開三道即九相粗細十二因緣等熏聞云藏通別人修行也不能成圓教佛果乃至別成兩教二乘及外道等即三乘失意之徒成人天邪行等云何二種阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣孤山云菩提了因佛性涅槃緣因佛性元清淨體正因佛性擕李云攀緣心即有為緣生生滅心也此心攬塵為體緣會即有緣散即無長水云衆生輪回五道莫窮初際故云無始聚緣內搖趣外奔逸故曰攀緣造善惡因受苦樂報死此生彼皆因此心故云根本不了是妄一迷為心決定惑為色身之內故云為自性者吁哉世人莫不用此攀緣妄心以為真性執妄心為佛心恃此修行轉增我慢涅槃經云是諸外道無有一法不從緣生計為常者悉是顛倒釋要云攀緣者攀外六塵於內分別造業受報塵沙劫波莫能遏絶者無不由此攀緣妄想以為其本保愛此法為自性者深為誤也然則法無彼此得失在人如人覽鏡不觀鏡體團圓內外明潔切取像之去來以為鏡苟能體像是全鏡之像則無像而不具於鏡鏡是全像之鏡則無鏡而不具於像斯則法界圓融本末俱現即是無始菩提元清淨體方見佛之本懷方免偏指之失方於行者不遠而得菩提智果涅槃斷果二果本具故云無始所依之性本來不與妄染相應故云元清淨體第八黎耶於諸識中最極微細名為識精此微細識有二種義一者覺義二者不覺義即是此文元明元明者本覺也不覺即是無明生滅謂不生不滅與生滅合非一非異名為識精從此變起根身種子器世間等名生諸緣識相既現元性即隱名緣所遺者故下文云一切衆生從無始來迷己為物失於本心對法經云無始時來界一切法等依由此有諸趣及涅槃證得斯之謂矣孤山云識精猶心性也其性本來即寂而照故曰元明隨染緣則成九界隨淨緣則成佛界故曰能生諸緣雖染淨俱緣而得失兩異淨得真性失染真性今別指染緣故曰緣所遺者熏聞云心即第六王數之心性即三因佛性應知此文秪就現前妄心示性故曰則汝今者識精元明也至第二卷亦就現前妄見顯性則曰汝且見我見精明元等若以下文例此識精元明亦第二月也秪由性在妄中是故能生諸緣熏聞云應知第四卷發覺初心二決定義與此大同但此中根本則未勸審詳因果則未論同異非初義無以知病非次義無以識藥發解立行目足在茲荊公云所謂識精元明者未分六和合唯有一精明即是識精元明識精者性識也元明者即本明也故上言元明而下言遺此本明以本覺所起故謂之本明以根元所受故謂之元明孤山云而不自覺者日用不知是謂不覺阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屈五輪指語阿難言汝今見不阿難言見佛言汝何所見阿難言我見如來舉臂屈指為光明拳曜我心目佛言汝將誰見阿難言我與大衆同將眼見佛告阿難汝今答我如來屈指為光明拳曜汝心目汝目可見以何為心當我拳曜意欲明心且止其眼阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心正以攀緣妄想為心佛言咄阿難此非汝心前以七番逐破復示二種根本未能領悟猶執能推嗟其迷重故叱以語之阿難矍然避座合掌起立白佛此非我心當名何等矍然遽視貌佛告阿難此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉熏聞云相即前塵想即分別影事二俱不實故曰虗妄孤山云執妄為真如認賊為子阿難白佛言世尊我佛寵弟心愛佛故令我出家我心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心孤山云阿難謂值佛起善謗法造惡皆由推窮尋逐之心也不因推尋安起善惡此則但執妄心能造不知真心本具正是偏教之解也問承事諸佛發大勇猛此乃發菩提心也豈是妄耶答前三教人發大菩提心皆妄也以不達常心本具故若圓發心則知常心本具故觀所造唯見理具是知在性則全修成性起修則全性成修性無所移修常宛爾如斯了達是圓發心豈以推尋造善為發心耶熏聞云阿難但認有作之心不了無為之性圓覺云有作思惟從有心起皆是六塵妄想緣氣非實心體已如空華用此思惟辨於佛境猶如空華復結空果展轉妄想無有是處若此發明不是心者我乃無心同諸土木離此覺知更無所有苕溪云阿難以對境覺知異乎土木執為我心此正當人執之相忽聞訶斥故以無情為難而不知真我無我靈知無知妙淨明心何所不在斯大權起教豈慶喜實然云何如來說此非心我實驚怖兼此大衆無不疑惑惟垂大悲開示未悟爾時世尊開示阿難及諸大衆欲令心入無生法忍於獅子座摩阿難頂而告之言擕李無云生法即真如理忍即智證此法時忍可印持決定不謬故云忍熏聞云荊溪云座無獅子之形但有所表故大論云佛人中獅子故佛所坐名獅子座佛之所說名獅子吼如來常說諸法所生唯心所現一切因果世界微塵因心成體孤山云一切因果即十界正報世果微塵即十界依報此釋上諸法所生也因心成體此釋上唯心所現也因心本具隨緣能造故所造法全能造心依正既是一心一心實無能所如金錍云故知不識佛性遍者良由不知煩惱性偏故唯心之言豈唯真心大教意謂點示在迷妄心性具故云諸法唯心故云唯心之言豈惟真心今此經云諸法所生唯心所現一切因果世界微塵因心成體一段經文正為點示唯心性具此法生起由真如不守自性為因無始妄想熏習為緣因緣和合成黎耶識從此變生根身種子器世間等如水起波如鏡現像故云唯心所現阿難若諸世界一切所有其中乃至草葉縷結詰具根元咸有體性縱令虗空亦有名貌草葉有根種縷結因絲麻孤山云如涅槃說空有四名謂虗空無所有不動無礙貌謂體貌如雜集論說空一顯色谷響云雜集論說二十五色謂青黃赤白長短方圓粗細高下若正形平等不正不平等光影明暗烟雲塵霧回表空一顯色何況清淨妙淨明心性一切心而自無體性一切心即常住真心能為九界妄心之本性也荊公云離垢而淨名為清淨即垢而淨名為妙淨此心亦即亦離故名清淨妙淨明心此明心者一切心皆受性於此若汝執吝分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性資中云分別謂藉緣托塵以立分別覺即尋伺也分別覺觀並是依他假合全性自無如畫水印空隨手即滅真際云諸塵事業即色等六塵皆有牽心為緣業用熏聞云即六塵牽起內心為染淨緣而成業用如汝今者承聽我法此則因聲而有分別縱滅一切見聞覺知內守幽間猶為法塵分別影事縱滅見聞覺知前六不行也意有四種定位明了夢中覺窹今約明了與五同緣俱不行也所取法塵乃散位獨頭也不緣外境泯迹藏用故曰內守幽間秪此虗想是名法塵影事釋論云眼曰見耳曰聞鼻舌身同云覺意曰知意有四種謂第六意識中有四一定三散定即根本事禪等所取法塵者即內守幽間也既非入定又不緣境故曰散住濁頭長水云五境不對明了不行既絶外緣故云內守幽間也當爾之時不無分別若便將此內分別心為全性者此亦非理而不知此全由第六法塵影像事境所發亦非全性乃是意識在獨散位比量別緣取獨影境非是明了同五所取故云縱滅見聞覺知也手鑑云在獨散等者謂一意識有明了獨散定夢之四四之所緣即性與獨影及帶質也故有頌云性境不隨心獨影唯從見帶質通情本性種等隨應性境者性體也境即所緣相分對心故名境此境從自種生有實體性名為性境不隨心者此境自有體性不隨能緣心有故獨影唯從見者影象由前五落謝塵無自種等為伴獨自而有此境皆從現分而有故帶質通情本者謂性種子等皆帶質故情即能緣本即本質性種等隨應者隨應是不定之義顯上二境隨其所應故別緣者與五同緣名比量境不與前五名別緣以意識獨自緣落謝影像此亦比量攝又獨影亦通謂與五緣假五塵時則有質獨影若緣空華毛輪即無質獨影若獨散意識多取獨影若定中通於三境夢中定唯獨影我非敕汝執為非心但汝於心微細揣摩孤山云我所訶叱非謂令汝執同土木無心勸其揣摩分別之心為當離塵有體為復離塵無體荊公云此亦是心然達本心則此但是妄若離前塵有分別性即真汝心孤山云分別性即妄心也若此妄心雜塵有體則容是真心既離塵無體非妄是何應知即真汝心乃暫縱之語非顯真也長水云世人只知即心是佛曾不子細度量此心剎那變異猶如猿猴鹿馬紛然亂想無暫停時故楞伽云當於靜處觀此妄想流注生滅凡夫不覺妄謂不動故下經云如瀑流水望如恬靜流急不覺非是無流起信亦云一切衆生不名為覺以從本以來念念相續未曾離念故說無始無明故佛再令細微揣摩楷定真僞若分別性離塵無體斯則前塵分別影事孤山云六塵如形分別如影影由形有故無自體心因塵有豈有體耶塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅其誰修證無生法忍心隨塵滅修證者誰手鑑云雜論分別有三一自性分別二隨念分別三計度分別第八及五皆唯現量現量所得自然於境皆顯現故即自性分別也任運自然分別不待起心籌量比度故隨念即此因聲也計度即下獨散也即時阿難與諸大衆默然自失佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果長水云四禪四空及滅受想名為九定然修此定能成無漏今言不得成阿羅漢者此名不得大乘阿羅漢也釋要云滅盡定者滅六全分盡七染分也熏聞云緣慮如影舉體全無阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝今日乃知雖有多聞若不修行與不聞等如人說食終不能飽世尊我等今者二障所纏良由不知寂常心性熏聞云身心本不相代佛之身心不能代我之身心出家是身三昧是心二事各行無相替理手鑑云如來於空王佛所同時發心佛勤精進我樂多聞此宿習不同焉能相代身雖因佛而出家心不因佛而悟道如孟嘗君薦宋玉於齊王王三年不用客謂孟嘗曰三年不見用不知臣之罪君之過線因針而入不因針而急女因媒而嫁不因媒而親由此言之子之才固自薄矣資中云涅槃云汝等比丘身雖得服袈裟染衣心由未染大乘淨法譬如窮子下迷真習妄五道轉輪此與法華喻意稍別彼喻於人以背佛為捨父皆於佛邊曾結大緣猶如父子退大流浪名之今譬於法以迷真為捨父真妄相關亦猶父子煩惱所知名為二障煩惱障為根本及隨也所知障亦名智障障一切種智故按百法論云根本煩惱有六謂貪瞋慢無明疑不正見也隨煩惱有二十謂忿恨惱覆誑諂害嫉樫憍無慚無愧不信懈怠放逸昏沉掉舉失念不正知散亂也證真於根本中廣明分別見惑俱生思惑二類各有種子習氣之異云云所知障亦名智障者資中云煩惱名數與前不別但應名法貪法瞋等此等正約界外見思言之即無明住地也唯願如來哀愍窮露發妙明心開我道眼苕溪云前破妄心但離粗執故今請云發明妙心將破妄見欲顯真見故復請云開我道眼又則眼見必由識心故心眼雙舉叩佛音教其旨甚微問何故先破妄心後破妄見答應有三義一者心為迷妄之元復是人執之本須先破之二者心屬王數通乎三性故在前破見唯眼識但屬無記故在後破三者所破妄心且離塵緣分別想相而未能知心性常住今破妄見則引盲人矚暗等以彰見性不滅乃至舉手飛光皆顯性無搖動當知如來善巧方便從粗至細自淺由深開示阿難奢摩他路也即時如來從胸卍字涌出寶光其光晃昱有百千色十方微塵普佛世界一時周遍遍灌十方所有寶剎諸如來頂旋至阿難及諸大衆長水云前光從口此光從胸者前文從說顯心此文從心顯見萬字者表無漏性德梵語阿悉底迦此云有樂即是吉祥勝德之相有此相者必受安樂則天長壽二年權制此字安於天樞其形如此卍音為卍字佛胸前有此之形然八種相中此當第一謂吉祥萬德之所集也熏聞云志誠纂要云梵書作卍古經皆爾梵云室利瑳此云吉祥海雲有此相者萬德具也華嚴音義云卍本非是字大周長壽二年主上權制此文著於天樞音之為萬謂吉祥萬德之所集也若西域萬字元作此𭮐寶剎者剎土也梵音正云差多羅此翻土田荊公云將說如來藏心應阿難等所問故從胸卍字涌出寶光如來藏心含攝一切故有百千色十方如來同此頂法今將以開示阿難等衆故遍十方佛頂旋至阿難及諸大衆告阿難言吾今為汝建大法幢亦令十方一切衆生獲妙微密性淨明心得清淨眼孤山云圓頓大法超出偏小喻之以幢獲妙明心證中理也得清淨眼發中智也荊公云幢以摧伏異類表示我所建立如寶積經所謂心性清淨阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見阿難言由佛全體閻浮檀金赩如寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相閻浮檀此云上勝赩盛貌長水云閻浮檀正云染部㮈陀此西域河名其河近其樹其金出彼河此則河因樹名金因河稱也或云閻浮果汁點物成金因流入河染石為金也其色赤黃兼帶紫焰故也觀經疏說閻浮檀金超過紫磨金色百千萬倍唯聖能知佛身光明猶如聚日紫磨必不如此手鑑云由樹在香山之上阿耨達河池之南半處平原半臨巨海海中有金色盈水面輪王出世鬼神得之博易人間故往往有此居暗室中暗則滅也然據染部是樹名無故不翻捺陀此云江亦言海等其樹之葉上濶下狹故此洲似彼地勢北濶而南狹人面上濶而下狹又其樹一年三變有時生華光色榮茂有時生葉滋華敷蔚有時凋落狀若枯死以喻於身有生長死佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難言唯然世尊既無我眼不成我見例如來拳事義相類熏聞云敬應曰唯如是曰然應辭唯恭於諾佛言阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於塗詢問盲人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚盲茫也茫茫無所見也以是義觀前塵自暗見何虧損前塵自暗此有二意一指種種色為前塵以無明緣故暗也二暗即前塵此眼之所對阿難言諸盲眼前唯覩黑暗云何成見佛告阿難諸盲無眼唯觀黑暗與有眼人處於暗室二黑有別為無有別如是世尊此暗中人與彼羣盲二黑校量曾無有異阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼資中云窮其根本遞遞相推心為其主餘是助緣既知是性屬心漸明真見矣熏聞云世尊說見性具四種緣所謂空明心眼今舉三緣但心為主燈眼是助第六意識已為前文所破今正指眼根能見之性名之為心是心無記去真稍近若深說者即見精明元也但此中未彰灼而示且通漫云心耳阿難雖復得聞是言與諸大衆口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨真際云大衆默然佇誨良由真妄未明若認見境之心前來已奪若謂本真之見豈假根塵口既亡言心希開悟爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆我初成道於鹿園中為阿若多五比丘等及汝四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果資中云五比丘者阿若多摩訶男頞婆敷若准餘說三轉十二行法輪一示轉謂此是苦等二勸轉謂苦應知集應斷滅應證道應修三證轉謂苦我已知不復更知乃至道已修不復更修三轉皆生眼智明覺成十二行能摧煩惱故名法輪也但是苦集滅道四諦之境准天台四教立四種四諦謂生滅無生無量無作今且指生滅四諦也言客塵煩惱即見思二惑非無始無明也苕溪云此中所問且約昔時小乘所悟耳意令答出客塵是動主空不動欲將動以譬妄不動喻真下文屈指飛光義亦如是法華玄文顯以客塵為見思惑補遺云玄文云五品圓解一觀四諦圓伏技客根本枝客者枝謂枝末客即客塵准上文二十五王三昧中云見思煩惱苦客塵暗障苦無明根本苦此則客塵自屬塵沙如法華文句又云斷客塵煩惱令無知不生玄文又云一切衆生自性清淨心不為客塵所染維摩疏消經菩薩斷除客塵煩惱云無明不有而有名為客塵能覆自性之心最勝王經煩惱隨惑皆是客塵法性是主無去無來時憍陳那起立白佛我今長老於大衆中獨得解名因悟客塵二字成果孤山云憍陳那此云解本際以第一解法獨得解名世尊譬如行客投寄旅亭或宿或食食宿事畢俶裝前塗不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清陽升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛初成道對大機則於寂場演華嚴頓部對小機則於鹿園轉生滅法輪此乃顯示次第則鹿園唯說小法明矣而不妨大機密受圓益於生滅法達不生滅而皆內祕大道外現小乘但法華已前咸謂實小至於今教既已開顯故得混同是故如來舉初成而問陳那於是據始悟而答須知此文唯在圓也以行客不住塵質動搖喻妄想分別主人安住虗空寂然喻常住真心向云因悟客塵二字成果即是破無明成初住分果也問陳那豈不破見思塵沙耶答圓頓所說唯一無明即今經所談通言妄想也以障法性如客與主如塵與空對待唯二更無他途但由亡智親疏致使迷成厚薄故強分三惑義開六即也問主與客殊空將塵異豈是圓中即惑是理耶答言偏意圓智不興難滿月況面豈有眉目雪山比象安責尾牙須曉大猷方知部旨佛言如是即時如來於大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住佛言如是如來於是從輪掌中飛一寶光在阿難右即時阿難回首右盻又放一光在阿難左阿難又則回首左盻佛告阿難汝頭今日何因搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盻佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是孤山云舉手開合飛光左右現生二相秪是證成陳那義以示阿難也長水云前明手有開合見無動靜此對外境以辨次於內身自分動靜動中有不動也於是如來普告大衆若復衆生以搖動者名之為塵以不住者名之為客汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪回是中自取流轉苕溪云此因阿難謂身境有動見性不動寄斥大衆迷真常而見無常也智論明無常有二種謂相續法壞及念念生滅今云從始洎終蓋言從生至死即相續法壞也既失真性唯造妄業故曰顛倒行事然而但是為物所轉正斥能迷之心認物為己又斥認所迷之境為我我所也如圓覺云妄認四大為自身相六塵緣影為自心相若如是則塵勞之境何由出也故曰輪回是中等已上經文雖明見性不動然猶未論此見亦妄離見乃真熏聞云以動為身等責其妄想認現前流動之相為身為境而不知真見之性本無動相也資中云此寄粗相密談真見分別顯了並在後文手鑑云然此迷失總四對顛倒謂四大非身認為身無相法身而不認是第一對六塵如幻本無而見有三諦真實本有而見無是第二對想念生滅認為真心真心了然而不自認是第三對想念如鏡中像全空而見有真心如鏡中明實有而見無是第四對一三我執二四法執
