body:
  text: 一名中印度那蘭陀大道場經於灌頂部録出別行大唐神龍元年歲次乙巳五月二十三日天竺沙門般剌密帝於廣州制止道場譯烏萇國沙門彌伽釋迦譯語菩薩戒弟子前正議大夫同中書門下平章事清河房融筆受趙宋桐洲沙門思坦集注明石盂後學比丘慧基重校訂明巡視漕河監察御史長安霍達參閲鋟爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恆河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地長水云此門次第合次那律以是六根之耳根故釋要云最後說者凡有三義一以圓通義廣正是此方便宜故備顯修證之門廣化儀之相也二以慶說相繼意欲觀音說後即便慶贊以表正讚觀音旁兼餘聖若於那律次說若不慶贊不彰觀境最優若便慶贊後說諸聖應非故留後說即慶贊正旁自然著矣三敕揀連環觀音說竟便敕文殊料簡連綿相接事無斷絶故也熏聞云證真引天台云西音阿那婆婁吉低輸此云觀世昔能所圓融有無兼暢照窮正性察其本末故稱觀世音又梵語阿縛盧枳帝濕伐羅此云觀自在唐三藏云觀有不住於有觀空不住於空聞名不惑於名見相不沒於相心不能動境不能隨動隨不亂其真可謂無礙智慧也今觀諸經標名或單云觀世音或單云觀自在唯大悲心陀羅尼經具云觀世音自在孤山云觀謂能觀之三觀世即所觀之三諦以聞世間出世間殊音異說皆了即空假中故名觀世音然此義與法華有殊彼云一心稱名菩薩即時觀其音聲皆得解脫則音在他機此云由我觀聽十方圓明故觀音名遍十方界則音屬自行應知因中自行異上化他二義畢備兩經所說各舉一邊耳准下文云由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫此亦同於法華釋名之意但彼為流通本經故偏對他機今為伸敘昔證故正約自行苕溪云教即世音以初稟教即是耳根所對之境故聞即耳根此從能聞邊說若約所聞有通有局取彼佛音教通取一切聲塵之境皆所觀之境也思修皆能觀之觀也聞非無觀以觀行成時正在思修故應知三慧有橫有竪橫則名字已上位位有之竪則名字為聞觀行為思相似為修三慧具足能得相似分真之定故曰從聞思修入三摩地然則觀由境入境實遍通而特取音聞者乃逗機之要也昔佛既爾今佛同然故文殊云此方真教體清淨在音聞欲取三摩提實從聞中入抑又觀音之三慧乃酬阿難之三請也一方便之請二入門之請三根本之請涅槃云證大涅槃有四因緣一者近善知識二者聽聞正法三者思惟其義四者如說修行若言若行是大涅槃近因緣者無有是處佛即善知識也三摩提是大涅槃也當知此上雖有信法兩行而正在信行又法行非全不聞但少從他聞多自思惟耳若然則信法兩行並由三慧者方有所證無聞慧如覆器不能受水無思慧如漏器雖受而失無修慧如穢器不堪飲用三慧備者既仰且完而復清淨所受之水足堪飲用止渴除垢何莫由斯又無三慧是理即佛有聞慧是名字即佛有思慧是觀行即佛有修慧是相似即佛是故備斯三者能入三摩成分真佛及究竟佛然此觀音所說三慧入道正是滅後衆生之行門向如來敕令諸聖各說圓通正在觀音行門以酬阿難本根之請而亦遠酬天王賜與華屋雖獲大宅要因門入之請大宅之門是三慧矣初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅孤山云初五句明聞慧次四句明思慧後二句明修慧明聞慧中先二句標初於聞中謂始聞言教也入流謂體言入理則是反觀聞性也亡所謂不滯名言即是離緣塵也次三句釋所入既寂即釋上入流也所入之理無文字相故云既寂動靜至不生即釋上亡所也動謂有說靜謂無說既達聞性唯一真寂則不得前塵有說無說動靜二相故曰了然不生次明思慧如是漸增者明轉聞成思也聞中亡所故曰聞所聞盡此則亡言達理即結上聞慧也盡聞不住者理無聞相故曰盡聞亦不滯理故曰不住此則言理俱亡生後思慧也覺所覺空者正示思慧也所覺是盡聞之理今覺知此理亦無即是釋上盡聞不住耳後明修慧上思慧雖言理俱空而有覺空之智是則俱空成境能覺成智今境智都泯故曰極圓以極圓故能覺空智所覺空境悉不可得故云空所空滅當知此明三慧聞則亡言達理思則言理俱亡修則境智齊泯以此尋文文無不曉此皆住前修行也補遺云初於聞中入流亡所者流謂照理也聞教則照理理明則亡詮故曰亡所所入者所指能詮入指所詮聞所聞盡者所聞是聲教今亡能聞之根帶所聞言之盡聞不住者指前空耳根之觀為盡聞不著此能空故曰不住由不住故能空之覺皆空寂矣所覺指前耳根相帶言耳空覺等者指前重空之觀故曰空覺既空之又空無以加也故曰極圓言極圓者謂前重空亡所冥理理則圓極今又亡其圓極之相故曰空所空寂也所空指空智也亦欲以所顯能相帶言也應云上句顯前重空冥理下句亡冥理之迹生滅既滅寂滅現前生滅既滅三慧俱亡也以住前三慧是生滅相故寂滅現前初住理顯也以分證三諦無生滅故又生滅既滅則二邊亡寂滅現前則中道顯忽然超越世出世間孤山云世謂六道出世謂三乘十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道衆生與諸衆生同一悲仰補遺云此明登住實證獲二殊勝一合修德之極二合性德之具與佛如來同一慈力於修德中別標三十二應也與諸衆生同一悲仰於性德中別標十四無畏也慈悲實通此中別配二義者良以三十二應說法與樂義強故曰慈力十四無畏救衆生苦苦是悲境依仰佛救故曰悲仰我有悲境依仰圓通而得離已今欲衆生亦然故曰同一悲仰如下十四無畏曰令諸衆生於我身心獲十四種無畏功德又曰我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫意言我已離塵反性脫此悲境今以智力冥資同我昔日脫其悲苦汝亦依仰此理爾下十四無畏皆先言菩薩脫苦復言衆生耳世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土擕李云幻喻三慧體不可得金剛喻摧堅之能熏聞云熏謂熏習從喻為名修兼於思三慧備矣起信云如世間衣服實無於香若人以香而熏習故則有香氣今亦如是觀音因中初無淨用由聞如幻金剛三昧而熏習故能成三十二應入諸國土約四土論之應六凡二乘及藏通菩薩但入同居應別圓菩薩則入方便實報或機在同居亦入分段寂光無相三土由之而生天器飯色喻意可解世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為說法令其解脫孤山云若諸菩薩別圓機也若入相似三摩地進修中道無漏則分真勝解現圓乃至若進修金剛無漏則究竟勝解現圓大士皆現佛身為說頓法令得分真究竟解脫問菩薩何能現佛身耶答心性理顯高下無殊如鏡已明形對像現臣家之鏡王苟臨之豈無王像王家之鏡臣苟對之豈無臣像當知人有高下鏡無貴賤然亦不妨明有優劣臣家之鏡下喻分真理能現佛身也王家之鏡下喻究竟理現菩薩身也證真云若初住能現妙覺是本下迹高若妙覺現菩薩等像是本高迹下俱高俱下二句可知此依天台四句分別補遺云天台普門品別行義疏解即現佛身而為說法明同居方便實報下之三土所現佛身勝劣不同維摩疏佛國八科第六說教約土說教不同准知現身有勝有劣長水云第十地菩薩坐華王座垂成正覺亦須別佛說教聞熏令斷最後微細無明故觀世音現第十重他受用身而為說法孤山云問等覺菩薩豈假初住現佛說法耶答聞法得解何必求人復假勝身彌增內慧資中云勝解現圓將登正覺坐道場也將登者躡上修進無漏言之秪為進修未登正覺是故現身而為說法令其勝解現前圓滿長水云於決定境忍可印持不為異緣之所引轉此指最極根本無分別智將圓滿時故名勝解菩薩登住已去雖為因位便能現上位身為彼說法以此圓證一位即諸位更無深淺故能現耳若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為說法令其解脫若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為說法令其解脫長水云麟覺獨悟出無佛世厭喧樂靜獨處山林資加二位名為有學此後斷惑便證無學約自乘理智將證未證名寂靜妙明菩薩現同類身先稱本習後令近佛准諸文說獨覺根性能覩外境因緣以悟內心生滅推宿種本因雖聞十二因緣其獨覺時恐不可云亦觀十二因緣推宿種與能觀外境因緣通名緣覺可也如諸文依大論辟支迦羅此翻緣覺亦云獨覺通翻一名然後分別值佛不值佛大小不同皆言勝妙現圓者各約自乘理智將欲現前得此名也若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為說法令其解脫補遺云是則勝性言當分自說現謂現今三果已前賢位聖位俱屬有學見道一十六心斷四諦下惑證生空理故云得四諦空初果後進斷三界八十一品俱生品品皆證一分擇滅無為故云修道入滅舊謂數緣滅新云擇滅維摩疏云虗空無為數緣滅非數緣滅無為一是涅槃二非涅槃證一分擇滅無為者斷一品惑盡處名為證一分擇滅無為涅槃擇力所得滅名為擇滅謂斷智推令滅故名擇滅孤山云數緣即是擇也孤山云二乘藏通機也雖有菩薩而藏同人天不斷惑故通同二乘所證齊故若諸衆生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為說法令其解脫若諸衆生欲為天主統領諸天我於彼前現帝釋身而為說法令其成就若諸衆生欲身自在遊行十方我於彼前現自在天身而為說法令其成就若諸衆生欲身自在飛行虗空我於彼前現大自在天身而為說法令其成就孤山云梵王即色天主名為尸棄此云頂髻補遺云梵王此翻離欲亦稱高淨尸棄又外國喚火為樹投尸棄此王本修火光定破欲界惑從德立名今此依普門義疏作一人說案法華文句并維摩疏作兩人說謂初禪二禪主也若依大論舉位顯名目一人耳瓔珞明四禪皆有王今言梵王者應是初禪之頂以有覺觀語言之法得為千界之主熏聞云次第禪門云佛於仁王經說十八梵亦應有民主之異又云四禪中有大靜王而佛於三藏中但說初禪有大梵王者以初禪內有覺觀心外有語言法主領下欲衆生為便上地無此故不別出說法說出欲論解脫令離欲塵帝釋即欲界第二天主彼橫有三十三天而帝釋統之說法謂十善金光明云釋提桓因種種善論長水云欲身自在遊行十方現二天身說法教化即夜摩覩史天名自在者智者釋普門品云自在是欲界頂天具云婆舍跋提此云他化自在假他所作以成己樂即魔王也慈恩云得異熟果隨意所念勝下二天下二天果依樹而得今隨欲得名為自在也樂變化天他化自在名大自在不樂異熟果樂自樂他變為樂具而受用之名大自在然若止以化樂他化二天所配即攝義不盡故從慈恩攝四天也孤山云華嚴稱為色究竟天即摩醯首羅天大論云三目八臂騎白牛執白拂者是也智者云有人以為第六天而諸經多稱大自在是色界頂天釋論云過淨居天有十住菩薩號大自在又十住經云大自在天光明勝一切衆生涅槃獻供大自在天最勝故非第六天也舊以前自在天為第五大自在天為第六又慈恩以自在為夜摩兜率大自在為化樂他化自在若諸衆生愛統鬼神救護國土我於彼前現天大將軍身而為說法令其成就若諸衆生愛統世界保獲衆生我於彼前現四天王身而為說法令其成就若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為說法令其成就金光明以散脂為大將經云八臂健提是天中力士大論稱鳩摩羅伽此云童子騎孔擎雞持鐸提赤幡復有韋紐此云遍聞四臂捉具持輪騎金翅鳥皆是諸天大將未知此中定是何等雖未可定何妨菩薩隨機俱現熏聞云四天王天者上升之元首下界之初天居半須彌東黃金埵王名提頭賴吒此云持國南琉璃埵王名毗留勒又此云增長西白銀埵王名毗留博叉此云雜語北水精埵王名毗沙門此云多聞長水云各領鬼神每王二部共八部衆救護國界釋要云持國所領二部一名撻闥婆二名富單那增長所領薜荔多鳩盤茶廣目所領毒龍毗舍闍北方所領即夜叉羅剎制此鬼神不令惱人故稱護世谷響云國太子亦如世間太子入則監國出則撫軍長水云天王太子即那吒之類輔正統攝跨握鬼物護世益人菩薩身同先令成就後使厭離也若諸衆生樂為人主我於彼前現人王身而為說法令其成就若諸衆生愛主族姓世間推讓我於彼前現長者身而為說法令其成就若諸衆生愛談名言清淨自居我於彼前現居士身而為說法令其成就若諸衆生愛治國土剖斷邑我於彼前現宰官身而為說法令其成就若諸衆生愛諸數術攝衛自居我於彼前現婆羅門身而為說法令其成就長水云人王者王往也人皆歸往故四輪粟散皆人之主手鑑云金銀銅鐵四輪王如次王四三二一天下若中下品十善報為粟散小王衆多如彼粟故從喻立名又言粟散如人把粟散置槃中各得分位王喻亦爾散字上去二音以上化下物無不從以一人有慶兆民賴之抑又佛法興隆增長精氣大集經云國王護法增長三種精氣一地精氣謂五穀豐熟二衆生精氣謂形貌端嚴無諸疾疫三善法精氣謂修施戒信等長水云長者具十德謂姓貴位高大富威猛智深年耆行淨禮備上嘆下歸補遺云愛主族姓等者長者有德士族多歸附之博聞強識不求仕宦居財大富秉志廉貞故名居士熏聞云據普門疏以多積財貸居業豐盈謂之居士今經之意有似鄭康成云居士者道藝處士孤山云三台輔相州牧縣長悉號宰官熏聞云三台亦曰三階每台二星凡六星名泰階六符符者星之驗也黃帝泰階六符經云泰階者天之三階也上階謂天子中階謂公卿諸候大夫下階謂士庶人也今通云三台正言其中耳州牧者牧養也謂養於民也婆羅門翻淨行四姓之一劫初種族山野自間故人以淨行稱之補遺云愛諸數術如此間方士導養之法如華陀五禽之戲怡神養性故曰攝衛又亦可數謂知陰陽之數術為導養若有男子好學出家持諸戒律我於彼前現比丘身而為說法令其成就若有女人好學出家持諸禁戒我於彼前現比丘尼身而為說法令其成就若有男子樂持五戒我於彼前現優婆塞身而為說法令其成就若有女子五戒自居我於彼前現優婆夷身而為說法令其成就孤山云優婆塞云近事男優婆夷云近事女以五戒自守堪任近事出家二衆故若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為說法令其成就若有衆生不壞男根我於彼前現童男身而為說法令其成就若有處女愛樂處身不求侵暴我於彼前現童女身而為說法令其成就女主即天子之后周禮天子之后立六宮三夫人九嬪二十七世婦八十一御妻谷響云六宮前一宮後五宮五者后一宮三夫人一宮九嬪一宮二十七世婦一宮八十一御妻一宮凡一百二十人國夫人如云君之妻曰君夫人命婦謂妻因夫榮者也大家如曹世叔妻師號大家大家尊之稱似言家中之尊大者唐來宮掖并宦者呼皇帝為大家補遺云處女藐姑射山有神人居處在家未嫁之女若有諸天樂出天倫我現天身而為說法令其成就若有諸龍樂出龍倫我現龍身而為說法令其成就若有藥叉樂度本倫我於彼前現藥叉身而為說法令其成就若乾闥婆樂脫其倫我於彼前現乾闥婆身而為說法令其成就熏聞云龍有四種一守天宮殿持令不落二興雲致雨利益人間三地龍泱江開瀆四伏藏龍守轉輪王及大福人藏肇師但出三種不出天龍孤山云藥叉云輕捷熏聞云此有三處海島空中天上傳傳相持不令食人佛初成道說法傳唱至天乾闥婆云香陰新翻尋香行帝釋樂神也在須彌山南金剛窟住天欲作樂身有異相若阿修羅樂脫其倫我於彼前現阿修羅身而為說法令其成就若緊那羅樂脫其倫我於彼前現緊那羅身而為說法令其成就若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為說法令其成就阿修羅云無端正以女美而男醜故從男彰名新翻非天以諂詐無天行故阿修羅有千頭二千手萬頭二萬手或三頭六手苕溪云准普門品八部此闕伽樓羅即金翅鳥恐在下文雜類中收孤山云緊那羅形似人而頭有一角因呼為疑神天帝絲竹樂神也小劣乾闥婆新翻云歌神摩呼羅伽什師云地龍肇公云大蟒腹行也長水云蟒形田蚥復行之類手鑑云亦云莫呼落伽此云大腹田蚥蝦䗫蟒蛇等類皆此所攝田蚥蟾蜍別名蟾蜍蝦䗫也張衡賦曰羿得不死之藥於西王母姮娥竊之奔月遂託身於月是為蟾蜍抱朴子云蟾蜍壽三千歲者頭上有角領下有丹書八字玄中記云蟾蜍頭生角食之壽千歲也即蝦䗫之類大者也以多於田野故名田蚥若諸衆生樂人修人我現人身而為說法令其成就若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為說法令其成就補遺云人者除上人倫之有名位者言之也其或隱淪無位窮而在下固亦隨彼化之然天龍等皆言樂出其倫而人謂樂人修人者樂入其類或欲出其倫皆隨而應之人非無出天非無入互現其文長水云有形有色蘊如下休咎精靈等無形無色蘊如下空散消沉等有想有四蘊如下鬼神精靈等無想無四蘊如下精靈化為草木金石等此皆非人也是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就苕溪云三十二應比普門品雖互有出沒大體是同總而言之無越十界於十界中兩經俱無菩薩并地獄身者或智者依正法華具現菩薩界身又准釋論菩薩亦化地獄故知十界不可闕補遺云聲教熏習故曰聞熏聞而復修故曰聞修修必兼思三慧具矣修兼聞者顯耳根聞而復修也然說法華圓頓之法此經隨機大小者何耶法華為流通本經故說圓頓今直談體用故說隨機世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故令諸衆生於我身心獲十四種無畏功德一者由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫資中云由我不自觀音以觀觀者謂由我不觀所聽音聲但觀聞性也真際云由我不自觀音不循前塵也以觀觀者用無緣之慈觀彼世間觀音者也苕溪云聖人無已惟物是利故以觀音之智加彼觀聲之機於苦得脫不旋踵矣若夫止稱名號罔識聞熏善應未臻而責聖言之虗者是猶灑一杯之水救積薪之火不熄則謂水不勝火惑亦甚哉熏聞云罔識聞熏者謂無聞慧熏習之力也今順經文以觀觀者故須正取觀慧為機因此策其怠者及遮其謗者然有散心感應者亦由過去積善或是現在至誠之所招致必非淺植輕念者能通聖應傳曰小信未孚神弗福也菩薩利物豈不如之補遺云對衆生之他故云自行既不循前塵今以智加彼良由十四無畏與衆生同一悲仰推己昔日亦墮悲苦依仰圓通之理而得解脫今亦令衆生同依此理脫其悲苦故十四無畏皆先推己然後及物顯與衆生同一悲仰也緣前塵為生死所縛悲苦也今不自觀音反其聞性仰依圓通之理也二者知見旋復令諸衆生設入大火火不能燒三者觀聽旋復令諸衆生大水所漂水不能溺擕李云准天台釋火難有三種一果報火下從地獄上至初禪二惡業火通三界三煩惱火通三乘火難既然他皆倣此他皆倣此者水難三種果報水至二禪餘二同上彼羅剎難中以黑風為難亦由有三種果報風至三禪餘二同上乃至七難皆有觀行三義須者尋之補遺云涅槃云迦葉白佛彼第四禪以何因緣風不能吹水不能漂火不能燒佛告迦葉內外過患一切無故初禪過患內有覺觀外有火灾二禪過患內有歡喜外有水灾三禪過患內有喘息外有風灾彼第四禪內外過患一切悉無是故三灾不能及之然四明因釋消伏三毒引例三火云應知三種毒害捨傍從正受名不同如普門別行疏分別火難等相報火至初禪豈下諸有全無惑業蓋苦報為正也煩惱火通四教豈三乘人全無業報以煩惱為正也嶽師云所引三火例今三毒捨旁從正受名不同者不爾以謂三障不可皆受報名乃至三障皆受煩惱名也業報亦是四教所詮煩惱亦是三界所起兩師各據方圓共鑿今謂若乃三障通而論之三界六道四教三乘降佛極果以還無不有之今普門疏所解三火別取三界六道四教三乘被燒害善之義而說所以別取此義者為欲見當界當位有所難於此故也又復帖文舉事所說直指下界燒物之火故也消文釋義自有來由雖作三種約觀行解必須隨順帖文舉事難字去聲補遺云此下一一文中並須先明菩薩悲仰次同衆生必須求其自他悲仰同意知見旋復者見屬眼根知屬意根今從一根既脫六用同旋故雖耳根圓通亦通明知見旋復也知見屬心心屬火自行知見旋復則心體寂滅之火火無能為也如諸論所明初禪不能免火難內有覺觀即心也言是心聲並能致火灾矣孤山云達聲無聲水聲豈溺長水云聲能漂蕩如水騰波觀聽旋真塵相不起虗明湛寂何物能漂故令念者大水不溺補遺云今謂五行言之水屬腎腎主耳耳根能復其聽聞水亦不能為害矣良由內根消則外水亦伏體性同故也四者斷滅妄想心無殺害令諸衆生入諸鬼國鬼不能害五者聞熏成聞六根銷復同於聲聽能令衆生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動九道衆生莫非妄想其虗詐不實乃鬼之因妄想之尤者內滅其因雖入其國故不能害我矣孤山云聞熏成聞者熏於妄聞成真聞性耳根既復五根咸同具舉言六也補遺云熏妄聞成真聞六用俱復耳鼻舌身已成清淨縱遭橫逆無如我何苕溪云割水吹光等淮南子云光可見不可握水可循不可壞今云吹割性無搖動喻意不殊六者聞熏精明明遍法界則諸幽暗性不能全能令衆生藥叉羅剎鳩槃茶鬼及毗舍遮富單那等雖近其傍目不能視七者音性圓銷觀聽返入離諸塵妄能令衆生禁繫枷鎖所不能著八者滅音圓聞遍生慈力能令衆生經過險路賊不能劫補遺云聞熏精明者見真如理無幽不燭彼諸幽冥固為我所破故曰性不能全苕溪云藥叉有三種一在地二在虗空三在天孤山云羅剎云可畏鳩槃茶厭魅鬼毗舍遮噉精氣鬼富單那熱病鬼補遺云音性圓銷六用返入言觀聽者且舉其二耳六用返入六塵俱消塵縛已超則禁繫之事成鎖夢關空耳滅音圓聞得體也遍生慈力起用也慈能攝物彼偷兒輩如何陸梁九者熏聞離塵色所不劫能令一切多淫衆生遠離貪欲十者純音無塵根境圓融無對所對能令一切忿恨衆生離諸瞋恚十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗苕溪云准天台釋三毒通界內外內謂思惑外謂無明二乘以欣涅槃名貪厭生死為瞋迷中道即癡菩薩廣求佛法訶惡二乘未了佛性皆是三毒補遺云六用既脫色塵消亡豈能劫我常心耶故曰色不能劫純音中道法音也無塵者非同世間音聲有塵染相也中道法音不落根境故對待已亡外之嫌恨無從生也阿顛迦癡暗人也我以銷六塵復真明推己及之令離暗鈍也孤山云阿顛迦亦云阿闡底迦此翻無欲不樂欲涅槃也十二者融形復聞不動道場涉入世間不壞世界能遍十方供養微塵諸佛如來各各佛邊為法王子能令法界無子衆生欲求男者誕生福德智慧之男十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令法界無子衆生欲生女者誕生端正福德柔順衆人愛敬有相之女智者引阿含明地獄已上乃至欲天皆有無子之苦令所求者悉令滿心擕李云上云涉入世間不壞世界即方便智方便屬權權能幹事故生於男次云立大圓鏡空如來藏即屬實智實智詣理理能含育故生於女如淨名云智度菩薩母方便以為父即其義焉擕李云以方便實智用配二文固有眉目今更作內外以銷其文融形復聞只是因耳復聞六根俱脫形即身根俱脫中別言耳內既復性外身自在故能依中現正等遊歷十方供養諸佛此言男子外事也古者生男懸弧於門表男子有四方志故今以形身自在應彼求男也六根圓通明照無二此言內心明也含十方界心具三千也大圓鏡智空如來藏此言內心冥三諦也含十方俗也鏡智空也如來藏中也內心冥理應彼求女也言含言藏皆欲表女子生育之事言鏡亦女子所覽言空若處子時也承順若有三從之義祕密法明如在闥中受領無失中饋之職也經文既欲推己證以應彼求則句句不徒然如天台明表法之義也融通形礙旋復真聞所以不動道場涉入世界身無限量遍至十方紹繼法王種姓不斷六根圓遍融通照明含現十方無二無別唯一寶觀名大圓鏡復能承順微塵諸佛受領含容無量法門不失不壞名為空藏十四者此三千大千世界百億日月現住世間諸法王子有六十二恆河沙數修法垂範教化衆生隨順衆生方便智慧各各不同由我所得圓通本根發妙耳門然後身心微妙含容周遍法界能令衆生持我名號與彼共持六十二恆河沙諸法王子二人福德正等無異世尊我一名號與彼衆多名號無異由我修習得真圓通是名十四施無畏力福備衆生孤山云法華疏云圓人唯一偏人則多格六十二億偏菩薩也又別行疏云一多性不可得無有二相一則非多同入實際實際正等是故無異法華論云畢竟決定知法故法即法性真如法身是故六十二億與觀音無別嘗試議之法華為流通本經故智者二疏約待絶二妙之義互顯其文格偏等圓相待義也實際正等絶待義也況復本論以法性釋等今經為對諸聖說圓通本根校量勝劣然則兩經義趣不可全同儻或一向將此例彼豈唯見智者未曉抑亦觀天親弗明五品四依便成虗說蓋此方衆生耳根利故受道者多所以觀音化勝餘根鈍故受道者少所以諸聖化劣是知行位雖齊對機有異總彼恆河沙數但敵觀音一人故使持名二福正等補遺云此中以一敵多意者乃是偏圓之義觀音用圓六十二恆河沙用偏偏教益物豈能敵圓此皆從用偏用圓益物以為比挍欲彰觀音圓實為勝若六十二恆河沙用實無以為優劣故經云修法垂範教化衆生隨順衆生方便智慧各各不同豈非指其用偏耶由我所得圓通本根乃至能令衆生等豈非用實益物耶文中雖有發妙耳門之言非直指耳根對諸根簡優劣義此中因明耳根圓通故言發妙耳門為圓通對彼用偏為揀耳修法垂範之言方便智慧之語豈指餘根鈍劣耶法華文句約偏對以為比挍蓋暗與此經合以耳根對餘根簡却疑智者不見此經吳興亦是此說噫吾祖可謂無遠孫矣今仰窺經旨必含二途一約化用二約實本若就諸菩薩化用言之乃有偏圓之異如善財參文殊彌勒普賢乃用圓以接之中道知識其餘用偏俗諦知識辭云不知彼法門也今觀音沒偏用圓故假設六十二億恆沙用偏以為比校觀音固勝矣經文正意雖如此必兼含平等之意若乃從諸菩薩實本則無優劣彼六十二雖多觀音一人雖少實際平等所以一能等多也經中正等無異亦具二意以一圓敵多偏功德正等故言正等無異雖云正等一固己勝矣若從實本多非多一非一同入實際故言正等此不分勝劣也雖有二向比校顯圓為正所以大師於文句中依入大乘論以法應比校作偏圓消之也應色之多偏教也法身之一圓意也次義不可缺却於別行疏出之蓋欲兩出而彰互有也又文句只用初義其旁正可見也然法華論何故只作後義須知一卷之文務在簡略其偏圓比校在文可見是以無說第恐亡本者起分別想招罪不淺故用此義以除疑想耳然何以知偏圓比校是經正意須知法華玄贊引十輪經云假使於彌勒妙吉祥觀自在普賢之類而為上首殑伽沙等諸大菩薩於百劫中至心歸依稱名念誦不如有人於念頃至歸依禮拜供養地藏菩薩云云既云不如乃比勝劣也故知凡偏贊之文比校為正而意含平等耳然何以知必含次意須知以楞嚴文顯彼普門品可也楞嚴既云諸法王子又曰隨順衆生則知六十二億行位已高自證已深經為比校化用優劣其實本之義固無優劣故知經文密含此意也是則今楞嚴偏圓化用實本體同二義最顯符合智者頗同天親而長水擕李失其正途而用次意孤山雖從初義釋義乖違興福疏中頗知正轍但其科目略存文理不說故彼疏曰初彰群智劣次顯己功圓三校福齊諸四歎名圓敵彼文熏聞云百億日月准俱舍頌云四大洲日月蘇彌盧欲天梵世各一千說名小千界此小千千倍說名一中千此千倍大千皆同一成壞是則小千界有一千日月中千界有十億日月大千界有萬億日月故南山云三千世界其中四洲山王日月等則有萬億之數是也今大千云百億者恐西天數有大小應以一百小億為一大億乃成百億日月修法垂範者修法約自行除耳根外隨於何根修習行法也垂範約化他即以自行垂為模範轉化於他也補遺云大論云此河是佛生處遊行處弟子眼見故以為喻問恆河中沙為有幾許答一切算數所不能知唯有佛法身菩薩能知其數世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現衆多妙容能說無邊祕密神呪其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護衆生得大自在興福云妙妙聞心者初妙則脫粘聲境後妙圓聽無遺孤山云根境圓融無能無所故曰妙妙心精遺聞者一根脫粘也見聞覺知不能分隔者五根圓拔也孤山云首表法身超出二邊臂表解脫提拔衆苦目表般若照了萬境或慈或威結現首也或定或慧結臂目也其容慈故攝中道之善其容威故折二邊之惡法身明矣或定則手以止散解脫著矣或慧則目以觀昏般若顯矣三德圓融既內無滯礙故外益衆生而得自在以人之首只一故從畸數以增臂乃有二故從耦以辨人眼二天或三故兼畸耦以明真際云爍迦羅類拔折羅即金剛也擕李云母陀羅或云印義二者由我聞思脫出六塵如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸衆生是故十方微塵國土皆名我為施無畏者三者由我修習本妙圓通清淨本根所遊世界皆令衆生捨身珍寶求我哀愍四者我得佛心證於究竟能以珍寶種種供養十方如來傍及法界六道衆生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃苕溪云此四不思議前二屬應後二對機應中備顯形聲二益初文雖云說呪而正示形益即應身功用也次文雖復現形而正示聲益即名稱普聞也機中具明因果二相光明修因則六度之中略舉布施俾求福故後明感果則世出世願靡不成就令得樂故此之四段經文乃明現身說法拔苦與樂為次第耳前三十二應十四無畏雖亦明現身說法拔苦與樂乃是總相示之今委明隨機之相靡所不現故四皆曰不思議也如一首至八萬四千等乃至與樂蓋亦如此之多非不思議能如此乎第三既云求我哀愍即是拔苦也捨身珍寶者乃明求拔苦人用為禱請耳然拔苦文所以甚略者以現身說法顯之也八萬四千首臂等現差別身者為拔苦故也現身說法能救如此所救之苦固亦如之所以得略也佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩提成就菩提斯為第一補遺云耳識初緣音聲故曰緣心不循前塵故曰自在反聞觀性故曰入流圓照三昧即一行三昧謂初緣實相造境即中無不真實繫緣法界一念法界故云緣心自在此一經所宗首楞嚴定文殊所讚得真圓通諸佛交光同慶此說世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名遍十方界苕溪云按觀音三昧經及大悲經並云此菩薩過去久已成佛號正法明又悲華經說往昔寶藏如來授不瞬太子記名觀世音熏聞云彼云往昔過恆河沙阿僧祇劫此佛世界名刪提嵐劫名善持有轉輪王名無諍念有一大臣名曰寶海是梵志種生一子有三十二相八十種好出家成佛號曰寶藏輪王千子第一太子名曰不瞬請佛及僧終竟三月奉諸供養太子願言我所有一切善根盡回向佛道願我行菩薩道時有衆生受諸苦惱怖畏等事退失正法墮大暗處憂愁孤窮無有救獲若能念我稱我名字我天耳所聞天眼所見是諸衆生若不免苦者我終不成阿耨菩提時寶藏佛即為授記汝觀天人及三惡道一切衆生生大悲心欲斷諸苦住安樂故今當字汝為觀世音乃至云無量壽佛般涅槃已第二恆河沙阿僧祇劫後分初夜分中正法滅盡夜後分中彼土轉名一切珍寶所成世界所有種種莊嚴安樂世界所不能及汝於後夜成等正覺號遍出一切光明功德山王如來應供等然則悲華與今經皆覆本垂迹之名今得圓通即太子後身也補遺云今謂此正釋出觀音之名於聞聽中用觀觀其聞性方成圓明從德立名故不云聞而云觀也是則云觀已兼其聽矣由我以觀為聽故能圓明前云觀聽旋復亦此意爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢林木池沼皆演法音交光相羅如寶絲網是諸大衆得未曾有一切普獲金剛三昧孤山云寶光交照表自他之理互融林木演音顯依正之性不二印前所證盡契佛心初住已上能破堅惑皆號金剛三昧此應通指圓定名為金剛亦首楞嚴之異名也如下文明位中云是種種地皆以金剛觀察等孤山別指初住以上能破堅惑蓋約多分說之長水云耳根圓通五根總攝稱可諸佛說證皆同及大菩薩阿羅漢者即前二十五聖說圓通人印說皆是無非圓通故放寶光流灌其頂林木池沼演法音者既號圓音彼我同唱智周萬物何法不宣交光如網圓張大教也釋要云初諸佛交光林木演法者法法塵塵無非智體故智光及處無不演妙也五體放光者表餘五根一時解脫圓張大教者大教之網圓張漉十界魚出生死河至菩提岸也耳聞圓觀頂觸智光觀音三昧一時同獲此則二十四聖同會觀音一門皆得名為金剛三昧也補遺云彼此特云五體放光證前十八界皆圓通也林沼演法表下文殊談國土皆一心變也即時天雨百寶蓮華青黃赤白間錯紛糅十方虗空成七寶色此娑婆界大地山河俱時不現唯見十方微塵國土合成一界梵唄詠歌自然敷奏苕溪云此表大衆於第一義天以四十位真因之華而嚴果德也又表發真歸元空界殞裂唯一寂光土是事希有故詠歌之補遺云天雨百寶華表百界千法均一理四色表四位間錯紛糅表一位具足諸位功德虗空成七寶色表七覺理遍一切法娑婆不現唯一佛土吳興表空界殞裂唯一寂光可也亦可云表上十八界差別已破圓通一理現前長水云法身體素天龍之所忽劣今將顯現如空寶嚴萬行集成故華間錯根塵消復法界圓成山河不現合成一界也釋要云百寶華者萬行因華莊嚴本有法身方彰妙果也山河不現九界依正一念全空合成一界佛界圓顯也谷響云梵唄詠歌者具言唄匿或曰婆師此翻讚歎乃是以梵天之音讚歎詠歌於三寶也手鑑云善見云聽汝等作唄唄者言說之辭也佛雖言說未知說何等法諸比丘問佛佛聽從修多羅至優婆提舍隨意所說今此方梵音准宣驗記魏陳王居魚山夜間聞岩岫門響韻記憶因經中伽陀教僧作梵唄陳思王即曹子建魏武帝第四太子十歲屬文下筆便成初不曾改每讀佛經輒留連嗟玩以為至道之宗極也因遊魚山忽聞空中梵天音響清雅哀婉獨聽良久從者咸聞乃模其聲即寫為梵唄撰文製音讚歎三寶傳為後式也如僧護比丘向樹下坐高聲作唄群仙聞之證不還果又諸天聞之悉生歡喜於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各說最初成道方便皆言修習真實圓通長水云若以三科七大專門獨善隨根各入此皆方便若於此界現在未來設教通方上中下機咸得悟入永為衆生方便成道者於二十五何門為勝由先所請十方如來得成菩提妙三摩提最初方便故今令選通途法門使其成就補遺云成道方便者方便乃善巧之名又云二十五無學從其敘昔證言之有小乘四果之無學菩薩地位之無學從其敘圓通言之既已開顯俱菩薩之無學耳彼等修行實無優劣前後差別我今欲令阿難開悟二十五行誰當其根補遺云此中實無優劣會同諸聖圓通理齊也誰當其根從土順機彰別義也須知十八界門根根通根根別入道皆通順土皆別下文以耳根當此土機為別乃別義之規模耳須知佛意欲顯根根皆別方是盡理如香積土必以味塵別為圓通門使文殊在彼則觀音耳根固為所揀今仰窺佛意先列二十五聖並云入圓通門佛印定云實無優劣顯十八界皆圓通門此通意也又令揀選當機易得成就取耳根者顯十八界根根皆別順土義也則知取耳根圓通欲彰十八界根根順土皆別之義非特只為顯觀音之勝耳須知通處常別別處常通也兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就苕溪云上從證性會同圓通今為逗根令簡方便性如華屋根如入門若得其門方受其賜世人以解為證請思最初入道方便與二十五聖孰為其倫乎文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神說偈對佛此下欲簡圓通先明覺性次辨迷妄後示歸元於歸元中選耳根為易文殊既與觀音同證故奉佛慈旨有自來矣覺海性澄圓圓澄覺元妙真覺之性譬如大海澄湛圓融皆喻寂而常照也復牒圓澄所喻之覺示其本來照而常寂故曰元妙此類前文性覺妙明本覺明妙但法喻相參耳澄圓二字皆喻須知澄取定義圓取動義水之為物逐器大小乘流遇坎無所不可圓融不拘之義故對於照有應物之義也圓澄喻也覺元妙法也覺而元妙照而寂也上句覺性二字亦約二法明寂照但與喻相參欲成句逗故不次耳元明照生所所立照性亡迷妄有虗空依空立世界想澄成國土知覺乃衆生真際云圓明照生所等者於彼元明性上妄生照用而形所相熏聞云照即能見相所即境界相有相當情無相則隱故照性亡苕溪云照字義通真妄猶明覺二義也故前文云性覺必明妄為明覺覺非所明因明立所所既妄立生汝妄能迷妄有虗空等此乃無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異是知虗空為同世界國土為異衆生即有為法無同無異熏聞云想澄成國土知覺乃衆生謂情與無情皆妄想所成如天親說有分別及無分別皆名為識有分別名識識無分別名似塵識今想澄成國土即似塵識也知覺乃衆生即識識也宗唯識者但謂此識不與真如同以一心為源故說真如無覺無知凝然不變不許隨緣唯談八識生起諸法由是與法性宗義同水火若曉今家破四性已隨宜而說情通妙契諍計咸失纂注云由無明迷乎覺性遂乃變成頑空所有世界皆依空立又妄想澄凝則成三土染礙妄想知覺則成九界紛擾空生大覺中如海一漚發有漏微塵國皆依空所生苕溪云有漏兼有情熏聞云漏謂漏失屬煩惱故律云癡人造業開諸漏門是也漚滅空本無況復諸三有三有含情器有因有果故婆沙以苦集二諦為三有體妄元無本畢竟不生故虗空如漚不滅而滅三有如幻不無而無歸元性無二方便有多門補遺云上句言所入圓通下句指十八界七大得涅槃之心則易明差別之智為難聖性無不通順逆皆方便上句指二十五聖無施不可下句約機順土故逆順之義生焉如此土耳根入道則順餘根入道則逆他土例說雖有逆順皆方便門如此土亦有餘根入道但遲而不速亦方便也苕溪云應亦以聲聞所修為逆菩薩所修為順又菩薩中漸次為逆圓頓曰順下文云淺深同說法其義例然初心入三昧遲速不同倫苕溪云當根則速差機則遲日劫相倍是不同類補遺云此土凡夫入道之人欲入三昧於一十八界七大有遲速之義耳根入道則速所以下取之餘根入道則遲所以去之如來上文以諸聖修行實無優劣又言二十五行誰當其根只是將十八界七大法相對此土機宜揀選不能揀諸聖圓通也歷觀下文並將十八界七大法相對此土凡夫根境揀宜不宜更無一言指斥諸聖圓通為失也如初色塵則曰塵染不明徹如何獲圓通且優波尼沙陀析色至空又曰妙色密圓豈不於色精了明徹揀聲塵云音聲雜語言一非含一切且陳那於聲明悟又曰妙音密圓如何却云雜語言不含一切是知諸聖雖得圓通若以聲色對今初心只成塵礙雜相不能入圓通也色想結成塵精了不能徹如何不明徹於是獲圓通苕溪云初色塵色由妄想結成諸塵塵質留礙故於精明了別之性不能通徹音聲雜語言但伊名句味一非含一切云何獲圓通孤山云聲塵中雜謂種種語言而此語言但唯名句味耳新翻皆云名句文釋要云名詮自性如云火秪詮得火更不含水風等并是何火等句詮差別即言炭火艾火等文即是字為二所依古以文為味者字能顯二如味能顯食中之醎淡也問陳那悟聲塵與觀音耳根相類今簡以為非者蓋聲是佛語根乃自身認塵則著他語言觀根則了己心性是心聲塵亦為所簡香以合中知離則元無有不恆其所覺云何獲圓通味性非本然要以味時有其覺不恆一云何獲圓通觸以所觸明無所不明觸合離性非定云何獲圓通熏聞云香味觸塵皆合中知離則不覺簡意大同法稱為內塵憑塵必有所能所非遍涉云何獲圓通真際云獨散遍緣不依五根所取稱為內塵補遺云法塵為所緣意為能緣但心無並慮如緣善心數則不能緣惡故曰非遍涉既非遍涉於凡夫法塵豈獲圓通若在迦葉圓通則曰妙法開明豈可斥曰能所非遍涉乎見性雖洞然明前不明後四維虧一半云何獲圓通擕李云初眼根縱其見性雖云洞然奪其見相故不明後長水云前方全明後方全暗左右傍觀三分之二故云四維虧一半補遺云此只就凡夫眼根見物亦有洞然不昧者欲以不明後奪之故以洞然縱之耳前文自將四隅以明凡夫所觀只得一半若四維即同四方不成一半矣此中欲將一半奪之特指四隅耳鼻息出入通現前無交氣支離匪涉入云何獲圓通舌非入無端因味生覺了味亡了無有云何獲圓通苕溪云舌根為識所依亦名舌入今文語倒但是舌入非無端耳身與所觸同各非圓覺觀涯量不冥會云何獲圓通內身外物能所相觸方有覺觀離中則無故云各非等若謂合中有者其如物非體知成敵兩立故云涯量等知根雜亂思湛了終無見想念不可脫云何獲圓通湛了終無見如前精了不能徹也以雜亂思於湛了性終不能見補遺云此亦就凡夫根境以辨聖人明前不明後乃凡夫那律半頭天眼十方俱明方是神通之相耳如上自敘曰我不因眼觀見十方豈有神通但明前邪鼻根通利方有出入之息若出入息支分之時則缺於中交兩相涉入乃是中交六根中唯鼻舌身三乃合中知此三中鼻根聞氣似不待其香入身遇寒暑冷暖似不待觸入唯舌根非味入則舌無知言舌非味入則無端由知為舌根也故下句便云因味生覺了也身根中各言身觸兩離非不也圓成也身觸兩離則不成覺觀身觸二物雖合各有邊畔非能冥會涯量猶言邊畔凡夫意根多有亂思不能照理豈可入圓通耶若在空生從曠劫來心得無礙頓入如來寶明空海如何斥云雜亂思不見湛了耶識見雜三和詰本稱非相自體先無定云何獲圓通擕李云論云二和生識謂根境和合識生其中今言三和者能所合說也根境乖時識自無體故云無定心聞洞十方生於大因力初心不能入云何獲圓通孤山云耳識中唯以心聞不由根聽斯是分真所得故非初心能入長水云普賢菩薩本用心聞分別衆生所有知見得大自在今揀太高收機不盡既法界為體心聞為用故洞十方此由普賢因修大行之所感故中下之機於斯絶分故云不能入以衆生心中發明普賢行者方現其身非同觀音觸物隨現鼻想本權機秪令攝心住住成心所住云何獲圓通狐山云數息乃調心方便故曰權機機謀也亦方便之異名耳資中云若心有住則為非住有所住著也非觀也真則無住補遺云此亦就此方凡夫言之若使凡夫初心依此數息守心於鼻端乃成有相縛心之法圓通安在如世之癡禪兀坐安能入道若在難陀見息化為光明乃至云息久發明明圓滅漏安得斥云只令攝心住而已耶說法弄音文開悟先成者名句非無漏云何獲圓通說法弄音文因斥末俗講者不務談理趣衒其音聲雜以外典以為文華若玩弄然若欲於此說法舌根中求開悟必資先有師教開解或宿有善種則或有之不則無也良由能說法者必先學習亦善種宿成今日開悟之功不獨在舌根矣況所說名句非入無漏之器故今揀之持犯但束身非身無所束元非遍一切云何獲圓通上首先以小乘束身次以大乘束心然後身心一切通達今言今日初心欲以持戒執身從身識入道則不可何則徒能束身心不能束言非身則心是也元非遍一切謂不能遍束身之與心也然則今云身識豈不是心須知大乘菩薩所戒單心小乘所治身口兼意若望單心只成身口神通本宿因何關法分別念緣非離物云何獲圓通熏聞云六神通中漏盡通是意識內證前五通是意識外用斯由目連宿因成熟從三迦葉邊聞法而發且非初心入道軌則是故簡之苕溪云目連神通由宿習所得雖云旋湛心光發宣非關於法分別而現又小乘神通皆是作意熏聞云謂一心秪能作一不同大乘無記化化通也緣物則有離物則亡谷響云小乘修通天眼則緣障外色修之天耳則緣障外聲修之餘通皆然今謂身如意通中轉變他身及世間所有隨心自在亦是念緣非離物相補遺云目連得通蓋由聞法得道然後於意識禪定發於神通非獨意識而已法謂法塵分別即意識舉所顯能耳今欲對此土初心之人只從意識入道者意識必有緣念不能離所緣塵物如何可得圓通耶若以地性觀堅礙非通達有為非聖性云何獲圓通初地大持地菩薩觀身微塵與世界微塵等無差別乃至刀兵亦無所觸豈可斥令堅礙非通達耶驗知此中全以大地法相對初心以簡若以水性觀想念非真實如如非覺觀云何獲圓通熏聞云水大中如如非覺觀謂如如之理非由水之覺觀所能契會補遺云初心欲用尋伺心想念水性豈能契如如圓通耶覺觀即尋伺也言能所不合故曰非如如若以火性觀厭有非真離非初心方便云何獲圓通火大厭有烏芻瑟摩厭欲觀火非真解脫初心欲學火頭厭欲火之有只成取捨事行不能淫欲即是道之真離欲火也抑又若依火頭遍觀火大化淫心成智慧火此又非初心所宜若初心治欲自有方便如五停心不淨是也火頭發大心後生大寶焰已成真離但初心非及耳若以風性觀動寂非無對對非無上覺云何獲圓通風是動性由動有寂動寂相對不成圓通故為所簡若以空性觀昏鈍先非覺無覺異菩提云何獲圓通先非覺從迷空是無明故屬昏鈍望今妄心故先非覺若以識性觀觀識非常住存心乃虗妄云何獲圓通熏聞云非常初心以識為境則念念流動入道良難故孤山云心本無心存之則妄補遺云彌勒唯心識觀豈不達常住耶驗知就初心觀識不能即陰是真耳諸行是無常念性元生滅因果今殊感云何獲圓通諸行是無常等者蓋言今日初心欲依念根通則不可初心動念即屬行陰無常此念性既在凡位元是生滅如何以生滅因尅圓通果耶苕溪云已上二十四聖皆由所得圓通本根非此土當根乃為所簡豈文殊之有慢心諸聖之有慚德文殊所簡去者既而下交所取耳根當此土機須約十八界在迷陰境而說但其中揀六識有約高位有約宿習為非初心能入此外為所揀去文殊必先立以耳根當此土機故也不然一十八界皆可以起衆生根諸聖本初隨緣撞著雖在文殊諒不可揀今此自循六塵六根六識七大諸法相而揀何曾干涉諸聖邊事若云須知揀聖全是揀機未為盡理須知揀法全是揀機我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入離苦得解脫長水云娑婆世界耳根最利故用音聲以為佛事手鑑云由前問云何方便門得易成就故今對曰實以聞中入謂此土初心依乎耳根悟道則速三昧易成以餘根鈍故悟道則遲觀行難就由從耳根發識聞聲引生第六識中聞慧緣名句聞熏成解心種子納為教體教體既成然後思惟修習入三摩提成大解脫苕溪云教體應具聲名句文今言音聞者以聲是實法餘三是假攝假從實故但云音音即所聞之境聞即能聞之根舉所顯能而正示聞性故云欲取等又音即一切音聲蓋本性之音耳相宗之義音即聲識聞性即耳識即見相二分故音聲不出自之本性前文由我不自觀音以觀觀者即反聞也下文云圓真實通真實常真實乃顯音聞之性反聞故即空觀空則清淨故名梵音以音聞之性聞聲救苦故即假故名海潮音以正反聞時不失尋聲救苦應衆機時不離反聞自性則即中故名為妙音也良哉觀世音於恆沙劫中入微塵佛國得大自在力無畏施衆生妙音觀世音梵音海潮音救世悉安寧出世獲常住長水云初句總標歎次二句歎三十二應次二句歎十四無畏兼四不思議次二句歎德號補遺云書曰股肱良哉良善也觀音補處安養而助化娑婆皆股肱義孤山云智冥妙理故曰妙音悲化羣生故觀世音此約法歎也智冥理故無二邊染污如梵音清淨悲化生故赴十界機感如潮不過限此約吁歎也救世結潮音赴機出世結梵音冥理亦是令衆生先得世樂後獲常樂我今啓如來如觀音所說譬如人靜居十方俱擊鼓十處一時聞此則圓真實長水云此解脫德也熏聞云居坐也如禮記燕居間居然前觀音所陳三昧所得殊勝赴感不差周遍皆應十方十界也擊鼓機動也一時聞者應不失也應身無量即圓真實也目非觀障外口鼻亦復然身以合方知心念紛無緒隔垣聽音響遐邇俱可聞五根所不齊是則通真實長水云此般若德也孤山云口鼻身俱合中知若將以合方知句居上其義則順蓋語倒耳熏聞云心念紛無緒說文云緒絲端也言心念紛亂如絲之無端補遺云心之亂思多失念健忘如絲之失緒也以此明意根有障隔之義苕溪云此明圓通且寄耳用以顯聞性異於五根也用有時方遠近以量恐未達者謂之無常故有下文明常真實以顯也音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實長水云此法身德也真際云如羅睺羅擊鍾聲于聞中自有動靜說為有無非謂聞性是有無也世人若以不聞聲時號無聞者聞性已滅聲塵更起遣誰更聞是知聲有聞性不生聲無聞性不滅生滅既而遍離由是得名常真實也縱令在夢想不為不思無覺觀出思惟身心不能及如前重睡心想不行聞舂搗聲別作他物此時豈憶靜搖應知聞性不斷故云不為不思無覺觀出思惟者此既不與念想相應即出覺觀思惟之表譯人回文不盡故令語倒覺觀即尋伺也思惟即是遍行思也俱是心所皆不相應故名為出又覺是本覺即聞性也觀即是照此即順文夢聞舂搗之聲雖不思惟聞性不滅及乎覺觀盡聞不住覺所覺空則身心豈能及乎因粘上句不為不思無故言覺觀出於思惟耳今此娑婆國聲論得宣明衆生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流獲無妄阿難汝諦聽我承佛威力宣說金剛王如幻不思議佛母真三昧孤山云金剛空也如幻假也佛母中也汝聞微塵佛一切祕密門欲漏不先除畜聞成過誤將聞持佛佛何不自聞聞補遺云畜積乃自外而入非中有者也留滯言詮逐外而已孤山云將汝循聲之妄聞以持諸佛之言教何不反觀自性而求解脫乎上聞能觀之智下聞所觀之理聞非自然生因聲有名字旋聞與聲脫能脫欲誰名苕溪云上既警其自聞今乃略示修相先指妄聞非無緣生生必藉因因即聲教當以三慧旋此根境俱令脫黏所執若銷則能脫之慧復何名狀能脫亦亡也誰名之言即責其能亡之相也一根既返源六根成解脫見聞如幻翳三界若空華聞復翳根除塵銷覺圓淨淨極光通達寂照含虗空熏聞云復其本聞分破無明故名為除覺淨即分真智淨極光通達謂真智究竟若心起見則有不見之相心既離見即是光明遍照之義長水云淨極謂滿淨解脫圓也光通達謂滿覺般若備也寂照謂真理法身極也三德既圓三障永盡如大夢寤如蓮華開返觀世界欲誰留礙却來觀世間猶如夢中事摩登伽在夢誰能留汝形如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性苕溪云幻師譬真如幻作喻隨緣真妄和合變成六根如諸男女一機即耳根也應以旋聞聲脫為抽熏聞云如於木人抽斷耳根轉動之機則諸根動作一時俱息又應知要以一機抽機謂機關雖轉動如人元無主宰故智論云佛所說法皆無有我亦無我所但諸法和合假名衆生如機關木人雖能動作內無有主若觀上文云幻作諸男女似非木人恐是幻術使其木人故見諸根機動之相補遺云幻者假為之名非必如幻師幻藥化成男女但是假作木人即名幻師幻作耳六根亦如是元依一精明分成六和合一處成休復六用皆不成苕溪云元依一精明合前幻師妄為能依真僞所依分成等合文可見谷響云休善也善復其性也又休歇也歇脫粘合而復其性也塵垢應念銷成圓明淨妙餘塵尚諸學明極即如來苕溪云上二句登圓初住下二句從力至極大衆及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是熏聞云今謂機者亦應怗前抽機之喻補遺云反聞不循塵也聞自性者却以耳聞之性為所聞能聞是觀也前云何不自聞聞亦然上聞字是能觀下聞字是耳根聞性照其聞性寂然歸真耳此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最自餘諸方便皆是佛威神即事捨塵勞非是長修學淺深同說法苕溪云謂此方所有於諸方便而得悟者由佛之力苟他土以餘根為利耳根為鈍者反顯可知長水云前四句頌佛令揀成就下二句正指圓門顯是雅當自餘下五句明二十四聖各隨所因事相而成觀行皆是佛之威神方便令其得道非是久長修學淺深二機同入之法門也足顯觀音即是淺深二機同說同入長修學之法門耳釋要云即事捨塵勞者因權小而入實也又因淫因刺因水等事也補遺云唯自餘下五句方是揀諸聖圓通之文意云除耳根圓通之外其餘根入圓通之人乃是佛威神就餘根塵之事亦能捨塵勞但非久遠永則也蓋非正逗此土機宜故曰非是長修學也前歷法相揀則曰非圓通此揀能入人亦是圓通但不可為此土永則耳前二十四聖敘昔所證在小則淺在大則深此淺深者於餘根塵得入者不可與耳根聞說法為同故曰淺深同說法以上非是二字冠下故也相倍遲速不同倫又亦可凡此土於餘根塵得入者必先同聞說法以聲教為本方能入道故曰皆是佛威神及經淺深同說也所以荊溪云此土入者不假餘塵雖有滅後色經淨名香飯及以法行思惟悟等並以金口聲教為本頂禮如來藏無漏不思議願加被未來於此門無惑方便易成就堪以教阿難及末劫沉淪但以此根修圓通超餘者真實心如是長水云如來藏即一體三寶具足無漏性功德故於是阿難及諸大衆身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路文殊指已選圓通心一會之衆根器各異大小不同前文觀音說竟即感諸佛放光互來灌頂兼灌大菩薩及阿羅漢受彼光者一時俱獲金剛三昧此即顯會二十四聖諸別觀門一時圓入觀音修證今此阿難及諸初心聞說偈已隨其位次悟入有異阿難等方悟圓通從耳根入猶未有證故云明了其家所歸道路手鑑云最初語云不知常住真心乃至不知七大圓融洎乎知者即解中之悟也次請云示我本發心路復云未達圓通本根佛令諸聖各說初門又敕文殊選令易入遂領云是中修行得無疑惑即行中之悟也斯則於解於行坦然明白可舉而行故有了家歸路之喻也未證明矣普會大衆天龍八部有學二乘及諸一切新發心菩薩其數凡有十恆河沙皆得本心遠塵離垢獲法眼淨資中云莊嚴論法眼淨初地見道也若依圓教即十住初心補遺云以小乘法眼淨乃初果見道故別圓擬之初地初住也若據天台破塵沙為法眼淨當在圓家八信已上性比丘尼聞說偈已成阿羅漢孤山云阿羅漢其名雖小其證乃圓准涅槃四依品第四依人名阿羅漢苕溪云四卷指登伽方得三果約圓位收之即七信已前也此中若用四依判位恐升之太高以第四依之住第十地故秪應示作聲聞同除四住證阿羅漢如涅槃中聞常取果之比也涅槃解圓行漸權用小果蘇息即自入圓也登伽若以圓位配之前得三果圓七信已前今云羅漢正入七信所謂名偏義圓耳無量衆生皆發無等等阿耨多羅三藐三菩提心按天台釋法華分別功德品發菩提心初入十信也故仁王般若云十善菩薩發大心長別三界苦輪海補遺云發心者必以真如妙理平等其心蓋無等而論等耳良由心佛無二何所論等乎阿難整衣服於大衆中合掌頂禮心迹圓明悲欣交集欲益未來諸衆生故稽首白佛補遺云心迹猶言心境也苕溪云悲昔不聞欣今得悟又念未來衆生未悟故悲觀現在大衆得益故欣圓明即是心所行路故云心迹領悟既深故下云無疑惑大悲世尊我今已悟成佛法門是中修行得無疑惑常聞如來說如是言自未得度先度人者菩薩發心自覺己圓能覺他者如來應世我雖未度願度末劫一切衆生菩薩四誓以度人為先如來十號以應世為本當知五住究盡二死永亡方云得度世尊此諸衆生去佛漸遠邪師說法如恆河沙欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈長水云前雖廣說圓通修證凡夫始學障難尤深況末代邪宗紛然競起邪言惑正魔辨逼真濫迷既多朋流者衆若不甄辨妨正修行故以戒定慧驗之邪元自露故九十六種外道皆能修禪而無戒德涅槃經云魔尚能變身為佛豈不能為四依菩薩釋要云住前名初依五品十信位也初住至五住名二依六七二住名三依八九十住名四依通言依者以內有道法堪受人天依止也此約圓教配也恐惑亂世間故佛不說若言聽畜八不淨物者一田宅二種殖根栽三貯聚稻穀居監求利四奴婢人民五養群畜六金銀財寶七象牙刻鏤諸寶大牀等八銅鐵釜鑊等物是魔所說身外之物尚不許畜何況淫盜殺妄根本貪嗔世有愚人為魔所惑誹毀戒律言是小乘自稱大乘無礙自在下經廣破此等並是魔業故佛深誡是稱必定大乘明了之教阿難大權愍我將來必陷魔難故殷勤毀請永為真誡耳熏聞云邪師說法者如梁肅止觀統例云去聖久遠賢人不出庸昏之徒含識而已致使魔邪詭惑諸黨並熾空有云云為坑為穽有膠於文句不敢動者有流于渀浪不能住者有太遠而甘心不至者有太近而我身即是者有枯木而稱定者有竅號而稱慧者有奔走非道而言權者有假於鬼神而言通者有放心而言廣者有罕言而為密者有齒舌潛傳而為口訣者凡此之類自立為祖繼祖為家反經非聖昧者不覺今阿難請意謂當爾之時恐諸衆生為彼所惑云何令其攝心入定等爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救護衆生末劫沉溺汝今諦聽當為汝說阿難大衆唯然奉教佛告阿難汝常聞我毗奈耶中宣說修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學長水云此總明三學下別示戒學以定慧二門前已說故扶律談常同涅槃矣定慧二門前已說者從初至第四半經總是開解即慧學從阿難舉喻譬如天王賜與華屋至此是明定學故此下唯明戒學扶律談常者意明今經唯顯圓頓合明大乘持戒何以但明四根本戒以符合小乘律制為最後誡勗攝心為戒斷性亦無即大乘持戒故知名雖同小持心永殊孤山云毗奈耶此云律谷響云以此方法律之名翻彼土奈耶之語律者詮也詮量輕重犯不犯等風俗通曰皋陶謨虞造律律訓詮又尚書大傳曰丕天之大律注云奉天之大法法亦律也補遺云應知此中扶小律故淫戒居初部屬實故攝心為戒不同小乘治身口而已阿難云何攝心我名為戒若諸世界六道衆生其心不淫則不隨其生死相續孤山云大乘則殺戒居初慈心為本故小乘則淫戒居初人多喜犯故今扶小律以淫為初又小乘四重唯制殺人犯者既稀故居盜後今制殺畜須居盜先又四重制僧五戒制俗亦復不同大論淫欲雖不惱衆生心心繫縛故為大罪是以戒律中淫欲為初白衣不殺戒在前為求福故汝修三昧本出塵勞淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒衆各各自謂成無上道熏聞云縱有多智禪定現前如不斷淫必落魔道應知此約比丘等修正定者借使得入觀行位中若不斷淫正翻為邪即同魔業殺戒亦爾但隨定力三品分之暫得生天天報若終還墮地獄下云受魔福盡墮無間獄我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸衆生落愛見坑失菩提路落愛見坑者愛義可知見者如為衆生說行淫欲非障道法或復錯說淫欲是道等汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨戒雖與小乘名同而持隨有異此則一一內防心念輕重等持彼則事逐緣成輕重隨戒故先斷心淫故論云心生則種種法生心滅則種種法滅故與小乘持戒全別補遺云即律中受隨二戒也初誓受於師後隨而行之也熏聞云今謂先斷心淫乃防萌杜漸之意非謂起心便同初萹一例結罪如大經云言語嘲調壁外釧聲男女相追皆汙淨戒天台菩薩戒疏指此為汙定共戒又稱嘆摩觸等皆是淫戒方便悉犯輕垢當知大經云菩薩持遮制戒與性重戒等無差別者蓋慎小過如護夷愆耳是故阿難若不斷淫修禪定者如蒸砂石欲其成飯經百千劫只名熱砂何以故此非飯本砂石成故汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三塗必不能出如來涅槃何路修證必使淫機身心俱斷斷性亦無於佛菩提斯可希冀如我此說名為佛說不如此說即波旬說長水云正云波卑夜此翻惡者熏聞云或言殺者斷人善根故名殺違佛亂僧罪莫之大故名惡波旬訛也阿難又諸世界六道衆生其心不殺則不隨其生死相續汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒衆各各自謂成無上道帶殺修禪報為神道功深福厚為大力鬼即五嶽四瀆係祠祀者功淺福劣列在中下八部所管及大海邊羅剎國類因修定故皆有業通迅疾無礙不斷殺故受此惡趣為天驅役若不修禪及不修福但行殺害直入地獄無此差降我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸濕加以砂石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味擕李云涅槃迦葉問佛云何如來先許比丘三種淨肉佛言為隨事漸制故言三種者除人蛇象馬驢狗獅子狐猪獼猴十種之外若不見不聞不疑即名為淨今云五者加自死鳥殘二也涅槃復有九種淨肉即于三淨各開正罪及前後方便也谷響云于見聞疑中各說三相且見中三者見謂牽畜去時乃至見彼持刀臨殺時名方便見正殺時即根本正罪見殺已歡喜名後方便不見此三名為淨肉聞三亦爾疑中三者初瞥爾舉心名前方便分別思忖疑為己殺名根本正罪疑已歡喜名後方便無此三疑名為淨肉然諸律並明魚肉為食唯楞伽涅槃及以今經悉唱斷肉蓋說被機事有頓漸定慧既爾戒律亦然故梵網頓制對別圓之機久斷食肉但鹿苑以來毗尼漸制對藏機故開三淨化道將終則取漸歸頓于是三經俱唱斷肉楞伽且制藏通菩薩此經則兼制三乘洎至涅槃更獨制聲聞殷勤告示云云汝婆羅門西方四姓以婆羅門為上故彼五天悉號婆羅門國僧亦號為婆羅門僧華備西域記奈何如來滅度之後食衆生肉名為釋子汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沉生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界長水云似三摩地鬼神定也亦能令知過去未來事與善定相似如起信說汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大呌求人不聞此等名為欲隱彌露清淨比丘及諸菩薩於岐路行不踏生草況以手拔云何大悲取諸衆生血肉充食熏聞云草本無情外計云有佛遮其謗故制壞生清淨戒者尚兢持之況有情之類乎若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆為彼緣如人食其地中百穀足不離地必使身心於諸衆生若身身分身心二塗不服不食我說是人真解脫者資中云西國指此方為東彼尚不許雜野蠶綿作新臥具況有家蠶律中若有犯者斬銼塗埵終不衣也補遺云似若取犯者綿絹斬銼用塗漫泥埵示無用也酬還宿債即此生身捨此則逈別三界矣釋要云物理論云梁者黍稷之總名稻者粳糯之總名菽者衆豆之總名三穀各二十合六十蔬果之實合二十合為百穀荊公云此為凡夫求解脫者說所謂凡地修聖行者也若果地所習非凡夫法非聖人法苟可與彼為緣乃將所以度脫之如我此說名為佛說不如此說即波旬說阿難又復世界六道衆生其心不偷則不隨其生死相續汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著彼等群邪亦有徒衆各各自謂成無上道我滅度後末法之中多此妖邪熾盛世間潛匿奸欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散熏聞云潛匿奸欺則懷偷賊之心稱善知識則盜聖賢之名若據各自謂己得上人法此則已是犯大妄語今且用為取財之緣耳證真引十誦律有六種盜心謂苦切取謂乞憐狀輕慢取有現威狀以他名字取謂我是善知識抵突取謂慢罵使伏己受寄取謂昏昧他寄附出息取謂以錢責人之息者五分律有四種謂諂心曲心瞋心恐怖心四分律有十種謂黑暗心謂不知因果邪心謂不識正理曲戾心謂諂附恐怖心謂惟恐失之常有盜他物心既言常有則不問多寡必欲盜耳決定取若以力強取不問可否寄物取恐怖取謂以言恐之如談他地獄受報搖憾之事而取財見便取謂伺其可取之便而盜之倚託取謂假借權勢經云恐令失心即恐怖取失心即令前人失己正念俱墮邪見今謂此經潛匿奸欺等其言雖略足以蔽諸而偏指稱善知識者將非如來懸鑑末世其徒實繁耶持此經者當以自省我教比丘循方乞食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返梵網經自手作食犯輕垢罪律文犯墮云何賊人假我衣服販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量衆生墮無間獄附也謂附佛法以自活命又增也如販賣人加增其價自無實德而加增之以販賣而求為之師乃販賣佛法耳資中云涅槃邪正品云我滅後是魔波旬漸當壞亂我之正法乃至作比丘比丘尼像及阿羅漢等形以此有漏之身稱是無漏乃至說言無四波羅夷十三僧殘二不定法三十捨墮九十墮四懺悔法衆多學法七滅諍等無偷蘭遮亦無五逆等罪乃一闡提乃至若犯如是等罪亦無有報如是說者並是魔說云云常聞冷齊夜話云曾於夏月道逢禪者問所從曰閩中飫生荔技而還又問此復何之曰欲到盧山讀未見耳豫曰子何破夏而出曰夏制豈為我輩設耶彼文嗚呼何無識之甚乎豈有輕佛制而口腹是急尚欲稱之哉往往無識蹈其跡而輕佛制者多矣疑誤墮獄可弗信歟若我滅後其有比丘發心決定修三摩地能於如來形像之前身燃一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心孤山云盜者取他依報資于己身今損正報以供上聖故能翻破無始盜業補遺荊公苕溪釋要云法華藥王本事品中云有人問律制燒身得蘭燒指得吉此中讚燒其事如何今為答之大小開制教法不同小制結遇大制令燒故梵網中若不燒者非出家菩薩豈獨令俗而不制道故知順小行易不燒何難從大乘難燒乃不易世以不持為大則小大俱傾手著𦚾曰揖酈食其初見沛公方以兩女洗足酈生長揖不拜長揖謂似欲揖而去也今云長揖世間亦取謝絶之意若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異苕溪云馬麥緣在興起行經云佛昔于迦葉佛時為婆羅門博通典籍教五百童子因王設會請佛及僧有一比丘病不能赴佛及大衆食已還時為病比丘請食過梵志山梵志聞食香美便與嫉妬曰此髠頭沙門正應食馬麥不應食此甘饌之供告諸童子童子曰此等師主亦應食馬麥佛告舍利弗爾時婆羅門則我身是五百童子今五百羅漢是病比丘即彌勒菩薩是以是因緣我與卿等經歷地獄無數千歲今雖成道爾時殘緣故于毗蘭邑食馬麥九十日也又中本起經明舍衛國隨蘭郡有婆羅門名阿耆達多請佛與五百比丘三月供食時婆羅門為天魔所惑耽荒五欲退入後宮其郡既飢人不好道佛與比丘各且分衛三日空還時有馬師減麥飯佛及比丘等云云長水云前云摩登伽在夢誰能留汝形今云縱成無為必酬宿債者此示業報不亡成無為後現有為身尚還宿債況全未離有為而欲妄逃業果其可得乎汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復谷響云巵飲酒器也若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生於大集會合掌禮衆有人捶詈同於稱讚必使身心二俱捐捨身肉骨血與衆生共不將如來不了義說回為己解以誤初學佛印是人得真三昧熏聞云寶雲經云凡乞食分為四分一分奉同梵行者一分與窮乞人一分與諸恩神一分自食上有人等二句是捨心下身肉等二句是捨身亦可捨身之際須亡能捨之心故智論云捨身易捨心難苕溪云法華以前圓教之外皆不了義蓋權實未融故也今既開顯同法華圓豈將不了以誤初學若乃去實取權誘物從己者亦佛法之大盜歟長水云不將佛方便說回作自己心中獨悟之法以此詃惑無識初學得食淨肉必至了教一切皆斷不了義教將為究竟說也執楞伽云愚癡凡夫惡見所噬邪曲迷醉妄稱一切智說暉解云無智之人不了如來方便說法而乃妄稱一切智人作究竟說如我所說名為佛說不如此說即波旬說阿難如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩提不得清淨成愛見魔失如來種孤山云內貪名利欲他重己則成愛魔內起邪見以己均聖則成見魔所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養熏聞云未得三果未證無學此似見魔或求下正是愛魔長水云涅槃邪正品云若有說言我已得成阿耨菩提何以故以有佛性故有佛性者必定得成阿耨菩提當知是人犯波羅夷罪何以故雖有佛性以未修習諸善方便是故未見以不見故不得成就阿耨菩提故知略不修斷自稱即是佛者皆大妄語犯波羅夷非佛弟子是一顛迦銷滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沉三苦海不成三昧孤山云大妄語罪同於闡提熏聞云多羅樹形如棕櫚高者七八十尺我滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉或作沙門白衣居士人王宰官童男童女如是乃至淫女寡婦姦偷屠販與其同事稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢泄佛密因輕言未學長水云四攝利人作種種化初同其道後勸佛乘盡為益化非貪利己釋要云四攝者一布施以財法二施令彼附己也二愛語以軟順之語慰彼受道三利行三業利他令生恭敬四同事以種種形同其事業補遺云泄佛密因者凡應化同凡乃作佛之密因耳唯除命終陰有遺付孤山云非公灼惑衆但私示于人耳南嶽之言鐵輪天台之示五品功德鎧說偈真觀師屈指即其事焉谷響云南嶽臨終謂其徒曰吾一生望入銅輪領徒太早損己利他今但鐵天輪耳瓔珞以十輪喻位鐵信銅住銀行金向水精地摩尼等南嶽六根清淨即圓十信位也智者臨滅謂智朗曰吾不領衆必淨六根以損己益他但居五品求那跋摩此云功德鎧罽賓國王之子宋文帝時來于建康臨終作梵語說偈付弟子何沙羅寄歸西土文帝令譯乃言于闍婆林邑證得須斯兩果至死反屈二指以表之真觀錢塘天竺寺僧當隋文帝時及死及屈三指表證三果云何是人惑亂衆生成大妄語汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨是故阿難若不斷其大妄語者如刻人糞為旃檀形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲求佛菩提如噬臍人欲誰成就果招紆曲三塗報也擕李云噬臍喻求菩提不可及也熏聞云魯莊公六年楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬臍言若齧腹臍喻不可及若諸比丘心如直弦一切真實入三摩提永無魔事我印是人成就菩薩無上知覺如我所說名為佛說不如此說即波旬說
